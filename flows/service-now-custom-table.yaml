id: service_now_custom_table
namespace: company.team

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 * * *"

tasks:
  - id: fetch_products
    type: io.kestra.plugin.core.http.Request
    uri: https://dummyjson.com/products
    method: GET
  - id: iterate_products
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ outputs.fetch_products.body.products }}"
    tasks:
      - id: check_existing_product
        type: io.kestra.plugin.servicenow.Get
        domain: "{{ secret('SN_DOMAIN') }}"
        username: "{{ secret('SN_USERNAME') }}"
        password: "{{ secret('SN_PASSWORD') }}"
        table: product_data
        fields:
          - title
          - description
          - price
          - category
      - id: if_product_exists
        type: io.kestra.plugin.core.flow.If
        condition: "{{ outputs.check_existing_product.size > 0 }}"
        then:
          - id: update_product_in_servicenow
            type: io.kestra.plugin.servicenow.Update
            domain: "{{ secret('SN_DOMAIN') }}"
            username: "{{ secret('SN_USERNAME') }}"
            password: "{{ secret('SN_PASSWORD') }}"
            table: product_data
            sysId: "{{ outputs.check_existing_product.results[0].sys_id }}"
            data:
              title: "{{ taskrun.value.title }}"
              description: "{{ taskrun.value.description }}"
              price: "{{ taskrun.value.price }}"
              category: "{{ taskrun.value.category }}"
        else:
          - id: post_product_to_servicenow
            type: io.kestra.plugin.servicenow.Post
            domain: "{{ secret('SN_DOMAIN') }}"
            username: "{{ secret('SN_USERNAME') }}"
            password: "{{ secret('SN_PASSWORD') }}"
            table: product_data
            data:
              title: "{{ taskrun.value.title }}"
              description: "{{ taskrun.value.description }}"
              price: "{{ taskrun.value.price }}"
              category: "{{ taskrun.value.category }}"

extend:
  shortDescription: "This flow load data from an HTTP Request and adds it to a custom ServiceNow table"
  title: Update a custom ServiceNow table
  description: |
    This flow loads data from an HTTP Request and checks if records in a custom ServiceNow table should be updated or added as new.

    This flow requires:
    - Access to a ServiceNow instance
    - A user or service account with a username and password
      - Correct access and permissions for using the Tables API
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: This flow calls an API and loads data to a custom ServiceNow table.