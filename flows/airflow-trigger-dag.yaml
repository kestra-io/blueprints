id: airflow-trigger-dag
namespace: company.team

inputs:
  - id: dag_id
    type: STRING
    description: The Airflow DAG ID to trigger
    defaults: example_astronauts

tasks:
  - id: trigger_dag
    type: io.kestra.plugin.airflow.dags.TriggerDagRun
    description: Trigger an Airflow DAG run and wait for completion.
    baseUrl: "{{ secret('AIRFLOW_BASE_URL') }}"
    dagId: "{{ inputs.dag_id }}"
    wait: true
    pollFrequency: PT1S
    options:
      basicAuthUser: "{{ secret('AIRFLOW_USERNAME') }}"
      basicAuthPassword: "{{ secret('AIRFLOW_PASSWORD') }}"
    body:
      conf:
        source: kestra
        namespace: "{{ flow.namespace }}"
        flow: "{{ flow.id }}"
        task: "{{ task.id }}"
        execution: "{{ execution.id }}"

extend:
  shortDescription: "Trigger an Apache Airflow DAG from Kestra and wait for its completion."
  title: Trigger an Airflow DAG
  description: |
    This blueprint shows how to trigger an Apache Airflow DAG run from
    Kestra using the Airflow REST API. The task waits for the DAG run
    to complete and returns its final status.

    Kestra metadata (namespace, flow, execution) is passed to the DAG
    as custom configuration so you can trace which Kestra execution
    triggered each Airflow run.

    Prerequisites:
      - Secrets:
        - AIRFLOW_BASE_URL: Base URL of the Airflow instance (e.g. http://airflow:8080).
        - AIRFLOW_USERNAME: Airflow basic auth username.
        - AIRFLOW_PASSWORD: Airflow basic auth password.
      - Services:
        - An Apache Airflow instance with the REST API enabled.

    Expected outputs:
      - `{{ outputs.trigger_dag.dagId }}`: The triggered DAG ID.
      - `{{ outputs.trigger_dag.dagRunId }}`: The unique run identifier.
      - `{{ outputs.trigger_dag.state }}`: Final state (success, failed, etc.).

  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Trigger an Apache Airflow DAG from Kestra and wait for its completion. Automate cross-platform orchestration between Kestra and Airflow workflows.
