id: ansible-rolling-patch-wave
namespace: company.team
description: |
  Patch a fleet in waves with a health check between each. For every wave, run
  the Ansible patch playbook, then probe the service; the run stops if a wave
  comes back unhealthy, and Slack reports completion.

inputs:
  - id: waves
    type: ARRAY
    itemType: STRING
    description: Inventory group names to patch in order, one per wave.
  - id: health_check_url
    type: STRING
    description: URL probed after each wave to confirm the service is healthy.

tasks:
  - id: patch_waves
    type: io.kestra.plugin.core.flow.ForEach
    description: Patch each wave in order and health-check before continuing.
    values: "{{ inputs.waves }}"
    concurrencyLimit: 1
    tasks:
      - id: patch
        type: io.kestra.plugin.ansible.cli.AnsibleCLI
        description: Run the patch playbook against the current wave.
        taskRunner:
          type: io.kestra.plugin.core.runner.Process
        inputFiles:
          inventory.ini: |
            [{{ taskrun.value }}]
            # hosts for this wave are resolved from your dynamic inventory
          patch.yml: |
            ---
            - name: Apply OS updates
              hosts: all
              become: true
              tasks:
                - name: Update apt cache and upgrade
                  ansible.builtin.apt:
                    update_cache: true
                    upgrade: dist
        commands:
          - ansible-playbook -i inventory.ini patch.yml --limit {{ taskrun.value }}

      - id: health_check
        type: io.kestra.plugin.core.http.Request
        description: Confirm the service is healthy before the next wave.
        uri: "{{ inputs.health_check_url }}"
        method: GET

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Report that all waves patched successfully.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Rolling patch finished across {{ inputs.waves | length }} wave(s)."
      }

triggers:
  - id: monthly_patch
    type: io.kestra.plugin.core.trigger.Schedule
    description: Patch monthly in waves. Adjust or disable as needed.
    cron: "0 2 8 * *"
    disabled: true

extend:
  shortDescription: Patch a fleet wave by wave with Ansible, health-checking between waves and stopping on failure.
  title: Rolling Ansible Patch Wave with Health Gates
  metaTitle: Rolling Ansible Patch Wave with Health Gates
  description: |
    This blueprint patches a fleet safely, one wave at a time. For each wave it
    runs the Ansible patch playbook and then probes the service; because waves run
    sequentially and a failed health check stops the flow, a bad patch never rolls
    across the whole fleet. Slack reports when every wave is done.

    Prerequisites:
      - Secrets:
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - Ansible on the worker (Process runner), an inventory that resolves each wave group, and SSH reach to hosts.

    Quick start:
      1. Set SLACK_WEBHOOK_URL in your Kestra namespace.
      2. Pass the ordered list of inventory groups in waves and a health_check_url.
      3. Replace the inline inventory with your dynamic inventory source.

    Outputs:
      - outputs.patch_waves: per-wave patch and health-check results.

    Notes:
      - concurrencyLimit 1 makes waves strictly sequential so failures halt the rollout.
      - The health check fails the flow on a non-2xx response, stopping further waves.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Patch a fleet wave by wave with Ansible, health-checking between waves and stopping the rollout on failure.
