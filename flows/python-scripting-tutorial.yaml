id: python-scripting-tutorial
namespace: company.team
tasks:
  - id: sample_data
    type: io.kestra.plugin.scripts.python.Script
    description: "Lesson setup: creates a sample list of users with names and birth dates."
    script: |
      import json
      from kestra import Kestra

      users = [
          {"firstName": "Alice", "lastName": "Smith", "birthDate": "1990-05-15"},
          {"firstName": "Bob", "lastName": "Jones", "birthDate": "1985-11-22"},
          {"firstName": "Charlie", "lastName": "Brown", "birthDate": "2001-02-10"},
          {"firstName": "Alex", "lastName": "Garcia", "birthDate": "1995-07-30"}
      ]

      Kestra.outputs({"users": json.dumps(users)})

  - id: process_each_user
    type: io.kestra.plugin.scripts.python.Script
    description: "Lesson 1: Process each user to compute full name and age."
    script: |
      import json
      from datetime import datetime
      from kestra import Kestra

      # Load the users from the previous task
      users = json.loads('{{ outputs.sample_data.vars.users }}')

      processed = []
      for user in users:
          full_name = f"{user['firstName']} {user['lastName']}"

          birth_date = datetime.strptime(user["birthDate"], "%Y-%m-%d")
          today = datetime.now()
          age = today.year - birth_date.year - (
              (today.month, today.day) < (birth_date.month, birth_date.day)
          )

          processed.append({
              **user,
              "fullName": full_name,
              "age": age
          })
          print(f"Processing user: {full_name}, Age: {age}")

      Kestra.outputs({"processed_users": json.dumps(processed)})

  - id: fetch_external_data
    type: io.kestra.plugin.scripts.python.Script
    description: "Lesson 2 (Advanced): Enrich each user by calling an external API."
    script: |
      import json
      import urllib.request
      from kestra import Kestra

      users = json.loads('{{ outputs.process_each_user.vars.processed_users }}')

      enriched = []
      for user in users:
          # Call httpbin.org to demonstrate external HTTP requests
          url = f"https://httpbin.org/get?name={user['firstName']}"
          print(f"Fetching external data for {user['firstName']} from {url}")

          req = urllib.request.Request(url)
          with urllib.request.urlopen(req) as response:
              data = json.loads(response.read().decode())

          enriched.append({
              **user,
              "apiVerified": True,
              "apiArgs": data.get("args", {})
          })

      Kestra.outputs({"enriched_users": json.dumps(enriched)})

  - id: calculate_average_age
    type: io.kestra.plugin.scripts.python.Script
    description: "Lesson 3: Aggregate all users to compute the average age."
    script: |
      import json
      from kestra import Kestra

      users = json.loads('{{ outputs.fetch_external_data.vars.enriched_users }}')

      total_age = sum(u["age"] for u in users)
      user_count = len(users)
      average_age = round(total_age / user_count, 2)

      print(f"Calculated average age for {user_count} users.")

      Kestra.outputs({
          "totalUsers": user_count,
          "averageAge": average_age
      })

  - id: create_csv_report
    type: io.kestra.plugin.scripts.python.Script
    description: "Lesson 4 (Expert): Generate a CSV report and store it as a Kestra artifact."
    script: |
      import json
      import csv
      import io
      from kestra import Kestra

      users = json.loads('{{ outputs.fetch_external_data.vars.enriched_users }}')

      # Build CSV content
      output = io.StringIO()
      writer = csv.writer(output)
      writer.writerow(["FullName", "Age", "Verified", "ProcessedBy"])

      for user in users:
          writer.writerow([
              user["fullName"],
              user["age"],
              user.get("apiVerified", False),
              "kestra"
          ])

      csv_content = output.getvalue()

      # Write to a file that Kestra can store
      report_path = "user_report.csv"
      with open(report_path, "w") as f:
          f.write(csv_content)

      print(f"Generated CSV report with {len(users)} users.")

      Kestra.outputs({
          "reportGenerated": True,
          "userCount": len(users),
          "reportFile": report_path
      })
    outputFiles:
      - "user_report.csv"

extend:
  title: "Learn Python Scripting in Kestra — Interactive Tutorial"
  metaTitle: "Python Scripting Tutorial for Kestra"
  shortDescription: >-
    A hands-on tutorial covering Python scripting in Kestra from basics to
    advanced topics: data processing, HTTP requests, aggregation, and file
    generation.
  description: |
    **Learn to write Python scripts in Kestra tasks through four progressive lessons that process user data end to end.**

    1. A `io.kestra.plugin.scripts.python.Script` task provides sample user data (names and birth dates)
    2. A script task processes each user to compute full name and age, demonstrating basic data manipulation
    3. An HTTP task enriches each user by calling httpbin.org, showing how to fetch external data
    4. A script task aggregates all users to calculate average age, demonstrating summary computation
    5. A final script task generates a CSV report file stored as a Kestra internal storage artifact

    Ideal for:
    - **Beginners** who want to learn how Python Script tasks work in Kestra
    - **Developers** migrating from other orchestrators who need to understand Kestra outputs and file handling
  tags:
    - Getting Started
    - Core
  ee: false
  demo: true
  metaDescription: >-
    Step-by-step Kestra tutorial teaching Python scripting through user data
    processing, API calls, aggregation, and CSV file generation.

