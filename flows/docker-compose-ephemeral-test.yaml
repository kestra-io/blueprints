id: docker-compose-ephemeral-test
namespace: company.team
description: |
  Spin up an ephemeral Docker Compose stack, run a smoke test against it, and
  always tear it down. Use it on pull requests to validate that the full stack
  starts and answers before merging.

inputs:
  - id: smoke_test_url
    type: STRING
    defaults: http://localhost:8080/health
    description: URL probed once the stack is up to confirm it serves.

tasks:
  - id: compose_up
    type: io.kestra.plugin.docker.Compose
    description: Start the stack in the background and wait for it to be healthy.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    composeFile: |
      services:
        web:
          image: nginx:alpine
          ports:
            - "8080:80"
    composeArgs:
      - up
      - -d
      - --wait

  - id: smoke_test
    type: io.kestra.plugin.core.http.Request
    description: Probe the stack to confirm it responds.
    uri: "{{ inputs.smoke_test_url }}"
    method: GET

  - id: compose_down
    type: io.kestra.plugin.docker.Compose
    description: Tear the stack down after a successful test.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    composeFile: |
      services:
        web:
          image: nginx:alpine
          ports:
            - "8080:80"
    composeArgs:
      - down
      - -v

errors:
  - id: teardown_on_failure
    type: io.kestra.plugin.docker.Compose
    description: Tear the stack down even when the smoke test fails.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    composeFile: |
      services:
        web:
          image: nginx:alpine
          ports:
            - "8080:80"
    composeArgs:
      - down
      - -v

triggers:
  - id: on_pull_request
    type: io.kestra.plugin.core.trigger.Webhook
    description: CI posts here on pull requests to validate the stack.
    key: "{{ secret('COMPOSE_TEST_WEBHOOK_KEY') }}"

extend:
  shortDescription: Bring up a Docker Compose stack, smoke-test it, and always tear it down (even on failure).
  title: Ephemeral Docker Compose Test Environment
  metaTitle: Ephemeral Docker Compose Test Environment
  description: |
    This blueprint validates that a full stack starts and serves before you merge.
    It brings up a Docker Compose stack and waits for health, probes a smoke-test
    URL, and tears the stack down. An error handler runs the same teardown when the
    test fails, so ephemeral environments never linger.

    Prerequisites:
      - Secrets:
        - COMPOSE_TEST_WEBHOOK_KEY: key guarding the webhook trigger.
      - A worker that can reach a Docker daemon; the Compose task mounts the host socket.

    Quick start:
      1. Set COMPOSE_TEST_WEBHOOK_KEY in your Kestra namespace.
      2. Replace the inline compose file with your application's stack.
      3. Point smoke_test_url at a health endpoint the stack exposes.

    Outputs:
      - outputs.compose_up: result of bringing the stack up.
      - outputs.smoke_test.code: HTTP status returned by the probe.

    Notes:
      - The Docker task runner mounts /var/run/docker.sock so it can reach the host engine.
      - Teardown runs in both the happy path and the errors handler so nothing is left running.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Bring up a Docker Compose stack, smoke-test it, and always tear it down, even when the test fails.
