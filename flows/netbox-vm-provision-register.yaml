id: netbox-vm-provision-register
namespace: company.team
description: |
  Provision a Proxmox VE VM on demand and register it in NetBox end to end:
  create the VM, allocate the next free IP from a prefix, create the device
  record, and assign an owning contact. Triggered by a webhook so an external
  system (an ITSM request or a portal) can drive provisioning.

inputs:
  - id: vm_name
    type: STRING
    defaults: app-vm-01
    description: Name for the new VM and the NetBox device record.
  - id: vm_id
    type: INT
    defaults: 201
    description: Unused Proxmox VMID to assign to the new VM.
  - id: site
    type: STRING
    defaults: nyc-dc1
    description: NetBox site slug the device belongs to.
  - id: device_type
    type: STRING
    defaults: generic-vm
    description: Existing NetBox device type slug.
  - id: device_role
    type: STRING
    defaults: application-server
    description: Existing NetBox device role slug.
  - id: prefix_id
    type: INT
    description: NetBox prefix ID to allocate the next available IP from.
  - id: contact_id
    type: INT
    description: NetBox contact ID to assign as the device owner.
  - id: contact_role_id
    type: INT
    description: NetBox contact role ID for the assignment.

tasks:
  - id: provision_vm
    type: io.kestra.plugin.proxmox.vm.Create
    description: Create and power on the VM on Proxmox VE.
    vmId: "{{ inputs.vm_id }}"
    vmName: "{{ inputs.vm_name }}"
    cores: 2
    memory: 4096
    disk: "local-lvm:32"
    powerOn: true

  - id: register_device
    type: io.kestra.plugin.ee.netbox.device.Create
    description: Create the NetBox device record for the new VM.
    name: "{{ inputs.vm_name }}"
    deviceType: "{{ inputs.device_type }}"
    deviceRole: "{{ inputs.device_role }}"
    site: "{{ inputs.site }}"
    status: active

  - id: allocate_ip
    type: io.kestra.plugin.ee.netbox.ipam.AssignIpAddress
    description: Allocate the next available IP from the prefix.
    prefixId: "{{ inputs.prefix_id }}"
    status: active
    dnsName: "{{ inputs.vm_name }}"

  - id: assign_contact
    type: io.kestra.plugin.ee.netbox.contactassignment.Create
    description: Assign the owning contact to the new device.
    contentType: dcim.device
    objectId: "{{ outputs.register_device.id }}"
    contactId: "{{ inputs.contact_id }}"
    roleId: "{{ inputs.contact_role_id }}"
    priority: primary

pluginDefaults:
  - type: io.kestra.plugin.proxmox.vm.Create
    values:
      host: "{{ secret('PROXMOX_HOST') }}"
      node: "{{ secret('PROXMOX_NODE') }}"
      username: "{{ secret('PROXMOX_USERNAME') }}"
      password: "{{ secret('PROXMOX_PASSWORD') }}"
  - type: io.kestra.plugin.ee.netbox.device.Create
    values:
      url: "{{ secret('NETBOX_URL') }}"
      token: "{{ secret('NETBOX_API_TOKEN') }}"
  - type: io.kestra.plugin.ee.netbox.ipam.AssignIpAddress
    values:
      url: "{{ secret('NETBOX_URL') }}"
      token: "{{ secret('NETBOX_API_TOKEN') }}"
  - type: io.kestra.plugin.ee.netbox.contactassignment.Create
    values:
      url: "{{ secret('NETBOX_URL') }}"
      token: "{{ secret('NETBOX_API_TOKEN') }}"

triggers:
  - id: provision_request
    type: io.kestra.plugin.core.trigger.Webhook
    description: Provisioning request from an ITSM system or self-service portal.
    key: "{{ secret('NETBOX_PROVISION_WEBHOOK_KEY') }}"

extend:
  shortDescription: Provision a Proxmox VE VM, then register it in NetBox with an allocated IP, device record, and owning contact.
  title: Provision a VM and Register It in NetBox
  metaTitle: Provision a VM and Register It in NetBox
  description: |
    This blueprint turns a provisioning request into a fully recorded asset. A
    webhook fires the flow, Proxmox VE creates and powers on the VM, then NetBox
    is updated in lockstep: the device record is created, the next free IP is
    allocated from a prefix, and an owning contact is assigned. The result is a
    new VM that is documented in NetBox the moment it exists.

    Prerequisites:
      - Secrets:
        - PROXMOX_HOST, PROXMOX_NODE, PROXMOX_USERNAME, PROXMOX_PASSWORD: Proxmox VE connection.
        - NETBOX_URL, NETBOX_API_TOKEN: NetBox base URL and API token.
        - NETBOX_PROVISION_WEBHOOK_KEY: webhook key that guards the trigger.
      - Existing NetBox device type, device role, site slugs, a prefix, and a contact and contact role.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Create the NetBox prefix, contact, and contact role and note their IDs.
      3. POST to the webhook (or run manually) with vm_name, vm_id, prefix_id, contact_id, and contact_role_id.

    Outputs:
      - outputs.provision_vm: Proxmox VM creation result.
      - outputs.register_device.id: NetBox device ID used to attach the IP and contact.
      - outputs.allocate_ip.address: the IP allocated from the prefix.
      - outputs.assign_contact.id: the created contact assignment.

    Notes:
      - vm_id must be unused in the Proxmox cluster.
      - The IP is allocated from prefix_id; switch to an explicit address on AssignIpAddress if you prefer fixed IPs.
  tags:
    - Infrastructure
  ee: true
  demo: false
  metaDescription: Provision a Proxmox VE VM via webhook and register it in NetBox with an allocated IP, device record, and owning contact.
