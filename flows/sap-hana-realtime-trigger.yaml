id: sap-hana-realtime-trigger
namespace: company.finance

labels:
  team: finance
  domain: treasury-monitoring


tasks:
  - id: alert_finance_team
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Post a Slack alert to the finance channel with a formatted summary of the high-value transactions.
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    url: "{{ secret('SLACK_WEBHOOK') }}"
    payload: |
      {
        "blocks": [
          {
            "type": "header",
            "text": {
              "type": "plain_text",
              "text": "High-value transactions detected ({{ trigger.size }})"
            }
          },
          {
            "type": "divider"
          },
          {
            "type": "section",
            "text": {
              "type": "mrkdwn",
              "text": {{ ("SAP HANA flagged " ~ trigger.size ~ " new " ~ inputs.currency ~ " transaction(s) at or above " ~ inputs.threshold ~ ". Review the matched rows below.") | toJson }}
            }
          },
          {
            "type": "section",
            "text": {
              "type": "mrkdwn",
              "text": {{ ("```\n" ~ (trigger.rows | jq('[.[] | "txn " + (.TRANSACTION_ID|tostring) + " | acct ****" + ((.ACCOUNT_ID|tostring) | .[-4:]) + " | " + (.AMOUNT|tostring) + " " + .CURRENCY + " | " + (.CREATED_AT|tostring)] | join("\n")') | first) ~ "\n```") | toJson }}
            }
          },
          {
            "type": "context",
            "elements": [
              {
                "type": "mrkdwn",
                "text": "Flow {{ flow.namespace }}.{{ flow.id }} | Execution {{ execution.id }}"
              }
            ]
          }
        ]
      }

  - id: mark_alerted
    type: io.kestra.plugin.jdbc.hana.Query
    description: Mark only the transactions that were successfully alerted, scoped to the fetched ids. Runs after the Slack post succeeds so a failed alert never silently drops a row.
    fetchType: NONE
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    url: "jdbc:sap://{{ secret('HANA_HOST') }}:39015/?databaseName=HXE"
    username: "{{ secret('HANA_USERNAME') }}"
    password: "{{ secret('HANA_PASSWORD') }}"
    sql: |
      UPDATE FINANCE.TRANSACTIONS
      SET ALERTED = TRUE
      WHERE TRANSACTION_ID IN ({{ trigger.rows | jq('[.[].TRANSACTION_ID | tostring] | join(",")') | first }})

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }})."

triggers:
  - id: watch_high_value_transactions
    type: io.kestra.plugin.jdbc.hana.Trigger
    description: Poll the transactions table for unprocessed rows at or above the threshold in the configured currency.
    interval: PT1M
    url: "jdbc:sap://{{ secret('HANA_HOST') }}:39015/?databaseName=HXE"
    username: "{{ secret('HANA_USERNAME') }}"
    password: "{{ secret('HANA_PASSWORD') }}"
    fetchType: FETCH
    parameters:
      threshold: 100000
      currency: USD
    sql: |
      SELECT TRANSACTION_ID, ACCOUNT_ID, AMOUNT, CURRENCY, CREATED_AT
      FROM FINANCE.TRANSACTIONS
      WHERE AMOUNT >= :threshold
        AND CURRENCY = :currency
        AND ALERTED = FALSE
      ORDER BY CREATED_AT
      LIMIT 100

inputs:
  - id: currency
    type: STRING
    defaults: USD
    description: Currency the threshold is expressed in. The threshold is compared only against transactions in this currency, so the alert is not currency-blind.

  - id: threshold
    type: STRING
    defaults: "100000"
    description: Minimum AMOUNT (in the configured currency) that counts as high-value. Used only for the Slack message text.

extend:
  shortDescription: Poll SAP HANA for new high-value transactions and alert the finance team in Slack.
  title: Alert finance in Slack on new high-value SAP HANA transactions
  metaTitle: SAP HANA high-value transaction Slack alert
  description: |
    This event-driven flow watches a SAP HANA transactions table for new high-value rows and sends a
    Slack alert to the finance team the moment any are detected. It is a near real-time treasury
    monitoring pattern that turns HANA into the event source, with no polling logic to maintain in
    application code. Crucially, rows are marked as alerted only after the Slack post succeeds and only
    for the exact ids that were fetched, so a failed or rate-limited alert never silently drops a
    high-value transaction.

    ## What this flow does
    1. The SAP HANA `Trigger` polls `FINANCE.TRANSACTIONS` every minute (`interval: PT1M`) for rows where
       `AMOUNT >= :threshold AND CURRENCY = :currency AND ALERTED = FALSE`, capped with `LIMIT 100`. The
       threshold and currency are bound as SQL parameters, so the comparison is scoped to one currency and
       is never currency-blind (100000 USD and 100000 JPY are not treated as equal).
    2. When at least one row matches, the trigger creates an execution and the matched rows are exposed on
       `trigger.rows`.
    3. The `alert_finance_team` task posts a Slack Block Kit message with the match count and a formatted,
       masked row list. It retries on Slack 429/5xx with backoff.
    4. Only after the alert succeeds does the `mark_alerted` task flip `ALERTED = TRUE`, scoped to exactly
       the `TRANSACTION_ID`s that were fetched (`WHERE TRANSACTION_ID IN (...)`), not the open-ended
       predicate. Rows inserted mid-poll are therefore never marked without being alerted.
    5. If any task fails, the flow-level `errors` block posts a Slack failure alert with the execution id.

    ## Delivery semantics (honest)
    This is at-least-once delivery. The alert fires, then the rows are marked. If the execution dies
    between a successful Slack post and `mark_alerted`, those rows will be re-selected on the next poll and
    alerted again. Duplicate alerts are surfaced rather than dropped, which is the safe failure mode for a
    treasury alert. It is not exactly-once.

    ## Operational notes
    - Index `(ALERTED, AMOUNT, CURRENCY)` so the poll predicate stays sargable; without it, the per-minute
      scan grows with the table.
    - First-run backlog: if you enable this against a table that already has many unalerted high-value
      rows, the `LIMIT 100` bounds each poll so a single Slack message never exceeds Block Kit limits. The
      backlog drains 100 rows per minute until caught up.
    - Account ids are masked to the last four digits and only `TRANSACTION_ID`, masked account, amount,
      currency, and timestamp are posted. Posting transaction detail to a chat channel is still a
      data-egress decision; restrict the channel and review what you surface for your compliance posture.

    ## Prerequisites
    - A reachable SAP HANA instance (the JDBC URL uses port 39015; adjust the instance number and
      `databaseName` for your tenant). The SAP HANA JDBC driver (`ngdbc`) ships with the Kestra JDBC plugin.
    - A `FINANCE.TRANSACTIONS` table (or your equivalent) with `TRANSACTION_ID`, `ACCOUNT_ID`, `AMOUNT`,
      `CURRENCY`, `CREATED_AT`, and a boolean `ALERTED` marker column. `TRANSACTION_ID` must be numeric for
      the scoped `IN (...)` marking to bind safely.
    - A Slack Incoming Webhook URL pointing at the finance channel.

    ## Secrets
    - `HANA_HOST`: hostname or IP of the SAP HANA server.
    - `HANA_USERNAME`: SAP HANA database user with SELECT and UPDATE on the transactions table.
    - `HANA_PASSWORD`: password for that database user.
    - `SLACK_WEBHOOK`: Slack Incoming Webhook URL for the finance alert channel and failure alerts.

    ## Quick start
    1. Add the four secrets above to your Kestra instance.
    2. Set the `currency` and `threshold` inputs and adjust the table name and columns to match your schema.
    3. Enable the flow. The trigger begins polling and fires an execution as soon as a matching row appears.

    ## Expected outputs
    - `{{ trigger.size }}`: number of high-value transactions that fired this execution.
    - `{{ trigger.rows }}`: the list of matched transaction rows, formatted into the Slack message.
    - The Slack channel receives one Block Kit alert per execution; rows are marked alerted only after it
      lands.

    ## Documentation
    - SAP HANA plugin: https://kestra.io/plugins/plugin-jdbc-hana
    - SAP HANA Trigger: https://kestra.io/plugins/plugin-jdbc-hana/io.kestra.plugin.jdbc.hana.trigger
    - Slack Incoming Webhook task: https://kestra.io/plugins/plugin-notifications/slack/io.kestra.plugin.slack.notifications.slackincomingwebhook
    - Slack Incoming Webhooks API: https://api.slack.com/messaging/webhooks
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Poll a SAP HANA transactions table for high-value rows and alert finance in Slack, marking rows only after the alert succeeds.
