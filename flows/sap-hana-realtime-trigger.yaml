id: sap-hana-realtime-trigger
namespace: company.finance

labels:
  team: finance
  domain: treasury-monitoring


tasks:
  - id: alert_finance_team
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Post a Slack alert to the finance channel with a formatted summary of the high-value transactions.
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    url: "{{ secret('SLACK_WEBHOOK') }}"
    payload: |
      {
        "blocks": [
          {
            "type": "header",
            "text": {
              "type": "plain_text",
              "text": "High-value transactions detected ({{ trigger.size }})"
            }
          },
          {
            "type": "divider"
          },
          {
            "type": "section",
            "text": {
              "type": "mrkdwn",
              "text": {{ ("SAP HANA flagged " ~ trigger.size ~ " new " ~ inputs.currency ~ " transaction(s) at or above " ~ inputs.threshold ~ ". Review the matched rows below.") | toJson }}
            }
          },
          {
            "type": "section",
            "text": {
              "type": "mrkdwn",
              "text": {{ ("```\n" ~ (trigger.rows | jq('[.[] | "txn " + (.TRANSACTION_ID|tostring) + " | acct ****" + ((.ACCOUNT_ID|tostring) | .[-4:]) + " | " + (.AMOUNT|tostring) + " " + .CURRENCY + " | " + (.CREATED_AT|tostring)] | join("\n")') | first) ~ "\n```") | toJson }}
            }
          },
          {
            "type": "context",
            "elements": [
              {
                "type": "mrkdwn",
                "text": "Flow {{ flow.namespace }}.{{ flow.id }} | Execution {{ execution.id }}"
              }
            ]
          }
        ]
      }

  - id: mark_alerted
    type: io.kestra.plugin.jdbc.hana.Query
    description: Mark only the transactions that were successfully alerted, scoped to the fetched ids. Runs after the Slack post succeeds so a failed alert never silently drops a row.
    fetchType: NONE
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    url: "jdbc:sap://{{ secret('HANA_HOST') }}:39015/?databaseName=HXE"
    username: "{{ secret('HANA_USERNAME') }}"
    password: "{{ secret('HANA_PASSWORD') }}"
    sql: |
      UPDATE FINANCE.TRANSACTIONS
      SET ALERTED = TRUE
      WHERE TRANSACTION_ID IN ({{ trigger.rows | jq('[.[].TRANSACTION_ID | tostring] | join(",")') | first }})

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }})."

triggers:
  - id: watch_high_value_transactions
    type: io.kestra.plugin.jdbc.hana.Trigger
    description: Poll the transactions table for unprocessed rows at or above the threshold in the configured currency.
    interval: PT1M
    url: "jdbc:sap://{{ secret('HANA_HOST') }}:39015/?databaseName=HXE"
    username: "{{ secret('HANA_USERNAME') }}"
    password: "{{ secret('HANA_PASSWORD') }}"
    fetchType: FETCH
    parameters:
      threshold: 100000
      currency: USD
    sql: |
      SELECT TRANSACTION_ID, ACCOUNT_ID, AMOUNT, CURRENCY, CREATED_AT
      FROM FINANCE.TRANSACTIONS
      WHERE AMOUNT >= :threshold
        AND CURRENCY = :currency
        AND ALERTED = FALSE
      ORDER BY CREATED_AT
      LIMIT 100

inputs:
  - id: currency
    type: STRING
    defaults: USD
    description: Currency the threshold is expressed in. The threshold is compared only against transactions in this currency, so the alert is not currency-blind.

  - id: threshold
    type: STRING
    defaults: "100000"
    description: Minimum AMOUNT (in the configured currency) that counts as high-value. Used only for the Slack message text.

extend:
  shortDescription: Poll SAP HANA for new high-value transactions and alert the finance team in Slack in near real time.
  title: Alert finance in Slack on new high-value SAP HANA transactions
  metaTitle: SAP HANA high-value transaction Slack alerts with Kestra
  metaDescription: Watch a SAP HANA transactions table for high-value rows and alert finance in Slack with Kestra, marking each row only after the alert lands.
  description: |
    Turn a SAP HANA transactions table into a near real-time event source for treasury monitoring. This
    event-driven flow watches `FINANCE.TRANSACTIONS` for new high-value rows in a specific currency and
    posts a formatted Slack alert to the finance team the moment any appear, with no polling loop to
    maintain in application code. The hard problem it solves is safe delivery: rows are flagged as
    alerted only after the Slack post succeeds and only for the exact transaction ids that were fetched,
    so a failed, throttled, or rate-limited alert never silently drops a high-value transaction.

    ## How it works
    1. The `io.kestra.plugin.jdbc.hana.Trigger` polls SAP HANA every minute (`interval: PT1M`,
       `fetchType: FETCH`) for rows matching `AMOUNT >= :threshold AND CURRENCY = :currency AND
       ALERTED = FALSE`, ordered by `CREATED_AT` and capped with `LIMIT 100`. The `threshold` and
       `currency` are bound as SQL `parameters`, so the comparison is scoped to one currency and is never
       currency-blind.
    2. When at least one row matches, the trigger starts an execution and exposes the matched rows on
       `trigger.rows` and the count on `trigger.size`.
    3. The `alert_finance_team` task (`io.kestra.plugin.slack.notifications.SlackIncomingWebhook`) posts a
       Slack Block Kit message with the match count and a masked row list. It retries with a constant
       `PT10S` backoff up to three attempts.
    4. Only after the alert succeeds does the `mark_alerted` task (`io.kestra.plugin.jdbc.hana.Query`,
       `fetchType: NONE`) flip `ALERTED = TRUE`, scoped to exactly the fetched `TRANSACTION_ID`s via
       `WHERE TRANSACTION_ID IN (...)` rather than the open-ended predicate.
    5. If any task fails, the flow-level `errors` block fires a second `SlackIncomingWebhook` with the
       failing execution id.

    ## What you get
    - Near real-time Slack alerts on high-value transactions, one Block Kit message per execution.
    - At-least-once delivery: the alert fires, then rows are marked, so a crash between the two re-selects
      and re-alerts those rows rather than dropping them.
    - Masked output: account ids are reduced to the last four digits, and only transaction id, masked
      account, amount, currency, and timestamp are posted.
    - A self-cleaning queue: the `ALERTED` marker column drains a first-run backlog at 100 rows per minute.

    ## Who it's for
    - Treasury and finance operations teams monitoring large movements.
    - Data and platform engineers who own the SAP HANA warehouse and want alerting without bespoke code.
    - Compliance and risk functions that need an auditable, scoped trail of what was flagged and when.

    ## Why orchestrate this with Kestra
    SAP HANA has no native push-to-Slack capability, and its own scheduling cannot react row by row, post
    to a webhook, retry on a 429, and then conditionally mark only the rows it just handled. Kestra closes
    that gap: the database `Trigger` makes new rows an event, declarative YAML keeps the whole pipeline
    versioned and reviewable, per-task `retry` blocks ride out Slack throttling, the `errors` block
    guarantees a failure is itself surfaced, and full execution lineage records exactly which transactions
    were alerted in each run.

    ## Prerequisites
    - A reachable SAP HANA instance. The JDBC URL uses port 39015 and `databaseName=HXE`; adjust the
      instance number and database for your tenant. The SAP HANA driver (`ngdbc`) ships with the plugin.
    - A `FINANCE.TRANSACTIONS` table with `TRANSACTION_ID`, `ACCOUNT_ID`, `AMOUNT`, `CURRENCY`,
      `CREATED_AT`, and a boolean `ALERTED` column. `TRANSACTION_ID` must be numeric for the scoped
      `IN (...)` marking to bind safely. An index on `(ALERTED, AMOUNT, CURRENCY)` keeps the poll sargable.
    - A Slack Incoming Webhook pointing at the finance channel.

    ### Secrets
    - `HANA_HOST`: hostname or IP of the SAP HANA server.
    - `HANA_USERNAME`: database user with SELECT and UPDATE on the transactions table.
    - `HANA_PASSWORD`: password for that database user.
    - `SLACK_WEBHOOK`: Slack Incoming Webhook URL for the finance alert channel and failure alerts.

    ## Quick start
    1. Add the four secrets above to your Kestra instance.
    2. Adjust the table name, columns, and JDBC URL to match your SAP HANA schema and tenant.
    3. Set the `currency` and `threshold` inputs (defaults `USD` and `100000`).
    4. Enable the flow. The trigger starts polling and fires an execution as soon as a matching row appears.

    ## How to extend
    - Route by severity: branch to PagerDuty or email for transactions above a higher tier.
    - Add an enrichment `Query` to join account or counterparty metadata before posting.
    - Persist a record of every alert to a separate audit table for compliance reporting.
    - Swap the currency or lower the threshold per environment using flow inputs or labels.

    ## Links
    - SAP HANA plugin docs: https://kestra.io/plugins/plugin-jdbc-hana
    - Slack notifications plugin docs: https://kestra.io/plugins/plugin-notifications
  tags:
    - Data
  ee: false
  demo: false
