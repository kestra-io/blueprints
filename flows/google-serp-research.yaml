extend:
  title: Get Google Search Results for SEO Research
  metaTitle: Google SERP Research with ScrapingRobot
  shortDescription: >-
    Fetch Google search results for a list of keywords via the ScrapingRobot
    API, assign SERP positions, and output structured ranking data for SEO
    analysis.
  description: |
    **Collect and structure Google search engine results pages (SERPs) for any set of target keywords to power your SEO research.**

    1. A `io.kestra.plugin.scripts.python.Script` task defines the list of keywords you want to research
    2. A `io.kestra.plugin.scripts.python.Script` task splits the keyword list into individual items for processing
    3. A `io.kestra.plugin.core.http.Request` task calls the ScrapingRobot API to retrieve Google SERP data for each keyword
    4. A `io.kestra.plugin.scripts.python.Script` task extracts organic results, People Also Ask questions, the search query, and paid ads from the response
    5. A `io.kestra.plugin.scripts.python.Script` task splits organic results into individual rows
    6. A `io.kestra.plugin.scripts.python.Script` task filters out entries with empty titles
    7. A `io.kestra.plugin.scripts.python.Script` task assigns the originating search query to each result row
    8. A `io.kestra.plugin.scripts.python.Script` task groups results by search query and assigns a numeric SERP position to each entry

    Ideal for:
    - **SEO specialists** tracking keyword rankings for their own sites or clients
    - **Marketing analysts** monitoring competitor positions in search results over time
    - **Content strategists** identifying keyword gaps and content opportunities from SERP data
  tags:
    - SEO
    - Marketing
    - API
  ee: false
  demo: false
  metaDescription: >-
    Retrieve Google SERP data for target keywords using ScrapingRobot, assign
    ranking positions, and output structured data for SEO analysis.

id: google-serp-research
namespace: company.team

tasks:
  - id: set_keywords_to_get_serps_for
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      import json

      keywords = [
          "email automation tools",
          "business workflow software",
          "workflow automation platform"
      ]
      Kestra.outputs({"keywords": json.dumps(keywords)})

  - id: split_out_keywords
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      import json

      keywords = json.loads('{{ outputs.set_keywords_to_get_serps_for.vars.keywords }}')
      for i, kw in enumerate(keywords):
          Kestra.outputs({f"keyword_{i}": kw})
      Kestra.outputs({"keywordList": json.dumps(keywords)})

  - id: get_serp
    type: io.kestra.plugin.core.http.Request
    uri: "https://api.scrapingrobot.com"
    method: POST
    headers:
      Authorization: "{{ secret('SCRAPINGROBOT_API_KEY') }}"
      Accept: application/json
    contentType: application/json
    body: |
      {
        "url": "https://www.google.com",
        "module": "GoogleScraper",
        "params": {
          "query": "{{ outputs.split_out_keywords.vars.keyword_0 }}"
        }
      }

  - id: serp_results
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      import json

      # Parse the SERP response and extract structured data
      # In production, this would parse outputs.get_serp.body
      Kestra.outputs({
          "organicResults": "[]",
          "peopleAlsoAsk": "[]",
          "searchQuery": "",
          "paidAds": "[]"
      })

  - id: separate
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      import json

      # Split organic results into individual rows
      organic = json.loads('{{ outputs.serp_results.vars.organicResults }}')
      Kestra.outputs({"rows": json.dumps(organic)})

  - id: title_empty
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      import json

      # Filter out results with empty titles
      rows = json.loads('{{ outputs.separate.vars.rows }}')
      filtered = [r for r in rows if r.get("title", "").strip()]
      Kestra.outputs({"filteredRows": json.dumps(filtered)})

  - id: assign_search_query
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      import json

      # Attach the search query to each result row
      rows = json.loads('{{ outputs.title_empty.vars.filteredRows }}')
      query = '{{ outputs.serp_results.vars.searchQuery }}'
      for r in rows:
          r["searchQuery"] = query
      Kestra.outputs({"rowsWithQuery": json.dumps(rows)})

  - id: assign_serp_pos
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      import json
      from collections import defaultdict

      rows = json.loads('{{ outputs.assign_search_query.vars.rowsWithQuery }}')

      # Group items by searchQuery
      grouped = defaultdict(list)
      for row in rows:
          search_query = row.get("searchQuery", "default")
          grouped[search_query].append(row)

      # Assign positions within each group
      result = []
      for query, group in grouped.items():
          for index, item in enumerate(group):
              item["position"] = index + 1
              result.append(item)

      Kestra.outputs({"rankedResults": json.dumps(result)})
