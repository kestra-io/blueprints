id: serve-static-html-page
namespace: company.team
tasks:
  - id: respond_to_webhook
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      # Respond to webhook with a full HTML page
      Kestra.outputs({'response': '''<!doctype html>
      <html lang="en">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
          <title>Hello, world!</title>
        </head>
        <body>
          <h1>Hello, world!</h1>
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
        </body>
      </html>'''})
triggers:
  - id: webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"

extend:
  title: Serve a Static HTML Page via Webhook
  metaTitle: Serve Static HTML Page via Webhook
  shortDescription: >-
    Respond to incoming HTTP requests with a fully rendered static HTML page,
    using a webhook trigger and inline HTML content.
  description: |
    **Serve a complete HTML page in response to any incoming webhook request.**

    1. A `io.kestra.plugin.core.trigger.Webhook` trigger listens for incoming HTTP requests on a unique, secret-protected endpoint
    2. A `io.kestra.plugin.scripts.python.Script` task prepares the full HTML response, including Bootstrap styling and a greeting page
    3. The rendered HTML is returned directly to the caller's browser

    Ideal for:
    - **Developers** who need a quick way to serve status pages or lightweight dashboards from an automation platform
    - **DevOps engineers** looking to expose health-check or info pages triggered by external monitoring tools
    - **Teams** building simple webhook-driven landing pages without a dedicated web server
  tags:
    - Core
    - Getting Started
  ee: false
  demo: false
  metaDescription: >-
    Serve a static HTML page with Bootstrap styling directly from a webhook
    endpoint. Ideal for quick status pages and lightweight dashboards.

