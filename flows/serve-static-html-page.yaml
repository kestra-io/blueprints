id: serve-static-html-page
namespace: company.team
tasks:
  - id: respond_to_webhook
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      # Respond to webhook with a full HTML page
      Kestra.outputs({'response': '''<!doctype html>
      <html lang="en">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
          <title>Hello, world!</title>
        </head>
        <body>
          <h1>Hello, world!</h1>
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
        </body>
      </html>'''})
triggers:
  - id: webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"

extend:
  title: "Serve an HTML Page from a Kestra Webhook — No Web Server Required"
  metaTitle: "Kestra as a Webhook Web Server — Serve HTML Pages On-Demand"
  shortDescription: >-
    Respond to incoming HTTP requests with a fully rendered HTML page using a
    Kestra webhook trigger — no dedicated web server or hosting required.
  description: |
    **Turn a Kestra webhook into a lightweight web server: return a complete HTML page in response to any HTTP request, without deploying or maintaining a separate web server.**

    1. A `io.kestra.plugin.core.trigger.Webhook` trigger listens on a unique, secret-protected HTTPS endpoint and fires on every incoming request
    2. A `io.kestra.plugin.scripts.python.Script` task builds the full HTML response inline — including Bootstrap 5 layout, responsive viewport meta, and any dynamic content derived from the webhook payload
    3. The rendered HTML string is returned as the webhook response body, directly visible in the caller's browser

    This pattern is useful beyond a static "Hello World" page. The Python script can read `{{ trigger.body }}` or `{{ trigger.headers }}` to inject dynamic content — rendering deployment summaries, CI/CD status reports, or approval confirmation screens based on the incoming request context. The Bootstrap CDN link can be replaced with any CSS framework or inline styles.

    Ideal for:
    - **Platform and DevOps engineers** who need lightweight internal status pages or health-check endpoints tied to live pipeline state, without provisioning a separate web service
    - **Teams building approval flows** that want to show a human-readable confirmation screen after a user clicks an approval link in an email
    - **Developers** prototyping webhook-based microservices or form result pages before moving to a full web framework
    - **Anyone** who needs a quick, shareable URL that returns a formatted HTML view of pipeline outputs or structured data
  tags:
    - Core
    - Getting Started
  ee: false
  demo: false
  metaDescription: >-
    Serve HTML pages from a Kestra webhook trigger — no web server needed.
    Build status pages, CI dashboards, or approval screens with inline Python.

