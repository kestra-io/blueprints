id: kubernetes-gpu-pod-artifact
namespace: company.team
description: |
  Run a GPU workload as a Kubernetes pod and collect its artifact. The pod
  requests a GPU, runs the job, writes a result file that Kestra pulls back into
  internal storage, and Slack reports completion.

tasks:
  - id: run_gpu_pod
    type: io.kestra.plugin.kubernetes.core.PodCreate
    description: Schedule a GPU pod, run the job, and collect its output file.
    namespace: gpu-jobs
    waitUntilRunning: PT10M
    spec:
      containers:
        - name: train
          image: nvidia/cuda:12.4.0-runtime-ubuntu22.04
          command:
            - bash
            - -c
            - 'nvidia-smi > {{ workingDir }}/result.txt 2>&1 || echo "no gpu" > {{ workingDir }}/result.txt'
          resources:
            limits:
              nvidia.com/gpu: 1
      restartPolicy: Never
    outputFiles:
      - result.txt

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Report that the GPU job finished and its artifact was collected.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "GPU pod finished; artifact stored at {{ outputs.run_gpu_pod.outputFiles['result.txt'] }}."
      }

pluginDefaults:
  - type: io.kestra.plugin.kubernetes.core.PodCreate
    values:
      connection:
        masterUrl: "{{ secret('K8S_MASTER_URL') }}"
        oauthToken: "{{ secret('K8S_TOKEN') }}"

triggers:
  - id: nightly_job
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run the GPU job nightly. Adjust or disable as needed.
    cron: "0 2 * * *"
    disabled: true

extend:
  shortDescription: Run a GPU pod on Kubernetes, collect its output artifact into Kestra storage, and report to Slack.
  title: Run a GPU Pod and Collect Its Artifact
  metaTitle: Run a GPU Pod and Collect Its Artifact
  description: |
    This blueprint runs a GPU workload on Kubernetes and brings its result back.
    It creates a pod that requests a GPU, runs the job, and writes an output file
    that Kestra pulls into internal storage via the pod sidecar. Slack reports the
    artifact location.

    Prerequisites:
      - Secrets:
        - K8S_MASTER_URL, K8S_TOKEN: Kubernetes API access.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - A cluster with GPU nodes and the NVIDIA device plugin installed.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Replace the container image and command with your GPU job.
      3. Run the flow; the result file is collected and linked in Slack.

    Outputs:
      - outputs.run_gpu_pod.outputFiles: the collected artifact URIs.
      - outputs.run_gpu_pod.status: the pod status snapshot.

    Notes:
      - outputFiles are read from the pod working directory ({{ workingDir }}); write your artifacts there.
      - The pod is deleted after completion by default; set delete: false to keep it for debugging.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Run a GPU pod on Kubernetes, collect its output artifact into Kestra storage, and report to Slack.
