id: ai-voice-assistant-siri-shortcuts
namespace: company.team

tasks:
  - id: generate_response
    type: io.kestra.plugin.openai.ChatCompletion
    description: Process the voice input with GPT-4o and generate a concise, voice-optimized reply
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4o
    messages:
      - role: system
        content: |
          You are a helpful assistant. Provide concise replies as the user receives them via voice on their mobile phone. Avoid using symbols or formatting characters that would sound unnatural when read aloud.

          Context:
          - Today is {{ now() | date("dd MMM yy") }}.
          - Current time: {{ now() | date("h:mm a") }}.
          - You are an AI assistant running as a Kestra workflow.

          Keep responses short and clear, optimized for voice delivery. If you do not know the answer, say so honestly.
      - role: user
        content: "Here is my request: {{ trigger.body.input }}"

  - id: respond_to_shortcut
    type: io.kestra.plugin.scripts.python.Script
    description: Return the AI response as plain text for Siri to read aloud
    script: |
      from kestra import Kestra

      reply = """{{ outputs.generate_response.choices[0].message.content }}"""
      Kestra.outputs({"response": reply})

triggers:
  - id: apple_shortcut_webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"

extend:
  title: AI Voice Assistant via Apple Shortcuts and OpenAI
  metaTitle: AI Voice Assistant with Siri and OpenAI
  shortDescription: >-
    Turn Siri into an AI-powered assistant by connecting Apple Shortcuts to OpenAI GPT.
    Speak a request, get an intelligent response read back to you.
  description: |
    **Connect Apple Shortcuts to an OpenAI-powered backend so Siri can answer complex questions, draft content, and perform tasks via voice — without any third-party app.**

    1. A `io.kestra.plugin.core.trigger.Webhook` receives POST requests from an Apple Shortcut containing the voice-transcribed input as `trigger.body.input`
    2. A `io.kestra.plugin.openai.ChatCompletion` task processes the transcribed request with GPT-4o using a system prompt optimized for short, voice-friendly responses: no markdown, no bullet points, no symbols that sound unnatural when read aloud
    3. A `io.kestra.plugin.scripts.python.Script` task formats and returns the AI response as plain text, which the Apple Shortcut passes to Siri's "Speak Text" action to read aloud

    To set up the Apple Shortcuts side, create a shortcut that: (1) records a voice input with "Dictate Text", (2) sends it to this webhook URL using a "Get contents of URL" action with method POST and the text as the JSON body, and (3) passes the response text to "Speak Text". The webhook key should be stored as a Text variable in the Shortcut to avoid hardcoding it.

    The system prompt can be extended with personal context (your name, role, timezone, calendar data) to make responses more personalized, or replaced with a domain-specific persona (coding assistant, language tutor, recipe advisor) depending on your use case.

    Ideal for:
    - **Productivity enthusiasts** who want hands-free AI assistance through Siri on iPhone, iPad, or Mac without switching apps or relying on ChatGPT's mobile app
    - **Developers** building voice-controlled automation pipelines with Apple Shortcuts as a zero-code front end for complex backend logic
    - **Teams** who want a private, self-hosted AI assistant on any Apple device — fully controlled and auditable via Kestra flow logs
  tags:
    - AI
  ee: false
  demo: false
  metaDescription: >-
    Build a private AI voice assistant with Apple Shortcuts, Siri, and Kestra.
    Speak a question, process it with GPT-4o, and hear the response read aloud.

