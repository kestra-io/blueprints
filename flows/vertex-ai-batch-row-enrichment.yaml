id: vertex-ai-batch-row-enrichment
namespace: company.team
description: |
  Enrich a batch of BigQuery rows with Vertex AI on a schedule. The flow selects
  rows that still need enrichment, calls a Gemini model on Vertex AI for each one
  under a concurrency limit that controls the request rate, writes the result
  back to BigQuery, and emails a summary. A scheduled, retryable alternative to a
  one-off notebook calling the model in a loop.

tasks:
  - id: select_rows
    type: io.kestra.plugin.gcp.bigquery.Query
    description: Pick the rows that still need a sentiment label.
    sql: |
      SELECT id, review
      FROM `{{ secret('GCP_PROJECT_ID') }}.analytics.reviews`
      WHERE sentiment IS NULL
      LIMIT 50;
    fetchType: FETCH

  - id: enrich
    type: io.kestra.plugin.core.flow.ForEach
    description: Classify each review, limiting concurrency to control the request rate.
    values: "{{ outputs.select_rows.rows }}"
    concurrencyLimit: 4
    tasks:
      - id: classify
        type: io.kestra.plugin.gcp.vertexai.ChatCompletion
        description: Ask Gemini on Vertex AI for a one-word sentiment.
        region: us-central1
        modelId: gemini-1.5-flash
        messages:
          - author: user
            content: "Reply with exactly one word, positive or negative, for this review: {{ taskrun.value.review }}"

      - id: store
        type: io.kestra.plugin.gcp.bigquery.Query
        description: Write the label back to the row.
        sql: |
          UPDATE `{{ secret('GCP_PROJECT_ID') }}.analytics.reviews`
          SET sentiment = '{{ outputs.classify.predictions[0] }}'
          WHERE id = {{ taskrun.value.id }};

  - id: notify
    type: io.kestra.plugin.email.MailSend
    description: Email the team how many rows were enriched.
    host: "{{ secret('SMTP_HOST') }}"
    port: 587
    username: "{{ secret('SMTP_USERNAME') }}"
    password: "{{ secret('SMTP_PASSWORD') }}"
    from: kestra@example.com
    to: data-team@example.com
    subject: "Vertex AI enrichment complete"
    htmlTextContent: "Enriched {{ outputs.select_rows.size }} review(s) with Vertex AI (execution {{ execution.id }})."

pluginDefaults:
  - type: io.kestra.plugin.gcp
    values:
      projectId: "{{ secret('GCP_PROJECT_ID') }}"
      serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT') }}"

triggers:
  - id: nightly
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run the enrichment batch on a cadence. Adjust or disable as needed.
    cron: "0 2 * * *"
    disabled: true

errors:
  - id: alert_on_failure
    type: io.kestra.plugin.email.MailSend
    description: Email the team if enrichment fails.
    host: "{{ secret('SMTP_HOST') }}"
    port: 587
    username: "{{ secret('SMTP_USERNAME') }}"
    password: "{{ secret('SMTP_PASSWORD') }}"
    from: kestra@example.com
    to: data-team@example.com
    subject: "Vertex AI enrichment failed"
    htmlTextContent: "The Vertex AI enrichment batch failed (execution {{ execution.id }})."

extend:
  shortDescription: Select BigQuery rows, classify each with a Gemini model on Vertex AI under a concurrency limit, and write the labels back.
  title: Batch-Enrich BigQuery Rows with Vertex AI
  metaTitle: Batch-Enrich BigQuery Rows with Vertex AI
  description: |
    This blueprint runs LLM enrichment as a scheduled, governed batch instead of a
    one-off script. It selects the BigQuery rows that still need a label, loops
    over them with a ForEach whose concurrencyLimit caps the request rate against
    Vertex AI, calls a Gemini model for each row, and writes the result back to the
    table. Email confirms the batch and an error handler alerts on failure.

    Prerequisites:
      - Secrets:
        - GCP_PROJECT_ID: GCP project hosting the dataset and Vertex AI.
        - GCP_SERVICE_ACCOUNT: service account key JSON with BigQuery and Vertex AI access.
        - SMTP_HOST, SMTP_USERNAME, SMTP_PASSWORD: SMTP credentials for email.
      - A reviews table with id, review, and a nullable sentiment column.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Point the SQL and the model prompt at your data and task.
      3. Tune concurrencyLimit and modelId to balance speed, cost, and quality.

    Outputs:
      - outputs.select_rows.rows: the batch of rows to enrich.
      - per-row outputs.classify.predictions: the model response used for the write-back.

    Notes:
      - concurrencyLimit is the rate control: raise it for throughput, lower it to stay under model quotas.
      - Vertex AI hosts Gemini models; set region and modelId (for example gemini-1.5-flash) to your enabled model.
      - Add an If on the emitted token-count metric to stop the batch when a cost threshold is crossed.
  tags:
    - AI
    - Data
  ee: false
  demo: false
  metaDescription: Select BigQuery rows, classify each with a Gemini model on Vertex AI under a concurrency limit, and write the labels back.
