id: aws-glue-athena-dynamodb
namespace: company.team
description: |
  Run an AWS data pipeline end to end: trigger a Glue ETL job and wait for it,
  validate the result with an Athena query, then write the headline KPI into
  DynamoDB for low-latency reads.

inputs:
  - id: glue_job_name
    type: STRING
    defaults: daily-sales-etl
    description: Name of the Glue job to run.
  - id: athena_database
    type: STRING
    defaults: analytics
    description: Athena database holding the curated table.
  - id: athena_output_location
    type: STRING
    defaults: s3://my-athena-results/
    description: S3 location where Athena writes query results.
  - id: dynamodb_table
    type: STRING
    defaults: kpi-cache
    description: DynamoDB table that stores the computed KPI.

tasks:
  - id: run_glue_job
    type: io.kestra.plugin.aws.glue.StartJobRun
    description: Start the Glue ETL job and wait for it to finish.
    jobName: "{{ inputs.glue_job_name }}"
    wait: true

  - id: validate_with_athena
    type: io.kestra.plugin.aws.athena.Query
    description: Validate the curated output and read the headline metric.
    database: "{{ inputs.athena_database }}"
    outputLocation: "{{ inputs.athena_output_location }}"
    fetchType: FETCH_ONE
    query: |
      SELECT count(*) AS row_count, sum(amount) AS total_amount
      FROM curated_sales
      WHERE dt = current_date

  - id: write_kpi
    type: io.kestra.plugin.aws.dynamodb.PutItem
    description: Cache the computed KPI in DynamoDB for fast reads.
    tableName: "{{ inputs.dynamodb_table }}"
    item:
      kpi_id: "daily-sales-{{ execution.startDate | date('yyyy-MM-dd') }}"
      row_count: "{{ outputs.validate_with_athena.row.row_count }}"
      total_amount: "{{ outputs.validate_with_athena.row.total_amount }}"
      glue_state: "{{ outputs.run_glue_job.state }}"

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Report the pipeline result to Slack.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Glue->Athena->DynamoDB complete. Glue {{ outputs.run_glue_job.state }}, rows {{ outputs.validate_with_athena.row.row_count }}."
      }

pluginDefaults:
  - type: io.kestra.plugin.aws.glue.StartJobRun
    values:
      accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
      region: "{{ secret('AWS_DEFAULT_REGION') }}"
  - type: io.kestra.plugin.aws.athena.Query
    values:
      accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
      region: "{{ secret('AWS_DEFAULT_REGION') }}"
  - type: io.kestra.plugin.aws.dynamodb.PutItem
    values:
      accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
      region: "{{ secret('AWS_DEFAULT_REGION') }}"

triggers:
  - id: daily_pipeline
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run the pipeline daily. Adjust or disable as needed.
    cron: "0 4 * * *"
    disabled: true

extend:
  shortDescription: Run a Glue ETL job, validate the output with Athena, and cache the KPI in DynamoDB.
  title: Glue ETL, Athena Validation, DynamoDB Cache
  metaTitle: Glue ETL, Athena Validation, DynamoDB Cache
  description: |
    This blueprint chains three AWS analytics services into one governed run. It
    starts a Glue ETL job and waits for completion, validates the curated output
    with an Athena query, and writes the headline KPI to DynamoDB so applications
    can read it with low latency. Slack reports the outcome.

    Prerequisites:
      - Secrets:
        - AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION: AWS access.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - An existing Glue job, an Athena database and curated table, an S3 results location, and a DynamoDB table.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Pass the Glue job name, Athena database and output location, and DynamoDB table.
      3. Adjust the Athena query to match your curated schema.

    Outputs:
      - outputs.run_glue_job.state: terminal Glue job state.
      - outputs.validate_with_athena.row: the validation metrics row.
      - outputs.write_kpi: the DynamoDB put result.

    Notes:
      - StartJobRun waits for completion (wait: true), so a Glue failure stops the pipeline before Athena runs.
      - The Athena query and the DynamoDB item are examples; map them to your real schema.
  tags:
    - Cloud
    - Data
  ee: false
  demo: false
  metaDescription: Run a Glue ETL job, validate the result with Athena, and cache the headline KPI in DynamoDB, with Slack reporting.
