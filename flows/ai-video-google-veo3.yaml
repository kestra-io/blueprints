id: ai-video-google-veo3
namespace: company.team
tasks:
  - id: get_new_video
    type: io.kestra.plugin.core.http.Request
    uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ secret('GOOGLE_SHEET_ID') }}/values/Sheet1"
    method: GET
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_ACCESS_TOKEN') }}"
  - id: set_data
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      import json

      # Format the prompt and duration from the sheet data
      # Replace with actual row parsing logic for your sheet structure
      prompt = "Your video prompt here"
      duration = "5"

      Kestra.outputs({
          "prompt": f"{prompt}\n\nDuration of the video: {duration}"
      })
  - id: create_video
    type: io.kestra.plugin.core.http.Request
    uri: https://queue.fal.run/fal-ai/veo3
    method: POST
    headers:
      Authorization: "Key {{ secret('FAL_API_KEY') }}"
      Content-Type: application/json
    body: |
      {
        "prompt": "{{ outputs.set_data.vars.prompt }}"
      }
  - id: wait_for_generation
    type: io.kestra.plugin.core.flow.Pause
    pauseDuration: PT60S
  - id: get_status
    type: io.kestra.plugin.core.http.Request
    uri: "https://queue.fal.run/fal-ai/veo3/requests/{{ outputs.create_video.body.request_id }}/status"
    method: GET
    headers:
      Authorization: "Key {{ secret('FAL_API_KEY') }}"
  - id: get_url_video
    type: io.kestra.plugin.core.http.Request
    uri: "https://queue.fal.run/fal-ai/veo3/requests/{{ outputs.create_video.body.request_id }}"
    method: GET
    headers:
      Authorization: "Key {{ secret('FAL_API_KEY') }}"
  - id: generate_title
    type: io.kestra.plugin.openai.ChatCompletion
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4o
    messages:
      - role: system
        content: You are an expert YouTube SEO specialist.
      - role: user
        content: >-
          Generate a short, SEO-optimized YouTube title for a video about:
          {{ outputs.set_data.vars.prompt }}
  - id: get_file_video
    type: io.kestra.plugin.core.http.Request
    uri: "{{ outputs.get_url_video.body.video.url }}"
    method: GET
  - id: upload_video_to_drive
    type: io.kestra.plugin.core.http.Request
    uri: https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart
    method: POST
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_ACCESS_TOKEN') }}"
  - id: upload_to_youtube
    type: io.kestra.plugin.core.http.Request
    uri: https://api.upload-post.com/v1/upload
    method: POST
    headers:
      Authorization: "Apikey {{ secret('UPLOAD_POST_API_KEY') }}"
  - id: update_google_sheet
    type: io.kestra.plugin.core.http.Request
    uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ secret('GOOGLE_SHEET_ID') }}/values/Sheet1"
    method: PUT
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_ACCESS_TOKEN') }}"
triggers:
  - id: schedule_trigger
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "*/5 * * * *"

extend:
  title: Generate AI Videos with Google Veo3 and Google Drive
  metaTitle: Generate AI Videos with Google Veo3
  shortDescription: >-
    Generate AI videos from text prompts using Google Veo3 via the Fal.run API,
    save results to Google Drive, and upload to YouTube automatically.
  description: |
    **Automate AI video generation, cloud storage, and YouTube publishing from a Google Sheet.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger runs the flow on a recurring schedule to pick up new video requests
    2. A `io.kestra.plugin.core.http.Request` task fetches unfilled video prompts from a Google Sheet via the Sheets API
    3. A `io.kestra.plugin.scripts.python.Script` task formats the prompt and duration parameters for the video generation request
    4. A `io.kestra.plugin.core.http.Request` task submits the prompt to the Fal.run API (Google Veo3) to start video generation
    5. A `io.kestra.plugin.core.flow.Pause` task waits 60 seconds, then a status-check loop polls the API until the video is complete
    6. A `io.kestra.plugin.openai.ChatCompletion` task generates an SEO-optimized YouTube title using GPT-4
    7. Additional `io.kestra.plugin.core.http.Request` tasks download the video, upload it to Google Drive, publish it to YouTube via Upload-Post, and update the Google Sheet with result URLs

    Ideal for:
    - **Content creators** who want to produce AI-generated video at scale from a spreadsheet of prompts
    - **Marketing teams** automating video production and YouTube publishing pipelines
    - **Agencies** managing multiple video campaigns with centralized tracking in Google Sheets
  tags:
    - AI
    - Cloud
  ee: false
  demo: false
  metaDescription: >-
    Generate AI videos from text prompts using Google Veo3, save them to Google
    Drive, and auto-publish to YouTube. Driven by a Google Sheet interface.

