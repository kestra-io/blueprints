id: keyword-research-google-autosuggest
namespace: company.team
tasks:
  - id: fetch_suggestions
    type: io.kestra.plugin.core.http.Request
    uri: "https://google.com/complete/search?output=toolbar&gl=US&q={{ trigger.query.q }}"
    method: GET
  - id: parse_and_extract_keywords
    type: io.kestra.plugin.scripts.python.Script
    script: |
      import xml.etree.ElementTree as ET
      import json
      from kestra import Kestra

      xml_data = """{{ outputs.fetch_suggestions.body }}"""
      root = ET.fromstring(xml_data)

      keywords = []
      for suggestion in root.findall(".//suggestion"):
          data = suggestion.get("data")
          if data:
              cleaned = data.strip()
              if cleaned and cleaned not in keywords:
                  keywords.append(cleaned)

      Kestra.outputs({"keywords": json.dumps(keywords)})
  - id: return_keywords
    type: io.kestra.plugin.scripts.python.Script
    script: |
      import json
      from kestra import Kestra

      keywords = json.loads("""{{ outputs.parse_and_extract_keywords.keywords }}""")
      Kestra.outputs({"response": json.dumps(keywords)})
triggers:
  - id: receive_keyword
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"

extend:
  title: "Generate SEO Keywords with Google Autosuggest"
  metaTitle: "SEO Keyword Research via Google Autosuggest"
  shortDescription: >-
    Discover keyword ideas by querying Google Autosuggest and returning a
    structured list of suggestions for any seed term.
  description: |
    **Retrieve and structure keyword suggestions from Google Autosuggest for any seed query, ready for SEO and content planning.**

    1. A `io.kestra.plugin.core.trigger.Webhook` receives a GET request with a seed keyword as the `q` query parameter
    2. A `io.kestra.plugin.core.http.Request` task queries the Google Autosuggest XML endpoint for completion suggestions
    3. A `io.kestra.plugin.scripts.python.Script` task parses the XML response and extracts individual keyword suggestions
    4. A `io.kestra.plugin.scripts.python.Script` task cleans and deduplicates the extracted keywords
    5. A `io.kestra.plugin.scripts.python.Script` task aggregates the keywords into a single list and returns it as the webhook response

    Ideal for:
    - **SEO professionals** building keyword research pipelines at scale
    - **Content marketers** looking for topic ideas driven by real search demand
    - **Growth engineers** integrating keyword discovery into automated content workflows
  tags:
    - Business
    - Data
  ee: false
  demo: false
  metaDescription: >-
    Generate keyword ideas from Google Autosuggest. Send a seed term via webhook
    and receive a structured list of search suggestions for SEO and content planning.

