extend:
  title: SSL Certificate Expiry Alert System
  metaTitle: SSL Certificate Expiry Alert
  shortDescription: >-
    Monitor SSL certificates across multiple domains and receive email alerts
    when any certificate is approaching its expiration date.
  description: |
    **Proactively monitor SSL certificate expiration dates and get notified before they lapse.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger runs the check weekly on Monday mornings
    2. A `io.kestra.plugin.core.flow.ForEach` task iterates over your list of domains to monitor
    3. An `io.kestra.plugin.core.http.Request` task calls the SSL-Checker.io API to retrieve certificate details for each domain
    4. A `io.kestra.plugin.scripts.python.Script` task evaluates the days remaining and flags certificates expiring within the threshold
    5. An `io.kestra.plugin.email.MailSend` task sends an alert email listing all certificates that need attention

    Ideal for:
    - **DevOps engineers** managing SSL certificates across multiple services
    - **System administrators** responsible for uptime and security compliance
    - **Agency teams** maintaining client websites and needing automated certificate monitoring
  tags:
    - Monitoring
    - DevOps
    - Notifications
  ee: false
  demo: false
  metaDescription: >-
    Automatically check SSL certificate expiration dates using SSL-Checker.io and
    send email alerts when certificates are close to expiring.

id: ssl-certificate-expiry-alert
namespace: company.team

inputs:
  - id: domains
    type: ARRAY
    itemType: STRING
    displayName: Domains to monitor
    description: List of domain names (without protocol) to check for SSL expiry
    defaults:
      - "example.com"
      - "api.example.com"
  - id: expiry_threshold_days
    type: INT
    displayName: Alert threshold (days)
    description: Send an alert when a certificate has fewer than this many days remaining
    defaults: 14
  - id: alert_email
    type: STRING
    displayName: Alert recipient email
    description: Email address to receive SSL expiry warnings

tasks:
  - id: check_all_certificates
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ inputs.domains }}"
    tasks:
      - id: check_ssl
        type: io.kestra.plugin.core.http.Request
        uri: "https://ssl-checker.io/api/v1/check/{{ taskrun.value }}"
        method: GET

  - id: evaluate_expiry
    type: io.kestra.plugin.scripts.python.Script
    inputFiles:
      ssl_results.json: "{{ outputs.check_all_certificates | json }}"
    script: |
      import json
      from kestra import Kestra

      with open("ssl_results.json") as f:
          results = json.load(f)

      threshold = {{ inputs.expiry_threshold_days }}
      expiring = []
      healthy = []

      for domain, task_output in results.items():
          body = task_output.get("body", "{}")
          if isinstance(body, str):
              data = json.loads(body)
          else:
              data = body

          result = data.get("result", {})
          host = result.get("host", domain)
          days_left = result.get("days_left", -1)
          valid_till = result.get("valid_till", "unknown")

          entry = {
              "host": host,
              "days_left": days_left,
              "valid_till": valid_till
          }

          if days_left >= 0 and days_left <= threshold:
              expiring.append(entry)
          else:
              healthy.append(entry)

      Kestra.outputs({
          "expiring_count": len(expiring),
          "expiring": expiring,
          "healthy_count": len(healthy),
          "has_alerts": len(expiring) > 0
      })

  - id: send_alert
    type: io.kestra.plugin.core.flow.If
    condition: "{{ outputs.evaluate_expiry.vars.has_alerts }}"
    then:
      - id: send_alert_email
        type: io.kestra.plugin.email.MailSend
        host: "{{ secret('SMTP_HOST') }}"
        port: 587
        username: "{{ secret('SMTP_USER') }}"
        password: "{{ secret('SMTP_PASSWORD') }}"
        from: "{{ secret('EMAIL_FROM') }}"
        to: "{{ inputs.alert_email }}"
        subject: "SSL Certificate Expiry Warning - {{ outputs.evaluate_expiry.vars.expiring_count }} certificate(s) expiring soon"
        htmlTextContent: |
          <h2>SSL Certificate Expiry Alert</h2>
          <p>The following certificates are expiring within {{ inputs.expiry_threshold_days }} days:</p>
          <table border="1" cellpadding="8" cellspacing="0">
            <tr><th>Domain</th><th>Days Remaining</th><th>Expires On</th></tr>
            {% for cert in outputs.evaluate_expiry.vars.expiring %}
            <tr>
              <td>{{ cert.host }}</td>
              <td style="color: red; font-weight: bold;">{{ cert.days_left }}</td>
              <td>{{ cert.valid_till }}</td>
            </tr>
            {% endfor %}
          </table>
          <p>Please renew these certificates before they expire.</p>

triggers:
  - id: weekly_check
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 9 * * 1"
