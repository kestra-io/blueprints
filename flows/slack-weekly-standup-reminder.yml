id: slack-weekly-standup-reminder
namespace: company.team

tasks:
  - id: post_weekly_standup_prompt
    type: io.kestra.plugin.slack.app.chats.Post
    token: "{{ secret('SLACK_TOKEN') }}"
    channel: "{{ secret('SLACK_CHANNEL_ID') }}" # e.g. C0123...
    messageText: |
      Weekly Stand-up (Week of {{ now() }})

      1) *Last week* — key achievements
      2) *This week* — priorities
      3) *Risks / Blockers* — anything impacting delivery?
      4) *Support needed* — where can others help?

      _Please reply in a thread to keep the channel organized._

triggers:
  - id: weekly_monday_morning
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 9 * * 1"   # Every Monday at 09:00 UTC
    disabled: true

description: |
  Posts a weekly stand-up prompt to a Slack channel every Monday.
  Configure secrets:
    - SLACK_TOKEN (xoxb-...)
    - SLACK_CHANNEL_ID (C...)

extend:
  title: Weekly Stand-up Reminder in Slack
  shortDescription: "Posts a weekly stand-up template to a Slack channel."
  description: |
    This blueprint posts a structured weekly stand-up reminder to Slack.

    It encourages teams to reflect on:
    - last week's achievements
    - current week's priorities
    - risks or blockers
    - collaboration needs

    Setup:
    1) Create a Slack app and install it
    2) Add required scopes (`chat:write`)
    3) Store the bot token as `SLACK_TOKEN`
    4) Store the target channel ID as `SLACK_CHANNEL_ID`

    Adjust the cron expression for your timezone and enable the trigger.
  tags:
    - Business
  ee: false
  demo: false
  meta_description: |
    Automatically post a weekly stand-up template to a Slack channel using Kestra and the Slack App API.