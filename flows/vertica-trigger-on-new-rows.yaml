id: vertica-trigger-on-new-rows
namespace: company.analytics

labels:
  team: data
  domain: analytics

concurrency:
  limit: 1

variables:
  vertica_url: jdbc:vertica://vertica-host:5433/analytics
  order_ids: "{{ trigger.rows | jq('[.[].order_id | tostring] | join(\",\")') | first }}"

pluginDefaults:
  - type: io.kestra.plugin.jdbc.vertica
    values:
      url: "{{ vars.vertica_url }}"
      username: "{{ secret('VERTICA_USERNAME') }}"
      password: "{{ secret('VERTICA_PASSWORD') }}"

tasks:
  - id: notify_batch
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Post a single batched Slack message summarizing all newly detected orders in this poll window.
    url: "{{ secret('SLACK_WEBHOOK') }}"
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 5
    messageText: |
      :package: {{ trigger.size }} new Vertica order(s) detected (execution {{ execution.id }})
      Order IDs: {{ vars.order_ids }}
      First order: {{ trigger.rows[0].order_id }} - {{ trigger.rows[0].customer_name }} - {{ trigger.rows[0].product }} - {{ trigger.rows[0].total }}

  - id: mark_processed
    type: io.kestra.plugin.jdbc.vertica.Query
    description: Mark only the alerted order_ids as processed, after the Slack post succeeded, so a failed alert never drops a row.
    timeout: PT5M
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    fetchType: NONE
    sql: |
      UPDATE staging.orders
      SET processed = true
      WHERE order_id IN ({{ vars.order_ids }});

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }}). Orders {{ vars.order_ids }} may not have been marked processed and could be re-alerted next poll."

triggers:
  - id: poll_new_orders
    type: io.kestra.plugin.jdbc.vertica.Trigger
    description: Poll for a bounded batch of unprocessed orders. Marking is done flow-side after the alert succeeds, not in the trigger.
    interval: PT5M
    url: "{{ vars.vertica_url }}"
    username: "{{ secret('VERTICA_USERNAME') }}"
    password: "{{ secret('VERTICA_PASSWORD') }}"
    fetchType: FETCH
    sql: |
      SELECT order_id, customer_name, product, total
      FROM staging.orders
      WHERE processed = false
      ORDER BY order_id
      LIMIT 500;

extend:
  shortDescription: Poll Vertica for unprocessed rows, post one batched Slack alert, then mark only the alerted ids processed.
  title: Notify Slack on new Vertica rows
  metaTitle: Vertica row trigger to Slack alert
  description: |
    This event-driven flow watches a Vertica table for new rows and posts a batched Slack notification, then marks only the alerted rows as processed. It is designed for honest at-least-once delivery: a row is never marked processed before its alert has been sent.

    What the flow does:
    - Polls Vertica every 5 minutes using the Vertica Trigger, selecting up to 500 orders where `processed = false`, ordered by `order_id` (a bounded batch, so a backlog cannot dump an unbounded set into memory).
    - When the query returns rows, starts an execution exposing the matched rows as `{{ trigger.rows }}` and the count as `{{ trigger.size }}`.
    - Posts a single batched Slack message (count, the list of order ids, and the first order's detail) instead of one webhook per row, so a burst of new orders does not hit Slack's per-second rate limit. The Slack task carries a `retry` to ride out 429/5xx responses.
    - Only after the Slack post succeeds, marks exactly the alerted `order_id`s as processed with a scoped `UPDATE ... WHERE order_id IN (...)`, built from the fetched rows.

    Why the marking moved out of the trigger:
    - The trigger's `afterSQL` would run at poll time, inside the SELECT's transaction, BEFORE the Slack task. A blanket `UPDATE ... WHERE processed = false` there has two real bugs: any row inserted between the SELECT and the UPDATE gets flagged processed without ever being alerted, and a row is marked processed even if the Slack post later fails, permanently dropping it. This flow removes `afterSQL` entirely and instead marks rows flow-side, scoped to the exact alerted ids, after the alert succeeds.

    Delivery semantics (honest):
    - This is at-least-once, not exactly-once. If the `mark_processed` step fails after the Slack alert was delivered, those order ids stay `processed = false` and will be re-alerted on the next poll. The `errors` block makes this visible by naming the affected ids. If you need exactly-once, deduplicate on the consumer side using the order id.

    Reliability and safety:
    - Connection/credential properties are set once in `pluginDefaults` keyed by the Vertica plugin group; the trigger keeps its own url/username/password since triggers are not covered by task `pluginDefaults`, but it reuses the same `vertica_url` variable for consistency.
    - `notify_batch` retries up to 5 times on transient Slack errors; `mark_processed` retries up to 3 times on transient Vertica errors and has a 5-minute timeout.
    - A flow-level `errors` block posts a Slack alert with the execution id and the affected order ids on any failure.
    - `concurrency.limit: 1` serializes executions so two overlapping polls cannot mark the same window twice; the trigger's `allowConcurrent` also defaults to false.

    Operational note on polling a columnar warehouse:
    - Vertica is a columnar analytics warehouse, not a low-latency message queue. This pattern is appropriate for low-volume change notification. Keep the predicate column (`processed`) covered by a projection, and prefer a longer `interval` (PT5M here) over aggressive sub-minute polling. For high-volume queue semantics, use a transactional source or change data capture instead of polling a data warehouse.

    Prerequisites:
    - A reachable Vertica cluster with a `staging.orders` table that includes a boolean `processed` column and an `order_id` column. Update the `vertica_url` variable to your JDBC URL.
    - A Slack incoming webhook URL pointing at the channel that should receive alerts.

    Secrets:
    - `VERTICA_USERNAME`: the Vertica database user used for the connection.
    - `VERTICA_PASSWORD`: the password for that Vertica user.
    - `SLACK_WEBHOOK`: the Slack incoming webhook URL used to post messages.

    Quick start:
    1. Add the `VERTICA_USERNAME`, `VERTICA_PASSWORD`, and `SLACK_WEBHOOK` secrets to your namespace.
    2. Edit the `vertica_url` variable and the SQL to match your table and the column that marks rows as unprocessed.
    3. Adjust the `interval` if you want to poll more or less often (minimum recommended is PT30S; PT5M is a good default for a warehouse).
    4. Insert a row with `processed = false` to see an execution and a Slack alert.

    Expected outputs:
    - Each execution exposes the matched rows as `{{ trigger.rows }}` and the count as `{{ trigger.size }}`.
    - One batched Slack message is delivered per poll window to the configured webhook channel.
    - The alerted ids are marked `processed = true` only after the alert succeeds.

    Documentation:
    - Vertica plugin: https://kestra.io/plugins/plugin-jdbc-vertica
    - Slack Incoming Webhook task: https://kestra.io/plugins/plugin-notifications/slack/io.kestra.plugin.slack.notifications.slackincomingwebhook
    - Slack incoming webhooks: https://api.slack.com/messaging/webhooks
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Poll Vertica for unprocessed rows, post one batched Slack alert with retry, then mark only the alerted ids processed.
