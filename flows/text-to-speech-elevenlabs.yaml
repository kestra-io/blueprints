id: text-to-speech-elevenlabs
namespace: company.team
tasks:
  - id: validate_params
    type: io.kestra.plugin.core.flow.If
    condition: "{{ trigger.body.voice_id is defined and trigger.body.text is defined }}"
    then:
      - id: generate_voice
        type: io.kestra.plugin.core.http.Request
        uri: "https://api.elevenlabs.io/v1/text-to-speech/{{ trigger.body.voice_id }}"
        method: POST
        headers:
          xi-api-key: "{{ secret('ELEVENLABS_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "text": "{{ trigger.body.text }}"
          }
      - id: respond_with_audio
        type: io.kestra.plugin.scripts.python.Script
        script: |
          from kestra import Kestra

          # Return the binary audio from the ElevenLabs response
          Kestra.outputs({"response": "{{ outputs.generate_voice.body }}"})
    else:
      - id: respond_with_error
        type: io.kestra.plugin.scripts.python.Script
        script: |
          import json
          from kestra import Kestra

          error_response = json.dumps({"error": "Invalid inputs. Both voice_id and text are required."})
          Kestra.outputs({"response": error_response})
triggers:
  - id: webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"

extend:
  title: "Generate Text-to-Speech Audio with ElevenLabs API"
  metaTitle: "Text-to-Speech with ElevenLabs API"
  shortDescription: >-
    Convert text to natural-sounding speech audio using the ElevenLabs API,
    exposed as a simple webhook endpoint.
  description: |
    **Turn any text into lifelike speech audio by calling the ElevenLabs text-to-speech API through a webhook endpoint.**

    1. A `io.kestra.plugin.core.trigger.Webhook` receives a POST request with a voice ID and the text to convert
    2. A `io.kestra.plugin.core.flow.If` task validates that both `voice_id` and `text` parameters are present in the request body
    3. A `io.kestra.plugin.core.http.Request` task sends the text to the ElevenLabs text-to-speech endpoint for the specified voice
    4. A `io.kestra.plugin.scripts.python.Script` task returns the generated audio binary as the webhook response
    5. If validation fails, a `io.kestra.plugin.scripts.python.Script` task returns an error message indicating invalid inputs

    Ideal for:
    - **Video producers** who need voiceover audio generated on demand from scripts
    - **Application developers** building voice-enabled features or accessibility tools
    - **Content creators** looking to add narration to articles, tutorials, or social media posts
  tags:
    - AI
  ee: false
  demo: false
  metaDescription: >-
    Generate natural-sounding speech from text using the ElevenLabs API.
    Send text and a voice ID via webhook to receive audio output.

