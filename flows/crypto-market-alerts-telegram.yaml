id: crypto-market-alerts-telegram
namespace: company.team

inputs:
  - id: change_threshold_pct
    type: FLOAT
    displayName: Price change threshold (%)
    description: Minimum absolute 24h price change percentage to trigger an alert
    defaults: 15.0
  - id: telegram_chat_id
    type: STRING
    displayName: Telegram chat ID
    description: The Telegram chat or group ID where alerts will be sent
  - id: max_message_length
    type: INT
    displayName: Max message length (chars)
    description: Maximum characters per Telegram message (Telegram limit is 4096)
    defaults: 1000

tasks:
  - id: fetch_binance_ticker
    type: io.kestra.plugin.core.http.Request
    uri: "https://api.binance.com/api/v3/ticker/24hr"
    method: GET

  - id: filter_significant_changes
    type: io.kestra.plugin.scripts.python.Script
    script: |
      import json
      from kestra import Kestra

      ticker_data = json.loads("""{{ outputs.fetch_binance_ticker.body }}""")
      threshold = {{ inputs.change_threshold_pct }}

      significant = []
      for coin in ticker_data:
          try:
              pct = float(coin.get("priceChangePercent", 0))
          except (ValueError, TypeError):
              continue
          if abs(pct) >= threshold:
              significant.append({
                  "symbol": coin.get("symbol", ""),
                  "priceChangePercent": pct,
                  "lastPrice": coin.get("lastPrice", "0")
              })

      # Sort by percentage change descending
      significant.sort(key=lambda x: x["priceChangePercent"], reverse=True)

      # Format messages
      messages = []
      for item in significant:
          direction = "+" if item["priceChangePercent"] > 0 else ""
          msg = (
              f"{item['symbol']} "
              f"Price changed by {direction}{item['priceChangePercent']:.2f}%\n"
              f"Last Price: {item['lastPrice']}"
          )
          messages.append(msg)

      Kestra.outputs({
          "alert_count": len(significant),
          "messages": messages,
          "has_alerts": len(significant) > 0
      })

  - id: send_alerts
    type: io.kestra.plugin.core.flow.If
    condition: "{{ outputs.filter_significant_changes.vars.has_alerts }}"
    then:
      - id: split_into_chunks
        type: io.kestra.plugin.scripts.python.Script
        script: |
          import json
          from kestra import Kestra

          messages = json.loads("""{{ outputs.filter_significant_changes.vars.messages | json }}""")
          max_len = {{ inputs.max_message_length }}

          chunks = []
          current_chunk = ""

          for msg in messages:
              entry = msg + "\n\n"
              if len(current_chunk) + len(entry) > max_len:
                  if current_chunk:
                      chunks.append(current_chunk.strip())
                  current_chunk = entry
              else:
                  current_chunk += entry

          if current_chunk.strip():
              chunks.append(current_chunk.strip())

          Kestra.outputs({"chunks": chunks})

      - id: send_telegram_messages
        type: io.kestra.plugin.core.flow.ForEach
        values: "{{ outputs.split_into_chunks.vars.chunks }}"
        tasks:
          - id: send_message
            type: io.kestra.plugin.core.http.Request
            uri: "https://api.telegram.org/bot{{ secret('TELEGRAM_BOT_TOKEN') }}/sendMessage"
            method: POST
            contentType: application/json
            body: |
              {
                "chat_id": "{{ inputs.telegram_chat_id }}",
                "text": "{{ taskrun.value }}",
                "parse_mode": "Markdown"
              }

triggers:
  - id: poll_binance
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "*/6 * * * *"

extend:
  title: Crypto Market Alert System with Telegram Notifications
  metaTitle: Crypto Alerts via Binance and Telegram
  shortDescription: >-
    Monitor cryptocurrency prices on Binance and receive Telegram alerts when any
    token moves more than a configurable percentage in 24 hours.
  description: |
    **Track significant cryptocurrency price swings on Binance and get instant Telegram notifications for coins that exceed your alert threshold.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger polls Binance every 6 minutes
    2. An `io.kestra.plugin.core.http.Request` task fetches the full 24-hour price change ticker from the Binance API
    3. A `io.kestra.plugin.scripts.python.Script` task filters coins by absolute percentage change and sorts them by magnitude
    4. A second `io.kestra.plugin.scripts.python.Script` task splits the formatted alert data into message chunks under Telegram's character limit
    5. A `io.kestra.plugin.core.flow.ForEach` task sends each chunk as a separate Telegram message via the Bot API

    Ideal for:
    - **Crypto traders** who want automated alerts for volatile market moves
    - **Portfolio managers** tracking large price swings across hundreds of tokens
    - **Market analysts** monitoring real-time cryptocurrency momentum signals
  tags:
    - Business
    - System
  ee: false
  demo: false
  metaDescription: >-
    Automated cryptocurrency price monitoring using Binance API with Telegram
    notifications for significant 24-hour market movements.

