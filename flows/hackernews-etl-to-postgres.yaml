id: hackernews-etl-to-postgres
namespace: company.team

inputs:
  - id: story_type
    type: SELECT
    displayName: Story type
    description: Which HackerNews feed to fetch stories from
    values:
      - topstories
      - newstories
      - beststories
    defaults: "topstories"
  - id: max_stories
    type: INT
    displayName: Number of stories
    description: How many stories to fetch and process (max 30)
    defaults: 10

tasks:
  - id: fetch_story_ids
    type: io.kestra.plugin.core.http.Request
    uri: "https://hacker-news.firebaseio.com/v0/{{ inputs.story_type }}.json"
    method: GET

  - id: fetch_stories
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ outputs.fetch_story_ids.body | json | jq('.[0:' + inputs.max_stories | string + ']') | first }}"
    concurrencyLimit: 5
    tasks:
      - id: fetch_story_detail
        type: io.kestra.plugin.core.http.Request
        uri: "https://hacker-news.firebaseio.com/v0/item/{{ taskrun.value }}.json"
        method: GET

  - id: summarize_stories
    type: io.kestra.plugin.scripts.python.Script
    inputFiles:
      stories_raw.json: "{{ outputs.fetch_stories | json }}"
    dependencies:
      - requests
    script: |
      import json
      from kestra import Kestra

      with open("stories_raw.json") as f:
          raw = json.load(f)

      stories = []
      for story_id, story_outputs in raw.items():
          body = story_outputs.get("body", "{}")
          if isinstance(body, str):
              try:
                  story = json.loads(body)
              except:
                  continue
          else:
              story = body

          if not story or story.get("type") not in ("story", "job", "ask", "show"):
              continue

          stories.append({
              "id": story.get("id"),
              "title": story.get("title", ""),
              "url": story.get("url", ""),
              "score": story.get("score", 0),
              "author": story.get("by", ""),
              "comments": story.get("descendants", 0),
              "story_type": story.get("type", ""),
              "posted_at": story.get("time", 0)
          })

      # Sort by score descending
      stories.sort(key=lambda x: x["score"], reverse=True)
      Kestra.outputs({"stories": stories, "count": len(stories)})

  - id: summarize_with_ai
    type: io.kestra.plugin.openai.ChatCompletion
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4o-mini
    maxTokens: 800
    messages:
      - role: system
        content: |
          You are a tech analyst. Given a list of trending HackerNews stories, write a brief digest
          (3-5 bullet points) highlighting the most interesting themes and trends. Be concise and insightful.
          Focus on what these stories collectively reveal about the current state of tech.
      - role: user
        content: |
          HackerNews {{ inputs.story_type }} today:
          {{ outputs.summarize_stories.vars.stories | json }}

  - id: store_to_postgres
    type: io.kestra.plugin.scripts.python.Script
    inputFiles:
      stories.json: "{{ outputs.summarize_stories.vars.stories | json }}"
    script: |
      import json
      import psycopg2
      import os

      with open("stories.json") as f:
          stories = json.load(f)

      conn = psycopg2.connect(
          host=os.getenv("POSTGRES_HOST", ""),
          dbname=os.getenv("POSTGRES_DB", ""),
          user=os.getenv("POSTGRES_USER_VAL", ""),
          password=os.getenv("POSTGRES_PASS_VAL", ""),
          port=5432
      )
      cur = conn.cursor()

      cur.execute("""
          CREATE TABLE IF NOT EXISTS hackernews_stories (
              id BIGINT PRIMARY KEY,
              title TEXT,
              url TEXT,
              score INTEGER,
              author TEXT,
              comments INTEGER,
              story_type TEXT,
              posted_at BIGINT,
              fetched_at TIMESTAMP DEFAULT NOW()
          )
      """)

      for story in stories:
          cur.execute("""
              INSERT INTO hackernews_stories (id, title, url, score, author, comments, story_type, posted_at)
              VALUES (%(id)s, %(title)s, %(url)s, %(score)s, %(author)s, %(comments)s, %(story_type)s, %(posted_at)s)
              ON CONFLICT (id) DO UPDATE SET
                  score = EXCLUDED.score,
                  comments = EXCLUDED.comments,
                  fetched_at = NOW()
          """, story)

      conn.commit()
      cur.close()
      conn.close()
      print(f"Stored {len(stories)} stories to PostgreSQL")
    env:
      POSTGRES_HOST: "{{ secret('POSTGRES_HOST') }}"
      POSTGRES_DB: "{{ secret('POSTGRES_DB') }}"
      POSTGRES_USER_VAL: "{{ secret('POSTGRES_USER') }}"
      POSTGRES_PASS_VAL: "{{ secret('POSTGRES_PASSWORD') }}"
    dependencies:
      - psycopg2-binary

  - id: post_digest_to_slack
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    messageText: |
      :newspaper: *HackerNews {{ inputs.story_type | replace('stories', '') | title }} Digest*
      _{{ outputs.summarize_stories.vars.count }} stories processed_

      {{ outputs.summarize_with_ai.choices[0].message.content }}

triggers:
  - id: daily_digest
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 8 * * *"
    description: Fetch and process HackerNews stories every day at 08:00 UTC

extend:
  title: Extract, Transform, and Store HackerNews Top Stories with AI-Generated Daily Digest
  metaTitle: HackerNews to PostgreSQL ETL with Kestra
  shortDescription: "Fetch trending HackerNews stories, store them in PostgreSQL, generate an AI trend digest with OpenAI, and post a daily briefing to Slack."
  description: |
    Build a daily tech intelligence pipeline that pulls trending HackerNews stories, lands them in a PostgreSQL table for historical analysis, and broadcasts an AI-generated digest to your team. This blueprint solves the problem of turning a noisy public feed into a clean, deduplicated, queryable PostgreSQL dataset plus a human-readable summary, all on an automated daily schedule with no manual collection or copy-paste.

    ## How it works

    1. The `daily_digest` trigger (`io.kestra.plugin.core.trigger.Schedule`, cron `0 8 * * *`) starts the flow every morning at 08:00 UTC.
    2. `fetch_story_ids` (`io.kestra.plugin.core.http.Request`) calls the HackerNews Firebase API for the selected feed (`topstories`, `newstories`, or `beststories`).
    3. `fetch_stories` (`io.kestra.plugin.core.flow.ForEach`) fans out across the top N story IDs with a `concurrencyLimit` of 5, fetching each story detail in parallel via a nested `io.kestra.plugin.core.http.Request`.
    4. `summarize_stories` (`io.kestra.plugin.scripts.python.Script`) parses and normalizes the raw Firebase responses, extracting id, title, url, score, author, comments, type, and timestamp, then sorts by score.
    5. `summarize_with_ai` (`io.kestra.plugin.openai.ChatCompletion`) sends the story list to `gpt-4o-mini` to write a concise 3 to 5 bullet trend digest.
    6. `store_to_postgres` (`io.kestra.plugin.scripts.python.Script`) upserts every story into a `hackernews_stories` table using `INSERT ... ON CONFLICT DO UPDATE`, keeping a clean historical archive.
    7. `post_digest_to_slack` (`io.kestra.plugin.slack.notifications.SlackIncomingWebhook`) posts the AI digest and story count to a Slack channel.

    ## What you get

    - A deduplicated, ever-growing PostgreSQL table of HackerNews stories you can query and join.
    - A daily AI-written digest of the dominant tech themes, delivered to Slack.
    - Parallel, rate-friendly fetching of story details via `ForEach` with bounded concurrency.
    - Configurable feed type and story count through flow inputs.

    ## Who it's for

    - Data engineers who want a worked ETL example landing in PostgreSQL.
    - Engineering teams tracking emerging tools, libraries, and security topics.
    - Analysts and investors monitoring technology momentum over time.
    - Tech newsletter and content authors who need a daily grounded briefing.

    ## Why orchestrate this with Kestra

    PostgreSQL has no built-in scheduler, retrieval, or alerting: it stores rows, nothing more. Kestra supplies the scheduled trigger, parallel HTTP retrieval, Python transformation, AI enrichment, and Slack delivery around the database, with retries, full execution lineage, and a declarative YAML definition you can version control. Event and schedule triggers, per-task observability, and replay close the orchestration gap that the database itself cannot fill.

    ## Prerequisites

    - A running PostgreSQL instance reachable from your Kestra workers.
    - An OpenAI API key with access to `gpt-4o-mini`.
    - A Slack incoming webhook URL.

    ### Secrets

    - `OPENAI_API_KEY`
    - `POSTGRES_HOST`
    - `POSTGRES_DB`
    - `POSTGRES_USER`
    - `POSTGRES_PASSWORD`
    - `SLACK_WEBHOOK_URL`

    ## Quick start

    1. Add the six secrets above to your Kestra instance.
    2. Create the flow from this blueprint.
    3. Adjust the `story_type` and `max_stories` inputs if needed.
    4. Execute manually once to verify the PostgreSQL table and Slack post.
    5. Leave the daily schedule enabled to run automatically at 08:00 UTC.

    ## How to extend

    - Filter stories by keyword before storing or summarizing.
    - Add sentiment scoring or per-story tagging in the Python step.
    - Track score trends over time for ranking analysis with SQL queries.
    - Scrape full article bodies to feed a deeper AI summary.
    - Fan out the digest to Notion, email, or other channels.

    ## Links

    - [Postgres plugin documentation](https://kestra.io/plugins/plugin-jdbc-postgres)
    - [PostgreSQL orchestration with Kestra](https://kestra.io/orchestration/postgres)
  tags:
    - Data
    - AI
    - Business
  ee: false
  demo: true
  metaDescription: Fetch HackerNews top stories with Kestra, store them in PostgreSQL, generate an AI trend digest with GPT-4o-mini, and post a daily briefing to Slack.
