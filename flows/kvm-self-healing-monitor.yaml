id: kvm-self-healing-monitor
namespace: company.infra

inputs:
  - id: monitored_vm
    type: STRING
    defaults: critical-db-01
    description: >
      Libvirt domain to watch and auto-recover. Treat as a trusted,
      operator-supplied identifier.
    validator: ^[a-z0-9][a-z0-9-]{0,62}$

  - id: max_restarts_per_window
    type: INT
    defaults: 3
    description: >
      Maximum auto-restarts allowed inside the flap window before the flow stops
      restarting and escalates to on-call instead. Prevents endlessly rebooting a
      crash-looping VM.

  - id: flap_window
    type: DURATION
    defaults: PT30M
    description: >
      Sliding window over which restarts are counted. The restart counter in the
      KV store expires after this duration (TTL), so flapping resets once the VM
      stays healthy for a full window.

variables:
  libvirt_uri: "{{ secret('LIBVIRT_URI') }}"

pluginDefaults:
  - type: io.kestra.plugin.kvm
    values:
      uri: "{{ vars.libvirt_uri }}"

concurrency:
  limit: 1

tasks:
  - id: read_maintenance_flag
    type: io.kestra.plugin.core.kv.Get
    description: >
      Read an optional per-VM maintenance flag. When set, the domain was stopped
      on purpose (backup, failover, planned maintenance) and must not be auto-booted.
    key: "maintenance_{{ inputs.monitored_vm }}"
    errorOnMissing: false

  - id: read_restart_counter
    type: io.kestra.plugin.core.kv.Get
    description: Read how many times this VM has been auto-restarted within the current flap window.
    key: "restart_count_{{ inputs.monitored_vm }}"
    errorOnMissing: false

  - id: decide
    type: io.kestra.plugin.core.flow.If
    description: >
      Recover only when the VM is down unexpectedly AND it has not exceeded the
      flap threshold. Otherwise escalate or stand down.
    condition: "{{ (outputs.read_maintenance_flag.value ?? 'false') != 'true' and ((outputs.read_restart_counter.value ?? 0) | number) < (inputs.max_restarts_per_window | number) }}"
    then:
      - id: bump_restart_counter
        type: io.kestra.plugin.core.kv.Set
        description: >
          Increment the flap counter before restarting, with a TTL equal to the
          flap window so it resets automatically after a healthy period.
        key: "restart_count_{{ inputs.monitored_vm }}"
        kvType: NUMBER
        value: "{{ ((outputs.read_restart_counter.value ?? 0) | number) + 1 }}"
        ttl: "{{ inputs.flap_window }}"

      - id: recover_vm
        type: io.kestra.plugin.kvm.StartVm
        description: Boot the unexpectedly stopped domain and wait for it to reach RUNNING.
        name: "{{ inputs.monitored_vm }}"
        waitForRunning: true
        timeToWait: PT2M
        retry:
          type: constant
          interval: PT15S
          maxAttempt: 3

      - id: alert_recovered
        type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
        description: Slack alert that the domain was found down and auto-restarted.
        url: "{{ secret('SLACK_WEBHOOK') }}"
        retry:
          type: constant
          interval: PT10S
          maxAttempt: 3
        payload: |
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Auto-recovery: {{ inputs.monitored_vm }} was down"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Detected state:*\n{{ trigger.state }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*State after restart:*\n{{ outputs.recover_vm.state }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Restarts in window:*\n{{ ((outputs.read_restart_counter.value ?? 0) | number) + 1 }} / {{ inputs.max_restarts_per_window }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Execution:*\n{{ execution.id }}"
                  }
                ]
              }
            ]
          }
    else:
      - id: classify
        type: io.kestra.plugin.core.flow.If
        description: Distinguish an intentional stop from a flapping VM that hit the restart ceiling.
        condition: "{{ (outputs.read_maintenance_flag.value ?? 'false') == 'true' }}"
        then:
          - id: log_maintenance
            type: io.kestra.plugin.core.log.Log
            description: The VM is down on purpose; do not auto-restart.
            level: INFO
            message: "Domain {{ inputs.monitored_vm }} is SHUTOFF but the maintenance flag is set; skipping auto-restart."
        else:
          - id: escalate_flapping
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            description: >
              The VM has hit the restart ceiling inside the flap window. Stop
              restarting and page on-call instead of rebooting a sick VM forever.
            url: "{{ secret('SLACK_WEBHOOK') }}"
            retry:
              type: constant
              interval: PT10S
              maxAttempt: 3
            messageText: ":rotating_light: <!channel> {{ inputs.monitored_vm }} has flapped {{ outputs.read_restart_counter.value ?? 0 }} times within {{ inputs.flap_window }} and was NOT auto-restarted. On-call must investigate (execution {{ execution.id }})."

errors:
  - id: alert_recovery_failed
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: >
      A failed self-heal is more urgent than a successful one: if the restart
      itself fails or never reaches RUNNING, page loudly so the VM does not stay
      down silently.
    url: "{{ secret('SLACK_WEBHOOK') }}"
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    messageText: ":rotating_light: <!channel> Auto-recovery FAILED for {{ inputs.monitored_vm }} in {{ flow.namespace }}.{{ flow.id }} (execution {{ execution.id }}). The VM is likely still down; investigate now."

triggers:
  - id: watch_vm
    type: io.kestra.plugin.kvm.VmEventTrigger
    description: >
      Poll the monitored domain's state every minute, but only create an
      execution when it is SHUTOFF, so a healthy VM does not flood the execution
      history with no-op runs.
    uri: "{{ vars.libvirt_uri }}"
    name: "{{ inputs.monitored_vm }}"
    interval: PT1M
    conditions:
      - type: io.kestra.plugin.core.condition.Expression
        expression: "{{ trigger.state == 'SHUTOFF' }}"

extend:
  shortDescription: A polling trigger watches a KVM domain and, only when it is SHUTOFF, auto-restarts it with flap protection, a maintenance-aware skip, and loud failure alerts.
  title: Self-healing KVM VM monitor with auto-restart
  metaTitle: Self-healing KVM monitoring with Kestra
  description: |
    This flow keeps a critical KVM domain online while avoiding the two classic anti-patterns
    of naive self-healing: flooding the execution history with no-op polls, and blindly
    rebooting a sick VM forever. A polling trigger reads the domain's state every minute but
    only creates an execution when the domain is SHUTOFF. When it fires, the flow decides
    whether to recover based on a maintenance flag and a flap counter, restarts the domain if
    it is safe to do so, and alerts Slack. A failed recovery pages on-call loudly.

    ## What this flow does
    1. The `watch_vm` trigger (`io.kestra.plugin.kvm.VmEventTrigger`) polls the monitored
       domain every minute. An `Expression` condition gates execution creation on
       `trigger.state == 'SHUTOFF'`, so a healthy VM produces zero executions instead of
       roughly 1,440 no-op runs per day.
    2. `read_maintenance_flag` and `read_restart_counter` read per-VM state from the KV store
       (both with `errorOnMissing: false`, so a missing key is null, not an error).
    3. `decide` recovers only when the maintenance flag is not set AND the restart count is
       below `max_restarts_per_window`.
       - On the recover path, `bump_restart_counter` increments the flap counter with a TTL of
         `flap_window` (so it resets after a healthy period), `recover_vm` boots the domain and
         waits for RUNNING, and `alert_recovered` posts a Slack summary.
       - Otherwise `classify` either logs that the VM is down on purpose (maintenance flag set)
         or, if the VM has hit the restart ceiling, posts a Slack `<!channel>` escalation and
         deliberately does NOT restart.
    4. The flow-level `errors` block pages on-call if the recovery itself fails, because a
       failed self-heal leaves the VM down and is the most urgent case.

    The libvirt `uri` lives in a `pluginDefaults` block keyed on `io.kestra.plugin.kvm`, every
    remote call has a retry, and `concurrency.limit: 1` ensures only one recovery acts on the
    VM at a time even if a restart takes longer than the poll interval.

    ## Caveats (read before pointing this at a stateful service)
    - Auto-restarting a stateful database can mask or worsen incidents. This flow adds flap
      protection (a capped restart count over a sliding window) and escalates to on-call once
      the ceiling is reached, instead of rebooting a crash-looping VM indefinitely.
    - To pause auto-recovery during planned work, set the KV key
      `maintenance_<monitored_vm>` to the string `true` (for example with a
      `io.kestra.plugin.core.kv.Set` task in your maintenance flow), and clear it afterward.
      While set, the monitor logs and stands down instead of booting the domain.
    - RUNNING is a libvirt state, not an application-readiness signal; the guest may still be
      recovering when the alert fires.

    ## Prerequisites
    - A reachable libvirt/KVM host, addressed via a URI such as `qemu+ssh://root@your-host/system`
      or `qemu:///system`.
    - The monitored domain (`monitored_vm`) must already be defined on the host.
    - A Slack Incoming Webhook URL for alerts and escalations.

    ## Secrets
    - `LIBVIRT_URI`: the libvirt connection URI used by the trigger and the StartVm recovery task.
    - `SLACK_WEBHOOK`: the Slack Incoming Webhook URL used for recovery, escalation, and failure alerts.

    ## Quick start
    1. Add the `LIBVIRT_URI` and `SLACK_WEBHOOK` secrets to your Kestra instance.
    2. Set the `monitored_vm` input to the domain you want watched, and tune
       `max_restarts_per_window` and `flap_window` to your flap tolerance.
    3. Adjust the trigger `interval` if you need faster or slower polling.
    4. Save the flow; the trigger begins polling automatically and only fires on SHUTOFF.

    ## Expected outputs
    - `trigger.name` and `trigger.state`: the domain name and state at the SHUTOFF poll.
    - `{{ outputs.recover_vm.state }}`: domain state after the restart attempt (RUNNING on success).
    - `{{ outputs.read_restart_counter.value }}`: restarts already performed in the current window.

    ## Documentation
    - KVM plugin: https://kestra.io/plugins/plugin-kvm
    - Slack plugin: https://kestra.io/plugins/plugin-slack
    - KV store: https://kestra.io/docs/concepts/kv-store
    - libvirt domain states: https://libvirt.org/html/libvirt-libvirt-domain.html
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Watch a KVM domain and auto-restart it on SHUTOFF with flap protection, maintenance-aware skips, and loud failure alerts in Kestra.
