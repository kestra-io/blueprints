id: kvm-self-healing-monitor
namespace: company.infra

inputs:
  - id: monitored_vm
    type: STRING
    defaults: critical-db-01
    description: >
      Libvirt domain to watch and auto-recover. Treat as a trusted,
      operator-supplied identifier.
    validator: ^[a-z0-9][a-z0-9-]{0,62}$

  - id: max_restarts_per_window
    type: INT
    defaults: 3
    description: >
      Maximum auto-restarts allowed inside the flap window before the flow stops
      restarting and escalates to on-call instead. Prevents endlessly rebooting a
      crash-looping VM.

  - id: flap_window
    type: DURATION
    defaults: PT30M
    description: >
      Sliding window over which restarts are counted. The restart counter in the
      KV store expires after this duration (TTL), so flapping resets once the VM
      stays healthy for a full window.

variables:
  libvirt_uri: "{{ secret('LIBVIRT_URI') }}"

pluginDefaults:
  - type: io.kestra.plugin.kvm
    values:
      uri: "{{ vars.libvirt_uri }}"

concurrency:
  limit: 1

tasks:
  - id: read_maintenance_flag
    type: io.kestra.plugin.core.kv.Get
    description: >
      Read an optional per-VM maintenance flag. When set, the domain was stopped
      on purpose (backup, failover, planned maintenance) and must not be auto-booted.
    key: "maintenance_{{ inputs.monitored_vm }}"
    errorOnMissing: false

  - id: read_restart_counter
    type: io.kestra.plugin.core.kv.Get
    description: Read how many times this VM has been auto-restarted within the current flap window.
    key: "restart_count_{{ inputs.monitored_vm }}"
    errorOnMissing: false

  - id: decide
    type: io.kestra.plugin.core.flow.If
    description: >
      Recover only when the VM is down unexpectedly AND it has not exceeded the
      flap threshold. Otherwise escalate or stand down.
    condition: "{{ (outputs.read_maintenance_flag.value ?? 'false') != 'true' and ((outputs.read_restart_counter.value ?? 0) | number) < (inputs.max_restarts_per_window | number) }}"
    then:
      - id: bump_restart_counter
        type: io.kestra.plugin.core.kv.Set
        description: >
          Increment the flap counter before restarting, with a TTL equal to the
          flap window so it resets automatically after a healthy period.
        key: "restart_count_{{ inputs.monitored_vm }}"
        kvType: NUMBER
        value: "{{ ((outputs.read_restart_counter.value ?? 0) | number) + 1 }}"
        ttl: "{{ inputs.flap_window }}"

      - id: recover_vm
        type: io.kestra.plugin.kvm.StartVm
        description: Boot the unexpectedly stopped domain and wait for it to reach RUNNING.
        name: "{{ inputs.monitored_vm }}"
        waitForRunning: true
        timeToWait: PT2M
        retry:
          type: constant
          interval: PT15S
          maxAttempt: 3

      - id: alert_recovered
        type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
        description: Slack alert that the domain was found down and auto-restarted.
        url: "{{ secret('SLACK_WEBHOOK') }}"
        retry:
          type: constant
          interval: PT10S
          maxAttempt: 3
        payload: |
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Auto-recovery: {{ inputs.monitored_vm }} was down"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Detected state:*\n{{ trigger.state }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*State after restart:*\n{{ outputs.recover_vm.state }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Restarts in window:*\n{{ ((outputs.read_restart_counter.value ?? 0) | number) + 1 }} / {{ inputs.max_restarts_per_window }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Execution:*\n{{ execution.id }}"
                  }
                ]
              }
            ]
          }
    else:
      - id: classify
        type: io.kestra.plugin.core.flow.If
        description: Distinguish an intentional stop from a flapping VM that hit the restart ceiling.
        condition: "{{ (outputs.read_maintenance_flag.value ?? 'false') == 'true' }}"
        then:
          - id: log_maintenance
            type: io.kestra.plugin.core.log.Log
            description: The VM is down on purpose; do not auto-restart.
            level: INFO
            message: "Domain {{ inputs.monitored_vm }} is SHUTOFF but the maintenance flag is set; skipping auto-restart."
        else:
          - id: escalate_flapping
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            description: >
              The VM has hit the restart ceiling inside the flap window. Stop
              restarting and page on-call instead of rebooting a sick VM forever.
            url: "{{ secret('SLACK_WEBHOOK') }}"
            retry:
              type: constant
              interval: PT10S
              maxAttempt: 3
            messageText: ":rotating_light: <!channel> {{ inputs.monitored_vm }} has flapped {{ outputs.read_restart_counter.value ?? 0 }} times within {{ inputs.flap_window }} and was NOT auto-restarted. On-call must investigate (execution {{ execution.id }})."

errors:
  - id: alert_recovery_failed
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: >
      A failed self-heal is more urgent than a successful one: if the restart
      itself fails or never reaches RUNNING, page loudly so the VM does not stay
      down silently.
    url: "{{ secret('SLACK_WEBHOOK') }}"
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    messageText: ":rotating_light: <!channel> Auto-recovery FAILED for {{ inputs.monitored_vm }} in {{ flow.namespace }}.{{ flow.id }} (execution {{ execution.id }}). The VM is likely still down; investigate now."

triggers:
  - id: watch_vm
    type: io.kestra.plugin.kvm.VmEventTrigger
    description: >
      Poll the monitored domain's state every minute, but only create an
      execution when it is SHUTOFF, so a healthy VM does not flood the execution
      history with no-op runs.
    uri: "{{ vars.libvirt_uri }}"
    name: "{{ inputs.monitored_vm }}"
    interval: PT1M
    conditions:
      - type: io.kestra.plugin.core.condition.Expression
        expression: "{{ trigger.state == 'SHUTOFF' }}"

extend:
  shortDescription: Watch a KVM libvirt domain and auto-restart it the moment it goes SHUTOFF, with flap protection, maintenance-aware skips, and loud failure alerts.
  title: Self-healing KVM VM monitor with auto-restart
  metaTitle: Self-healing KVM VM monitoring with Kestra
  description: |
    This blueprint turns Kestra into a self-healing watchdog for a critical KVM (libvirt) virtual machine. A polling trigger checks the domain state once a minute and only fires when the VM is SHUTOFF, so a healthy host never floods your execution history with no-op runs. When the VM does go down unexpectedly, the flow decides whether recovery is safe, restarts the domain, and notifies Slack. It avoids the two classic self-healing anti-patterns: silent no-op spam and blindly rebooting a crash-looping VM forever. Keywords: KVM monitoring, libvirt auto-restart, VM self-healing, flap protection, infrastructure orchestration.

    ## How it works
    1. The `watch_vm` trigger (`io.kestra.plugin.kvm.VmEventTrigger`) polls the domain every `PT1M`. An `io.kestra.plugin.core.condition.Expression` gates execution creation on `{{ trigger.state == 'SHUTOFF' }}`, so a healthy VM produces zero executions.
    2. `read_maintenance_flag` and `read_restart_counter` (`io.kestra.plugin.core.kv.Get`, both `errorOnMissing: false`) load per-VM state from the KV store: an optional maintenance flag and the restart count in the current window.
    3. `decide` (`io.kestra.plugin.core.flow.If`) recovers only when the maintenance flag is not `true` AND the count is below `max_restarts_per_window`.
       - Recover path: `bump_restart_counter` (`io.kestra.plugin.core.kv.Set`, `kvType: NUMBER`) increments the counter with a `ttl` of `flap_window`, `recover_vm` (`io.kestra.plugin.kvm.StartVm`) boots the domain with `waitForRunning: true`, and `alert_recovered` posts a Slack summary.
       - Else path: `classify` either logs a `maintenance` skip or, on the restart ceiling, posts a `<!channel>` escalation and deliberately does NOT restart.
    4. The flow-level `errors` block (`alert_recovery_failed`) pages on-call if the restart itself fails.

    The libvirt `uri` lives in `pluginDefaults` keyed on `io.kestra.plugin.kvm`, every remote call carries a `retry`, and `concurrency.limit: 1` keeps a single recovery acting on the VM at a time.

    ## What you get
    - Sub-minute detection and automatic restart of a downed KVM domain.
    - Flap protection: a capped restart count over a sliding TTL window that escalates instead of looping.
    - Maintenance-aware skips so planned stops are never fought by the watchdog.
    - Loud Slack escalation when recovery fails, the most urgent case.
    - A clean execution history that records only real incidents.

    ## Who it's for
    - Platform and infrastructure engineers running libvirt/KVM hosts.
    - SREs and on-call teams who want fewer pages for transient blips and louder pages for real failures.
    - Homelab and self-hosted operators keeping a critical VM online.

    ## Why orchestrate this with Kestra
    A bare libvirt host has no native scheduler that can poll state, count restarts across a window, branch on a maintenance flag, and escalate to Slack. Kestra adds an event-style polling trigger, declarative YAML logic, per-task `retry`, a built-in KV store for stateful flap counting with TTL, `concurrency` control, and full execution lineage. The KV store turns a stateless restart into a rate-limited, self-resetting recovery loop, something a cron job or a watchdog script cannot do cleanly.

    ## Prerequisites
    - A reachable libvirt/KVM host, addressed via a URI such as `qemu+ssh://root@your-host/system` or `qemu:///system`.
    - The monitored domain (`monitored_vm`) already defined on the host.
    - A Slack Incoming Webhook URL.

    ### Secrets
    - `LIBVIRT_URI`: the libvirt connection URI used by the trigger and the `StartVm` recovery task.
    - `SLACK_WEBHOOK`: the Slack Incoming Webhook URL used for recovery, escalation, and failure alerts.

    ## Quick start
    1. Add the `LIBVIRT_URI` and `SLACK_WEBHOOK` secrets to your Kestra instance.
    2. Set the `monitored_vm` input to the domain you want watched.
    3. Tune `max_restarts_per_window` and `flap_window` to your flap tolerance.
    4. Adjust the trigger `interval` if you need faster or slower polling.
    5. Save the flow; the trigger begins polling and fires only on SHUTOFF.

    ## How to extend
    - To pause recovery during planned work, set the KV key `maintenance_<monitored_vm>` to `true` with `io.kestra.plugin.core.kv.Set`, then clear it afterward.
    - Add an application-readiness check after `recover_vm`, since RUNNING is a libvirt state, not a guest-ready signal.
    - Fan out to many domains with a `ForEach` over a VM list, or swap Slack for PagerDuty or email on the escalation path.
    - Feed recovery events into a dashboard or incident system for trend analysis.

    ## Links
    - KVM plugin: https://kestra.io/plugins/plugin-kvm
    - Slack plugin: https://kestra.io/plugins/plugin-slack
    - KV store: https://kestra.io/docs/concepts/kv-store
    - libvirt domain states: https://libvirt.org/html/libvirt-libvirt-domain.html
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Watch a KVM libvirt domain and auto-restart it on SHUTOFF with flap protection, maintenance-aware skips, and loud failure alerts, all in Kestra.
