id: gitlab-issue-on-failure
namespace: company.team
description: |
  Open a GitLab issue automatically when a monitored job fails. The job runs on
  a schedule; if it fails, the errors handler creates a GitLab issue with the
  execution link and the failing context, then pings Slack. The incident lands
  in the team's tracker without anyone relaying it by hand.

inputs:
  - id: service_name
    type: STRING
    defaults: data-pipeline
    description: Name of the monitored service, used in the issue title and labels.

tasks:
  - id: monitored_job
    type: io.kestra.plugin.scripts.shell.Commands
    description: The job being monitored; a failure here opens a GitLab issue.
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - echo "Running {{ inputs.service_name }}..."
      - exit 0

errors:
  - id: open_issue
    type: io.kestra.plugin.gitlab.issues.Create
    description: Open a GitLab issue describing the failed run.
    token: "{{ secret('GITLAB_TOKEN') }}"
    projectId: "{{ secret('GITLAB_PROJECT_ID') }}"
    title: "[Incident] {{ inputs.service_name }} failed — {{ execution.startDate | date('yyyy-MM-dd HH:mm') }}"
    issueDescription: |
      ## Pipeline failure

      The monitored job **{{ inputs.service_name }}** failed.

      - Flow: `{{ flow.namespace }}.{{ flow.id }}`
      - Execution: `{{ execution.id }}`
      - Started: `{{ execution.startDate }}`

      Open the execution in Kestra to inspect logs and retry.
    labels:
      - incident
      - "{{ inputs.service_name }}"

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Ping Slack that an incident issue was opened.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Opened a GitLab incident issue for {{ inputs.service_name }} (execution {{ execution.id }})."
      }

triggers:
  - id: scheduled_run
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run the monitored job on a schedule. Adjust or disable as needed.
    cron: "0 */6 * * *"
    disabled: true

extend:
  shortDescription: When a scheduled job fails, open a GitLab issue with the execution link and ping Slack, with no manual relay.
  title: Open a GitLab Issue Automatically on Pipeline Failure
  metaTitle: Open a GitLab Issue on Pipeline Failure
  description: |
    This blueprint turns pipeline failures into tracked GitLab issues. A
    monitored job runs on a schedule; if it fails, the errors handler creates a
    GitLab issue with the execution link, the failing flow context, and labels,
    then pings Slack. The incident lands in the team's existing GitLab tracker
    automatically, so nothing depends on a human noticing a Slack alert and
    filing the issue by hand.

    Prerequisites:
      - Secrets:
        - GITLAB_TOKEN: GitLab personal access token with api scope.
        - GITLAB_PROJECT_ID: target GitLab project ID.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - The incident and service-name labels created in the project (or remove the labels block).

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Replace the monitored_job task with your real job and set service_name.
      3. Enable the schedule; a failure opens an issue automatically.

    Outputs:
      - outputs.open_issue.webUrl: URL of the created GitLab issue.

    Notes:
      - The issue handler lives in the errors block, so it runs only when the monitored job fails.
      - For self-hosted GitLab, add url and apiPath to the Create task to point at your instance.
      - To raise a merge request instead of an issue, swap in io.kestra.plugin.gitlab.mergerequests.Create.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: When a scheduled job fails, open a GitLab issue with the execution link and ping Slack, with no manual relay.
