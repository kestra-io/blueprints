id: create-vm-gcp-terraform
namespace: solutions.infra
description: >
  Create a VM on Google Cloud by generating a hostname, reserving an IP from an
  external IPAM, provisioning the instance via Terraform, and notifying Slack
  with the resulting details.

inputs:
  - id: cloudProvider
    displayName: Cloud Provider
    type: SELECT
    values:
      - AWS
      - GCP
      - Azure
      - VCF
    defaults: GCP

  - id: billingAccount
    type: SELECT
    displayName: Billing Account
    description: |
      This is typically your
      Account ID for AWS
      Project ID for GCP
      Subscription ID for Azure
    values:
      - sandbox
      - dev
    defaults: sandbox
    dependsOn:
      inputs:
        - cloudProvider
      condition: "{{ inputs.cloudProvider == 'GCP' }}"

  - id: region
    type: SELECT
    displayName: Region
    values:
      - us-central1
      - us-east1
    dependsOn:
      inputs:
        - billingAccount
      condition: "{{ inputs.billingAccount == 'kestra-sandbox' }}"
    defaults: us-central1

  - id: zone
    type: SELECT
    displayName: Zone
    values:
      - us-central1-a
      - us-central1-b
    dependsOn:
      inputs:
        - region
      condition: "{{ inputs.region == 'us-central1' }}"
    defaults: us-central1-a

  - id: os
    displayName: Operating System
    type: SELECT
    values:
      - Windows
      - Linux
    defaults: Linux

  - id: osFlavor
    displayName: OS Version
    type: SELECT
    values:
      - Ubuntu 24.04
      - Ubuntu 20.04
      - ubuntu-minimal-2210-kinetic-amd64-v20230126
    defaults: ubuntu-minimal-2210-kinetic-amd64-v20230126
    dependsOn:
      inputs:
        - os
      condition: "{{ inputs.os == 'Linux' }}"

  - id: vmSize
    displayName: VM Size
    type: SELECT
    values:
      - Small
      - Medium
      - Large
      - n1-standard-1
    description: |
      Small   - 2 vCPUs 4 GB RAM
      Medium  - 4 vCPUs 8 GB RAM
      Large   - 8 vCPUs 16 GB RAM
    defaults: n1-standard-1

  - id: network
    displayName: Network
    type: SELECT
    values:
      - demo-vpc
      - vpc-02
    defaults: demo-vpc

  - id: subnet
    displayName: Subnet
    type: SELECT
    values:
      - demo-vpc
      - subnet-02
    defaults: demo-vpc

  - id: vmType
    type: SELECT
    displayName: Type of VM
    values:
      - Application
      - Database
      - Server
    defaults: Application

  - id: env
    type: SELECT
    displayName: Environment
    values:
      - Development
      - Staging
      - Production
    defaults: Development

tasks:
  - id: generateCustomHostname
    type: io.kestra.plugin.scripts.python.Script
    dependencies:
      - kestra
    script: |
      from kestra import Kestra

      try:
          cloud_code = "{{ inputs.cloudProvider | slice(0, 3) }}"
          env_code = "{{ inputs.env | slice(0, 3) }}"
          os_code = "{{ inputs.os | slice(0, 3) }}"
          vm_code = "{{ inputs.vmType | slice(0, 3) }}"
          index_code = {{ kv('getVMIndex', errorOnMissing = false) ?? 1 }}

          vm_name = f"{cloud_code}{env_code}{os_code}{vm_code}{index_code}"

          Kestra.outputs({'customHostname': vm_name.lower(), 'index_code': index_code})

      except KeyError as e:
          print(f"Invalid value for input: {e}")
      except Exception as e:
          print(str(e))

  - id: getIPAddress
    type: io.kestra.plugin.scripts.python.Script
    dependencies:
      - requests 
      - kestra
    script: |
      from kestra import Kestra
      import requests

      IPAM_BASE_URL = "{{ kv('ipamAddress', errorOnMissing = false) ?? 'localhost' }}/api/dev-ipam"
      endpoint = f"subnets/{{inputs.subnet}}/first_free"

      response = requests.get(f"{IPAM_BASE_URL}/{endpoint}", verify=False)
      print(response.status_code)
      ip_address = response.json().get("ipAddress")
      Kestra.outputs({'status': response.status_code, 'ipAddress': ip_address})

  - id: createVM
    type: io.kestra.plugin.terraform.cli.TerraformCLI
    inputFiles:
      main.tf: |
        resource "google_compute_instance" "default" {
          name         = "{{ outputs.generateCustomHostname.vars.customHostname }}"
          machine_type = "{{ inputs.vmSize }}"
          zone         = "{{ inputs.zone }}"
          project      = "{{ inputs.billingAccount }}"

          boot_disk {
            initialize_params {
              image = "{{ inputs.osFlavor }}"
            }
          }

          network_interface {
            network            = "{{ inputs.network }}"
            subnetwork         = "{{ inputs.subnet }}"
            subnetwork_project = "{{ inputs.billingAccount }}"
            access_config {}
            network_ip = "{{ outputs.getIPAddress.vars.ipAddress }}"
          }

          metadata = {
            enable-oslogin = false
            "ssh-keys" = <<EOT
              root:{{ secret('SSH_PUB_KEY') }}
            EOT
          }
        }

        output "external_ip" {
          value       = google_compute_instance.default.network_interface[0].access_config[0].nat_ip
          description = "The external IP address of the VM"
        }
      gcp-svc-account.json: "{{ secret('GCP_SVC_ACCOUNT') }}"
    env:
      GOOGLE_APPLICATION_CREDENTIALS: gcp-svc-account.json
    beforeCommands:
      - terraform init
    commands:
      - terraform plan
      - terraform apply -auto-approve -json
      - terraform output -raw external_ip > external_ip.txt
    allowFailure: false
    outputFiles:
      - "*.txt"

  - id: notifyChannel
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret(namespace='system', key='SLACK_WEBHOOK') }}"
    messageText: |
      {
        "text": "{{ outputs.generateCustomHostname.vars.customHostname }} created successfully with the following properties\n ExternalIPAddress: {{ read(outputs.createVM.outputFiles['external_ip.txt']) }}\n DefaultUser: {{ secret('SSH_VM_USER') }}\n Cloud: {{ inputs.cloudProvider }}\n Account: {{ inputs.billingAccount }}\n Region: {{ inputs.region }}\n Zone: {{ inputs.zone }}\n Network: {{ inputs.network }}\n Subnet: {{ inputs.subnet }}\n Size: {{ inputs.vmSize }}\n OS: {{ inputs.os }}\n Version: {{ inputs.osFlavor }}\n Environment: {{ inputs.env }}\n VMType: {{ inputs.vmType }}\n IPAddress: {{ outputs.getIPAddress['vars']['ipAddress'] }}\n"
      }

  - id: incrementindex
    type: io.kestra.plugin.core.kv.Set
    key: getVMIndex
    kvType: NUMBER
    value: "{{ outputs.generateCustomHostname.vars.index_code + 1 }}"
    allowFailure: true

outputs:
  - id: externalIPAddress
    type: STRING
    value: "{{ read(outputs.createVM.outputFiles['external_ip.txt']) ?? 'Failed' }}"

extend:
  shortDescription: Provision a Google Cloud VM with Terraform, IPAM-reserved IPs, standardized naming, and a Slack notification, all from one form.
  title: Provision Google Cloud VMs with Terraform, IPAM, and Slack Notifications
  metaTitle: Provision Google Cloud VMs with Terraform and Kestra
  metaDescription: Provision Google Cloud VMs with Terraform and Kestra. Generate standardized hostnames, reserve IPs from IPAM, apply with Terraform, and notify Slack.
  description: |
    Provision Google Cloud Compute Engine virtual machines on demand with an Infrastructure as Code workflow that turns a self-service form into a fully governed VM. This blueprint generates a standardized hostname, reserves an IP address from an external IPAM, applies a Terraform configuration to create the instance, and posts the results to Slack. It solves the messy reality of cloud VM provisioning, where naming drifts, IP conflicts happen, and nobody knows a machine exists until someone asks.

    ## How it works

    1. `generateCustomHostname` runs an `io.kestra.plugin.scripts.python.Script` task that builds a hostname from the cloud provider, environment, OS, and VM type inputs, plus a numeric index pulled from Kestra KV (`kv('getVMIndex')`).
    2. `getIPAddress` runs another `io.kestra.plugin.scripts.python.Script` task that calls your external IPAM API to reserve the first free IP in the selected subnet.
    3. `createVM` uses `io.kestra.plugin.terraform.cli.TerraformCLI` with inline `main.tf` to run `terraform init`, `plan`, and `apply -auto-approve`, creating a `google_compute_instance` and writing the external IP to an output file.
    4. `notifyChannel` sends an `io.kestra.plugin.slack.notifications.SlackIncomingWebhook` message with the hostname, external IP, default user, and full machine configuration.
    5. `incrementindex` uses `io.kestra.plugin.core.kv.Set` to bump the VM index so the next provisioning run gets a unique name.

    ## What you get

    - Collision-free, standardized VM hostnames driven by KV-backed indexing.
    - IPAM-reserved IPs so addresses are governed centrally, not guessed.
    - Declarative Terraform provisioning with `init`, `plan`, and `apply` in one task.
    - A Slack message summarizing every new VM with its IP and configuration.
    - The external IP surfaced as a flow output for downstream use.

    ## Who it's for

    - Platform and cloud infrastructure engineers offering self-service VMs.
    - DevOps teams standardizing Google Cloud provisioning.
    - Operations teams that need network governance and visibility on new machines.

    ## Why orchestrate this with Kestra

    Terraform applies infrastructure, but it has no scheduler, no event triggers, and no built-in way to chain a hostname generator, an IPAM lookup, and a Slack notification around an apply. Kestra wraps the apply in a declarative YAML flow with retries, full execution lineage, and an input form that non-experts can drive. The KV store keeps stateful naming between runs, something a bare `terraform apply` cannot do on its own.

    ## Prerequisites

    - A Kestra instance with the Terraform, GCP, Slack, Python script, and core plugins.
    - A Google Cloud project with Compute Engine enabled and an existing network and subnet.
    - An external IPAM endpoint reachable from Kestra (configured via the `ipamAddress` KV).

    ### Secrets

    - `GCP_SVC_ACCOUNT`: service account JSON used by Terraform as `GOOGLE_APPLICATION_CREDENTIALS`.
    - `SSH_PUB_KEY`: public key injected into the VM metadata.
    - `SLACK_WEBHOOK` (in the `system` namespace): incoming webhook URL for notifications.
    - `SSH_VM_USER`: default user reported in the Slack message.

    ## Quick start

    1. Add the secrets above to your Kestra instance.
    2. Set the `ipamAddress` KV (and optionally `getVMIndex`) for your environment.
    3. Adjust the `main.tf` inputs and select lists to match your project, networks, and machine types.
    4. Execute the flow, fill in the form, and watch the VM get created and announced in Slack.

    ## How to extend

    - Add a destroy flow that runs `terraform destroy` for teardown.
    - Swap the inline IPAM call for your own provider (Infoblox, NetBox, phpIPAM).
    - Branch the Terraform configuration to support the AWS and Azure options already in the form.
    - Add approval or cost-estimation steps before `apply`.

    ## Links

    - [Terraform plugin docs](https://kestra.io/plugins/plugin-terraform)
    - [Terraform orchestration with Kestra](https://kestra.io/orchestration/terraform)
  tags:
    - Infrastructure
  ee: false
  demo: false
