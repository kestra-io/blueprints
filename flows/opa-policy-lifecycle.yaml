id: opa-policy-lifecycle
namespace: company.team
description: |
  Promote OPA policies from Git to a running OPA server with a test-and-approve
  gate. Clone the policy repo, run `opa test`, pause for a human to approve, then
  upload the Rego module so only reviewed policy reaches the enforcement point.

inputs:
  - id: policy_repo
    type: STRING
    defaults: https://github.com/my-org/opa-policies
    description: Git repository holding the Rego policies and tests.
  - id: policy_branch
    type: STRING
    defaults: main
    description: Branch to promote.
  - id: policy_id
    type: STRING
    defaults: kubernetes-admission
    description: OPA policy module ID to create or replace.
  - id: policy_file
    type: STRING
    defaults: admission.rego
    description: Rego file (relative to the repo) to upload.
  - id: approval_timeout
    type: DURATION
    defaults: PT2H
    description: How long to wait for approval before timing out.

tasks:
  - id: clone_policies
    type: io.kestra.plugin.git.Clone
    description: Clone the policy repository.
    url: "{{ inputs.policy_repo }}"
    branch: "{{ inputs.policy_branch }}"
    directory: policies

  - id: test_policies
    type: io.kestra.plugin.scripts.shell.Commands
    description: Run the Rego unit tests before anything is promoted.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: openpolicyagent/opa:latest-debug
    commands:
      - opa test policies/ -v

  - id: notify_approval
    type: io.kestra.plugin.googleworkspace.chat.GoogleChatIncomingWebhook
    description: Tell the team a policy promotion is waiting for approval.
    url: "{{ secret('GOOGLE_CHAT_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Approval needed: OPA policy {{ inputs.policy_id }} passed tests and is paused before upload (execution {{ execution.id }})."
      }

  - id: approve_promotion
    type: io.kestra.plugin.core.flow.Pause
    description: Wait for a human to approve promoting the tested policy.
    pauseDuration: "{{ inputs.approval_timeout }}"

  - id: upload_policy
    type: io.kestra.plugin.ee.opa.policy.Upload
    description: Upload (or replace) the policy module on the OPA server.
    policyId: "{{ inputs.policy_id }}"
    policy: "{{ read('policies/' ~ inputs.policy_file) }}"

pluginDefaults:
  - type: io.kestra.plugin.ee.opa.policy.Upload
    values:
      url: "{{ secret('OPA_URL') }}"
      token: "{{ secret('OPA_TOKEN') }}"

triggers:
  - id: on_policy_change
    type: io.kestra.plugin.core.trigger.Schedule
    description: Re-promote on a schedule. Adjust, disable, or swap for a Git webhook.
    cron: "0 9 * * 1-5"
    disabled: true

extend:
  shortDescription: Clone OPA policies from Git, run opa test, pause for approval, then upload the Rego module to OPA.
  title: Promote OPA Policies from Git with a Test and Approval Gate
  metaTitle: Promote OPA Policies from Git with a Test and Approval Gate
  description: |
    This blueprint gives OPA policy changes a safe path to production. It clones
    the policy repository, runs the Rego unit tests, pauses for a human approval,
    and only then uploads the module to the OPA server. Untested or unapproved
    policy never reaches the enforcement point.

    Prerequisites:
      - Secrets:
        - OPA_URL: Base URL of the OPA server (for example, https://opa.example.com).
        - OPA_TOKEN: Bearer token for the OPA server, if authentication is enabled.
        - GOOGLE_CHAT_WEBHOOK_URL: Google Chat incoming webhook URL for the approval notification.
      - A Git repo with Rego policies and tests that `opa test` can run.

    Quick start:
      1. Set OPA_URL (and OPA_TOKEN if needed) in your Kestra namespace.
      2. Point policy_repo at your Rego repository.
      3. Run the flow; approve the Pause once tests pass to upload the policy.

    Outputs:
      - outputs.test_policies: stdout and exit code of opa test.
      - outputs.upload_policy: result of the policy upload.

    Notes:
      - The test image is openpolicyagent/opa:latest-debug, which includes the test runner.
      - Swap the Schedule trigger for a Git push webhook to promote on merge.
  tags:
    - Infrastructure
  ee: true
  demo: false
  metaDescription: Clone OPA policies from Git, run opa test, pause for approval, then upload the Rego module to the OPA server.
