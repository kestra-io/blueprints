id: beam-wordcount-direct
namespace: company.team

labels:
  team: data
  domain: beam

inputs:
  - id: source_url
    type: STRING
    defaults: https://www.gutenberg.org/cache/epub/1342/pg1342.txt
    description: Public text file to count words from. The default is the full text of Pride and Prejudice.


tasks:
  - id: download_text
    type: io.kestra.plugin.core.http.Download
    description: Download the source text file into Kestra internal storage so Beam reads a real ingested file rather than a literal.
    uri: "{{ inputs.source_url }}"
    saveAs: source.txt
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    timeout: PT5M
    options:
      readTimeout: PT2M

  - id: write_pipeline
    type: io.kestra.plugin.core.storage.Write
    description: Render a Beam YAML word-count pipeline. The Write task is used (instead of an inline definition) so the source file name stays a single source of truth shared with inputFiles.
    extension: .yaml
    content: |
      pipeline:
        type: chain
        transforms:
          - type: ReadFromText
            config:
              path: source.txt
          - type: MapToFields
            config:
              language: python
              fields:
                words:
                  callable: |
                    import re
                    def fn(row):
                      return [w for w in re.findall(r"[a-zA-Z']+", row.line.lower())]
          - type: Explode
            config:
              fields: words
          - type: MapToFields
            config:
              language: python
              fields:
                word: "words"
                count: "1"
          - type: Combine
            config:
              group_by: word
              combine:
                count: sum
          - type: WriteToCsv
            config:
              path: counts

  - id: run_wordcount
    type: io.kestra.plugin.beam.RunPipeline
    description: Execute the word-count pipeline locally with the DIRECT runner using the Python SDK.
    sdk: PYTHON
    beamRunner: DIRECT
    containerImage: apache/beam_python3.11_sdk:2.71.0
    file: "{{ outputs.write_pipeline.uri }}"
    inputFiles:
      source.txt: "{{ outputs.download_text.uri }}"
    pipelineTimeoutSeconds: 300
    timeout: PT10M
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 2
    outputFiles:
      - "counts*"

  - id: log_result
    type: io.kestra.plugin.core.log.Log
    description: Log the captured output shard URIs so an operator can see what the run produced.
    message: "Word count finished. Output shards: {{ outputs.run_wordcount.outputFiles }}"

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }})."

extend:
  shortDescription: Run the canonical Apache Beam word-count pipeline locally with the DIRECT runner over a real ingested text file.
  title: Apache Beam Word Count with the DIRECT Runner
  metaTitle: Apache Beam word count with Kestra (DIRECT runner)
  metaDescription: Orchestrate the Apache Beam word-count pipeline on Kestra with the DIRECT runner, real ingested text, retries, timeouts, and Slack failure alerts.
  description: |
    Run the canonical Apache Beam word-count pipeline on Kestra using the Beam DIRECT runner over a real downloaded text file instead of a toy literal. This blueprint is the hello-world of Apache Beam data processing, showing how Kestra internal storage feeds a Beam source, how a Python pipeline tokenizes and aggregates words, and how output shards flow back into Kestra. It solves the problem of learning and testing Beam pipelines without standing up a Flink, Spark, or Dataflow cluster, because the DIRECT runner executes locally inside the task container.

    ## How it works
    1. The `download_text` task (`io.kestra.plugin.core.http.Download`) fetches the `source_url` text file into Kestra internal storage with `retry` and a `timeout`, so a transient network blip does not kill the run.
    2. The `write_pipeline` task (`io.kestra.plugin.core.storage.Write`) renders a Beam YAML pipeline definition and stores it. Keeping it as a Write (rather than an inline definition) lets the source file name `source.txt` live in one place, shared with `inputFiles`.
    3. The `run_wordcount` task (`io.kestra.plugin.beam.RunPipeline`) runs the pipeline with `sdk: PYTHON` and `beamRunner: DIRECT` on the pinned `apache/beam_python3.11_sdk:2.71.0` image. The downloaded file is mounted via `inputFiles`, the pipeline reads each line, tokenizes words, explodes them, maps each word to a count of 1, sums counts per word, and writes CSV via `WriteToCsv`. Shards are captured by `outputFiles`.
    4. The `log_result` task (`io.kestra.plugin.core.log.Log`) prints the captured output shard URIs.

    ## What you get
    - A working, end-to-end Beam pipeline you can run in minutes with no external cluster.
    - Per-word counts written as CSV shards, captured into Kestra internal storage.
    - Built-in reliability: task-level `retry` and `timeout` on `download_text` and `run_wordcount`, plus `pipelineTimeoutSeconds` for the Beam wait.
    - A reproducible run thanks to the pinned Beam SDK image rather than `:latest`.

    ## Who it's for
    - Data engineers evaluating Apache Beam or prototyping pipelines before deploying to Dataflow or Flink.
    - Platform teams who want a reference pattern for running Beam under an orchestrator.
    - Anyone learning the Beam YAML framework and the DIRECT runner.

    ## Why orchestrate this with Kestra
    The Beam DIRECT runner has no scheduler, no retry policy, and no alerting of its own: it just executes a pipeline once. Kestra fills that gap. You declare the whole flow in YAML, attach event or schedule triggers, get task-level retries and timeouts, capture lineage from the ingested file through the generated pipeline to the output shards, and wire a flow-level `errors` block that posts a Slack alert on failure. This is the production scaffolding Beam itself leaves to you.

    ## Prerequisites
    - Docker available to the Kestra worker, since `RunPipeline` runs Beam inside the pinned SDK container.
    - Outbound HTTPS so `download_text` can fetch the sample text.
    - No Flink, Spark, or JobServer is required for the DIRECT runner.

    ### Secrets
    - `SLACK_WEBHOOK`: incoming webhook used only by the failure-alert `errors` block (`io.kestra.plugin.slack.notifications.SlackIncomingWebhook`). The word-count itself uses no credentials. Remove the `errors` block if you do not want Slack alerting.

    ## Quick start
    1. Add the flow and execute it. Optionally override `source_url` with another public text file.
    2. Open the `run_wordcount` task run and review the captured `outputFiles`.
    3. Download a `counts` CSV shard from the Outputs tab to see per-word totals.

    ## How to extend
    - Swap `beamRunner: DIRECT` for a clustered runner (Flink, Spark, or Dataflow) once the pipeline works locally.
    - Replace the `Download` source with an object-storage or database ingestion task and feed it through `inputFiles`.
    - Add a `Schedule` or event trigger to run the word count on every new file or on a cron.
    - Extend the Beam YAML transforms to filter stop words, lowercase, or write to Parquet instead of CSV.

    ## Links
    - Apache Beam plugin: https://kestra.io/plugins/plugin-beam
    - Beam YAML framework: https://beam.apache.org/documentation/sdks/yaml/
    - Beam DIRECT runner: https://beam.apache.org/documentation/runners/direct/
  tags:
    - Data
  ee: false
  demo: true
