id: aws-s3-fanout
namespace: company.team
description: |
  React to objects landing in S3 and fan out by file type. An S3 trigger fires
  per new object; JSON payloads are handed to a Lambda for processing while
  everything else is announced on an SNS topic. A Slack message closes the loop.

inputs:
  - id: lambda_function_arn
    type: STRING
    description: ARN of the Lambda that processes JSON objects.
  - id: sns_topic_arn
    type: STRING
    description: SNS topic ARN used to announce non-JSON objects.

tasks:
  - id: route_by_type
    type: io.kestra.plugin.core.flow.If
    description: Route JSON objects to Lambda and everything else to SNS.
    condition: "{{ trigger.objects[0].key | jq('endswith(\".json\")') | first }}"
    then:
      - id: process_json
        type: io.kestra.plugin.aws.lambda.Invoke
        description: Invoke the Lambda to process the JSON object.
        functionArn: "{{ inputs.lambda_function_arn }}"
        functionPayload:
          key: "{{ trigger.objects[0].key }}"
          uri: "{{ trigger.objects[0].uri }}"
    else:
      - id: announce_object
        type: io.kestra.plugin.aws.sns.Publish
        description: Announce the non-JSON object on SNS.
        topicArn: "{{ inputs.sns_topic_arn }}"
        from:
          data: "New object landed: {{ trigger.objects[0].key }}"

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Post the routing outcome to Slack.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "S3 object {{ trigger.objects[0].key }} processed by the s3-fanout flow."
      }

pluginDefaults:
  - type: io.kestra.plugin.aws.lambda.Invoke
    values:
      accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
      region: "{{ secret('AWS_DEFAULT_REGION') }}"
  - type: io.kestra.plugin.aws.sns.Publish
    values:
      accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
      region: "{{ secret('AWS_DEFAULT_REGION') }}"

triggers:
  - id: object_landed
    type: io.kestra.plugin.aws.s3.Trigger
    description: Fires for each new object under the watched prefix.
    accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
    secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
    region: "{{ secret('AWS_DEFAULT_REGION') }}"
    bucket: my-landing-bucket
    prefix: incoming/
    interval: PT1M
    maxKeys: 1
    action: NONE

extend:
  shortDescription: An S3 trigger routes new objects by type, sending JSON to Lambda and the rest to SNS, then notifies Slack.
  title: Fan Out S3 Object Events to Lambda and SNS
  metaTitle: Fan Out S3 Object Events to Lambda and SNS
  description: |
    This blueprint turns S3 object events into routed work. An S3 trigger fires
    for each new object under the watched prefix; the flow inspects the key and
    sends JSON files to a Lambda for processing while other files are announced on
    an SNS topic. A Slack message reports the outcome.

    Prerequisites:
      - Secrets:
        - AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION: AWS access.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - An existing Lambda function and SNS topic, plus the watched S3 bucket and prefix.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Point the trigger at your bucket and prefix.
      3. Pass lambda_function_arn and sns_topic_arn and drop a file to test routing.

    Outputs:
      - outputs.route_by_type: the executed branch (Lambda or SNS) and its result.

    Notes:
      - The trigger uses action NONE so objects are left in place; switch to MOVE or DELETE to avoid reprocessing.
      - Extend the If with more branches to fan out across additional file types or prefixes.
  tags:
    - Cloud
    - AWS
  ee: false
  demo: false
  metaDescription: An S3 trigger routes new objects by file type to Lambda or SNS, then posts the result to Slack.
