id: flow-condition-executionlabels
namespace: company.team

tasks:
  - id: send_email
    type: io.kestra.plugin.email.MailExecution
    to: john.doe@kestra.io
    from: hello@kestra.io
    subject: "The workflow execution {{ trigger.executionId }} failed for the flow {{ trigger.flowId }} in the namespace {{ trigger.namespace }}"
    host: mail.privateemail.com
    port: 465
    username: "{{ secret('EMAIL_USERNAME') }}"
    password: "{{ secret('EMAIL_PASSWORD') }}"
    executionId: "{{ trigger.executionId }}"

triggers:
  - id: flow_trigger
    type: io.kestra.plugin.core.trigger.Flow
    conditions:
      - type: io.kestra.plugin.core.condition.ExecutionLabels
        labels:
          owner: john.doe
    states:
      - FAILED

extend:
  shortDescription: Send a failure alert email when any labeled flow fails, using a Flow trigger filtered by execution labels.
  title: Executes flow on flow trigger with ExecutionLabels condition
  metaTitle: Label-Based Flow Trigger Alerts with Kestra
  metaDescription: Trigger a Kestra flow when any labeled execution fails and send an email alert, using the ExecutionLabels condition on a Flow trigger to scope by owner.
  description: |
    Get notified the moment a flow you care about fails, without polling or custom glue code. This blueprint listens across your Kestra instance for executions that carry a specific label and reach the `FAILED` state, then automatically sends a targeted email alert. It pairs the core `io.kestra.plugin.core.trigger.Flow` trigger with the `io.kestra.plugin.core.condition.ExecutionLabels` condition to scope alerting to exactly the workflows that matter, for example everything owned by a given team, so on-call engineers and flow owners hear about failures fast and stop chasing them in the UI.

    ## How it works
    1. A `io.kestra.plugin.core.trigger.Flow` trigger watches all executions running on the instance.
    2. An `io.kestra.plugin.core.condition.ExecutionLabels` condition filters that stream to executions tagged with `owner: john.doe`.
    3. The trigger only fires when a matching execution reaches one of the `states` listed, here `FAILED`.
    4. When fired, the `send_email` task (`io.kestra.plugin.email.MailExecution`) sends an alert over SMTP, building the subject from `{{ trigger.executionId }}`, `{{ trigger.flowId }}`, and `{{ trigger.namespace }}` and attaching the failed execution context via `executionId`.

    ## What you get
    - Automatic email alerts on flow failure, scoped by label.
    - A subject line that names the failed execution, flow, and namespace.
    - Centralized, instance-wide failure detection with no per-flow wiring.
    - A reusable pattern for routing alerts by ownership.

    ## Who it's for
    - Platform and data engineers running many flows who need failure visibility.
    - On-call and SRE teams that want label-scoped alerting.
    - Flow owners who only want to be paged about their own workflows.

    ## Why orchestrate this with Kestra
    Kestra's event-driven Flow trigger reacts to execution state changes the instant they happen, across every flow, something a single flow's own schedule cannot do. The declarative YAML keeps the alert rule version controlled and reviewable, the `ExecutionLabels` condition gives you precise, label-based routing, and built-in retries plus full execution lineage mean alerts and their context are durable and auditable rather than fire-and-forget.

    ## Prerequisites
    - A running Kestra instance with flows that carry labels (for example `owner: john.doe`).
    - SMTP server access (host, port, credentials) for outbound email.

    ### Secrets
    - `EMAIL_USERNAME`: SMTP account username.
    - `EMAIL_PASSWORD`: SMTP account password.

    ## Quick start
    1. Add the `EMAIL_USERNAME` and `EMAIL_PASSWORD` secrets to your Kestra instance.
    2. Update the `to`, `from`, `host`, and `port` values in the `send_email` task for your mail provider.
    3. Adjust the `labels` in the `ExecutionLabels` condition to match the flows you want to monitor.
    4. Save the flow, then fail a labeled execution to confirm the alert email arrives.

    ## How to extend
    - Watch additional `states` such as `WARNING` or `KILLED`.
    - Match multiple labels (for example `owner` plus `team` or `env`) for tighter scoping.
    - Swap or add notification tasks for Slack, Microsoft Teams, or PagerDuty.
    - Add a remediation task to retry or restart the failed flow automatically.

    ## Links
    - [Core plugin docs](https://kestra.io/plugins/plugin-core)
    - [Email plugin docs](https://kestra.io/plugins/plugin-notifications)
  tags:
    - Core
  ee: false
  demo: false
