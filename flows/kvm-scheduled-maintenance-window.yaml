id: kvm-scheduled-maintenance-window
namespace: company.infra

inputs:
  - id: target_vm
    type: STRING
    defaults: app-server-01
    description: >
      Libvirt domain to patch during the maintenance window. Treat as a trusted,
      operator-supplied identifier.
    validator: ^[a-z0-9][a-z0-9-]{0,62}$

variables:
  libvirt_uri: "{{ secret('LIBVIRT_URI') }}"

pluginDefaults:
  - type: io.kestra.plugin.kvm
    values:
      uri: "{{ vars.libvirt_uri }}"
  - type: io.kestra.plugin.email.MailSend
    values:
      host: "{{ secret('SMTP_HOST') }}"
      port: 587
      transportStrategy: SMTP_TLS
      username: "{{ secret('SMTP_USERNAME') }}"
      password: "{{ secret('SMTP_PASSWORD') }}"
      from: kestra@company.local
      to: ops@company.local

concurrency:
  limit: 1

tasks:
  - id: inventory
    type: io.kestra.plugin.kvm.ListVms
    description: Enumerate domains on the hypervisor before any changes for an audit record.
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 3

  - id: assert_target_present
    type: io.kestra.plugin.core.execution.Fail
    description: >
      Fail early (before stopping anything) if the target domain is not present
      in the inventory, so the window does not shut down a VM it cannot verify.
    condition: "{{ inputs.target_vm not in (outputs.inventory.vms | jq('.[].name')) }}"
    errorMessage: "Domain {{ inputs.target_vm }} was not found in the hypervisor inventory; aborting maintenance window."

  - id: graceful_stop
    type: io.kestra.plugin.kvm.StopVm
    description: Send a graceful ACPI shutdown and wait until the domain reaches SHUTOFF.
    name: "{{ inputs.target_vm }}"
    force: false
    waitForStopped: true
    timeToWait: PT5M
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 2
    errors:
      - id: force_stop
        type: io.kestra.plugin.kvm.StopVm
        description: >
          ACPI shutdown did not complete in time (no ACPI daemon, hung kernel,
          stuck app). Hard power-off so maintenance can proceed instead of
          stranding the VM in an unknown state.
        name: "{{ inputs.target_vm }}"
        force: true
        waitForStopped: true
        timeToWait: PT2M
        retry:
          type: constant
          interval: PT15S
          maxAttempt: 2

  - id: run_maintenance
    type: io.kestra.plugin.scripts.shell.Commands
    description: >
      Run a real offline maintenance action against the stopped domain: take a
      libvirt-external disk snapshot and report the qcow2 image health.
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    retry:
      type: constant
      interval: PT30S
      maxAttempt: 2
    env:
      LIBVIRT_DEFAULT_URI: "{{ vars.libvirt_uri }}"
      TARGET_VM: "{{ inputs.target_vm }}"
      SNAPSHOT_NAME: "maint-{{ (trigger.date ?? execution.startDate) | date('yyyyMMdd-HHmmss') }}"
    commands:
      - set -euo pipefail
      - echo "Maintenance window started for ${TARGET_VM} at $(date -u)"
      - echo "Reported domain state is {{ outputs.graceful_stop.state }}; running offline maintenance"
      - virsh snapshot-create-as --domain "${TARGET_VM}" --name "${SNAPSHOT_NAME}" --disk-only --atomic
      - |
        for disk in $(virsh domblklist "${TARGET_VM}" --details | awk '$2=="disk"{print $4}'); do
          echo "Inspecting ${disk}"
          qemu-img info "${disk}" || true
        done
      - echo "Maintenance complete for ${TARGET_VM} (snapshot ${SNAPSHOT_NAME})"

  - id: restart_vm
    type: io.kestra.plugin.kvm.StartVm
    description: Boot the domain again and wait for it to return to the RUNNING state.
    name: "{{ inputs.target_vm }}"
    waitForRunning: true
    timeToWait: PT3M
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 3

  - id: notify_complete
    type: io.kestra.plugin.email.MailSend
    description: Email the operations team a maintenance summary once the VM is back online.
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    subject: "Maintenance complete for {{ inputs.target_vm }}"
    htmlTextContent: |
      Maintenance window finished for domain {{ inputs.target_vm }}.<br>
      Final state: {{ outputs.restart_vm.state }}.<br>
      Execution: {{ execution.id }}

errors:
  - id: alert_failure
    type: io.kestra.plugin.email.MailSend
    description: >
      Alert ops on any failure. A maintenance window is defined by what happens
      when it goes wrong: if the stop, the maintenance script, or the restart
      fails, ops must hear about it because the VM may be left down.
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    subject: ":rotating_light: MAINTENANCE FAILED for {{ inputs.target_vm }}"
    htmlTextContent: |
      Maintenance window FAILED for domain {{ inputs.target_vm }}.<br>
      Flow: {{ flow.namespace }}.{{ flow.id }}<br>
      Execution: {{ execution.id }}<br>
      Last known stop state: {{ outputs.graceful_stop.state ?? 'n/a' }}<br>
      Last known restart state: {{ outputs.restart_vm.state ?? 'n/a' }}<br>
      The VM may be stopped; verify and recover it manually.

triggers:
  - id: weekly_window
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run every Sunday at 02:00 UTC, an off-hours maintenance window.
    cron: "0 2 * * 0"
    timezone: Etc/UTC

extend:
  shortDescription: Off-hours patch window that verifies the target, gracefully stops it (with a force fallback), snapshots and inspects its disk, restarts it, and emails ops on success or failure.
  title: Scheduled KVM maintenance window orchestration
  metaTitle: Orchestrate a KVM maintenance window with Kestra
  description: |
    This flow orchestrates a recurring off-hours maintenance window for a KVM domain. On a
    weekly schedule it inventories the hypervisor, verifies the target domain exists,
    gracefully shuts it down (falling back to a hard power-off if ACPI shutdown stalls),
    takes an external disk snapshot and inspects the qcow2 image while the domain is
    offline, boots the domain again, and emails the operations team. A flow-level `errors`
    block emails ops on any failure so a run that leaves a server down is never silent.

    ## What this flow does
    1. `inventory` calls `io.kestra.plugin.kvm.ListVms` to capture the current domain list.
    2. `assert_target_present` fails fast if `target_vm` is not in the inventory, so the
       window never shuts down a domain it could not verify.
    3. `graceful_stop` calls `io.kestra.plugin.kvm.StopVm` with `force: false` and
       `waitForStopped: true`. ACPI shutdown frequently does not complete (no ACPI daemon,
       hung kernel, stuck app), so a task-level `errors` handler runs a second StopVm with
       `force: true` to hard power-off and let maintenance proceed instead of stranding the
       VM in an unknown state.
    4. `run_maintenance` performs a real offline action: a libvirt external disk snapshot
       (`virsh snapshot-create-as --disk-only --atomic`) named from the schedule date, then
       reports `qemu-img info` for each disk. Replace or extend with your own fsck, qcow2
       compaction, or backup steps.
    5. `restart_vm` calls `io.kestra.plugin.kvm.StartVm` with `waitForRunning: true` to
       bring the domain back and confirm it reaches RUNNING.
    6. `notify_complete` emails an ops summary with the final state.

    The shared libvirt `uri` and the SMTP connection live in `pluginDefaults` keyed on
    `io.kestra.plugin.kvm` and `io.kestra.plugin.email.MailSend`, every remote call has a
    retry, and `concurrency.limit: 1` guarantees windows never overlap.

    ## Reliability and operability
    - The graceful stop has a force fallback, so the window does not burn its whole timeout
      and then abort with the VM half-stopped.
    - The `errors` block emails ops on failure, including the last known stop and restart
      states, so a bad run is loud rather than silent.
    - `concurrency.limit: 1` prevents a long-running window (slow fsck or backup) from
      overlapping the next scheduled fire. For stop/start ordering, overlap would be unsafe.
    - Backfill note: Kestra can backfill missed schedules, but replaying a stop/start
      maintenance window over past dates is usually not what you want. Backfill this flow
      deliberately, not as a catch-up.

    ## Scaling to many VMs
    This flow patches a single domain so the stop/maintain/restart ordering stays clear.
    To patch a set of VMs, promote `target_vm` to an `ARRAY` input and wrap the
    stop/maintain/restart tasks in a `ForEach` with per-iteration error handling so one
    VM failing does not abort the rest.

    ## Prerequisites
    - A reachable libvirt/KVM host, addressed via a URI such as `qemu+ssh://root@your-host/system`
      or `qemu:///system`.
    - The target domain (`target_vm`) must already be defined on the hypervisor.
    - The Kestra worker must be able to run `virsh` and `qemu-img` against the host.
    - An SMTP server reachable from the Kestra worker for the email notifications.

    ## Secrets
    - `LIBVIRT_URI`: the libvirt connection URI used by the KVM tasks and the maintenance script.
    - `SMTP_HOST`: the SMTP server hostname used to send the emails.
    - `SMTP_USERNAME`: the SMTP account username for authentication.
    - `SMTP_PASSWORD`: the SMTP account password for authentication.

    ## Quick start
    1. Add the `LIBVIRT_URI`, `SMTP_HOST`, `SMTP_USERNAME`, and `SMTP_PASSWORD` secrets.
    2. Set `target_vm` to the domain you want to patch, and adjust the `from`/`to`
       addresses in the `pluginDefaults` block.
    3. Replace or extend the `run_maintenance` commands with your real maintenance steps.
    4. Enable the `weekly_window` schedule trigger (defaults to Sunday 02:00 UTC).

    ## Expected outputs
    - `{{ outputs.inventory.vms }}`: the list of domains seen on the hypervisor at run time.
    - `{{ outputs.graceful_stop.state }}`: domain state after the shutdown attempt (SHUTOFF on success).
    - `{{ outputs.restart_vm.state }}`: domain state after restart (RUNNING on success).

    ## Documentation
    - KVM plugin: https://kestra.io/plugins/plugin-kvm
    - Email plugin: https://kestra.io/plugins/plugin-notifications
    - Schedule trigger: https://kestra.io/plugins/core/triggers/io.kestra.plugin.core.trigger.schedule
    - libvirt domain lifecycle: https://libvirt.org/formatdomain.html
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: "Weekly KVM patch window: verify target, graceful stop with force fallback, snapshot disk, restart, and email ops on success or failure."
