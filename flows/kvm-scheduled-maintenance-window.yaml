id: kvm-scheduled-maintenance-window
namespace: company.infra

inputs:
  - id: target_vm
    type: STRING
    defaults: app-server-01
    description: >
      Libvirt domain to patch during the maintenance window. Treat as a trusted,
      operator-supplied identifier.
    validator: ^[a-z0-9][a-z0-9-]{0,62}$

variables:
  libvirt_uri: "{{ secret('LIBVIRT_URI') }}"

pluginDefaults:
  - type: io.kestra.plugin.kvm
    values:
      uri: "{{ vars.libvirt_uri }}"
  - type: io.kestra.plugin.email.MailSend
    values:
      host: "{{ secret('SMTP_HOST') }}"
      port: 587
      transportStrategy: SMTP_TLS
      username: "{{ secret('SMTP_USERNAME') }}"
      password: "{{ secret('SMTP_PASSWORD') }}"
      from: kestra@company.local
      to: ops@company.local

concurrency:
  limit: 1

tasks:
  - id: inventory
    type: io.kestra.plugin.kvm.ListVms
    description: Enumerate domains on the hypervisor before any changes for an audit record.
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 3

  - id: assert_target_present
    type: io.kestra.plugin.core.execution.Fail
    description: >
      Fail early (before stopping anything) if the target domain is not present
      in the inventory, so the window does not shut down a VM it cannot verify.
    condition: "{{ inputs.target_vm not in (outputs.inventory.vms | jq('.[].name')) }}"
    errorMessage: "Domain {{ inputs.target_vm }} was not found in the hypervisor inventory; aborting maintenance window."

  - id: graceful_stop
    type: io.kestra.plugin.kvm.StopVm
    description: Send a graceful ACPI shutdown and wait until the domain reaches SHUTOFF.
    name: "{{ inputs.target_vm }}"
    force: false
    waitForStopped: true
    timeToWait: PT5M
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 2
    errors:
      - id: force_stop
        type: io.kestra.plugin.kvm.StopVm
        description: >
          ACPI shutdown did not complete in time (no ACPI daemon, hung kernel,
          stuck app). Hard power-off so maintenance can proceed instead of
          stranding the VM in an unknown state.
        name: "{{ inputs.target_vm }}"
        force: true
        waitForStopped: true
        timeToWait: PT2M
        retry:
          type: constant
          interval: PT15S
          maxAttempt: 2

  - id: run_maintenance
    type: io.kestra.plugin.scripts.shell.Commands
    description: >
      Run a real offline maintenance action against the stopped domain: take a
      libvirt-external disk snapshot and report the qcow2 image health.
    # Script tasks default to the Docker runner. This one needs host-side libvirt
    # tooling (qemu-img/virsh against the local hypervisor), so it uses the Process
    # runner to execute on the host. Remove this block to run in Docker, or switch
    # the type to Kubernetes/Docker if your hypervisor tooling lives in a container.
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    retry:
      type: constant
      interval: PT30S
      maxAttempt: 2
    env:
      LIBVIRT_DEFAULT_URI: "{{ vars.libvirt_uri }}"
      TARGET_VM: "{{ inputs.target_vm }}"
      SNAPSHOT_NAME: "maint-{{ (trigger.date ?? execution.startDate) | date('yyyyMMdd-HHmmss') }}"
    commands:
      - set -euo pipefail
      - echo "Maintenance window started for ${TARGET_VM} at $(date -u)"
      - echo "Reported domain state is {{ outputs.graceful_stop.state }}; running offline maintenance"
      - virsh snapshot-create-as --domain "${TARGET_VM}" --name "${SNAPSHOT_NAME}" --disk-only --atomic
      - |
        for disk in $(virsh domblklist "${TARGET_VM}" --details | awk '$2=="disk"{print $4}'); do
          echo "Inspecting ${disk}"
          qemu-img info "${disk}" || true
        done
      - echo "Maintenance complete for ${TARGET_VM} (snapshot ${SNAPSHOT_NAME})"

  - id: restart_vm
    type: io.kestra.plugin.kvm.StartVm
    description: Boot the domain again and wait for it to return to the RUNNING state.
    name: "{{ inputs.target_vm }}"
    waitForRunning: true
    timeToWait: PT3M
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 3

  - id: notify_complete
    type: io.kestra.plugin.email.MailSend
    description: Email the operations team a maintenance summary once the VM is back online.
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    subject: "Maintenance complete for {{ inputs.target_vm }}"
    htmlTextContent: |
      Maintenance window finished for domain {{ inputs.target_vm }}.<br>
      Final state: {{ outputs.restart_vm.state }}.<br>
      Execution: {{ execution.id }}

errors:
  - id: alert_failure
    type: io.kestra.plugin.email.MailSend
    description: >
      Alert ops on any failure. A maintenance window is defined by what happens
      when it goes wrong: if the stop, the maintenance script, or the restart
      fails, ops must hear about it because the VM may be left down.
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    subject: ":rotating_light: MAINTENANCE FAILED for {{ inputs.target_vm }}"
    htmlTextContent: |
      Maintenance window FAILED for domain {{ inputs.target_vm }}.<br>
      Flow: {{ flow.namespace }}.{{ flow.id }}<br>
      Execution: {{ execution.id }}<br>
      Last known stop state: {{ outputs.graceful_stop.state ?? 'n/a' }}<br>
      Last known restart state: {{ outputs.restart_vm.state ?? 'n/a' }}<br>
      The VM may be stopped; verify and recover it manually.

triggers:
  - id: weekly_window
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run every Sunday at 02:00 UTC, an off-hours maintenance window.
    cron: "0 2 * * 0"
    timezone: Etc/UTC

extend:
  shortDescription: Off-hours patch window that verifies the target, gracefully stops it (with a force fallback), snapshots and inspects its disk, restarts it, and emails ops on success or failure.
  title: Scheduled KVM maintenance window orchestration
  metaTitle: Orchestrate a KVM maintenance window with Kestra
  metaDescription: "Automate a recurring KVM/libvirt maintenance window in Kestra: verify the domain, graceful stop with force fallback, snapshot its disk, restart, and alert ops."
  description: |
    Automate a safe, recurring off-hours maintenance window for a KVM (libvirt) virtual machine without hand-running virsh at 2am. This blueprint orchestrates the full domain lifecycle around a maintenance action: it inventories the hypervisor, verifies the target VM exists, gracefully shuts it down with a hard power-off fallback, takes an external disk snapshot and checks the qcow2 image health while the domain is offline, boots it back up, and emails the operations team. A flow-level error handler guarantees that a run which leaves a server down is never silent. It solves the classic problem of unattended VM patching, snapshotting, and disk maintenance on bare libvirt hosts where the hypervisor has no built-in scheduler, retries, or alerting.

    ## How it works
    1. `inventory` runs `io.kestra.plugin.kvm.ListVms` to capture the current domain list as an audit record before anything changes.
    2. `assert_target_present` uses `io.kestra.plugin.core.execution.Fail` with a `condition` that checks `target_vm` against the inventory, aborting before any shutdown if the domain cannot be verified.
    3. `graceful_stop` runs `io.kestra.plugin.kvm.StopVm` with `force: false` and `waitForStopped: true`. If ACPI shutdown stalls, a task-level `errors` handler (`force_stop`) runs a second `StopVm` with `force: true` to hard power-off the domain.
    4. `run_maintenance` is a `io.kestra.plugin.scripts.shell.Commands` task on the `io.kestra.plugin.core.runner.Process` runner that takes a `virsh snapshot-create-as --disk-only --atomic` snapshot named from the schedule date, then reports `qemu-img info` for each disk.
    5. `restart_vm` runs `io.kestra.plugin.kvm.StartVm` with `waitForRunning: true` to bring the domain back and confirm it reaches RUNNING.
    6. `notify_complete` sends an `io.kestra.plugin.email.MailSend` summary with the final state.
    7. The `weekly_window` `io.kestra.plugin.core.trigger.Schedule` fires every Sunday at 02:00 UTC, and a flow-level `errors` block emails ops on any failure.

    ## What you get
    - A hands-off maintenance window that runs on a schedule and self-recovers from a stuck ACPI shutdown.
    - An audit trail: domain inventory, stop/restart states, and snapshot names per run.
    - Loud failure handling that emails ops the last known stop and restart states when anything breaks.
    - Safe sequencing via `concurrency.limit: 1` so windows never overlap.

    ## Who it's for
    - Platform and infrastructure engineers running self-hosted KVM/libvirt hypervisors.
    - SREs and on-call ops who need reliable, alerting maintenance automation.
    - Homelab and on-prem teams without a managed virtualization control plane.

    ## Why orchestrate this with Kestra
    A bare libvirt host has no scheduler, no retry logic, no conditional branching, and no alerting. Kestra adds all of it declaratively in YAML: the `Schedule` trigger replaces fragile cron-and-bash, per-task `retry` blocks absorb transient hypervisor hiccups, the task-level `errors` handler turns a stuck graceful stop into a force stop instead of a hung window, and the flow-level `errors` block guarantees ops is paged when a VM might be left down. Execution outputs give you lineage across the stop, maintain, and restart steps, and `concurrency.limit: 1` prevents overlapping windows: guarantees virsh and qemu cannot give you on their own.

    ## Prerequisites
    - A reachable libvirt/KVM host addressed via a URI such as `qemu+ssh://root@your-host/system` or `qemu:///system`.
    - The target domain (`target_vm`) already defined on the hypervisor.
    - A Kestra worker that can run `virsh` and `qemu-img` against the host (this flow uses the Process runner).
    - An SMTP server reachable from the worker for notifications.

    ### Secrets
    - `LIBVIRT_URI`: the libvirt connection URI used by the KVM tasks and the maintenance script.
    - `SMTP_HOST`: the SMTP server hostname used to send the emails.
    - `SMTP_USERNAME`: the SMTP account username for authentication.
    - `SMTP_PASSWORD`: the SMTP account password for authentication.

    ## Quick start
    1. Add the `LIBVIRT_URI`, `SMTP_HOST`, `SMTP_USERNAME`, and `SMTP_PASSWORD` secrets.
    2. Set `target_vm` to the domain you want to patch, and adjust the `from`/`to` addresses in `pluginDefaults`.
    3. Replace or extend the `run_maintenance` commands with your real maintenance steps.
    4. Enable the `weekly_window` schedule trigger (defaults to Sunday 02:00 UTC).

    ## How to extend
    - Swap the snapshot/qemu-img commands for your own fsck, qcow2 compaction, OS patching, or backup steps.
    - Promote `target_vm` to an `ARRAY` input and wrap stop/maintain/restart in a `ForEach` with per-iteration error handling to patch a fleet.
    - Add a `pause` or approval task before the stop for change-controlled windows.

    ## Links
    - KVM plugin: https://kestra.io/plugins/plugin-kvm
    - Email plugin: https://kestra.io/plugins/plugin-notifications
    - Schedule trigger: https://kestra.io/plugins/core/triggers/io.kestra.plugin.core.trigger.schedule
  tags:
    - Infrastructure
  ee: false
  demo: false
