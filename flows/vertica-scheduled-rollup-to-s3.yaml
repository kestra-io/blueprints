id: vertica-scheduled-rollup-to-s3
namespace: company.analytics

labels:
  team: data
  domain: analytics

concurrency:
  limit: 1

inputs:
  - id: source_table
    type: STRING
    defaults: staging.orders
    description: |
      Fully qualified source table for the rollup. Operator-controlled
      identifier concatenated into the SELECT (an identifier cannot be bound
      as a parameter); keep it trusted, not user/web input.

  - id: s3_prefix
    type: STRING
    defaults: vertica-reports/daily
    description: S3 key prefix under which the date-partitioned report is written.

variables:
  vertica_url: jdbc:vertica://vertica-host:5433/analytics
  report_date: "{{ (trigger.date ?? execution.startDate) | date('yyyy-MM-dd') }}"

pluginDefaults:
  - type: io.kestra.plugin.jdbc.vertica
    values:
      url: "{{ vars.vertica_url }}"
      username: "{{ secret('VERTICA_USERNAME') }}"
      password: "{{ secret('VERTICA_PASSWORD') }}"
  - type: io.kestra.plugin.aws.s3
    values:
      region: "{{ secret('AWS_DEFAULT_REGION') }}"
      accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"

tasks:
  - id: daily_rollup
    type: io.kestra.plugin.jdbc.vertica.Query
    description: Aggregate the report day's sales by product and store the result set to internal storage.
    fetchType: STORE
    timeout: PT15M
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    parameters:
      report_date: "{{ vars.report_date }}"
    sql: |
      SELECT
        order_date,
        product,
        COUNT(*) AS orders,
        SUM(total) AS revenue,
        ROUND(SUM(total) / NULLIF(COUNT(*), 0), 2) AS revenue_per_order
      FROM {{ inputs.source_table }}
      WHERE order_date = :report_date
      GROUP BY order_date, product
      ORDER BY revenue DESC;

  - id: assert_not_empty
    type: io.kestra.plugin.core.execution.Fail
    description: Fail loudly when the report day has zero rows so a missed upstream load is not shipped as an empty file.
    condition: "{{ (outputs.daily_rollup.size ?? 0) == 0 }}"
    errorMessage: "No rows in {{ inputs.source_table }} for {{ vars.report_date }}. Upstream load may be missing or late; not shipping an empty report."

  - id: to_csv
    type: io.kestra.plugin.serdes.csv.IonToCsv
    description: Convert the stored ION result set into CSV for export.
    from: "{{ outputs.daily_rollup.uri }}"
    header: true

  - id: upload_to_s3
    type: io.kestra.plugin.aws.s3.Upload
    description: Upload the daily rollup CSV to the reporting bucket under a date-partitioned key.
    from: "{{ outputs.to_csv.uri }}"
    bucket: "{{ secret('AWS_S3_BUCKET') }}"
    key: "{{ inputs.s3_prefix }}/sales_rollup_{{ vars.report_date }}.csv"
    timeout: PT15M
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "30 6 * * *"
    timezone: Etc/UTC

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed for {{ vars.report_date }} (execution {{ execution.id }})."

extend:
  shortDescription: Run a daily Vertica rollup, assert it is non-empty, convert to CSV, and upload it to an S3 reporting bucket.
  title: Scheduled Vertica rollup exported to Amazon S3
  metaTitle: Vertica daily rollup to S3
  description: |
    This flow runs every morning to produce a daily sales rollup from Vertica and ship it to Amazon S3 as a CSV report, with retries, failure alerting, and an empty-day guard so an unattended run fails loudly instead of silently.

    What the flow does:
    - Fires on a daily Schedule trigger at 06:30 in an explicit `Etc/UTC` timezone, so the run time does not drift with the worker's default zone or DST.
    - Derives the report date from the trigger/execution date (`{{ (trigger.date ?? execution.startDate) | date('yyyy-MM-dd') }}`), so backfills and replays target the correct day and the S3 partition key is built from the same value.
    - Runs a Vertica Query that aggregates the report day's sales by product, binding the date through the task `parameters` map (`:report_date`) as a prepared-statement parameter rather than concatenating it into the SQL string.
    - Asserts the rollup returned at least one row; an empty result (weekend, or a missed/late upstream load) fails the execution rather than shipping a header-only CSV that looks like a real zero-revenue day.
    - Converts the stored ION result set into CSV.
    - Uploads the CSV to S3 under a date-partitioned key.

    Reliability and safety:
    - Vertica and AWS connection/credential properties live in `pluginDefaults` keyed by plugin group, not repeated on each task.
    - `daily_rollup` and `upload_to_s3` carry a `retry` (constant, 3 attempts) and a 15-minute `timeout` to survive transient Vertica failover or S3 throttling without hanging a worker.
    - A flow-level `errors` block posts a Slack alert (with the report date and execution id) on failure, which matters for a scheduled job no human is watching.
    - `concurrency.limit: 1` ensures a slow run cannot overlap the next scheduled fire.

    Scheduling assumption:
    - The rollup assumes the prior day's data is fully loaded into the source table by 06:30 UTC. If your load finishes later, push the cron back, or trigger this flow from the load flow with a Flow trigger instead of a fixed time. Missed scheduled runs can be backfilled from the Triggers tab in the UI, and because the date is derived from the trigger date, each backfilled run targets the correct day.

    Security note on the table name:
    - `source_table` is concatenated into the SELECT because a SQL identifier cannot be bound as a parameter. Keep it an operator-controlled value, not user/web input.

    Prerequisites:
    - A reachable Vertica cluster holding the source table (or adapt the SQL to your schema). Update the `vertica_url` variable to your JDBC URL.
    - An Amazon S3 bucket and AWS credentials with `s3:PutObject` permission on that bucket. A fixed key per date overwrites on re-run; enable bucket versioning if you need immutable history.

    Secrets:
    - `VERTICA_USERNAME`: the Vertica database user used for the connection.
    - `VERTICA_PASSWORD`: the password for that Vertica user.
    - `AWS_S3_BUCKET`: the destination S3 bucket name for the report.
    - `AWS_DEFAULT_REGION`: the AWS region of the bucket, for example `us-east-1`.
    - `AWS_ACCESS_KEY_ID`: the AWS access key ID for an account allowed to write to the bucket.
    - `AWS_SECRET_ACCESS_KEY`: the AWS secret access key paired with the access key ID.
    - `SLACK_WEBHOOK`: the Slack incoming webhook used for failure alerts.

    Quick start:
    1. Add the `VERTICA_USERNAME`, `VERTICA_PASSWORD`, `AWS_S3_BUCKET`, `AWS_DEFAULT_REGION`, `AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY`, and `SLACK_WEBHOOK` secrets to your namespace.
    2. Edit the `vertica_url` variable and the `source_table` / `s3_prefix` inputs to match your environment.
    3. Adjust the Schedule `cron` if you need a different run time; the `timezone` is already pinned to UTC.
    4. Enable the trigger and let it run, or execute manually to test.

    Expected outputs:
    - The rollup result set is stored as ION at `{{ outputs.daily_rollup.uri }}` with `{{ outputs.daily_rollup.size }}` rows.
    - The converted CSV is available at `{{ outputs.to_csv.uri }}`.
    - The uploaded object lands in S3 at the key `<s3_prefix>/sales_rollup_<date>.csv` in bucket `{{ outputs.upload_to_s3.bucket }}`.

    Documentation:
    - Vertica plugin: https://kestra.io/plugins/plugin-jdbc-vertica
    - AWS S3 Upload task: https://kestra.io/plugins/plugin-aws/s3/io.kestra.plugin.aws.s3.upload
    - Schedule trigger: https://kestra.io/plugins/core/triggers/io.kestra.plugin.core.trigger.schedule
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Daily Vertica rollup with retry, failure alerting, and an empty-day guard, converted to CSV and uploaded to Amazon S3.
