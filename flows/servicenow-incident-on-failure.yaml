id: servicenow-incident-on-failure
namespace: company.team
description: |
  Open a ServiceNow incident automatically when a pipeline fails, with severity
  driven by the CMDB. The monitored job runs on a schedule; on failure, the flow
  looks up the affected service in the CMDB and opens an incident at the matching
  priority, then alerts Slack.

inputs:
  - id: service_name
    type: STRING
    defaults: analytics-pipeline
    description: CMDB service name used to derive the incident severity.

tasks:
  - id: monitored_job
    type: io.kestra.plugin.dbt.cli.DbtCLI
    description: The job being monitored; a failure here opens an incident.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: ghcr.io/kestra-io/dbt-duckdb:latest
    namespaceFiles:
      enabled: true
    commands:
      - dbt deps
      - dbt build

errors:
  - id: lookup_cmdb
    type: io.kestra.plugin.servicenow.Get
    description: Look up the affected service in the CMDB for its priority.
    table: cmdb_ci_service
    query: "name={{ inputs.service_name }}"
    fetchType: FETCH_ONE

  - id: open_incident
    type: io.kestra.plugin.servicenow.Post
    description: Open an incident at the CMDB-driven priority.
    table: incident
    data:
      short_description: "Pipeline failure: {{ flow.id }} ({{ execution.id }})"
      description: "Execution {{ execution.id }} of {{ flow.namespace }}.{{ flow.id }} failed."
      cmdb_ci: "{{ inputs.service_name }}"
      priority: "{{ outputs.lookup_cmdb.results[0].priority ?? '3' }}"

  - id: alert
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Alert Slack that an incident was opened.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Opened ServiceNow incident for failed pipeline {{ flow.id }} (execution {{ execution.id }})."
      }

pluginDefaults:
  - type: io.kestra.plugin.servicenow.Get
    values:
      domain: "{{ secret('SN_DOMAIN') }}"
      username: "{{ secret('SN_USERNAME') }}"
      password: "{{ secret('SN_PASSWORD') }}"
  - type: io.kestra.plugin.servicenow.Post
    values:
      domain: "{{ secret('SN_DOMAIN') }}"
      username: "{{ secret('SN_USERNAME') }}"
      password: "{{ secret('SN_PASSWORD') }}"

triggers:
  - id: scheduled_run
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run the monitored job on a schedule. Adjust or disable as needed.
    cron: "0 */4 * * *"
    disabled: true

extend:
  shortDescription: When a scheduled job fails, look up its CMDB service and open a ServiceNow incident at the matching priority.
  title: Open a ServiceNow Incident on Failure with CMDB Severity
  metaTitle: Open a ServiceNow Incident on Failure with CMDB Severity
  description: |
    This blueprint turns pipeline failures into properly triaged ServiceNow
    incidents. A monitored job runs on a schedule; if it fails, the error handler
    looks up the affected service in the CMDB, opens an incident at the priority
    that service carries, and alerts Slack. Incidents get the right severity
    without manual triage.

    Prerequisites:
      - Secrets:
        - SN_DOMAIN, SN_USERNAME, SN_PASSWORD: ServiceNow instance and credentials.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - A CMDB service record (cmdb_ci_service) for the monitored service and a dbt project in the namespace.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Upload your dbt project to the namespace and set service_name to its CMDB service.
      3. Enable the schedule; a failure opens an incident automatically.

    Outputs:
      - outputs.lookup_cmdb.results: the CMDB service record used for severity.
      - outputs.open_incident.result: the created incident.

    Notes:
      - The incident handler lives in the errors block, so it runs only when the monitored job fails.
      - Priority falls back to 3 when the CMDB lookup returns nothing; adjust the mapping to your model.
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: When a scheduled job fails, look up its CMDB service and open a ServiceNow incident at the matching priority.
