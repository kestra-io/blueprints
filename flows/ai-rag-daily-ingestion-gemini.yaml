id: ai-rag-daily-ingestion-gemini
namespace: company.ai

triggers:
  - id: reindex_daily
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 3 * * *"

tasks:
  - id: ingest
    type: io.kestra.plugin.ai.rag.IngestDocument
    timeout: PT10M
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    provider:
      type: io.kestra.plugin.ai.provider.GoogleGemini
      modelName: gemini-embedding-001
      apiKey: "{{ secret('GEMINI_API_KEY') }}"
    embeddings:
      type: io.kestra.plugin.ai.embeddings.KestraKVStore
    drop: true
    documentSplitter:
      splitter: PARAGRAPH
      maxSegmentSizeInChars: 4096
      maxOverlapSizeInChars: 200
    fromExternalURLs:
      - https://raw.githubusercontent.com/kestra-io/docs/refs/heads/main/src/contents/blogs/release-1-1/index.md

extend:
  title: Nightly RAG Ingestion Pipeline with Google Gemini
  metaTitle: Scheduled RAG Ingestion with Google Gemini Embeddings
  shortDescription: "This blueprint runs a nightly ingestion job that fetches documents from external URLs, splits them into chunks, and indexes them into a vector store using Google Gemini embeddings."
  description: |
    This blueprint runs a **nightly document ingestion pipeline** that fetches content
    from external URLs, splits it into overlapping chunks, and stores **Google Gemini
    embeddings** in the Kestra KV Store — keeping a RAG knowledge base current without
    any manual intervention.

    It demonstrates how to:

    1. Schedule ingestion with a **daily cron trigger** that runs at 3 AM, so the
       vector store is refreshed before the workday starts.
    2. Fetch documents from **public external URLs** (Markdown files, documentation
       pages, or any plain-text source) and ingest them directly — no intermediate
       file storage required.
    3. Split documents using **paragraph-based splitting** with a 4096-character
       segment size and 200-character overlap to preserve context across chunk
       boundaries without exceeding embedding model limits.
    4. Generate embeddings and persist them in the **Kestra KV Store** 
       for zero-infrastructure semantic search.
    5. Drop and rebuild the index on every run (`drop: true`) to prevent stale
       chunks from accumulating as source documents change.
    6. Handle transient network or API failures with a **constant retry policy**
       (3 attempts, 1-minute intervals) and a 10-minute task timeout to avoid
       runaway executions.

    This pattern is well-suited for:
      - **Documentation indexing** pipelines that need to track frequently updated
        sources like release notes, changelogs, or knowledge base articles
      - **Scheduled knowledge refresh** workflows where a downstream Q&A agent
        always queries a current index
      - Teams building **lightweight RAG systems** without a dedicated vector
        database, using Kestra's KV Store as the embedding backend

    Once ingestion completes, query the indexed content with a companion flow
    using `io.kestra.plugin.ai.rag.ChatCompletion`:

    ```yaml
    id: rag_pipeline
    namespace: company.ai

    inputs:
      - id: question
        type: STRING

    tasks:
      - id: chat_with_rag
        type: io.kestra.plugin.ai.rag.ChatCompletion
        chatProvider:
          type: io.kestra.plugin.ai.provider.GoogleGemini
          modelName: gemini-2.5-flash
          apiKey: "{{ secret('GEMINI_API_KEY') }}"
        embeddingProvider:
          type: io.kestra.plugin.ai.provider.GoogleGemini
          modelName: gemini-embedding-001
          apiKey: "{{ secret('GEMINI_API_KEY') }}"
        embeddings:
          type: io.kestra.plugin.ai.embeddings.KestraKVStore
        systemMessage: |
          You are a helpful assistant. Use the provided documentation to give
          accurate, specific answers. If the context doesn't contain the answer, say so.
        prompt: "{{ inputs.question }}"
    ```

    ## Choosing a vector store

    The `embeddings` block is the one line you change as you scale. `KestraKVStore`
    requires no setup, but similarity search runs in memory so performance degrades
    as your knowledge base grows. For larger workloads, swap in Qdrant or PGVector — the
    rest of the flow stays identical.

    | Store | Setup | Best for |
    | --- | --- | --- |
    | KestraKVStore | None (built in) | Learning and prototyping |
    | Qdrant | External service | Larger corpora, fast vector search |
    | PGVector | Postgres extension | Teams already running Postgres |
  tags:
    - AI
  ee: false
  demo: false
  metaDescription: Schedule a nightly RAG ingestion pipeline with Kestra and Google Gemini. Fetch documents from URLs, split into chunks, and index embeddings into a vector store on a daily cron schedule.
