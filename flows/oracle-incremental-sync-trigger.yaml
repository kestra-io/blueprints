id: oracle-incremental-sync-trigger
namespace: company.team

variables:
  oracle_url: jdbc:oracle:thin:@//oracle.internal:1521/ORCLPDB1
  batch_size: 500

concurrency:
  limit: 1

labels:
  team: data
  pipeline: orders-incremental-sync

pluginDefaults:
  - type: io.kestra.plugin.jdbc.oracle
    values:
      url: "{{ vars.oracle_url }}"
      username: "{{ secret('ORACLE_USERNAME') }}"
      password: "{{ secret('ORACLE_PASSWORD') }}"

tasks:
  - id: stage_batch
    type: io.kestra.plugin.jdbc.oracle.Batch
    description: Bulk load the batch the trigger captured into a transient per-execution staging table.
    from: "{{ trigger.uri }}"
    chunk: "{{ vars.batch_size }}"
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    columns:
      - order_id
      - customer_id
      - customer_name
      - region
      - amount
      - created_at
    sql: "INSERT INTO orders_enriched_stg (order_id, customer_id, customer_name, region, amount, created_at) VALUES (?, ?, ?, ?, ?, ?)"

  - id: merge_into_mart
    type: io.kestra.plugin.jdbc.oracle.Queries
    description: Upsert the staged rows into the mart keyed on order_id, then clear the staging table in one transaction. The MERGE makes a replay idempotent even on the at-least-once path.
    fetchType: NONE
    transaction: true
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    sql: |
      MERGE INTO orders_enriched t
      USING orders_enriched_stg s
        ON (t.order_id = s.order_id)
      WHEN MATCHED THEN UPDATE SET
        t.customer_id   = s.customer_id,
        t.customer_name = s.customer_name,
        t.region        = s.region,
        t.amount        = s.amount,
        t.created_at    = s.created_at
      WHEN NOT MATCHED THEN INSERT
        (order_id, customer_id, customer_name, region, amount, created_at)
      VALUES
        (s.order_id, s.customer_id, s.customer_name, s.region, s.amount, s.created_at);
      DELETE FROM orders_enriched_stg;

  - id: notify_batch
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Post the size of the synced batch to Slack so the data team can track sync volume.
    url: "{{ secret('SLACK_WEBHOOK') }}"
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    messageText: "Oracle incremental sync upserted {{ trigger.size }} enriched order(s) into orders_enriched. Source batch: {{ trigger.uri }}"

triggers:
  - id: poll_new_orders
    type: io.kestra.plugin.jdbc.oracle.Trigger
    description: Poll Oracle every 5 minutes for unclaimed orders, enrich them, and claim exactly that id window.
    interval: PT5M
    url: "{{ vars.oracle_url }}"
    username: "{{ secret('ORACLE_USERNAME') }}"
    password: "{{ secret('ORACLE_PASSWORD') }}"
    fetchType: STORE
    sql: |
      SELECT
        o.order_id,
        o.customer_id,
        c.customer_name,
        c.region,
        o.amount,
        o.created_at
      FROM orders o
      LEFT JOIN customers c ON c.customer_id = o.customer_id
      WHERE o.processed_flag IS NULL
      ORDER BY o.order_id
      FETCH FIRST {{ vars.batch_size }} ROWS ONLY
    afterSQL: |
      UPDATE orders
      SET processed_flag = 'Y'
      WHERE processed_flag IS NULL
        AND order_id <= (
          SELECT MAX(order_id) FROM (
            SELECT order_id
            FROM orders
            WHERE processed_flag IS NULL
            ORDER BY order_id
            FETCH FIRST {{ vars.batch_size }} ROWS ONLY
          )
        )

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Alert Slack when a sync execution fails so the operator knows which already-claimed batch to replay.
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }}). The source rows for this batch are already claimed; replay batch {{ trigger.uri }} from this execution."

extend:
  shortDescription: Poll Oracle for new orders, enrich them with customer data, claim the exact batch, and MERGE it into a mart table so replays never duplicate.
  title: Incremental Oracle order sync with a polling trigger
  metaTitle: Oracle incremental sync trigger
  description: |
    This flow implements a change-data-capture style incremental sync from Oracle Database. Each poll captures
    a bounded batch of new orders, enriches them with customer attributes, claims exactly that batch, and
    upserts the result into a reporting mart table with a MERGE so a replay never duplicates.

    What the flow does:
    1. An Oracle Trigger polls the orders table every 5 minutes for rows where processed_flag is NULL, ordered by
       order_id, and fetches only the first batch_size rows (default 500). The query LEFT JOINs customers so the
       captured rows are already enriched with customer_name and region, and stores them to internal storage.
    2. The trigger's afterSQL claims that exact window by marking only rows whose order_id is less than or equal to
       the highest order_id in the fetched batch. Because order_id is a monotonically increasing sequence value,
       any rows inserted concurrently get a higher order_id and are simply picked up on the next poll. This avoids
       the classic race where a blanket "UPDATE ... WHERE processed_flag IS NULL" marks rows that were never emitted.
    3. The execution started by the trigger bulk loads the enriched batch (trigger.uri, an ION file) into a transient
       staging table with the Oracle Batch task.
    4. A single Oracle Query then MERGEs the staged rows into orders_enriched keyed on order_id (update on match,
       insert on no-match) and clears the staging table in the same transaction. Because the load is a MERGE rather
       than a plain INSERT, re-running an execution after a partial failure upserts the same rows instead of
       duplicating them.
    5. A Slack notification reports how many rows were synced.

    Reliability and safety:
    - The mart load is a MERGE on order_id, so the at-least-once failure mode (the trigger claims a batch, then the
      mart load fails and is re-run) re-upserts the same rows rather than inserting duplicates. orders_enriched.order_id
      should carry a unique constraint to back this up.
    - stage_batch, merge_into_mart, and notify_batch all retry (constant, 3 attempts) on transient DB or webhook blips.
    - A flow-level errors block posts a Slack failure alert including the execution id and trigger.uri, so when a load
      fails after the source rows are already claimed, the operator knows exactly which batch to replay.
    - concurrency.limit is 1 and the trigger's allowConcurrent defaults to false, so polls and mart loads never overlap;
      a slow mart load simply delays the next poll (back-pressure, not corruption).

    Delivery semantics and assumptions:
    - This pattern is at-least-once at the row level, made idempotent at the mart by the MERGE. If the mart load fails
      after the trigger has already claimed the batch, re-run the execution from the UI; the claimed rows remain
      available as trigger.uri on that execution and the MERGE absorbs the replay safely.
    - The race-safety of the claim depends on order_id being forward-only and monotonic. On Oracle RAC or with
      CACHE/NOORDER sequences, sequence values can be handed out out of order across instances, which can break the
      "anything newer has a higher id" assumption; use ORDER NOCACHE (or a monotonic source) if you need the strict
      guarantee. processed_flag must only ever move forward to 'Y'; a backfilled historical row given a small,
      previously-used id range with a NULL flag would be re-emitted.

    Backfill and drain rate:
    - The trigger drains batch_size rows per interval (default 500 every 5 minutes, about 6,000 per hour). To catch up
      on a large backlog, temporarily raise batch_size or lower the interval; there is no surge handling beyond that.

    Prerequisites:
    - A reachable Oracle Database instance. The JDBC URL uses the thin driver service form: jdbc:oracle:thin:@//host:1521/service.
    - An orders table with a numeric, sequence-generated order_id and a processed_flag column, a customers table
      to join against, an orders_enriched mart table with a unique order_id, and an orders_enriched_stg staging table
      with the same column shape.
    - A Slack Incoming Webhook URL.

    Least privilege:
    - The sync user needs SELECT on orders and customers, UPDATE on orders.processed_flag specifically (not the whole
      row), and INSERT/UPDATE/DELETE on the mart and staging tables. Consider a dedicated processed_flag owned by the
      sync so it never clobbers an operational flag.

    Secrets (set these as Kestra secrets, never inline):
    - ORACLE_USERNAME: the Oracle database user used by the polling trigger and the mart load.
    - ORACLE_PASSWORD: the password for that Oracle database user.
    - SLACK_WEBHOOK: the Slack Incoming Webhook URL the batch summary and failure alert are posted to.

    Quick start:
    1. Create the ORACLE_USERNAME, ORACLE_PASSWORD, and SLACK_WEBHOOK secrets.
    2. Update the oracle_url variable to point at your instance and service name.
    3. Create orders_enriched_stg matching orders_enriched, and a unique constraint on orders_enriched.order_id.
    4. Adjust the trigger SQL, the batch_size variable, the staging INSERT, and the MERGE to match your schema and watermark column.
    5. Enable the flow; the trigger will start polling automatically.

    Expected outputs:
    - Number of rows captured and claimed by the trigger: {{ trigger.size }}
    - Enriched batch stored by the trigger: {{ trigger.uri }}
    - Rows read into staging by the loader: {{ outputs.stage_batch.rowCount }}
    - Rows staged: {{ outputs.stage_batch.updatedCount }}

    Documentation:
    - Oracle plugin: https://kestra.io/plugins/plugin-jdbc-oracle
    - Oracle Trigger: https://kestra.io/plugins/plugin-jdbc-oracle/io.kestra.plugin.jdbc.oracle.trigger
    - Slack Incoming Webhook: https://kestra.io/plugins/plugin-slack/io.kestra.plugin.slack.notifications.slackincomingwebhook
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Poll Oracle for new orders, enrich them, claim the exact id window race-safely, and MERGE into a mart so replays never duplicate.
