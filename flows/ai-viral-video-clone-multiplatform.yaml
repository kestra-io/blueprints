id: ai-viral-video-clone-multiplatform
namespace: company.team

inputs:
  - id: video_url
    type: STRING
    displayName: Video URL
    description: URL of the short-form video to clone (e.g., a TikTok link)
  - id: avatar_rendering_wait
    type: INT
    displayName: Avatar rendering wait (seconds)
    description: How long to wait for Captions.ai to render the avatar video
    defaults: 180
  - id: caption_rendering_wait
    type: INT
    displayName: Caption rendering wait (seconds)
    description: How long to wait for JSON2Video to render the captioned video
    defaults: 120

tasks:
  - id: download_video
    type: io.kestra.plugin.core.http.Request
    description: Download the original video via RapidAPI
    uri: "https://tiktok-download-video1.p.rapidapi.com/getVideo?url={{ inputs.video_url }}"
    method: GET
    headers:
      X-RapidAPI-Key: "{{ secret('RAPIDAPI_KEY') }}"
      X-RapidAPI-Host: "tiktok-download-video1.p.rapidapi.com"

  - id: extract_thumbnail
    type: io.kestra.plugin.core.http.Request
    description: Download the video thumbnail image
    uri: "{{ outputs.download_video.body.data.origin_cover }}"
    method: GET

  - id: upload_thumbnail_to_cloudinary
    type: io.kestra.plugin.core.http.Request
    description: Upload the thumbnail to Cloudinary for stable hosting
    uri: "https://api.cloudinary.com/v1_1/{{ secret('CLOUDINARY_CLOUD_NAME') }}/image/upload"
    method: POST
    headers:
      Content-Type: "application/json"
    body: |
      {
        "file": "{{ outputs.extract_thumbnail.body }}",
        "upload_preset": "{{ secret('CLOUDINARY_UPLOAD_PRESET') }}"
      }

  - id: analyze_thumbnail
    type: io.kestra.plugin.openai.ChatCompletion
    description: Analyze the video thumbnail using GPT-4o vision capabilities
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4o
    messages:
      - role: user
        content: "Describe this image in detail: {{ outputs.upload_thumbnail_to_cloudinary.body.url }}"

  - id: extract_overlay_text
    type: io.kestra.plugin.openai.ChatCompletion
    description: Extract the primary overlay text from the thumbnail description
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4o
    messages:
      - role: user
        content: |
          Identify the primary text located at the top of the image described above:
          {{ outputs.analyze_thumbnail.choices[0].message.content }}

          Return only that specific top text as the output.
          Do not include any quotation marks.
          Focus only on the top section's text in the image and disregard any other content.

  - id: download_audio
    type: io.kestra.plugin.core.http.Request
    description: Download the audio track from the original video
    uri: "{{ outputs.download_video.body.data.music }}"
    method: GET

  - id: transcribe_audio
    type: io.kestra.plugin.openai.ChatCompletion
    description: Transcribe the video audio to text using OpenAI Whisper
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4o
    messages:
      - role: user
        content: "Transcribe the following audio content into a clean text script."

  - id: generate_template_id
    type: io.kestra.plugin.scripts.python.Script
    description: Generate a unique alphanumeric ID for tracking this video in the sheet
    script: |
      import random
      import string
      from kestra import Kestra

      def create_unique_id(length=12):
          characters = string.ascii_letters + string.digits
          return ''.join(random.choice(characters) for _ in range(length))

      Kestra.outputs({"code": create_unique_id()})

  - id: save_original_to_sheets
    type: io.kestra.plugin.core.http.Request
    description: Save the original video metadata to Google Sheets via API
    uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ secret('GOOGLE_SHEET_ID') }}/values/Sheet1!A1:append?valueInputOption=USER_ENTERED"
    method: POST
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_OAUTH_TOKEN') }}"
      Content-Type: "application/json"
    body: |
      {
        "values": [[
          "{{ outputs.generate_template_id.vars.code }}",
          "{{ inputs.video_url }}",
          "{{ outputs.transcribe_audio.choices[0].message.content }}",
          "{{ outputs.extract_overlay_text.choices[0].message.content }}"
        ]]
      }

  - id: suggest_similar_idea
    type: io.kestra.plugin.core.http.Request
    description: Use Perplexity AI to suggest a fresh content idea in the same niche
    uri: "https://api.perplexity.ai/chat/completions"
    method: POST
    headers:
      Authorization: "Bearer {{ secret('PERPLEXITY_API_KEY') }}"
      Content-Type: "application/json"
    body: |
      {
        "model": "sonar-reasoning",
        "messages": [
          {
            "role": "user",
            "content": "Suggest a content idea different from this video script: \"{{ outputs.transcribe_audio.choices[0].message.content }}\". It should be in the same niche and on the exact same topic or content idea but offer fresh value. You must pick one idea from your research that matches the topic idea of the video script exactly but is also different and unique from it so it would stand out on social media. Be as specific as the original video script. Maintain the nature of the topic. Make sure it appeals to a broad audience."
          }
        ]
      }

  - id: clean_perplexity_response
    type: io.kestra.plugin.scripts.python.Script
    description: Strip reasoning tags and whitespace from the Perplexity response
    script: |
      import re
      import json
      from kestra import Kestra

      raw = """{{ outputs.suggest_similar_idea.body.choices[0].message.content }}"""

      # Remove anything between <think> and </think> tags
      cleaned = re.sub(r'<think>(.|\n)*?</think>', '', raw, flags=re.IGNORECASE).strip()
      # Remove leading/trailing blank lines
      cleaned = re.sub(r'^\s+|\s+$', '', cleaned)

      Kestra.outputs({"cleanedResponse": cleaned})

  - id: rewrite_script_caption_overlay
    type: io.kestra.plugin.openai.ChatCompletion
    description: Rewrite the video script, caption, and overlay text using GPT-4o while preserving the original structure
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4o
    messages:
      - role: user
        content: |
          You are rewriting a short video script, caption, and overlay -- not inventing a new one. Follow this format strictly.

          CONTEXT:
          Here is the content idea to use:
          {{ outputs.clean_perplexity_response.vars.cleanedResponse }}

          STEP 1: Rewrite the original video script using the new topic/context above but maintain the original script structure and style:
          Original script: {{ outputs.transcribe_audio.choices[0].message.content }}

          Keep: first person narration, numbered lists, sentence breaks, colloquial tone.
          MUST be under 700 characters. Never change the structure or narration style.
          You MAY change: tool names, use cases, descriptions, niche-specific keywords.
          Never use quotation mark characters in the generated script.

          STEP 2: Rewrite the caption text using the new topic.
          Keep same structure, tone, hashtag usage, and sentence count.

          STEP 3: Rewrite the text overlay (short version for thumbnail or first screen).
          Keep exact same length, format, case, and structure.

          FINAL OUTPUT FORMAT (no markdown formatting):
          Text Overlay: [REWRITTEN TEXT OVERLAY]
          Video Script: [REWRITTEN SCRIPT]
          Caption Text: [REWRITTEN CAPTION TEXT]
          Do not return any explanations. Only return the rewritten sections.

  - id: split_rewritten_content
    type: io.kestra.plugin.scripts.python.Script
    description: Parse the GPT response into separate text overlay, video script, and caption fields
    script: |
      import re
      from kestra import Kestra

      content = """{{ outputs.rewrite_script_caption_overlay.choices[0].message.content }}"""

      # Extract Text Overlay
      overlay_match = re.search(r'Text\s*Overlay:\s*(.+?)(?:\r?\n|\\n)', content, re.DOTALL)
      # Extract Video Script
      script_match = re.search(r'Video\s*Script:\s*(.+?)(?:\r?\n|\\n)Caption\s*Text:', content, re.DOTALL)
      # Extract Caption Text (until end)
      caption_match = re.search(r'Caption\s*Text:\s*(.+)', content, re.DOTALL)

      Kestra.outputs({
          "textOverlay": overlay_match.group(1).strip() if overlay_match else "",
          "videoScript": script_match.group(1).strip() if script_match else "",
          "captionText": caption_match.group(1).strip() if caption_match else ""
      })

  - id: generate_video_id
    type: io.kestra.plugin.scripts.python.Script
    description: Generate a unique ID for the rewritten video entry
    script: |
      import random
      import string
      from kestra import Kestra

      def create_unique_id(length=12):
          characters = string.ascii_letters + string.digits
          return ''.join(random.choice(characters) for _ in range(length))

      Kestra.outputs({"code": create_unique_id()})

  - id: save_rewritten_to_sheets
    type: io.kestra.plugin.core.http.Request
    description: Save the rewritten video data to Google Sheets
    uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ secret('GOOGLE_SHEET_ID') }}/values/Sheet1!A1:append?valueInputOption=USER_ENTERED"
    method: POST
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_OAUTH_TOKEN') }}"
      Content-Type: "application/json"
    body: |
      {
        "values": [[
          "{{ outputs.generate_video_id.vars.code }}",
          "{{ outputs.split_rewritten_content.vars.videoScript }}",
          "{{ outputs.split_rewritten_content.vars.captionText }}",
          "{{ outputs.split_rewritten_content.vars.textOverlay }}"
        ]]
      }

  - id: fetch_available_avatars
    type: io.kestra.plugin.core.http.Request
    description: Retrieve the list of available AI avatars from Captions.ai
    uri: "https://api.captions.ai/api/creator/list"
    method: POST
    headers:
      Authorization: "{{ secret('CAPTIONS_AI_API_KEY') }}"
      Content-Type: "application/json"

  - id: generate_avatar_video
    type: io.kestra.plugin.core.http.Request
    description: Submit the rewritten script to Captions.ai for AI avatar video generation
    uri: "https://api.captions.ai/api/creator/submit"
    method: POST
    headers:
      Authorization: "{{ secret('CAPTIONS_AI_API_KEY') }}"
      Content-Type: "application/json"
    body: |
      {
        "script": "{{ outputs.split_rewritten_content.vars.videoScript }}",
        "creatorName": "{{ outputs.fetch_available_avatars.body.supportedCreators[0] }}",
        "resolution": "fhd"
      }

  - id: wait_for_avatar_rendering
    type: io.kestra.plugin.core.flow.Pause
    description: Wait for Captions.ai to finish rendering the avatar video
    pauseDuration: "PT{{ inputs.avatar_rendering_wait }}S"

  - id: fetch_avatar_video_url
    type: io.kestra.plugin.core.http.Request
    description: Poll Captions.ai for the completed avatar video URL
    uri: "https://api.captions.ai/api/creator/poll"
    method: POST
    headers:
      Authorization: "{{ secret('CAPTIONS_AI_API_KEY') }}"
      Content-Type: "application/json"
    body: |
      {
        "operationId": "{{ outputs.generate_avatar_video.body.operationId }}"
      }

  - id: add_overlay_and_subtitles
    type: io.kestra.plugin.core.http.Request
    description: Add text overlay and subtitles to the avatar video via JSON2Video
    uri: "https://api.json2video.com/v2/movies"
    method: POST
    headers:
      x-api-key: "{{ secret('JSON2VIDEO_API_KEY') }}"
      Content-Type: "application/json"
    body: |
      {
        "resolution": "instagram-story",
        "quality": "high",
        "scenes": [
          {
            "comment": "Scene 1",
            "elements": []
          }
        ],
        "elements": [
          {
            "type": "video",
            "src": "{{ outputs.fetch_avatar_video_url.body.url }}",
            "resize": "cover"
          },
          {
            "type": "text",
            "text": "{{ outputs.split_rewritten_content.vars.textOverlay }}",
            "settings": {
              "font-family": "Arial",
              "font-size": "60px",
              "color": "#000000",
              "background-color": "#FFFFFF",
              "horizontal-position": "center",
              "vertical-position": "top",
              "font-weight": "bold",
              "text-align": "center",
              "width": "80%",
              "line-height": "1.2",
              "margin": "50px 0 0 0",
              "padding": "0 10px 0 10px",
              "border-radius": "15px"
            }
          },
          {
            "type": "subtitles",
            "settings": {
              "style": "classic",
              "position": "bottom",
              "font-family": "Arial",
              "font-size": "100px",
              "word-color": "#ffd700",
              "shadow-color": "#260B1B",
              "line-color": "#F1E7F4",
              "shadow-offset": 0,
              "box-color": "#260B1B",
              "outline-color": "#000000",
              "outline-width": 8
            },
            "language": "en"
          }
        ]
      }

  - id: wait_for_caption_rendering
    type: io.kestra.plugin.core.flow.Pause
    description: Wait for JSON2Video to finish rendering the captioned video
    pauseDuration: "PT{{ inputs.caption_rendering_wait }}S"

  - id: fetch_final_video
    type: io.kestra.plugin.core.http.Request
    description: Retrieve the final captioned video URL from JSON2Video
    uri: "https://api.json2video.com/v2/movies?id={{ outputs.add_overlay_and_subtitles.body.project }}"
    method: GET
    headers:
      x-api-key: "{{ secret('JSON2VIDEO_API_KEY') }}"

  - id: update_sheet_with_final_url
    type: io.kestra.plugin.core.http.Request
    description: Update the Google Sheet with the final rendered video URL
    uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ secret('GOOGLE_SHEET_ID') }}/values/Sheet1!E1:append?valueInputOption=USER_ENTERED"
    method: POST
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_OAUTH_TOKEN') }}"
      Content-Type: "application/json"
    body: |
      {
        "values": [["{{ outputs.fetch_final_video.body.url }}"]]
      }

  - id: send_telegram_preview
    type: io.kestra.plugin.scripts.python.Script
    description: Send the final video URL and a preview via Telegram for review
    script: |
      import requests
      from kestra import Kestra

      bot_token = "{{ secret('TELEGRAM_BOT_TOKEN') }}"
      chat_id = "{{ secret('TELEGRAM_CHAT_ID') }}"
      video_url = "{{ outputs.fetch_final_video.body.url }}"

      # Send the video URL as text
      requests.post(
          f"https://api.telegram.org/bot{bot_token}/sendMessage",
          json={"chat_id": chat_id, "text": f"New video ready: {video_url}"}
      )

      # Send the video file
      requests.post(
          f"https://api.telegram.org/bot{bot_token}/sendVideo",
          json={"chat_id": chat_id, "video": video_url}
      )

      Kestra.outputs({"video_url": video_url})

  - id: upload_to_blotato
    type: io.kestra.plugin.core.http.Request
    description: Upload the final video to Blotato for cross-platform distribution
    uri: "https://backend.blotato.com/v2/media"
    method: POST
    headers:
      blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
      Content-Type: "application/json"
    body: |
      {
        "url": "{{ outputs.send_telegram_preview.vars.video_url }}"
      }

  - id: post_to_platforms
    type: io.kestra.plugin.core.flow.Parallel
    description: Publish the video to all configured social media platforms simultaneously
    tasks:
      - id: post_instagram
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_INSTAGRAM_ID') }}",
              "target": { "targetType": "instagram" },
              "content": {
                "text": "{{ outputs.split_rewritten_content.vars.captionText }}",
                "platform": "instagram",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_youtube
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_YOUTUBE_ID') }}",
              "target": {
                "targetType": "youtube",
                "title": "{{ outputs.split_rewritten_content.vars.textOverlay }}",
                "privacyStatus": "unlisted",
                "shouldNotifySubscribers": "false"
              },
              "content": {
                "text": "{{ outputs.split_rewritten_content.vars.captionText }}",
                "platform": "youtube",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_tiktok
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_TIKTOK_ID') }}",
              "target": {
                "targetType": "tiktok",
                "isYourBrand": "false",
                "disabledDuet": "false",
                "privacyLevel": "PUBLIC_TO_EVERYONE",
                "isAiGenerated": "true",
                "disabledStitch": "false",
                "disabledComments": "false",
                "isBrandedContent": "false"
              },
              "content": {
                "text": "{{ outputs.split_rewritten_content.vars.captionText }}",
                "platform": "tiktok",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_facebook
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_FACEBOOK_ID') }}",
              "target": {
                "targetType": "facebook",
                "pageId": "{{ secret('BLOTATO_FACEBOOK_PAGE_ID') }}"
              },
              "content": {
                "text": "{{ outputs.split_rewritten_content.vars.captionText }}",
                "platform": "facebook",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_linkedin
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_LINKEDIN_ID') }}",
              "target": { "targetType": "linkedin" },
              "content": {
                "text": "{{ outputs.split_rewritten_content.vars.captionText }}",
                "platform": "linkedin",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_threads
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_THREADS_ID') }}",
              "target": { "targetType": "threads" },
              "content": {
                "text": "{{ outputs.split_rewritten_content.vars.captionText }}",
                "platform": "threads",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_twitter
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_TWITTER_ID') }}",
              "target": { "targetType": "twitter" },
              "content": {
                "text": "{{ outputs.split_rewritten_content.vars.captionText }}",
                "platform": "twitter",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_pinterest
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_PINTEREST_ID') }}",
              "target": {
                "targetType": "pinterest",
                "boardId": "{{ secret('BLOTATO_PINTEREST_BOARD_ID') }}"
              },
              "content": {
                "text": "{{ outputs.split_rewritten_content.vars.captionText }}",
                "platform": "pinterest",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_bluesky
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_BLUESKY_ID') }}",
              "target": { "targetType": "bluesky" },
              "content": {
                "text": "{{ outputs.split_rewritten_content.vars.captionText }}",
                "platform": "bluesky",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

extend:
  title: Clone Viral Short Videos with AI Avatars and Multi-Platform Posting
  metaTitle: AI Video Clone with Avatar and Multi-Post
  shortDescription: >-
    Analyze a viral short video, generate a new version with an AI avatar,
    rewrite the script and caption, and auto-post to nine social platforms.
  description: |
    **Transform a viral short-form video link into original content with an AI-generated avatar, rewritten script, and automatic distribution to nine social media platforms.**

    1. A `io.kestra.plugin.core.http.Request` task downloads the original video via RapidAPI and extracts the thumbnail, audio, and metadata
    2. A `io.kestra.plugin.openai.ChatCompletion` task with GPT-4o analyzes the video thumbnail and extracts overlay text
    3. A `io.kestra.plugin.openai.ChatCompletion` task transcribes the audio to a text script
    4. A `io.kestra.plugin.core.http.Request` task sends the script to Perplexity AI to suggest a fresh content idea in the same niche
    5. A `io.kestra.plugin.scripts.python.Script` task cleans the Perplexity response by stripping reasoning tags
    6. A `io.kestra.plugin.openai.ChatCompletion` task rewrites the video script, caption, and text overlay using the new topic while preserving the original structure
    7. A `io.kestra.plugin.scripts.python.Script` task splits the rewritten content into separate overlay, script, and caption fields
    8. A `io.kestra.plugin.core.http.Request` task generates a new video with an AI avatar via Captions.ai
    9. A `io.kestra.plugin.core.http.Request` task adds subtitles and overlay text via JSON2Video
    10. A `io.kestra.plugin.telegram.TelegramSend` task sends the final video for preview
    11. Nine parallel `io.kestra.plugin.core.http.Request` tasks publish to Instagram, YouTube, TikTok, Facebook, LinkedIn, Threads, X, Pinterest, and Bluesky via Blotato

    Ideal for:
    - **Content creators** who repurpose trending formats with their own branding and AI avatar at scale
    - **Social media managers** who need to produce and distribute short-form video across every major platform daily
    - **Marketing teams** testing viral content patterns with AI-generated variations
  tags:
    - AI
    - Business
  ee: false
  demo: false
  metaDescription: >-
    Clone viral short video formats with AI avatars, rewrite scripts with GPT
    and Perplexity, and auto-post to nine platforms via Blotato and Captions.ai.

