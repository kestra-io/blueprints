id: nutanix-vmware-ahv-migration
namespace: company.team
description: |
  Coordinate a wave of VMware-to-Nutanix AHV migrations. Pull the planned wave
  from your migration tool, pause for a go/no-go approval, then power on each
  migrated VM on AHV in a controlled batch.

inputs:
  - id: vm_ext_ids
    type: ARRAY
    itemType: STRING
    description: AHV VM extIds in this migration wave, to be powered on after cutover.
  - id: plan_url
    type: STRING
    defaults: https://migration-tool.example.com/api/waves/current
    description: API that returns the planned migration wave for review.
  - id: approval_timeout
    type: DURATION
    defaults: PT4H
    description: How long to wait for the go/no-go approval.

tasks:
  - id: fetch_wave_plan
    type: io.kestra.plugin.core.http.Request
    description: Fetch the planned migration wave for review.
    uri: "{{ inputs.plan_url }}"
    method: GET

  - id: approve_cutover
    type: io.kestra.plugin.core.flow.Pause
    description: Wait for a go/no-go decision before powering on the wave on AHV.
    pauseDuration: "{{ inputs.approval_timeout }}"

  - id: power_on_wave
    type: io.kestra.plugin.core.flow.ForEach
    description: Power on each migrated VM on AHV, one at a time.
    values: "{{ inputs.vm_ext_ids }}"
    concurrencyLimit: 1
    tasks:
      - id: start_vm
        type: io.kestra.plugin.ee.nutanix.ahv.StartVm
        description: Power on one migrated VM on Nutanix AHV.
        vmExtId: "{{ taskrun.value }}"

pluginDefaults:
  - type: io.kestra.plugin.ee.nutanix.ahv.StartVm
    values:
      host: "{{ secret('NUTANIX_HOST') }}"
      token: "{{ secret('NUTANIX_TOKEN') }}"

extend:
  shortDescription: Fetch a migration wave, pause for go/no-go, then power on each migrated VM on Nutanix AHV.
  title: Wave-Based VMware-to-AHV Migration Cutover
  metaTitle: Wave-Based VMware-to-AHV Migration Cutover
  description: |
    This blueprint orchestrates the cutover step of a VMware-to-Nutanix AHV
    migration. It fetches the planned wave from your migration tooling, pauses for
    a human go/no-go decision, then powers on each migrated VM on AHV one at a
    time so a wave comes up in a controlled, observable order.

    Prerequisites:
      - Secrets:
        - NUTANIX_HOST: Prism Central host or IP.
        - NUTANIX_TOKEN: Prism Central bearer token.
      - The AHV VM extIds for the wave (post-migration) and a migration plan endpoint.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Point plan_url at your migration tool's wave endpoint.
      3. Run with the vm_ext_ids for the wave and approve the Pause to begin power-on.

    Outputs:
      - outputs.fetch_wave_plan.body: the migration wave plan.
      - outputs.power_on_wave: per-VM power-on task results.

    Notes:
      - Power-on runs with concurrencyLimit 1 for a controlled, observable cutover.
      - This handles the AHV power-on step; run your replication/cutover tool before this flow.
  tags:
    - Infrastructure
  ee: true
  demo: false
  metaDescription: Fetch a migration wave, pause for go/no-go, then power on each migrated VM on Nutanix AHV one at a time.
