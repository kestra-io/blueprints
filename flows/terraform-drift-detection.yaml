id: terraform-drift-detection
namespace: company.team
description: |
  Detect infrastructure drift on a schedule. Run terraform plan with a detailed
  exit code; when the plan reports changes, alert Slack so the team can
  reconcile before drift causes an incident.

tasks:
  - id: plan
    type: io.kestra.plugin.terraform.cli.TerraformCLI
    description: Run a read-only plan and capture whether the state has drifted.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: hashicorp/terraform:latest
    allowFailure: true
    env:
      AWS_ACCESS_KEY_ID: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      AWS_SECRET_ACCESS_KEY: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
    inputFiles:
      main.tf: |
        # Replace with your real configuration and backend.
        terraform {
          required_providers {
            random = { source = "hashicorp/random" }
          }
        }
        resource "random_pet" "example" {}
    beforeCommands:
      - terraform init
    commands:
      - terraform plan -detailed-exitcode -no-color

  - id: alert_on_drift
    type: io.kestra.plugin.core.flow.If
    description: When plan exits with code 2, infrastructure has drifted.
    condition: "{{ outputs.plan.exitCode == 2 }}"
    then:
      - id: notify_drift
        type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
        description: Alert Slack that drift was detected.
        url: "{{ secret('SLACK_WEBHOOK_URL') }}"
        payload: |
          {
            "text": "Terraform drift detected. Review the plan and reconcile."
          }

triggers:
  - id: hourly_drift_check
    type: io.kestra.plugin.core.trigger.Schedule
    description: Check for drift hourly. Adjust or disable as needed.
    cron: "0 * * * *"
    disabled: true

extend:
  shortDescription: Run terraform plan on a schedule and alert Slack when the detailed exit code reports drift.
  title: Terraform Drift Detection with Slack Alerts
  metaTitle: Terraform Drift Detection with Slack Alerts
  description: |
    This blueprint catches infrastructure drift before it bites. On a schedule it
    runs terraform plan with -detailed-exitcode; a return code of 2 means the real
    infrastructure no longer matches the configuration, and the flow alerts Slack
    so the team can reconcile.

    Prerequisites:
      - Secrets:
        - AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY: provider credentials for the plan.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - Terraform configuration with a remote backend so plan sees real state.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Replace the stub main.tf with your configuration and backend.
      3. Enable the schedule to run drift checks automatically.

    Outputs:
      - outputs.plan.exitCode: 0 (no changes), 2 (drift), or non-zero error.

    Notes:
      - allowFailure lets exit code 2 flow into the If instead of failing the task.
      - Swap the provider env vars for the credentials your configuration needs.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Run terraform plan on a schedule and alert Slack when the detailed exit code reports infrastructure drift.
