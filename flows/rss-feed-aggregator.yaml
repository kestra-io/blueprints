id: rss-feed-aggregator
namespace: company.team

inputs:
  - id: feed_urls
    type: ARRAY
    itemType: STRING
    displayName: RSS Feed URLs
    description: List of RSS feed URLs to fetch and aggregate
    defaults:
      - "https://blog.kestra.io/rss.xml"
      - "https://dev.to/feed/kestra"

tasks:
  - id: fetch_feeds
    type: io.kestra.plugin.core.flow.ForEach
    description: Iterate over each RSS feed URL and fetch its content
    values: "{{ inputs.feed_urls }}"
    tasks:
      - id: fetch_rss
        type: io.kestra.plugin.core.http.Request
        uri: "{{ taskrun.value }}"
        method: GET
        headers:
          Accept: "application/rss+xml, application/xml, text/xml"

  - id: parse_and_merge
    type: io.kestra.plugin.scripts.python.Script
    description: Parse all fetched RSS feeds and merge articles into a single sorted list
    inputFiles:
      feeds_raw.json: "{{ outputs.fetch_feeds | json }}"
    dependencies:
      - feedparser
    script: |
      import json
      import feedparser
      from kestra import Kestra

      with open("feeds_raw.json") as f:
          raw = json.load(f)

      articles = []
      for feed_url, feed_data in raw.items():
          body = feed_data.get("body", "")
          parsed = feedparser.parse(body)
          for entry in parsed.entries:
              articles.append({
                  "title": entry.get("title", ""),
                  "link": entry.get("link", ""),
                  "summary": entry.get("summary", "")[:500],
                  "published": str(entry.get("published", "")),
                  "source": parsed.feed.get("title", feed_url)
              })

      Kestra.outputs({"articles": articles, "count": len(articles)})

  - id: log_results
    type: io.kestra.plugin.core.log.Log
    description: Log the count of aggregated articles
    message: "Aggregated {{ outputs.parse_and_merge.vars.count }} articles from {{ inputs.feed_urls | length }} feeds."

extend:
  title: Aggregate RSS Feeds from Multiple Sources
  metaTitle: Multi-Source RSS Feed Aggregator
  shortDescription: >-
    Fetch and merge articles from multiple RSS feeds in a single flow.
    Define feed URLs as inputs and iterate over each to collect all entries.
  description: |
    **Collect and aggregate articles from multiple RSS feeds into a single unified output using a ForEach loop and the RSS Read plugin.**

    1. A `io.kestra.plugin.scripts.python.Script` task defines the list of RSS feed URLs to fetch
    2. A `io.kestra.plugin.core.flow.ForEach` task iterates over each feed URL and fetches the RSS content via HTTP
    3. A `io.kestra.plugin.scripts.python.Script` task parses the raw XML responses with feedparser and merges all articles into a sorted, deduplicated list

    Ideal for:
    - **Content curators** who aggregate news from multiple blogs and publications into a single feed
    - **Developers** learning how to iterate over dynamic lists in Kestra using ForEach
    - **Marketing teams** monitoring competitor blogs, industry news, and community channels in one place
  tags:
    - Data
    - Getting Started
  ee: false
  demo: true
  metaDescription: >-
    Aggregate articles from multiple RSS feeds into one output.
    Uses ForEach iteration and Python feedparser to collect and merge entries.

