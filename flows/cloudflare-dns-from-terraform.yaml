id: cloudflare-dns-from-terraform
namespace: company.team
description: |
  Keep Cloudflare DNS in sync with Terraform-provisioned infrastructure. Run
  Terraform, read the public IP it outputs, upsert the matching DNS record in
  Cloudflare, purge the cache, and confirm on Slack.

inputs:
  - id: zone_id
    type: STRING
    description: Cloudflare zone ID that owns the DNS record.
  - id: record_name
    type: STRING
    defaults: app.example.com
    description: Fully qualified DNS record name to keep in sync.

tasks:
  - id: provision
    type: io.kestra.plugin.terraform.cli.TerraformCLI
    description: Apply Terraform and export the provisioned IP to a file.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: hashicorp/terraform:latest
    inputFiles:
      main.tf: |
        terraform {
          required_providers {
            random = { source = "hashicorp/random" }
          }
        }
        # Replace with your real infrastructure. This stub emits an IP-shaped output.
        resource "random_pet" "placeholder" {}
        output "instance_ip" {
          value = "203.0.113.10"
        }
    outputFiles:
      - ip.txt
    beforeCommands:
      - terraform init
    commands:
      - terraform apply -auto-approve
      - terraform output -raw instance_ip > ip.txt

  - id: upsert_dns
    type: io.kestra.plugin.cloudflare.dns.records.Upsert
    description: Create or update the A record with the provisioned IP.
    zoneId: "{{ inputs.zone_id }}"
    recordType: A
    name: "{{ inputs.record_name }}"
    content: "{{ read(outputs.provision.outputFiles['ip.txt']) | trim }}"
    proxied: true

  - id: purge_cache
    type: io.kestra.plugin.cloudflare.cache.Purge
    description: Purge the record's cached responses so clients see the new origin.
    zoneId: "{{ inputs.zone_id }}"
    files:
      - "https://{{ inputs.record_name }}/"

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Post the DNS change to Slack.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Cloudflare DNS {{ inputs.record_name }} now points to {{ outputs.upsert_dns.content }} ({{ outputs.upsert_dns.action }})."
      }

pluginDefaults:
  - type: io.kestra.plugin.cloudflare.dns.records.Upsert
    values:
      apiToken: "{{ secret('CLOUDFLARE_API_TOKEN') }}"
  - type: io.kestra.plugin.cloudflare.cache.Purge
    values:
      apiToken: "{{ secret('CLOUDFLARE_API_TOKEN') }}"

triggers:
  - id: nightly_sync
    type: io.kestra.plugin.core.trigger.Schedule
    description: Reconcile DNS with infrastructure nightly. Adjust or disable as needed.
    cron: "0 1 * * *"
    disabled: true

extend:
  shortDescription: Apply Terraform, then upsert the resulting IP into Cloudflare DNS and purge the cache.
  title: Sync Cloudflare DNS from Terraform Output
  metaTitle: Sync Cloudflare DNS from Terraform Output
  description: |
    This blueprint closes the loop between infrastructure provisioning and DNS.
    Terraform runs and writes the provisioned IP to a file, the flow upserts the
    matching Cloudflare A record so it always points at the current origin, purges
    the cached responses for that hostname, and reports the change to Slack.

    Prerequisites:
      - Secrets:
        - CLOUDFLARE_API_TOKEN: Cloudflare token with DNS edit and cache purge permissions.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - Terraform configuration that exposes the target IP as an output named instance_ip.

    Quick start:
      1. Set the two secrets above in your Kestra namespace.
      2. Replace the stub main.tf with your real Terraform and keep an instance_ip output.
      3. Run the flow with your zone_id and record_name.

    Outputs:
      - outputs.provision.outputFiles: Terraform run artifacts, including ip.txt.
      - outputs.upsert_dns: the created or updated record (recordId, content, action).
      - outputs.purge_cache.requestId: Cloudflare purge request identifier.

    Notes:
      - The A record is proxied; set proxied to false for a DNS-only record.
      - Replace the stub Terraform output with your real instance_ip source.
  tags:
    - Cloud
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Run Terraform, upsert the provisioned IP into a Cloudflare DNS record, purge the cache, and notify Slack.
