id: jenkins-event-driven-job
namespace: company.team
description: |
  Trigger a Jenkins job from a Kestra webhook (or any other Kestra trigger),
  poll the Jenkins API every 15 seconds until the build reaches a terminal
  state, then notify Slack with the outcome.

inputs:
  - id: job_name
    type: STRING
    description: Jenkins job path (use forward slashes for foldered jobs).
  - id: jenkins_url
    type: STRING
    defaults: https://jenkins.example.com
    description: Base URL of the Jenkins instance.

triggers:
  - id: on_event
    type: io.kestra.plugin.core.trigger.Webhook
    description: Any HTTP source posts here to fire the Jenkins job.
    key: "{{ secret('JENKINS_TRIGGER_KEY') }}"

tasks:
  - id: enqueue_build
    type: io.kestra.plugin.jenkins.JobBuild
    description: Enqueue the Jenkins job with parameters from the trigger body.
    serverUrl: "{{ inputs.jenkins_url }}"
    jobName: "{{ inputs.job_name }}"
    username: "{{ secret('JENKINS_USERNAME') }}"
    apiToken: "{{ secret('JENKINS_API_TOKEN') }}"
    parameters:
      branch: "{{ trigger.body.branch ?? 'main' }}"
      triggered_by: kestra

  - id: wait_for_completion
    type: io.kestra.plugin.core.flow.Sequential
    description: Poll Jenkins every 15 seconds until the build reaches a terminal result.
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 80
    tasks:
      - id: poll_status
        type: io.kestra.plugin.jenkins.JobInfo
        serverUrl: "{{ inputs.jenkins_url }}"
        jobName: "{{ inputs.job_name }}"
        username: "{{ secret('JENKINS_USERNAME') }}"
        apiToken: "{{ secret('JENKINS_API_TOKEN') }}"
      - id: assert_terminal
        type: io.kestra.plugin.core.execution.Assert
        description: Re-runs the polling block until the Jenkins build result is set.
        conditions:
          - "{{ (outputs.poll_status.result ?? '') != '' }}"

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Confirm the build outcome to the team channel.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Jenkins job {{ inputs.job_name }} complete (execution {{ execution.id }})."
      }

errors:
  - id: alert_on_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Alert Slack if any step in the flow fails.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Jenkins flow failed for {{ inputs.job_name }} (execution {{ execution.id }})."
      }

extend:
  shortDescription: Trigger a Jenkins job from a webhook, poll until terminal status, then post the outcome to Slack.
  title: Event-Driven Jenkins Job with Slack Status Notification
  metaTitle: Event-Driven Jenkins Job with Slack Notification
  description: |
    This blueprint fires a Jenkins job from a webhook event (or any other
    Kestra trigger). Build parameters come from the trigger body, Kestra
    polls Jenkins every 15 seconds until the build reaches a terminal
    state, and a Slack notification reports the outcome. The errors handler
    pages Slack on any flow failure.

    Prerequisites:
      - Secrets:
        - JENKINS_USERNAME: Jenkins user for Basic Auth.
        - JENKINS_API_TOKEN: Jenkins API token.
        - JENKINS_TRIGGER_KEY: key guarding the Kestra webhook trigger.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - A reachable Jenkins instance and a job path (forward slashes for foldered jobs).

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. POST to the webhook URL with build parameters in the body.
      3. Watch Slack for the outcome notification.

    Outputs:
      - outputs.enqueue_build.status: HTTP status returned by Jenkins on enqueue.
      - outputs.wait_for_completion: results of the polling block, including the final JobInfo payload.

    Notes:
      - Polling uses a constant 15s interval and up to 80 attempts (20-minute ceiling). Tighten or widen the retry block as needed.
      - The Assert task re-runs the polling block until the Jenkins build result field is set; an empty result keeps the loop running.
      - Add an If task after wait_for_completion to branch on the build result (SUCCESS, FAILURE, UNSTABLE, ABORTED).
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Trigger a Jenkins job from a Kestra webhook, poll until terminal status, and post the build outcome to Slack.
