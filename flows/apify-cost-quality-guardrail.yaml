id: apify-cost-quality-guardrail
namespace: company.team

inputs:
  - id: actor_id
    type: STRING
    displayName: Apify actor ID
    description: Actor ID or owner~actor name to run under guardrails.
    defaults: apify/website-content-crawler
  - id: start_url
    type: STRING
    displayName: URL to scrape
    defaults: https://news.ycombinator.com
  - id: min_items
    type: INT
    displayName: Minimum healthy item count
    description: If the actor returns fewer items than this, the scrape is treated as degraded.
    defaults: 10

tasks:
  - id: run_actor
    type: io.kestra.plugin.apify.actor.Run
    actorId: "{{ inputs.actor_id }}"
    apiToken: "{{ secret('APIFY_API_TOKEN') }}"
    maxItems: 1000
    maxTotalChargeUsd: 10
    memory: MB_1024
    requestTimeout: 600
    input:
      startUrls:
        - url: "{{ inputs.start_url }}"
      maxCrawlPages: 100

  - id: get_dataset
    type: io.kestra.plugin.apify.dataset.Get
    apiToken: "{{ secret('APIFY_API_TOKEN') }}"
    datasetId: "{{ outputs.run_actor.defaultDatasetId }}"

  - id: quality_gate
    type: io.kestra.plugin.core.flow.If
    condition: "{{ (outputs.get_dataset.dataset | length) >= inputs.min_items }}"
    then:
      - id: promote
        type: io.kestra.plugin.core.storage.Write
        content: "{{ outputs.get_dataset.dataset | json }}"
        extension: .json
      - id: log_healthy
        type: io.kestra.plugin.core.log.Log
        message: "Scrape healthy: {{ outputs.get_dataset.dataset | length }} items at cost ${{ outputs.run_actor.usageTotalUsd }}. Dataset promoted for downstream processing."
    else:
      - id: alert_degraded
        type: io.kestra.plugin.pagerduty.PagerDutyAlert
        url: https://events.pagerduty.com/v2/enqueue
        payload: |
          {
            "routing_key": "{{ secret('PAGERDUTY_ROUTING_KEY') }}",
            "event_action": "trigger",
            "payload": {
              "summary": "Apify scrape degraded: actor {{ inputs.actor_id }} returned {{ outputs.get_dataset.dataset | length }} items, below the {{ inputs.min_items }} threshold. The target site DOM may have changed or the actor was blocked.",
              "source": "kestra-apify-guardrail",
              "severity": "warning"
            }
          }

triggers:
  - id: every_six_hours
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 */6 * * *"

extend:
  title: Guard Apify scrapes with cost caps and an automated quality gate
  metaTitle: Apify cost and quality guardrail with Kestra
  shortDescription: "Run an Apify actor under hard cost and run caps, then branch on the returned item count so a degraded scrape pages the on-call instead of silently shipping bad data."
  description: |
    Scrapers fail in two expensive ways: a runaway crawl that burns budget, and a silent degradation when a target site changes its DOM and the actor returns empty or half-null data. This flow guards against both, with no human in the loop.

    It demonstrates how to:

    1. Run any Apify actor with `io.kestra.plugin.apify.actor.Run` under hard `maxItems`, `maxTotalChargeUsd`, `memory`, and `requestTimeout` run caps, so cost is bounded at the source.
    2. Fetch the result with `io.kestra.plugin.apify.dataset.Get` and read the actor's reported `usageTotalUsd`.
    3. Branch with an automated `io.kestra.plugin.core.flow.If` on the returned item count. On a healthy count the dataset is promoted to internal storage for downstream processing; below the threshold the scrape is treated as degraded.
    4. Page the on-call through `io.kestra.plugin.pagerduty.PagerDutyAlert` when the scrape degrades, so a broken selector never ships bad data into a warehouse or a CRM.

    The gate is fully automated: no human approval Pause, just a deterministic check that halts bad data before it spreads. Tune `min_items` per actor, and add a null-ratio check to the condition for stricter quality control.
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Run Apify actors under cost caps and an automated quality gate with Kestra. Promote healthy scrapes and page the on-call when a scrape degrades, with no human gate.
