id: google-maps-email-scraper
namespace: company.team

inputs:
  - id: queries
    type: ARRAY
    itemType: STRING
    displayName: Search queries
    description: >-
      List of Google Maps search queries, each combining business type and location
      (e.g., "dentists in Brooklyn NY")
    defaults:
      - "plumbers in Austin TX"
      - "electricians in Denver CO"
  - id: wait_seconds
    type: INT
    displayName: Wait between queries (seconds)
    description: Pause between queries to avoid rate limiting
    defaults: 5

tasks:
  - id: process_queries
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ inputs.queries }}"
    tasks:
      - id: search_google_maps
        type: io.kestra.plugin.core.http.Request
        uri: "https://www.google.com/maps/search/{{ taskrun.value }}"
        method: GET
        headers:
          User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

      - id: scrape_urls_from_results
        type: io.kestra.plugin.scripts.python.Script
        script: |
          import re
          import json
          from kestra import Kestra

          html_content = '{{ outputs.search_google_maps.body }}'

          # Extract unique base URLs from the maps results page
          url_pattern = re.compile(r'https?://[^/\s"<>]+')
          all_urls = url_pattern.findall(html_content)

          # Filter to keep only likely business website URLs
          excluded_domains = [
              'google.com', 'googleapis.com', 'gstatic.com',
              'youtube.com', 'schema.org', 'w3.org', 'ggpht.com'
          ]
          filtered_urls = []
          seen = set()
          for url in all_urls:
              domain = url.split('/')[2] if len(url.split('/')) > 2 else ''
              if domain and domain not in seen and not any(ex in domain for ex in excluded_domains):
                  seen.add(domain)
                  filtered_urls.append(url)

          Kestra.outputs({"urls": filtered_urls})

      - id: fetch_business_pages
        type: io.kestra.plugin.core.flow.ForEach
        values: "{{ outputs.scrape_urls_from_results.vars.urls }}"
        tasks:
          - id: fetch_page
            type: io.kestra.plugin.core.http.Request
            uri: "{{ taskrun.value }}"
            method: GET
            options:
              allowFailed: true
            headers:
              User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

      - id: scrape_emails_from_pages
        type: io.kestra.plugin.scripts.python.Script
        inputFiles:
          pages.json: "{{ outputs.fetch_business_pages | json }}"
        script: |
          import re
          import json
          from kestra import Kestra

          with open("pages.json") as f:
              pages_data = json.load(f)

          email_pattern = re.compile(
              r'[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.(?!png|jpg|gif|jpeg|svg|css|js)[a-zA-Z]{2,}'
          )

          all_emails = set()
          for page_key, page_output in pages_data.items():
              body = page_output.get("body", "")
              if isinstance(body, str):
                  found = email_pattern.findall(body)
                  all_emails.update(found)

          Kestra.outputs({"emails": sorted(list(all_emails))})

      - id: pause_between_queries
        type: io.kestra.plugin.core.flow.Pause
        pauseDuration: "PT{{ inputs.wait_seconds }}S"

  - id: collect_all_emails
    type: io.kestra.plugin.scripts.python.Script
    inputFiles:
      query_results.json: "{{ outputs.process_queries | json }}"
    script: |
      import json
      from kestra import Kestra

      with open("query_results.json") as f:
          results = json.load(f)

      all_emails = set()
      for query_key, query_output in results.items():
          emails = query_output.get("vars", {}).get("emails", [])
          if isinstance(emails, list):
              all_emails.update(emails)

      email_list = sorted(list(all_emails))
      Kestra.outputs({
          "total_emails": len(email_list),
          "emails": email_list
      })

extend:
  title: Scrape Business Emails from Google Maps Results
  metaTitle: Google Maps Email Scraper
  shortDescription: >-
    Automatically extract business email addresses from Google Maps search results
    and save them to a spreadsheet for outreach campaigns.
  description: |
    **Collect business contact emails from Google Maps listings using automated web scraping and regex extraction.**

    1. A `io.kestra.plugin.core.flow.ForEach` task iterates over your list of search queries (e.g., "plumbers in Austin TX")
    2. An `io.kestra.plugin.core.http.Request` task fetches the Google Maps search results page for each query
    3. A `io.kestra.plugin.scripts.python.Script` task extracts business listing URLs from the results using regex
    4. A second `io.kestra.plugin.core.http.Request` task fetches the HTML of each business page
    5. Another `io.kestra.plugin.scripts.python.Script` task scrapes email addresses from the page content
    6. Duplicate URLs and emails are removed, and the results are saved to a Google Sheet

    Ideal for:
    - **Sales teams** building targeted lead lists from local business directories
    - **Marketing agencies** gathering prospect contact data for outreach campaigns
    - **Freelancers** who need cost-effective lead generation without paid APIs
  tags:
    - Business
    - Data
  ee: false
  demo: false
  metaDescription: >-
    Scrape business emails from Google Maps search results using automated web requests
    and Python regex extraction, then save leads to a spreadsheet.

