id: argocd-single-tenant-wave-rollout
namespace: company.team
description: |
  Roll out Argo CD Application updates across a large single-tenant fleet using
  controlled waves and Status-based gates.

inputs:
  - id: tenant_id
    type: STRING
    defaults: tenant-a
    description: Tenant identifier used for logs and rollout traceability.

  - id: application_waves
    type: JSON
    description: |
      Ordered list of deployment waves. Each wave is a list of Argo CD
      Application names.
    defaults: |
      [
        ["tenant-a-account", "tenant-a-billing", "tenant-a-auth"],
        ["tenant-a-orders", "tenant-a-payments", "tenant-a-inventory"],
        ["tenant-a-api-gateway", "tenant-a-web"]
      ]

  - id: max_parallel_per_wave
    type: INT
    defaults: 5
    description: Maximum number of applications deployed in parallel per wave.

  - id: target_revision
    type: STRING
    defaults: HEAD
    description: Git revision used by manual sync operations.

  - id: prune
    type: BOOL
    defaults: true
    description: Whether manual sync should prune out-of-band resources.

  - id: sync_when_auto_sync_enabled
    type: BOOL
    defaults: false
    description: |
      If true, run a manual sync even when Argo CD auto-sync is enabled.
      If false, rely on Argo CD reconciliation and only gate on Status.

  - id: auto_sync_disabled_strategy
    type: STRING
    defaults: manual_approval
    description: |
      Strategy when auto-sync is disabled:
      - force_sync: sync immediately
      - manual_approval: pause execution, then sync after resume
      - fail_rollout: fail immediately
      - skip_application: don't sync that app, continue with next one

  - id: manual_approval_timeout
    type: STRING
    defaults: PT2H
    description: Maximum pause duration when manual approval is required.

  - id: readiness_poll_interval
    type: STRING
    defaults: PT20S
    description: Delay between readiness checks.

  - id: readiness_max_attempts
    type: INT
    defaults: 90
    description: Max readiness check attempts before failing the application.

  - id: allow_degraded_health
    type: BOOL
    defaults: false
    description: |
      If true, `Degraded` can be accepted as healthy for readiness.
      Keep false for strict production gates.

tasks:
  - id: rollout_start
    type: io.kestra.plugin.core.log.Log
    message: |
      Starting Argo CD rollout for tenant={{ inputs.tenant_id }}.
      Waves={{ inputs.application_waves }},
      max_parallel_per_wave={{ inputs.max_parallel_per_wave }},
      auto_sync_disabled_strategy={{ inputs.auto_sync_disabled_strategy }},
      sync_when_auto_sync_enabled={{ inputs.sync_when_auto_sync_enabled }}.

  # Waves are processed sequentially to enforce blast-radius control.
  - id: rollout_by_wave
    type: io.kestra.plugin.core.flow.ForEach
    concurrencyLimit: 1
    values: "{{ inputs.application_waves }}"
    tasks:
      - id: wave_start
        type: io.kestra.plugin.core.log.Log
        message: "Starting deployment wave: {{ taskrun.value }}"

      # Applications in the same wave are deployed in parallel with a cap.
      - id: rollout_applications_in_wave
        type: io.kestra.plugin.core.flow.ForEach
        concurrencyLimit: 5
        values: "{{ parent.taskrun.value }}"
        tasks:
          - id: status_before
            type: io.kestra.plugin.argocd.apps.Status
            description: Fetch baseline Argo CD status before any action.
            application: "{{ taskrun.value }}"

          - id: log_status_before
            type: io.kestra.plugin.core.log.Log
            message: |
              [PRE] app={{ taskrun.value }}
              sync={{ outputs.status_before.app.status.sync.status }}
              health={{ outputs.status_before.app.status.health.status }}
              operation={{ outputs.status_before.app.status.operationState.phase | default('N/A') }}
              auto_sync_enabled={{ outputs.status_before.app.spec.syncPolicy.automated != null }}

          # Branch explicitly when auto-sync is disabled on the application.
          - id: handle_auto_sync_disabled
            type: io.kestra.plugin.core.flow.If
            condition: "{{ outputs.status_before.app.spec.syncPolicy.automated == null }}"
            then:
              - id: auto_sync_disabled_strategy_switch
                type: io.kestra.plugin.core.flow.Switch
                value: "{{ inputs.auto_sync_disabled_strategy }}"
                cases:
                  force_sync:
                    - id: log_force_sync
                      type: io.kestra.plugin.core.log.Log
                      message: "[ACTION] auto-sync disabled for {{ taskrun.value }} -> force_sync"

                    - id: sync_force_sync
                      type: io.kestra.plugin.argocd.apps.Sync
                      application: "{{ taskrun.value }}"
                      revision: "{{ inputs.target_revision }}"
                      prune: "{{ inputs.prune }}"

                  manual_approval:
                    - id: log_manual_approval
                      type: io.kestra.plugin.core.log.Log
                      message: |
                        [ACTION] auto-sync disabled for {{ taskrun.value }} -> manual_approval.
                        Resume execution to approve sync for this app.

                    - id: wait_for_manual_approval
                      type: io.kestra.plugin.core.flow.Pause
                      pauseDuration: "{{ inputs.manual_approval_timeout }}"

                    - id: sync_after_manual_approval
                      type: io.kestra.plugin.argocd.apps.Sync
                      application: "{{ taskrun.value }}"
                      revision: "{{ inputs.target_revision }}"
                      prune: "{{ inputs.prune }}"

                  fail_rollout:
                    - id: fail_on_auto_sync_disabled
                      type: io.kestra.plugin.core.execution.Fail
                      errorMessage: |
                        auto-sync is disabled for {{ taskrun.value }} and strategy=fail_rollout.
                        Stopping rollout to avoid unsafe reconciliation.

                defaults:
                  - id: skip_application
                    type: io.kestra.plugin.core.log.Log
                    message: |
                      [ACTION] auto-sync disabled for {{ taskrun.value }} and strategy
                      '{{ inputs.auto_sync_disabled_strategy }}' -> skip_application.
            else:
              - id: handle_auto_sync_enabled
                type: io.kestra.plugin.core.flow.If
                condition: "{{ inputs.sync_when_auto_sync_enabled }}"
                then:
                  - id: log_sync_when_enabled
                    type: io.kestra.plugin.core.log.Log
                    message: "[ACTION] auto-sync enabled for {{ taskrun.value }} -> manual sync requested"

                  - id: sync_when_enabled
                    type: io.kestra.plugin.argocd.apps.Sync
                    application: "{{ taskrun.value }}"
                    revision: "{{ inputs.target_revision }}"
                    prune: "{{ inputs.prune }}"
                else:
                  - id: log_no_manual_sync_when_enabled
                    type: io.kestra.plugin.core.log.Log
                    message: |
                      [ACTION] auto-sync enabled for {{ taskrun.value }} -> no manual sync.
                      Waiting for desired state through Status checks.

          # Poll Argo CD Status and fail-fast if the app does not converge.
          - id: wait_until_synced_and_healthy
            type: io.kestra.plugin.core.flow.Sequential
            runIf: "{{ not (outputs.status_before.app.spec.syncPolicy.automated == null and inputs.auto_sync_disabled_strategy == 'skip_application') }}"
            retry:
              type: constant
              interval: PT20S
              maxAttempt: 90
              warningOnRetry: false
            tasks:
              - id: readiness_status
                type: io.kestra.plugin.argocd.apps.Status
                application: "{{ taskrun.value }}"

              - id: log_readiness_probe
                type: io.kestra.plugin.core.log.Log
                message: |
                  [PROBE] app={{ taskrun.value }}
                  sync={{ outputs.readiness_status.app.status.sync.status }}
                  health={{ outputs.readiness_status.app.status.health.status }}
                  operation={{ outputs.readiness_status.app.status.operationState.phase ?? 'N/A' }}
                  sync_message={{ outputs.readiness_status.app.status.sync.comparedTo.source.targetRevision ?? 'N/A' }}

              - id: assert_app_ready
                type: io.kestra.plugin.core.execution.Assert
                conditions:
                  - "{{ outputs.readiness_status.app.status.sync.status == 'Synced' }}"
                  - "{{ outputs.readiness_status.app.status.health.status == 'Healthy' or (inputs.allow_degraded_health and outputs.readiness_status.app.status.health.status == 'Degraded') }}"

          - id: status_after
            type: io.kestra.plugin.argocd.apps.Status
            description: Capture final status after rollout logic for this app.
            application: "{{ taskrun.value }}"

          - id: log_status_after
            type: io.kestra.plugin.core.log.Log
            message: |
              [POST] app={{ taskrun.value }}
              sync={{ outputs.status_after.app.status.sync.status }}
              health={{ outputs.status_after.app.status.health.status }}
              operation={{ outputs.status_after.app.status.operationState.phase ?? 'N/A' }}
              revision={{ outputs.status_after.app.status.sync.revision ?? 'N/A' }}

          # Emit a concise machine-readable summary for downstream reporting.
          - id: emit_app_summary
            type: io.kestra.plugin.core.debug.Return
            format: |
              {
                "tenant": "{{ inputs.tenant_id }}",
                "application": "{{ taskrun.value }}",
                "sync": "{{ outputs.status_after.app.status.sync.status }}",
                "health": "{{ outputs.status_after.app.status.health.status }}",
                "operation": "{{ outputs.status_after.app.status.operationState.phase ?? 'N/A' }}",
                "autoSyncEnabled": {{ outputs.status_after.app.spec.syncPolicy.automated != null }}
              }

      - id: wave_done
        type: io.kestra.plugin.core.log.Log
        message: "Completed deployment wave: {{ taskrun.value }}"

  - id: rollout_done
    type: io.kestra.plugin.core.log.Log
    message: "Tenant {{ inputs.tenant_id }} rollout completed for all waves."

errors:
  - id: rollout_failure_diagnostics
    type: io.kestra.plugin.core.log.Log
    message: |
      Rollout failed for tenant={{ inputs.tenant_id }}.
      execution={{ execution.id }}.
      last_error={{ errorLogs()[0]['message'] }}.
      Review the latest [PRE]/[PROBE]/[POST] logs for the failing application.

pluginDefaults:
  - type: io.kestra.plugin.argocd.apps.Status
    values:
      server: "{{ secret('ARGOCD_SERVER') }}"
      token: "{{ secret('ARGOCD_TOKEN') }}"
      retry:
        type: constant
        interval: PT10S
        maxAttempt: 3
        warningOnRetry: false

  - type: io.kestra.plugin.argocd.apps.Sync
    values:
      server: "{{ secret('ARGOCD_SERVER') }}"
      token: "{{ secret('ARGOCD_TOKEN') }}"
      retry:
        type: constant
        interval: PT10S
        maxAttempt: 3
        warningOnRetry: false

extend:
  shortDescription: "Roll out Argo CD Application updates across a single-tenant fleet in safe, sequential waves gated on real sync and health status."
  title: Single-tenant Argo CD rollout with waves, guarded sync strategy, and Status-based readiness gates
  metaTitle: Argo CD Wave Rollout Orchestration with Kestra
  metaDescription: Roll out Argo CD apps in controlled waves for single-tenant fleets with Status-based readiness gates, explicit auto-sync handling, and fail-fast diagnostics.
  description: |
    Deploy Argo CD Application updates across a large single-tenant fleet (where one tenant can own hundreds of GitOps applications) without flooding your cluster all at once. This blueprint orchestrates a progressive, wave-by-wave Argo CD rollout with bounded parallelism, explicit handling for auto-sync-disabled apps, and readiness gates driven by Argo CD's own `Status` API rather than fragile HTTP probes. It solves the classic GitOps blast-radius problem: how to push changes safely, stop on the first non-converging application, and keep a clear audit trail per tenant.

    ## How it works
    - `rollout_start` (`io.kestra.plugin.core.log.Log`) records the tenant and rollout parameters for traceability.
    - `rollout_by_wave` (`io.kestra.plugin.core.flow.ForEach` with `concurrencyLimit: 1`) iterates the ordered `application_waves` plan sequentially to enforce blast-radius control.
    - `rollout_applications_in_wave` (a nested `io.kestra.plugin.core.flow.ForEach`) deploys the apps within a wave in parallel with a concurrency cap.
    - `status_before` (`io.kestra.plugin.argocd.apps.Status`) fetches a baseline; `handle_auto_sync_disabled` (`io.kestra.plugin.core.flow.If`) detects when `spec.syncPolicy.automated` is null and routes through a `io.kestra.plugin.core.flow.Switch` on `auto_sync_disabled_strategy`.
    - For auto-sync-enabled apps, an optional `io.kestra.plugin.argocd.apps.Sync` runs only when `sync_when_auto_sync_enabled` is true.
    - `wait_until_synced_and_healthy` (`io.kestra.plugin.core.flow.Sequential` with retry) polls `Status` and uses `io.kestra.plugin.core.execution.Assert` to gate on `sync.status == 'Synced'` and `Healthy` health.
    - `status_after`, `log_status_after`, and `emit_app_summary` (`io.kestra.plugin.core.debug.Return`) capture final state and a JSON summary per app.

    ## What you get
    - Sequential waves with parallel, capped deployment inside each wave.
    - Four explicit strategies for auto-sync-disabled apps: `force_sync`, `manual_approval`, `fail_rollout`, `skip_application`.
    - Status-based readiness gates that fail fast on non-converging applications.
    - Structured `[PRE]`, `[PROBE]`, `[POST]` logs plus a machine-readable per-app summary.

    ## Who it's for
    - Platform and SRE teams running single-tenant GitOps fleets on Argo CD.
    - DevOps engineers who need controlled, auditable production rollouts.

    ## Why orchestrate this with Kestra
    Argo CD reconciles each application independently and has no concept of ordered waves, cross-application gating, or human approval mid-rollout. Kestra adds that control plane on top: declarative YAML waves, event triggers and scheduling, automatic retries on the readiness `Sequential`, a `Pause` task for manual approval, full execution lineage, and fail-fast stop conditions across the whole fleet. You keep Argo CD as the GitOps engine while Kestra owns sequencing, gating, and observability the Argo CD scheduler cannot provide.

    ## Prerequisites
    - A reachable Argo CD API server and existing `Application` objects named in `application_waves`.

    ### Secrets
    - `ARGOCD_SERVER`: Argo CD API endpoint (for example https://argocd.example.com).
    - `ARGOCD_TOKEN`: API token with rights to read status and sync applications.

    ## Quick start
    1. Add the `ARGOCD_SERVER` and `ARGOCD_TOKEN` secrets to your namespace.
    2. Set `tenant_id` and edit `application_waves` to match your real Argo CD Application names.
    3. Choose an `auto_sync_disabled_strategy` and decide whether `sync_when_auto_sync_enabled` should force manual syncs.
    4. Execute the flow and watch the `[PRE]`/`[PROBE]`/`[POST]` logs converge wave by wave.

    ## How to extend
    - Add a `io.kestra.plugin.core.flow.Subflow` or notification task after `wave_done` to post rollout summaries to Slack or an incident channel.
    - Wire a Git or webhook trigger so a merge to your config repo kicks off the rollout automatically.
    - Tune `readiness_poll_interval`, `readiness_max_attempts`, and `allow_degraded_health` per environment for stricter or more lenient gates.

    ## Links
    - [Argo CD plugin docs](https://kestra.io/plugins/plugin-argocd)
    - [Argo CD orchestration with Kestra](https://kestra.io/orchestration/argocd)
  tags:
    - Infrastructure
    - Core
  ee: false
  demo: false
