id: gitlab-triage-stale-issues
namespace: company.devops

inputs:
  - id: stale_days
    type: INT
    defaults: 30
    description: "Number of days without activity before an issue is considered stale"

tasks:
  - id: search_open_issues
    type: io.kestra.plugin.gitlab.issues.Search
    description: "Fetch all open issues from the GitLab project"
    token: "{{ secret('GITLAB_TOKEN') }}"
    projectId: "{{ secret('PROJECT_ID') }}"
    state: "opened"

  - id: find_stale_issues
    type: io.kestra.plugin.scripts.python.Script
    description: "Filter issues not updated in the last N days and build a triage summary"
    inputFiles:
      issues.json: "{{ outputs.search_open_issues.issues | json }}"
    script: |
      import json, datetime, sys

      with open("issues.json") as f:
          issues = json.load(f)

      cutoff = datetime.datetime.now(datetime.UTC) - datetime.timedelta(days={{ inputs.stale_days }})
      stale = []
      for issue in issues:
          updated = datetime.datetime.fromisoformat(issue["updated_at"].replace("Z", "+00:00"))
          if updated < cutoff:
              stale.append({
                  "iid": issue["iid"],
                  "title": issue["title"],
                  "url": issue["web_url"],
                  "updated_at": issue["updated_at"],
                  "labels": issue.get("labels", [])
              })

      print(f"::{"stale_count"}::{len(stale)}")
      with open("stale_issues.json", "w") as out:
          json.dump(stale, out)
    outputFiles:
      - stale_issues.json

  - id: log_summary
    type: io.kestra.plugin.core.log.Log
    description: "Log how many stale issues were found"
    message: "Stale issues report saved to {{ outputs.find_stale_issues.outputFiles['stale_issues.json'] }}"

  - id: create_triage_issue
    type: io.kestra.plugin.gitlab.issues.Create
    description: "Create a triage tracking issue listing all stale issues for the team to review"
    token: "{{ secret('GITLAB_TOKEN') }}"
    projectId: "{{ secret('PROJECT_ID') }}"
    title: "[Triage] Stale Issues Report — {{ execution.startDate | date('yyyy-MM-dd') }}"
    issueDescription: |
      ## 🔍 Stale Issues Report

      The following issues have not been updated in **{{ inputs.stale_days }}+ days** and need attention.

      This report was generated automatically by Kestra on `{{ execution.startDate }}`.

      ---
      {{ read(outputs.find_stale_issues.outputFiles['stale_issues.json']) }}

      ---
      _Please assign, close, or add a comment to each issue above._
    labels:
      - triage
      - stale

triggers:
  - id: weekly_triage
    type: io.kestra.plugin.core.trigger.Schedule
    description: "Run every Monday at 9 AM UTC"
    cron: "0 9 * * 1"

extend:
  title: Triage Stale GitLab Issues and Create a Weekly Report
  description: |
    This flow automatically identifies open GitLab issues that have not been
    updated in a configurable number of days (default: 30), and creates a
    triage tracking issue summarizing all stale items for your team.

    It runs on a weekly schedule (Monday 9 AM UTC).

    **Prerequisites:**
    - Secrets:
      - `GITLAB_TOKEN`: A GitLab personal access token with `api` scope (required)
      - `PROJECT_ID`: Your GitLab project ID (required)
    - Services: Access to GitLab (cloud or self-hosted)

    **Quick Start:**
    1. Create a GitLab personal access token at  with `api` scope
    2. Add it as a Kestra secret named `GITLAB_TOKEN`
    3. Set your `PROJECT_ID` secret (found under your project Settings > General)
    4. Upload and execute the flow — or enable the weekly schedule

    **Expected Outputs:**
    - `outputs.search_open_issues.issues`: Full list of open issues
    - `outputs.find_stale_issues.outputFiles['stale_issues.json']`: Filtered stale issues as JSON
    - `outputs.create_triage_issue.webUrl`: URL of the newly created triage issue

    **Notes:**
    - The triage issue will be labelled `triage` and `stale` — create these labels in your project first.

    **Plugin Docs:**
    - [GitLab Issues.Search](https://kestra.io/plugins/plugin-gitlab/issues/io.kestra.plugin.gitlab.issues.search)
    - [GitLab Issues.Create](https://kestra.io/plugins/plugin-gitlab/issues/io.kestra.plugin.gitlab.issues.create)
    - [GitLab API Docs](https://docs.gitlab.com/ee/api/issues.html)
  tags:
    - Business
    - Data
  ee: false
  demo: false
  metaDescription: "Auto-detect stale GitLab issues and create a weekly triage tracking issue using Kestra and the GitLab plugin.id: gitlab-triage-stale-issues"