id: documentdb-api-ingest
namespace: company.team

labels:
  team: data
  domain: ingestion

concurrency:
  limit: 1

inputs:
  - id: api_url
    type: STRING
    defaults: https://jsonplaceholder.typicode.com/users
    description: Public JSON API returning an array of records to ingest.

  - id: business_key
    type: STRING
    defaults: id
    description: |
      Field in each source record that uniquely identifies it. Used as the `external_id` upsert key
      so re-runs upsert in place instead of accumulating duplicates.

variables:
  database: app_data
  collection: customers

pluginDefaults:
  - type: io.kestra.plugin.documentdb
    values:
      host: "{{ secret('DOCUMENTDB_HOST') }}"
      database: "{{ vars.database }}"
      username: "{{ secret('DOCUMENTDB_USERNAME') }}"
      password: "{{ secret('DOCUMENTDB_PASSWORD') }}"

tasks:
  - id: fetch_api
    type: io.kestra.plugin.core.http.Request
    description: Fetch a JSON array of records from the public API.
    uri: "{{ inputs.api_url }}"
    method: GET
    contentType: application/json
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: guard_array
    type: io.kestra.plugin.core.execution.Fail
    description: Fail fast if the body is empty or not a JSON array, before any write.
    condition: "{{ (fromJson(outputs.fetch_api.body) is iterable) == false or fromJson(outputs.fetch_api.body) | length == 0 }}"
    errorMessage: "Source {{ inputs.api_url }} did not return a non-empty JSON array."

  - id: ingest_records
    type: io.kestra.plugin.core.flow.ForEach
    description: Upsert every record in the feed, not just the first batch, keyed on a deterministic external_id.
    concurrencyLimit: 1
    values: "{{ fromJson(outputs.fetch_api.body) }}"
    tasks:
      - id: read_existing
        type: io.kestra.plugin.documentdb.Read
        description: Check whether a document with this external_id already exists, since Update has no native upsert flag.
        collection: "{{ vars.collection }}"
        filter:
          external_id: "{{ fromJson(taskrun.value)[inputs.business_key] }}"
        fetchType: FETCH_ONE
        retry:
          type: constant
          interval: PT10S
          maxAttempt: 3

      - id: upsert_record
        type: io.kestra.plugin.core.flow.If
        description: Update the matched document in place, otherwise insert it (emulated upsert).
        condition: "{{ outputs.read_existing.row is defined and outputs.read_existing.row is not null }}"
        then:
          - id: update_record
            type: io.kestra.plugin.documentdb.Update
            description: Refresh the existing document so re-runs and backfills overwrite in place instead of duplicating.
            collection: "{{ vars.collection }}"
            filter:
              external_id: "{{ fromJson(parent.taskrun.value)[inputs.business_key] }}"
            update:
              $set:
                record: "{{ parent.taskrun.value }}"
                source: "{{ inputs.api_url }}"
                last_ingested_at: "{{ trigger.date ?? execution.startDate }}"
              $inc:
                ingest_count: 1
            updateMany: false
            retry:
              type: constant
              interval: PT10S
              maxAttempt: 3
        else:
          - id: insert_record
            type: io.kestra.plugin.documentdb.Insert
            description: Insert the record the first time it is seen.
            collection: "{{ vars.collection }}"
            document:
              external_id: "{{ fromJson(parent.taskrun.value)[inputs.business_key] }}"
              record: "{{ parent.taskrun.value }}"
              source: "{{ inputs.api_url }}"
              last_ingested_at: "{{ trigger.date ?? execution.startDate }}"
              ingest_count: 1
            retry:
              type: constant
              interval: PT10S
              maxAttempt: 3

  - id: count_ingested
    type: io.kestra.plugin.documentdb.Read
    description: Count the records present in the collection after the load for the run summary.
    collection: "{{ vars.collection }}"
    fetchType: STORE
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: insert_run_marker
    type: io.kestra.plugin.documentdb.Insert
    description: Record a schedule-aware ingestion audit marker after a successful load.
    collection: ingestion_runs
    document:
      source: "{{ inputs.api_url }}"
      source_record_count: "{{ fromJson(outputs.fetch_api.body) | length }}"
      collection_size_after: "{{ outputs.count_ingested.size }}"
      status: success
      execution_id: "{{ execution.id }}"
      schedule_date: "{{ trigger.date ?? execution.startDate }}"
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: log_summary
    type: io.kestra.plugin.core.log.Log
    message: "Ingested {{ fromJson(outputs.fetch_api.body) | length }} source records from {{ inputs.api_url }}; {{ vars.collection }} now holds {{ outputs.count_ingested.size }} documents."

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }})."

triggers:
  - id: daily_ingest
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 5 * * *"
    timezone: Etc/UTC

extend:
  shortDescription: Fetch a JSON API and upsert every record into a DocumentDB collection, idempotently.
  title: Ingest a public JSON API into DocumentDB
  metaTitle: Ingest a JSON API into DocumentDB
  description: |
    This flow pulls a JSON array from a public HTTP API and loads the whole feed into Amazon DocumentDB
    (or any MongoDB-compatible endpoint exposed through the DocumentDB Data REST API). It runs every
    morning on a schedule and upserts every record on a deterministic `external_id` so re-runs and
    backfills overwrite in place instead of accumulating duplicates, rather than slicing the feed to a
    single 10-document batch. Every remote call retries on transient failures, and a flow-level `errors`
    block posts a Slack alert with the execution ID if the run fails.

    ## What this flow does
    1. Calls the public API with `io.kestra.plugin.core.http.Request` (with retry).
    2. Fails fast with `io.kestra.plugin.core.execution.Fail` if the body is empty or not a JSON array,
       so a broken upstream never writes partial data.
    3. Iterates the full array with `io.kestra.plugin.core.flow.ForEach` and emulates an upsert on each
       record keyed on `external_id` (taken from the configured `business_key` field): a
       `io.kestra.plugin.documentdb.Read` (`fetchType: FETCH_ONE`) checks whether the document exists,
       then `io.kestra.plugin.core.flow.If` runs `io.kestra.plugin.documentdb.Update` when it does or
       `io.kestra.plugin.documentdb.Insert` when it does not. The Update task has no native upsert flag,
       so this read-then-branch pattern is required. The raw record is stored under a `record` field and
       an `ingest_count` is incremented on update, so the same source record always maps to one document.
    4. Counts the collection after the load with `io.kestra.plugin.documentdb.Read` (`fetchType: STORE`).
    5. Writes a schedule-aware audit marker to `ingestion_runs` (source, source record count, collection
       size, status, execution ID, schedule date) so re-runs and backfills are reconstructable.
    6. Logs a one-line summary.

    ## Idempotency
    Records are upserted on a deterministic `external_id` built from the `business_key` field, so running
    the flow twice (a daily fire, a manual replay, or a backfill) updates the existing documents rather
    than inserting copies. `last_ingested_at` is refreshed each run and `ingest_count` increments on
    update, so you can see how many times a record was synced. The emulated upsert (Read then Update or
    Insert) has a small time-of-check / time-of-use window, so the flow runs with `concurrency.limit: 1`
    to serialize fires and backfills; create a unique index on `external_id` as a backstop so a duplicate
    insert fails loudly rather than silently creating two documents for the same source record.

    ## Prerequisites
    - A reachable DocumentDB Data REST API endpoint (Amazon DocumentDB or a MongoDB-compatible service
      that exposes the `/data/v1/action/*` HTTP API).
    - The target `database` and both collections (`customers`, `ingestion_runs`) created beforehand, or
      auto-created on first write by your service.
    - Each source record must contain the field named by the `business_key` input.
    - Outbound network access from your Kestra workers to the public API and the DocumentDB endpoint.

    ## Secrets
    - `DOCUMENTDB_HOST`: base HTTPS endpoint of the DocumentDB Data REST API, for example `https://your-documentdb.example.com`.
    - `DOCUMENTDB_USERNAME`: basic-auth username for the DocumentDB API.
    - `DOCUMENTDB_PASSWORD`: basic-auth password for the DocumentDB API.
    - `SLACK_WEBHOOK`: Slack incoming webhook URL used by the failure alert.

    ## Quick start
    1. Add the four secrets above to your Kestra instance.
    2. Adjust the `database` and `collection` variables, the `api_url`, and the `business_key` input to match your data.
    3. Run the flow manually once to validate connectivity, then run it again and confirm the collection size
       does not grow (proving the upsert is idempotent). Let the daily schedule take over.

    ## Expected outputs
    - `{{ outputs.count_ingested.size }}`: number of documents present in the collection after the load.
    - `{{ outputs.fetch_api.body }}`: raw API response used to derive the source record count.

    ## Links
    - DocumentDB plugin: https://kestra.io/plugins/plugin-documentdb
    - HTTP Request task: https://kestra.io/plugins/core/tasks/http/io.kestra.plugin.core.http.request
    - Sample API used here: https://jsonplaceholder.typicode.com
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Fetch a JSON API and upsert the full feed into a DocumentDB collection daily, with retry, idempotency, and failure alerts.
