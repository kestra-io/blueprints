id: ai-code-review-gitlab-mr
namespace: company.team

tasks:
  - id: check_trigger_comment
    type: io.kestra.plugin.core.flow.If
    description: Only proceed if the MR comment matches the trigger keyword
    condition: "{{ trigger.body.object_attributes.note == '+0' }}"
    then:
      - id: get_mr_changes
        type: io.kestra.plugin.core.http.Request
        description: Fetch the merge request diff from the GitLab API
        uri: "https://gitlab.com/api/v4/projects/{{ trigger.body.project_id }}/merge_requests/{{ trigger.body.merge_request.iid }}/changes"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ secret('GITLAB_TOKEN') }}"

      - id: review_each_change
        type: io.kestra.plugin.scripts.python.Script
        description: Parse diffs, extract code blocks, send each to GPT for review, and post results to GitLab
        beforeCommands:
          - pip install requests openai
        script: |
          import json
          import re
          import requests
          import openai

          # Configuration
          gitlab_token = "{{ secret('GITLAB_TOKEN') }}"
          openai_api_key = "{{ secret('OPENAI_API_KEY') }}"
          project_id = "{{ trigger.body.project_id }}"
          mr_iid = "{{ trigger.body.merge_request.iid }}"

          # Load the MR changes from the previous task output
          changes_json = """{{ outputs.get_mr_changes.body }}"""
          changes_data = json.loads(changes_json)
          diff_refs = changes_data.get("diff_refs", {})
          file_changes = changes_data.get("changes", [])

          # Initialize OpenAI client
          client = openai.OpenAI(api_key=openai_api_key)

          system_prompt = (
              "You are a senior programming expert responsible for reviewing code changes "
              "and providing review recommendations. At the beginning of the suggestion, "
              "clearly decide to 'reject' or 'accept' the code change, and rate the change "
              "in the format 'Change Score: Actual Score', with a score range of 0-100 points. "
              "Then, point out existing problems in concise language and a rigorous tone. "
              "If necessary, provide the corrected code. Your review must use Markdown format."
          )

          def parse_last_diff(git_diff):
              """Parse a git diff to find the last changed line positions."""
              git_diff = re.sub(r'\n\\ No newline at end of file', '', git_diff)
              diff_lines = git_diff.rstrip().split('\n')
              diff_lines_reversed = list(reversed(diff_lines))

              last_line_first_char = diff_lines_reversed[0][0] if diff_lines_reversed and diff_lines_reversed[0] else ''

              last_diff = ''
              for line in diff_lines_reversed:
                  if re.match(r'^@@ \-\d+,\d+ \+\d+,\d+ @@', line):
                      last_diff = line
                      break

              match = re.match(r'@@ \-(\d+),(\d+) \+(\d+),(\d+) @@.*', last_diff)
              if not match:
                  return {"lastOldLine": -1, "lastNewLine": -1, "gitDiff": git_diff}

              last_old_count = int(match.group(1)) + int(match.group(2))
              last_new_count = int(match.group(3)) + int(match.group(4))

              last_old_line = None if last_line_first_char == '+' else last_old_count - 1
              last_new_line = None if last_line_first_char == '-' else last_new_count - 1

              return {"lastOldLine": last_old_line, "lastNewLine": last_new_line, "gitDiff": git_diff}

          def split_diff_to_code(diff_text):
              """Split a diff into original and new code blocks."""
              lines = diff_text.rstrip().split('\n')
              original_code = ''
              new_code = ''
              for line in lines:
                  if line.startswith('-'):
                      original_code += line + '\n'
                  elif line.startswith('+'):
                      new_code += line + '\n'
                  else:
                      original_code += line + '\n'
                      new_code += line + '\n'
              return original_code, new_code

          for change in file_changes:
              # Skip renamed or deleted files, and non-diff content
              if change.get("renamed_file") or change.get("deleted_file"):
                  continue
              diff = change.get("diff", "")
              if not diff.startswith("@@"):
                  continue

              file_path = change.get("new_path", "unknown")
              parsed = parse_last_diff(diff)
              original_code, new_code = split_diff_to_code(parsed["gitDiff"])

              # Generate the AI review
              user_message = (
                  f"File path: {file_path}\n\n"
                  f"```Original code\n{original_code}```\n"
                  f"change to\n"
                  f"```New code\n{new_code}```\n"
                  f"Please review the code changes in this section:"
              )

              response = client.chat.completions.create(
                  model="gpt-4o",
                  messages=[
                      {"role": "system", "content": system_prompt},
                      {"role": "user", "content": user_message}
                  ]
              )
              review_text = response.choices[0].message.content

              # Post the review as a discussion on the MR
              position_data = {
                  "body": review_text,
                  "position[position_type]": "text",
                  "position[old_path]": change.get("old_path", ""),
                  "position[new_path]": file_path,
                  "position[start_sha]": diff_refs.get("start_sha", ""),
                  "position[head_sha]": diff_refs.get("head_sha", ""),
                  "position[base_sha]": diff_refs.get("base_sha", ""),
              }

              if parsed["lastNewLine"] is not None:
                  position_data["position[new_line]"] = str(parsed["lastNewLine"])
              if parsed["lastOldLine"] is not None:
                  position_data["position[old_line]"] = str(parsed["lastOldLine"])

              requests.post(
                  f"https://gitlab.com/api/v4/projects/{project_id}/merge_requests/{mr_iid}/discussions",
                  headers={"PRIVATE-TOKEN": gitlab_token},
                  data=position_data
              )

          from kestra import Kestra
          Kestra.outputs({"reviewed_files": len(file_changes)})

triggers:
  - id: gitlab_note_webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"

extend:
  title: AI-Powered Code Review for GitLab Merge Requests
  metaTitle: AI Code Review for GitLab Merge Requests
  shortDescription: >-
    Automatically review GitLab merge request diffs with OpenAI GPT.
    Triggered by a comment, the flow analyzes code changes and posts review feedback directly on the MR.
  description: |
    **Get instant AI-powered code reviews on GitLab merge requests, triggered by a comment and posted as inline discussion threads.**

    1. A `io.kestra.plugin.core.trigger.Webhook` receives GitLab note events when someone comments on a merge request
    2. A `io.kestra.plugin.core.flow.If` task checks whether the comment matches the trigger keyword ("+0") to initiate a review
    3. A `io.kestra.plugin.core.http.Request` task fetches the merge request diff via the GitLab API
    4. A `io.kestra.plugin.scripts.python.Script` task iterates over each changed file, parsing diff hunks to extract original and modified code blocks with line position metadata
    5. A `io.kestra.plugin.openai.ChatCompletion` task reviews each code change using a senior code reviewer system prompt that scores changes and provides actionable feedback
    6. A `io.kestra.plugin.core.http.Request` task posts the review as an inline discussion on the merge request at the exact changed lines

    Ideal for:
    - **Engineering teams** who want automated first-pass code reviews on every merge request
    - **Solo developers** seeking a second opinion before merging changes
    - **Tech leads** who want consistent review quality across a large number of MRs
  tags:
    - AI
    - Infrastructure
  ee: false
  demo: false
  metaDescription: >-
    Automate code reviews on GitLab merge requests with OpenAI GPT.
    Parses diffs, analyzes changes, and posts inline review comments.

