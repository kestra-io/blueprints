id: sap-hana-multi-statement-etl
namespace: company.data

labels:
  team: data
  pipeline: orders-etl

concurrency:
  limit: 1

inputs:
  - id: load_date
    type: STRING
    defaults: "{{ (trigger.date ?? execution.startDate) | date('yyyy-MM-dd') }}"
    description: Business date to load into the fact table. Defaults to the trigger or execution date so backfills reload the right partition.

pluginDefaults:
  - type: io.kestra.plugin.jdbc.hana
    values:
      url: "jdbc:sap://{{ secret('HANA_HOST') }}:39015/?databaseName=HXE"
      username: "{{ secret('HANA_USERNAME') }}"
      password: "{{ secret('HANA_PASSWORD') }}"

tasks:
  - id: transform_etl
    type: io.kestra.plugin.jdbc.hana.Queries
    description: Reload the load-date partition atomically - clear scoped staging, stage raw, delete-then-insert the fact partition, then clear staging again.
    transaction: true
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    parameters:
      loadDate: "{{ inputs.load_date }}"
    sql: |
      DELETE FROM STAGING.ORDERS_STG WHERE ORDER_DATE = :loadDate;

      INSERT INTO STAGING.ORDERS_STG (ORDER_ID, CUSTOMER_ID, AMOUNT, ORDER_DATE)
      SELECT ORDER_ID, CUSTOMER_ID, AMOUNT, ORDER_DATE
      FROM RAW.ORDERS_INGEST
      WHERE ORDER_DATE = :loadDate;

      DELETE FROM WAREHOUSE.FACT_ORDERS WHERE ORDER_DATE = :loadDate;

      INSERT INTO WAREHOUSE.FACT_ORDERS (ORDER_ID, CUSTOMER_ID, AMOUNT, ORDER_DATE)
      SELECT ORDER_ID, CUSTOMER_ID, AMOUNT, ORDER_DATE
      FROM STAGING.ORDERS_STG
      WHERE ORDER_DATE = :loadDate;

      DELETE FROM STAGING.ORDERS_STG WHERE ORDER_DATE = :loadDate;

  - id: verify_row_counts
    type: io.kestra.plugin.jdbc.hana.Query
    description: Compare the raw ingest count to the fact count for this load date - after a full-partition reload they must be equal.
    fetchType: FETCH_ONE
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    parameters:
      loadDate: "{{ inputs.load_date }}"
    sql: |
      SELECT
        (SELECT COUNT(*) FROM RAW.ORDERS_INGEST WHERE ORDER_DATE = :loadDate) AS RAW_COUNT,
        (SELECT COUNT(*) FROM WAREHOUSE.FACT_ORDERS WHERE ORDER_DATE = :loadDate) AS FACT_COUNT
      FROM DUMMY

  - id: assert_counts_match
    type: io.kestra.plugin.core.flow.If
    description: Fail the run if the raw and fact partition counts diverge for the load date.
    condition: "{{ outputs.verify_row_counts.row.RAW_COUNT == outputs.verify_row_counts.row.FACT_COUNT }}"
    then:
      - id: counts_match
        type: io.kestra.plugin.core.log.Log
        message: "Load verified for {{ inputs.load_date }}: {{ outputs.verify_row_counts.row.FACT_COUNT }} rows reloaded into the fact partition."
    else:
      - id: counts_mismatch
        type: io.kestra.plugin.core.execution.Fail
        errorMessage: "Row count mismatch for {{ inputs.load_date }}: RAW={{ outputs.verify_row_counts.row.RAW_COUNT }} vs FACT={{ outputs.verify_row_counts.row.FACT_COUNT }}"

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }})."

triggers:
  - id: nightly_load
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 2 * * *"
    timezone: Etc/UTC

extend:
  shortDescription: Run a transactional, idempotent SAP HANA partition reload, then verify source and target row counts match.
  title: Transactional idempotent in-database ETL on SAP HANA with a row-count check
  metaTitle: SAP HANA multi-statement ETL with verification
  description: |
    This flow performs an in-database ELT on SAP HANA that fully reloads a single date partition each run:
    it stages the raw orders for the load date, deletes and re-inserts that date's rows in the fact table,
    cleans up its scoped staging, and then verifies that the source and target counts for the load date
    agree before the run is declared successful. Pushing the transform into HANA keeps the heavy joins
    close to the in-memory engine, while Kestra orchestrates atomicity, scheduling, retries, alerting, and
    data-quality gating. The delete-then-insert per partition makes the load idempotent: re-runs and
    backfills produce the same result, and rows deleted at source for that date are removed from the fact
    table too.

    ## What this flow does
    1. A Schedule trigger fires nightly at 02:00 UTC. `load_date` defaults to
       `{{ (trigger.date ?? execution.startDate) }}`, so a backfill reloads exactly that day's partition.
    2. The `transform_etl` task uses the SAP HANA `Queries` task to run, in one atomic transaction
       (`transaction: true`): clear staging scoped to the load date, stage the raw rows for the load date,
       delete the fact rows for the load date, re-insert them from staging, then clear staging again. If
       any statement fails, the whole transaction rolls back. It retries transient HANA blips.
    3. The `verify_row_counts` task runs a single `FETCH_ONE` query returning the raw ingest count and the
       fact count for the load date. Because the fact partition is fully reloaded from raw, these two
       counts are equal on a correct load - the check measures what was actually reloaded this run rather
       than a coincidental cumulative total.
    4. The `assert_counts_match` If task compares the two counts: on a match it logs success, on a mismatch
       it fails the execution so the data-quality issue surfaces immediately.
    5. If any task fails, the flow-level `errors` block posts a Slack alert with the execution id.

    ## Idempotency and concurrency
    - The load is a full reload of one date partition: `DELETE ... WHERE ORDER_DATE = :loadDate` followed
      by `INSERT ... WHERE ORDER_DATE = :loadDate`. Re-running or backfilling the same date is safe and
      produces the same fact partition; source-side deletes for that date propagate to the fact table.
    - Staging is cleaned scoped to the load date (`WHERE ORDER_DATE = :loadDate`), not a blanket delete, so
      a concurrent or prior run's staged rows for another date are never disturbed.
    - `concurrency: { limit: 1 }` prevents two nightly loads from overlapping and interleaving staging.

    ## When to prefer MERGE
    This blueprint full-reloads a date partition, which is the simplest correct idempotent pattern when raw
    is the source of truth for the whole day. If you instead need to preserve fact rows not present in the
    current raw batch (late-arriving corrections without deletes), replace the fact delete-then-insert with
    a `MERGE INTO WAREHOUSE.FACT_ORDERS ... ON target.ORDER_ID = source.ORDER_ID` and verify with a
    checksum/EXCEPT of the merged set rather than a count.

    ## Prerequisites
    - A reachable SAP HANA instance (the JDBC URL uses port 39015; adjust the instance number and
      `databaseName` for your tenant). The SAP HANA JDBC driver (`ngdbc`) ships with the Kestra JDBC plugin.
    - Tables `RAW.ORDERS_INGEST`, `STAGING.ORDERS_STG`, and `WAREHOUSE.FACT_ORDERS` (or your equivalents),
      each with an `ORDER_DATE` column.
    - A database user with INSERT, DELETE, and SELECT on those schemas.

    ## Secrets
    - `HANA_HOST`: hostname or IP of the SAP HANA server.
    - `HANA_USERNAME`: SAP HANA database user with read and write access to the ETL schemas.
    - `HANA_PASSWORD`: password for that database user.
    - `SLACK_WEBHOOK`: Slack Incoming Webhook URL for failure alerts.

    ## Quick start
    1. Add the secrets above to your Kestra instance.
    2. Adjust the schema and table names in the SQL to match your warehouse model.
    3. Trigger the flow manually with a specific `load_date` to validate, then let the nightly schedule run it.

    ## Expected outputs
    - `{{ outputs.transform_etl.outputs }}`: per-statement results from the multi-statement transaction.
    - `{{ outputs.verify_row_counts.row }}`: the single verification row with `RAW_COUNT` and `FACT_COUNT`.
    - The execution succeeds when the partition counts match and fails with an explicit message when they
      diverge.

    ## Documentation
    - SAP HANA plugin: https://kestra.io/plugins/plugin-jdbc-hana
    - SAP HANA Queries task: https://kestra.io/plugins/plugin-jdbc-hana/io.kestra.plugin.jdbc.hana.queries
    - If task: https://kestra.io/plugins/core/flow/io.kestra.plugin.core.flow.if
    - SAP HANA MERGE statement: https://help.sap.com/docs/SAP_HANA_PLATFORM
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Run a transactional idempotent SAP HANA partition reload with staging and a meaningful row-count verification gate in Kestra.
