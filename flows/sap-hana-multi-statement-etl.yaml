id: sap-hana-multi-statement-etl
namespace: company.data

labels:
  team: data
  pipeline: orders-etl

concurrency:
  limit: 1

inputs:
  - id: load_date
    type: STRING
    defaults: "{{ (trigger.date ?? execution.startDate) | date('yyyy-MM-dd') }}"
    description: Business date to load into the fact table. Defaults to the trigger or execution date so backfills reload the right partition.

pluginDefaults:
  - type: io.kestra.plugin.jdbc.hana
    values:
      url: "jdbc:sap://{{ secret('HANA_HOST') }}:39015/?databaseName=HXE"
      username: "{{ secret('HANA_USERNAME') }}"
      password: "{{ secret('HANA_PASSWORD') }}"

tasks:
  - id: transform_etl
    type: io.kestra.plugin.jdbc.hana.Queries
    description: Reload the load-date partition atomically - clear scoped staging, stage raw, delete-then-insert the fact partition, then clear staging again.
    transaction: true
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    parameters:
      loadDate: "{{ inputs.load_date }}"
    sql: |
      DELETE FROM STAGING.ORDERS_STG WHERE ORDER_DATE = :loadDate;

      INSERT INTO STAGING.ORDERS_STG (ORDER_ID, CUSTOMER_ID, AMOUNT, ORDER_DATE)
      SELECT ORDER_ID, CUSTOMER_ID, AMOUNT, ORDER_DATE
      FROM RAW.ORDERS_INGEST
      WHERE ORDER_DATE = :loadDate;

      DELETE FROM WAREHOUSE.FACT_ORDERS WHERE ORDER_DATE = :loadDate;

      INSERT INTO WAREHOUSE.FACT_ORDERS (ORDER_ID, CUSTOMER_ID, AMOUNT, ORDER_DATE)
      SELECT ORDER_ID, CUSTOMER_ID, AMOUNT, ORDER_DATE
      FROM STAGING.ORDERS_STG
      WHERE ORDER_DATE = :loadDate;

      DELETE FROM STAGING.ORDERS_STG WHERE ORDER_DATE = :loadDate;

  - id: verify_row_counts
    type: io.kestra.plugin.jdbc.hana.Query
    description: Compare the raw ingest count to the fact count for this load date - after a full-partition reload they must be equal.
    fetchType: FETCH_ONE
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    parameters:
      loadDate: "{{ inputs.load_date }}"
    sql: |
      SELECT
        (SELECT COUNT(*) FROM RAW.ORDERS_INGEST WHERE ORDER_DATE = :loadDate) AS RAW_COUNT,
        (SELECT COUNT(*) FROM WAREHOUSE.FACT_ORDERS WHERE ORDER_DATE = :loadDate) AS FACT_COUNT
      FROM DUMMY

  - id: assert_counts_match
    type: io.kestra.plugin.core.flow.If
    description: Fail the run if the raw and fact partition counts diverge for the load date.
    condition: "{{ outputs.verify_row_counts.row.RAW_COUNT == outputs.verify_row_counts.row.FACT_COUNT }}"
    then:
      - id: counts_match
        type: io.kestra.plugin.core.log.Log
        message: "Load verified for {{ inputs.load_date }}: {{ outputs.verify_row_counts.row.FACT_COUNT }} rows reloaded into the fact partition."
    else:
      - id: counts_mismatch
        type: io.kestra.plugin.core.execution.Fail
        errorMessage: "Row count mismatch for {{ inputs.load_date }}: RAW={{ outputs.verify_row_counts.row.RAW_COUNT }} vs FACT={{ outputs.verify_row_counts.row.FACT_COUNT }}"

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }})."

triggers:
  - id: nightly_load
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 2 * * *"
    timezone: Etc/UTC

extend:
  shortDescription: Run a transactional, idempotent SAP HANA partition reload, then verify source and target row counts match.
  title: Transactional idempotent in-database ETL on SAP HANA with a row-count check
  metaTitle: SAP HANA Multi-Statement ETL with Kestra
  description: |
    This blueprint runs a transactional, idempotent in-database ETL on SAP HANA that fully reloads a single
    date partition on every execution. It stages raw orders for the load date, performs a delete-then-insert
    on the fact partition, cleans up scoped staging, and then verifies that source and target row counts
    agree before the run is declared successful. Pushing the multi-statement transform into HANA keeps heavy
    joins next to the in-memory column store, while Kestra owns atomicity, scheduling, retries, alerting, and
    a data-quality gate. The delete-then-insert per partition is what makes the load idempotent: re-runs and
    backfills produce identical results, and rows deleted at source for a date are removed from the fact
    table too. It solves the classic SAP HANA ETL problem of partial writes and silent drift when a
    multi-step load is run by a bare scheduler with no transaction boundary or verification.

    ## How it works
    1. The `nightly_load` `io.kestra.plugin.core.trigger.Schedule` trigger fires at `0 2 * * *` in `Etc/UTC`.
       The `load_date` input defaults to `{{ (trigger.date ?? execution.startDate) }}`, so a manual run or
       backfill reloads exactly that day's partition.
    2. The `transform_etl` task (`io.kestra.plugin.jdbc.hana.Queries`) runs five statements in one atomic
       transaction (`transaction: true`): clear staging for the load date, stage raw rows, delete the fact
       partition, re-insert it from staging, then clear staging again. Any statement failure rolls back the
       whole transaction. A `constant` retry (`PT1M`, `maxAttempt: 3`) absorbs transient HANA blips.
    3. The `verify_row_counts` task (`io.kestra.plugin.jdbc.hana.Query`, `fetchType: FETCH_ONE`) returns the
       raw ingest count and the fact count for the load date in a single row.
    4. The `assert_counts_match` task (`io.kestra.plugin.core.flow.If`) compares `RAW_COUNT` to `FACT_COUNT`:
       a match logs success via `io.kestra.plugin.core.log.Log`, a mismatch fails the run with
       `io.kestra.plugin.core.execution.Fail` and an explicit message.
    5. On any failure, the flow-level `errors` block posts a Slack alert through
       `io.kestra.plugin.slack.notifications.SlackIncomingWebhook` with the execution id.

    ## What you get
    - Atomic, all-or-nothing partition reloads with no partial writes.
    - Idempotent loads: safe re-runs and backfills, with source deletes propagated to the fact table.
    - A meaningful row-count gate that measures what this run actually reloaded, not a cumulative total.
    - Automatic Slack alerting on failure and built-in retries for flaky connections.
    - `concurrency: { limit: 1 }` so two nightly loads never overlap or interleave staging.

    ## Who it's for
    - Data engineers running scheduled SAP HANA warehouse loads who need correctness guarantees.
    - Analytics and BI teams who depend on a fact table that is trustworthy after every load.
    - Platform teams consolidating ad hoc HANA SQL jobs into observable, alerting pipelines.

    ## Why orchestrate this with Kestra
    A database scheduler can run SQL on a cron, but it cannot gate the run on a data-quality check, fail the
    pipeline on count drift, retry only the transient failures, alert Slack with execution context, or give
    you per-execution lineage and replayable history. Kestra wraps the in-database transform in declarative
    YAML with event and schedule triggers, retries, conditional branching, and end-to-end observability, the
    exact gap SAP HANA's own SQL scheduler cannot fill.

    ## Prerequisites
    - A reachable SAP HANA instance (the JDBC URL uses port 39015; adjust the instance number and
      `databaseName` for your tenant). The HANA JDBC driver (`ngdbc`) ships with the Kestra JDBC plugin.
    - Tables `RAW.ORDERS_INGEST`, `STAGING.ORDERS_STG`, and `WAREHOUSE.FACT_ORDERS` (or your equivalents),
      each with an `ORDER_DATE` column.
    - A database user with INSERT, DELETE, and SELECT on those schemas.

    ### Secrets
    - `HANA_HOST`: hostname or IP of the SAP HANA server.
    - `HANA_USERNAME`: SAP HANA database user with read and write access to the ETL schemas.
    - `HANA_PASSWORD`: password for that database user.
    - `SLACK_WEBHOOK`: Slack Incoming Webhook URL for failure alerts.

    ## Quick start
    1. Add the four secrets above to your Kestra instance.
    2. Adjust the schema and table names in the SQL to match your warehouse model.
    3. Trigger the flow manually with a specific `load_date` to validate the reload and the count gate.
    4. Let the nightly `0 2 * * *` schedule run it, and confirm Slack alerts route correctly.

    ## How to extend
    - Swap the fact delete-then-insert for `MERGE INTO WAREHOUSE.FACT_ORDERS ... ON target.ORDER_ID =
      source.ORDER_ID` when you must preserve fact rows absent from the current raw batch, and verify with a
      checksum or `EXCEPT` instead of a count.
    - Parameterize the schema and table names as inputs to reuse the flow across multiple fact tables.
    - Replace the schedule with a flow or webhook trigger to chain this load after an upstream ingestion.
    - Add more verification queries (sum of amounts, null checks) before the `assert_counts_match` gate.

    ## Links
    - SAP HANA plugin docs: https://kestra.io/plugins/plugin-jdbc-hana
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Run a transactional, idempotent SAP HANA partition reload with scoped staging and a meaningful row-count verification gate, orchestrated in Kestra.
