id: bigquery-pubsub-streaming-insert
namespace: company.team
description: |
  Land Pub/Sub messages into BigQuery in near real time with micro-batching. A
  Pub/Sub trigger polls the subscription on a short interval and starts the flow
  with the batch of messages; the flow converts them to newline-delimited JSON
  and loads them into BigQuery in one append. Micro-batching keeps you well
  under BigQuery's per-row DML limits while staying fresh.

tasks:
  - id: to_json
    type: io.kestra.plugin.serdes.json.IonToJson
    description: Convert the consumed messages (ION) to newline-delimited JSON for the load.
    from: "{{ trigger.uri }}"

  - id: load_to_bigquery
    type: io.kestra.plugin.gcp.bigquery.Load
    description: Append the batch of messages to a raw landing table, autodetecting the schema.
    from: "{{ outputs.to_json.uri }}"
    destinationTable: "{{ secret('GCP_PROJECT_ID') }}.analytics.pubsub_events_raw"
    format: JSON
    autodetect: true
    createDisposition: CREATE_IF_NEEDED
    writeDisposition: WRITE_APPEND

pluginDefaults:
  - type: io.kestra.plugin.gcp.bigquery
    values:
      projectId: "{{ secret('GCP_PROJECT_ID') }}"
      serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT') }}"

triggers:
  - id: on_messages
    type: io.kestra.plugin.gcp.pubsub.Trigger
    description: Poll the subscription and start the flow with each batch. Enable once your secrets and subscription are set.
    projectId: "{{ secret('GCP_PROJECT_ID') }}"
    topic: events
    subscription: kestra-events-sub
    serdeType: JSON
    interval: PT1M
    maxRecords: 1000
    disabled: true

errors:
  - id: alert_on_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Alert Slack if the batch load fails.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "BigQuery load from Pub/Sub failed (execution {{ execution.id }})."
      }

extend:
  shortDescription: A Pub/Sub trigger micro-batches messages and loads them into BigQuery as newline-delimited JSON, staying under DML limits.
  title: Stream Pub/Sub Events into BigQuery with Micro-Batching
  metaTitle: Stream Pub/Sub Events into BigQuery
  description: |
    This blueprint lands Pub/Sub messages into BigQuery in near real time. The
    Pub/Sub Trigger polls the subscription on a short interval and starts the
    flow with the batch of messages it consumed; the flow converts that batch
    from Kestra's ION format to newline-delimited JSON and appends it to a raw
    landing table, letting BigQuery autodetect the schema. Micro-batching keeps
    you well under BigQuery's per-row streaming and DML quotas while keeping
    latency low, and landing raw follows the ELT principle: capture first, parse
    downstream.

    Prerequisites:
      - Secrets:
        - GCP_PROJECT_ID: GCP project hosting the Pub/Sub topic and dataset.
        - GCP_SERVICE_ACCOUNT: service account key JSON with BigQuery and Pub/Sub access.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - An existing Pub/Sub topic (events) and an analytics dataset. The destination table analytics.pubsub_events_raw is created automatically on the first load.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Point the trigger topic and subscription at your Pub/Sub resources, then enable the trigger.
      3. Tune interval and maxRecords to trade latency for batch size.

    Outputs:
      - trigger.uri: the file of messages consumed in the batch.
      - outputs.load_to_bigquery.rows: the number of rows appended.

    Notes:
      - Each consumed record is the Pub/Sub message envelope (data, attributes, messageId); autodetect lands it as-is into the raw table, so parse the data field downstream with dbt or SQL.
      - The trigger consumes messages as ION; IonToJson converts them to the newline-delimited JSON that BigQuery Load accepts.
      - Lower interval for fresher data or raise maxRecords for larger batches; each run is one BigQuery load job, so batching avoids per-row DML quota limits.
      - The example trigger ships disabled so importing the blueprint does not connect to Pub/Sub with placeholder config; enable it once your secrets and subscription are set.
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: A Pub/Sub trigger micro-batches messages and loads them into BigQuery as newline-delimited JSON, staying under per-row DML limits.
