id: klaviyo-send-job-monitoring
namespace: company.marketing

labels:
  team: marketing-ops
  monitor: klaviyo-send


inputs:
  - id: job_ids
    type: ARRAY
    itemType: STRING
    description: |
      Klaviyo campaign send job IDs to monitor. Best used for jobs that are
      still in flight; once a job reaches a terminal state it stops changing,
      so prune completed IDs from this list (or feed it from a discovery step
      that lists recently created send jobs).
    defaults:
      - "01HZZZZZZZZZZZZZZZZZZZZZZZ"
  - id: alerting_statuses
    type: ARRAY
    itemType: STRING
    description: |
      Send job statuses that should page the team. Verify these against the
      Klaviyo Campaign Send Job API for your account before relying on them.
      "queued" is intentionally NOT treated as healthy here; a job stuck in a
      pre-send state is exactly what monitoring should surface.
    defaults:
      - cancelled
      - failed
      - error

pluginDefaults:
  - type: io.kestra.plugin.klaviyo
    values:
      apiKey: "{{ secret('KLAVIYO_API_KEY') }}"
  - type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    values:
      url: "{{ secret('SLACK_WEBHOOK_URL') }}"

tasks:
  - id: get_send_jobs
    type: io.kestra.plugin.klaviyo.jobs.GetSendJob
    description: |
      Fetch the current state of every send job in the input. fetchType FETCH
      returns all rows so each job is evaluated, not just the first.
    jobIds: "{{ inputs.job_ids }}"
    fetchType: FETCH
    retry:
      type: constant
      interval: PT30S
      maxAttempt: 4
    timeout: PT5M

  - id: evaluate_jobs
    type: io.kestra.plugin.core.flow.ForEach
    description: Evaluate each fetched send job and alert only on a transition into a bad state.
    concurrencyLimit: 1
    values: "{{ outputs.get_send_jobs.rows ?? [] }}"
    tasks:
      - id: get_last_status
        type: io.kestra.plugin.core.kv.Get
        description: Read the last status we recorded for this job so we only alert on change.
        key: "klaviyo_send_job_{{ fromJson(taskrun.value).id }}"
        errorOnMissing: false

      - id: route_status
        type: io.kestra.plugin.core.flow.If
        description: |
          Alert only when the job is in an alerting status AND that differs
          from the last status we saw, so a failed job pages once on transition
          rather than every poll.
        condition: "{{ (inputs.alerting_statuses contains fromJson(taskrun.value).attributes.status) and (fromJson(taskrun.value).attributes.status != (outputs.get_last_status.value ?? '')) }}"
        then:
          - id: alert_unhealthy_send
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            description: Page the marketing ops channel about a send job that just entered a bad state.
            payload: |
              {
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "Klaviyo send job needs attention"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Send job status:*\n{{ fromJson(taskrun.value).attributes.status }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Send job id:*\n{{ fromJson(taskrun.value).id }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Previous status:*\n{{ outputs.get_last_status.value ?? 'none' }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Execution:*\n{{ execution.id }}"
                      }
                    ]
                  },
                  {
                    "type": "context",
                    "elements": [
                      {
                        "type": "mrkdwn",
                        "text": "Open Klaviyo to inspect the send job and resend or reschedule as needed."
                      }
                    ]
                  }
                ]
              }
        else:
          - id: log_status
            type: io.kestra.plugin.core.log.Log
            description: Record the current status for the audit trail without paging.
            message: "Send job {{ fromJson(taskrun.value).id }} status is {{ fromJson(taskrun.value).attributes.status }} (previous {{ outputs.get_last_status.value ?? 'none' }}); no new alert."

      - id: record_status
        type: io.kestra.plugin.core.kv.Set
        description: |
          Persist the current status as the last-seen value so the next poll
          only alerts on a further transition. Written after the alert branch
          so a failed Slack post does not suppress a future page.
        key: "klaviyo_send_job_{{ fromJson(taskrun.value).id }}"
        value: "{{ fromJson(taskrun.value).attributes.status }}"
        kvType: STRING
        ttl: P30D

errors:
  - id: alert_on_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Alert if the monitoring flow itself fails (for example a bad API key).
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} monitoring failed (execution {{ execution.id }})."

triggers:
  - id: business_hours
    type: io.kestra.plugin.core.trigger.Schedule
    description: Poll the send jobs every 30 minutes during business hours (08:00 to 18:00 UTC, Mon to Fri).
    cron: "*/30 8-18 * * 1-5"
    timezone: Etc/UTC

extend:
  shortDescription: Poll Klaviyo send jobs during business hours, evaluate every job, and page Slack once when a send transitions into a bad state.
  title: Klaviyo Send Job Monitoring with Slack Alerts
  metaTitle: Klaviyo Send Job Monitoring to Slack
  description: |
    This blueprint gives marketing operations observability over Klaviyo
    campaign send jobs. On a business-hours schedule it fetches the current
    state of one or more send jobs, evaluates every one of them, and pages a
    Slack channel the moment a job transitions into a bad state, without
    re-paging on every subsequent poll.

    Why it is built this way: a Klaviyo send job is a short-lived object that
    settles into a terminal state and then stops changing. Naively re-polling a
    static list and alerting on every poll would either log "healthy" forever
    or re-page the same failure every cycle. To avoid that, the flow records
    each job's last-seen status in the KV store and alerts only when the
    current status is an alerting status AND differs from the last one seen.

    How it works:
      1. A Schedule trigger fires every 30 minutes during business hours
         (08:00 to 18:00 UTC, Monday to Friday). The cron matches the stated
         intent and pins an explicit timezone.
      2. `jobs.GetSendJob` fetches all send jobs in the `job_ids` input using
         `fetchType: FETCH`, so every job is evaluated rather than only the
         first.
      3. A `ForEach` iterates the fetched jobs. For each job it reads the
         last-seen status from the KV store, then an `If` alerts only on a
         transition into one of the `alerting_statuses` (cancelled, failed,
         error by default). Anything else is logged for the audit trail.
      4. After the alert decision, the current status is written back to the KV
         store with a 30-day TTL, so the next poll alerts only on a further
         transition. Writing after the alert branch means a failed Slack post
         does not silently suppress a future page.

    Reliability and operability:
      - `get_send_jobs` has a constant retry (4 attempts, 30s apart) and a
        5-minute timeout, so a transient 429 or 5xx self-heals instead of
        turning every Klaviyo blip into a "monitoring failed" false alarm.
      - A flow-level errors block posts a Slack alert with the execution id if
        the monitor itself fails.
      - `concurrency.limit` is 1 so a slow poll cannot overlap the next fire.
      - Shared credentials live in pluginDefaults (Klaviyo apiKey, Slack url).

    Status classification: the `alerting_statuses` default targets terminal bad
    states and deliberately does not treat "queued" as healthy, so a job stuck
    pre-send still surfaces. Verify the exact send-job status enum against the
    Klaviyo Campaign Send Job API for your account and adjust the input list.

    Keeping the watch list current: for in-flight monitoring, prune jobs that
    have reached a terminal state from `job_ids`, or feed the input from a
    discovery step that lists recently created send jobs, rather than polling a
    static hand-maintained list around the clock.

    Prerequisites:
      - A Klaviyo account with a Private API Key that has read access to
        campaign send jobs.
      - A Slack incoming webhook pointing at the marketing operations channel.

    Secrets:
      - KLAVIYO_API_KEY: Klaviyo Private API Key, sent as the `Klaviyo-API-Key`
        header by the send job task. Keep it secret, never hardcode it.
      - SLACK_WEBHOOK_URL: Slack incoming webhook URL used for the
        unhealthy-send alert and any flow-failure alert.

    Quick start:
      1. Add the KLAVIYO_API_KEY and SLACK_WEBHOOK_URL secrets to your Kestra
         namespace.
      2. Set the `job_ids` input to the send job IDs you want to watch and
         confirm the `alerting_statuses` match your account's status enum.
      3. Enable the flow. The business-hours schedule keeps jobs under watch
         and Slack stays quiet until a job transitions into a bad state.

    Expected outputs:
      - A Slack page for each send job that newly enters an alerting status.
      - A KV entry per job (key `klaviyo_send_job_<id>`) holding the last-seen
        status, used to deduplicate alerts across polls.

    Links:
      - Klaviyo plugin docs: https://kestra.io/plugins/plugin-klaviyo
      - Klaviyo Campaign Send Job API: https://developers.klaviyo.com/en/reference/get_campaign_send_job
      - Slack incoming webhooks: https://api.slack.com/messaging/webhooks
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: Scheduled Kestra flow that polls Klaviyo send jobs during business hours and pages Slack once when a send transitions into a bad state.
