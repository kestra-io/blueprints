id: beam-python-yaml-transform
namespace: company.team

labels:
  team: data
  domain: beam

inputs:
  - id: min_amount
    type: FLOAT
    defaults: 100.0
    description: Only keep orders whose total is greater than or equal to this amount. Typed FLOAT so the value cannot carry arbitrary Python into the Beam Filter.

  - id: source_url
    type: STRING
    defaults: https://huggingface.co/datasets/kestra/datasets/raw/main/csv/orders.csv
    description: Source orders CSV. Point this at a date-templated path to make the daily schedule genuinely incremental.


variables:
  run_date: "{{ (trigger.date ?? execution.startDate) | date('yyyy-MM-dd') }}"

tasks:
  - id: download_orders
    type: io.kestra.plugin.core.http.Download
    description: Pull the source orders CSV into Kestra internal storage.
    uri: "{{ inputs.source_url }}"
    saveAs: orders.csv
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    timeout: PT5M
    options:
      readTimeout: PT2M

  - id: write_pipeline
    type: io.kestra.plugin.core.storage.Write
    description: Build a Beam YAML pipeline that reads, filters, and writes the orders CSV. The threshold is passed as a typed Beam option, not concatenated into the filter code.
    extension: .yaml
    content: |
      pipeline:
        type: chain
        transforms:
          - type: ReadFromCsv
            config:
              path: orders.csv
          - type: Filter
            config:
              language: python
              keep:
                callable: |
                  import os
                  def fn(row):
                    return float(row.total) >= float(os.environ["MIN_AMOUNT"])
          - type: MapToFields
            config:
              language: python
              fields:
                order_id: "order_id"
                customer_name: "customer_name"
                total: "total"
          - type: WriteToCsv
            config:
              path: high_value_orders

  - id: transform_orders
    type: io.kestra.plugin.beam.RunPipeline
    description: Run the Beam YAML transform with the Python SDK on the DIRECT runner. min_amount is injected as the MIN_AMOUNT environment variable and read via os.environ inside the filter, not string-concatenated into the filter expression.
    sdk: PYTHON
    beamRunner: DIRECT
    containerImage: apache/beam_python3.11_sdk:2.71.0
    env:
      MIN_AMOUNT: "{{ inputs.min_amount }}"
    beforeCommands:
      - export MIN_AMOUNT="{{ inputs.min_amount }}"
    file: "{{ outputs.write_pipeline.uri }}"
    inputFiles:
      orders.csv: "{{ outputs.download_orders.uri }}"
    pipelineTimeoutSeconds: 600
    timeout: PT15M
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 2
    outputFiles:
      - "high_value_orders*"

  - id: archive_partition
    type: io.kestra.plugin.core.storage.Write
    description: Pin the filtered result to a date-partitioned key derived from the same run date as any output naming, so backfills and replays land in the correct partition.
    extension: .txt
    content: "high_value_orders for {{ render(vars.run_date) }}: {{ outputs.transform_orders.outputFiles }}"

  - id: log_result
    type: io.kestra.plugin.core.log.Log
    description: Log the run date and the captured output shard URIs.
    message: "Transformed orders for {{ render(vars.run_date) }} ready. Output shards: {{ outputs.transform_orders.outputFiles }}"

triggers:
  - id: daily_transform
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 5 * * *"
    timezone: Etc/UTC

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }})."

extend:
  shortDescription: Use the Beam YAML framework with the Python SDK to read, filter, and rewrite a daily orders CSV, backfill-safe and with a non-injectable threshold.
  title: Apache Beam Python YAML CSV Transform
  metaTitle: Beam YAML Python CSV transform
  description: |
    This blueprint shows the Apache Beam YAML framework in action with the Python SDK.
    On a daily schedule it downloads an orders CSV, filters and reshapes it with a
    declarative Beam YAML pipeline, and writes the filtered result back to Kestra internal
    storage keyed on the run date. No code, only YAML.

    ## When to use Beam YAML here
    Filtering a small CSV is below the threshold where Beam earns its weight; a `Filter`
    task or a one-line DuckDB query would be simpler. Treat this small CSV as a stand-in
    for a large partitioned source. Beam YAML pays off at volume, or when you will graduate
    the same declarative pipeline to a portable runner such as Flink, Spark, or Dataflow
    (see the sibling Flink blueprint) without rewriting the transforms.

    ## What this flow does
    1. A `Schedule` trigger fires every day at 05:00 in `Etc/UTC` (timezone is explicit so
       the run time does not drift with the server zone or DST).
    2. The `Download` task fetches `source_url` into internal storage as `orders.csv`, with
       `retry` and a `timeout` because a public-host download is the most likely transient
       failure here.
    3. The `Write` task renders a Beam YAML pipeline that reads the CSV, keeps only orders
       whose `total` is greater than or equal to the threshold, selects a subset of fields,
       and writes a `high_value_orders` CSV.
    4. The `RunPipeline` task runs the pipeline with `sdk: PYTHON` and `beamRunner: DIRECT`.
       The result is captured back through `outputFiles`.
    5. A `Write` task records the result under a date-partitioned key and a `Log` task prints
       the run date and shard URIs.

    ## Safe threshold injection
    `min_amount` is typed `FLOAT`, so Kestra rejects anything that is not a number before it
    reaches the pipeline. It is then passed to the worker as the `MIN_AMOUNT` environment
    variable and read with `os.environ` inside the `Filter` callable, instead of being
    string-concatenated into the filter expression. This avoids the expression-injection
    foot-gun you would create by interpolating a raw input directly into Python code. If you
    change this input to a free-text type or drive it from a webhook, validate it first and
    keep passing it as a parameter, never as concatenated code.

    ## Backfill safety
    The run date is derived from `{{ trigger.date ?? execution.startDate }}`, and the
    partition key is built from that same value. A backfill or replay for a past day therefore
    lands in the correct partition rather than under today's date. To make the schedule truly
    incremental, point `source_url` at a date-templated path built from the same `run_date`
    variable so each day reads a distinct slice rather than the same static file.

    ## Reliability
    - `download_orders` and `transform_orders` carry task-level `retry` plus a wall-clock
      `timeout`.
    - A flow-level `errors` block posts a Slack alert (with the execution id) on failure, so
      a missed scheduled run is never silent.
    - `concurrency.limit: 1` prevents an overrunning run or a backfill from clobbering the
      same output as the next scheduled fire.

    ## Reproducibility
    - The container image is pinned to `apache/beam_python3.11_sdk:2.71.0` rather than
      `:latest`.

    ## Environment type note
    With the DIRECT runner the pipeline executes locally in the task container, so no separate
    worker harness is needed. When you graduate this same pipeline to a portable runner such
    as Flink or Spark, set `options.environment_type`:
    - `LOOPBACK`: the runner connects back to the original Kestra task process to execute
      Python locally, avoiding a new worker container and the Docker socket mount. Lowest
      privilege, best for development.
    - `DOCKER`: the runner spawns a sibling worker container from `options.environment_config`
      (the Beam SDK image). Requires mounting `/var/run/docker.sock`. Best for distributed
      execution, but grant it only on isolated workers.

    ## Prerequisites
    - Docker available to the Kestra worker, with the pinned Beam image.
    - Outbound HTTPS so the `Download` task can fetch the source CSV.

    ## Secrets
    - `SLACK_WEBHOOK`: used only by the failure-alert `errors` block. The sample dataset is
      public, so the transform itself needs no credentials. To read from a private source,
      store the credential as a secret and reference it with `{{ secret('NAME') }}`.

    ## Quick start
    1. Add the flow. It runs on its daily schedule, or trigger it manually.
    2. Optionally adjust `min_amount` to change the filter threshold.
    3. Inspect the `transform_orders` Outputs tab and download the `high_value_orders` CSV.

    ## Expected outputs
    - `{{ outputs.transform_orders.outputFiles }}` is a map of file names to internal storage
      URIs, for example `high_value_orders-00000-of-00001.csv`.
    - `{{ outputs.download_orders.uri }}` is the `kestra://` URI of the source CSV.
    - `{{ outputs.transform_orders.exitCode }}` is `0` on success.

    ## Learn more
    - Apache Beam plugin: https://kestra.io/plugins/plugin-beam
    - Beam YAML framework: https://beam.apache.org/documentation/sdks/yaml/
    - Beam YAML transforms reference: https://beam.apache.org/releases/yamldoc/current/
  tags:
    - Data
  ee: false
  demo: true
  metaDescription: Read, filter, and rewrite a daily orders CSV with the Apache Beam YAML framework and Python SDK. Backfill-safe, with retry, alerting, and a safe threshold.
