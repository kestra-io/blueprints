id: opa-compliance-audit
namespace: company.team
description: |
  Daily cross-stack compliance audit with OPA. Collect facts from AWS and
  Kubernetes, evaluate them against a central OPA policy, and alert Slack when
  the decision returns any violations.

inputs:
  - id: opa_policy_path
    type: STRING
    defaults: compliance/violations
    description: OPA data path (relative to /v1/data) that returns the violation list.
  - id: k8s_namespace
    type: STRING
    defaults: production
    description: Kubernetes namespace to audit.

tasks:
  - id: collect_aws
    type: io.kestra.plugin.aws.cli.AwsCLI
    description: Collect AWS facts (here, public-access settings for S3 buckets).
    accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
    secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
    region: "{{ secret('AWS_DEFAULT_REGION') }}"
    commands:
      - aws s3api list-buckets --query 'Buckets[].Name' --output json

  - id: collect_k8s
    type: io.kestra.plugin.kubernetes.kubectl.Get
    description: Collect the Deployments in the audited namespace.
    connection:
      masterUrl: "{{ secret('K8S_MASTER_URL') }}"
      oauthToken: "{{ secret('K8S_TOKEN') }}"
    namespace: "{{ inputs.k8s_namespace }}"
    resourceType: deployments
    fetchType: FETCH

  - id: evaluate
    type: io.kestra.plugin.ee.opa.policy.Evaluate
    description: Evaluate the collected facts against the compliance policy.
    policyPath: "{{ inputs.opa_policy_path }}"
    input:
      aws_buckets: "{{ outputs.collect_aws.stdOutLineCount }}"
      kubernetes_deployments: "{{ outputs.collect_k8s.items }}"

  - id: alert_on_violations
    type: io.kestra.plugin.core.flow.If
    description: Notify Slack when the policy returns violations.
    condition: "{{ outputs.evaluate.defined and (outputs.evaluate.result | length) > 0 }}"
    then:
      - id: notify_violations
        type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
        description: Post the violation summary to Slack.
        url: "{{ secret('SLACK_WEBHOOK_URL') }}"
        payload: |
          {
            "text": "Compliance audit found {{ outputs.evaluate.result | length }} violation(s) in {{ inputs.k8s_namespace }}. Review the OPA decision {{ outputs.evaluate.decisionId }}."
          }

pluginDefaults:
  - type: io.kestra.plugin.ee.opa.policy.Evaluate
    values:
      url: "{{ secret('OPA_URL') }}"
      token: "{{ secret('OPA_TOKEN') }}"

triggers:
  - id: daily_audit
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run the compliance audit daily. Adjust or disable as needed.
    cron: "0 7 * * *"
    disabled: true

extend:
  shortDescription: Collect AWS and Kubernetes facts, evaluate them with OPA, and alert Slack on any violations.
  title: Daily Cross-Stack Compliance Audit with OPA
  metaTitle: Daily Cross-Stack Compliance Audit with OPA
  description: |
    This blueprint runs a recurring compliance check across clouds and clusters
    from one place. It gathers facts from AWS and Kubernetes, sends them to OPA as
    the input document for a central policy, and posts to Slack whenever the
    decision returns violations. The policy stays the single source of truth for
    what compliant looks like.

    Prerequisites:
      - Secrets:
        - AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION: AWS access for the CLI step.
        - K8S_MASTER_URL, K8S_TOKEN: Kubernetes API access for kubectl.
        - OPA_URL, OPA_TOKEN: OPA server URL and token.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - An OPA policy at the configured data path that returns a list of violations.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Load a policy whose data path (opa_policy_path) returns a violations array.
      3. Run the flow; adapt collect_aws and collect_k8s to the facts your policy expects.

    Outputs:
      - outputs.collect_aws / outputs.collect_k8s: the gathered facts.
      - outputs.evaluate.result: the policy decision (the violations list).
      - outputs.evaluate.decisionId: OPA decision id when decision logging is enabled.

    Notes:
      - Tune the input document and the If condition to match your policy's output shape.
      - Extend the fact collection (more AWS or kubectl calls) as your policy grows.
  tags:
    - Infrastructure
  ee: true
  demo: false
  metaDescription: Collect AWS and Kubernetes facts, evaluate them against an OPA policy, and alert Slack when violations are found.
