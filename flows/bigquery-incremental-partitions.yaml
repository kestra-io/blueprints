id: bigquery-incremental-partitions
namespace: company.team
description: |
  Refresh only the BigQuery partitions that changed instead of rescanning the
  whole table. For each day in a small rolling window, the flow loads that
  day's GCS files into the matching partition with a partition decorator and
  WRITE_TRUNCATE, so each partition is atomically replaced and cost tracks the
  delta. Reruns are safe because each load truncates just its own partition.

inputs:
  - id: day_offsets
    type: JSON
    defaults: [0, -1, -2]
    description: Days to refresh, counting back from today (0 = today, -1 = yesterday). Covers your late-arriving-data window.

tasks:
  - id: refresh_window
    type: io.kestra.plugin.core.flow.ForEach
    description: Replace each day's partition from its own GCS path, one at a time.
    values: "{{ inputs.day_offsets }}"
    concurrencyLimit: 1
    tasks:
      - id: load_partition
        type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
        description: Load one day's files into that day's partition, truncating just that partition.
        allowFailure: true
        from:
          - "gs://{{ secret('GCS_BUCKET') }}/events/dt={{ now() | dateAdd(taskrun.value, 'DAYS') | date('yyyy-MM-dd') }}/*.parquet"
        destinationTable: "{{ secret('GCP_PROJECT_ID') }}.analytics.events${{ now() | dateAdd(taskrun.value, 'DAYS') | date('yyyyMMdd') }}"
        format: PARQUET
        writeDisposition: WRITE_TRUNCATE

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Confirm the incremental partition refresh.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "BigQuery partition refresh complete for {{ inputs.day_offsets | length }} day(s) (execution {{ execution.id }})."
      }

pluginDefaults:
  - type: io.kestra.plugin.gcp.bigquery
    values:
      projectId: "{{ secret('GCP_PROJECT_ID') }}"
      serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT') }}"

triggers:
  - id: daily
    type: io.kestra.plugin.core.trigger.Schedule
    description: Refresh the recent partitions on a cadence. Adjust or disable as needed.
    cron: "0 5 * * *"
    disabled: true

errors:
  - id: alert_on_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Alert Slack if the partition refresh fails.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "BigQuery partition refresh failed (execution {{ execution.id }})."
      }

extend:
  shortDescription: For each day in a rolling window, load that day's GCS files into the matching partition with WRITE_TRUNCATE so cost tracks the delta.
  title: BigQuery Partition-Aware Incremental Refresh
  metaTitle: BigQuery Partition-Aware Incremental Refresh
  description: |
    This blueprint refreshes only the BigQuery partitions that changed rather
    than reprocessing the whole table. It loops over a small rolling window of
    days and, for each day, loads just that day's GCS files into the matching
    partition using a partition decorator (table$YYYYMMDD) with WRITE_TRUNCATE.
    Each partition is atomically replaced, the load is scoped to one day's files
    so it never rescans history, and a rerun is safe because each load truncates
    only its own partition.

    Prerequisites:
      - Secrets:
        - GCP_PROJECT_ID: GCP project hosting the dataset.
        - GCP_SERVICE_ACCOUNT: service account key JSON with BigQuery job and GCS read access.
        - GCS_BUCKET: bucket holding the day-partitioned source files.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - A day-partitioned BigQuery table analytics.events and GCS objects laid out under events/dt=YYYY-MM-DD/.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Point the GCS path and destinationTable at your partitioned data.
      3. Set day_offsets to cover how far back late data can arrive (e.g. [0,-1,-2,-3,-4,-5,-6] for a week).

    Outputs:
      - outputs.refresh_window: per-day load results, including rows loaded.

    Notes:
      - The partition decorator (events$YYYYMMDD) with WRITE_TRUNCATE replaces exactly one partition per load; nothing outside the window is touched.
      - allowFailure is set on the per-day load so a day with no GCS files (no matching URIs) does not fail the whole run; remove it if every day must exist.
      - Loading per day keeps each job small and the cost proportional to the delta; widen or narrow day_offsets to trade freshness for cost.
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: For each day in a rolling window, load that day's GCS files into the matching BigQuery partition with WRITE_TRUNCATE so cost tracks the delta.
