id: terraform-ansible-argocd-chain
namespace: company.team
description: |
  Provision, configure, and deploy in one chain. Terraform provisions the
  infrastructure, Ansible configures the hosts, and Argo CD syncs the
  application, with a final status check and a Slack summary.

tasks:
  - id: provision
    type: io.kestra.plugin.terraform.cli.TerraformCLI
    description: Provision the infrastructure with Terraform.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: hashicorp/terraform:latest
    env:
      AWS_ACCESS_KEY_ID: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      AWS_SECRET_ACCESS_KEY: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
    inputFiles:
      main.tf: |
        terraform {
          required_providers {
            random = { source = "hashicorp/random" }
          }
        }
        resource "random_pet" "node" {}
    beforeCommands:
      - terraform init
    commands:
      - terraform apply -no-color -auto-approve

  - id: configure
    type: io.kestra.plugin.ansible.cli.AnsibleCLI
    description: Configure the provisioned hosts with Ansible.
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    inputFiles:
      inventory.ini: |
        [app]
        app-host-01
      site.yml: |
        ---
        - name: Configure application hosts
          hosts: app
          gather_facts: false
          tasks:
            - name: Confirm reachability
              ansible.builtin.ping:
    commands:
      - ansible-playbook -i inventory.ini site.yml

  - id: deploy
    type: io.kestra.plugin.argocd.apps.Sync
    description: Sync the Argo CD application to deploy the new release.
    application: my-argocd-app
    prune: true
    revision: HEAD

  - id: verify
    type: io.kestra.plugin.argocd.apps.Status
    description: Confirm the application is healthy after sync.
    application: my-argocd-app

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Report the end-to-end result to Slack.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Provision -> configure -> deploy chain complete for execution {{ execution.id }}."
      }

pluginDefaults:
  - type: io.kestra.plugin.argocd.apps.Sync
    values:
      server: "{{ secret('ARGOCD_SERVER') }}"
      token: "{{ secret('ARGOCD_TOKEN') }}"
  - type: io.kestra.plugin.argocd.apps.Status
    values:
      server: "{{ secret('ARGOCD_SERVER') }}"
      token: "{{ secret('ARGOCD_TOKEN') }}"

triggers:
  - id: on_release
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run the chain on a release cadence. Adjust or disable as needed.
    cron: "0 10 * * 1-5"
    disabled: true

extend:
  shortDescription: Chain Terraform provisioning, Ansible configuration, and an Argo CD sync with a final health check.
  title: Provision with Terraform, Configure with Ansible, Deploy with Argo CD
  metaTitle: Provision with Terraform, Configure with Ansible, Deploy with Argo CD
  description: |
    This blueprint runs the full provision-configure-deploy chain as one audited
    flow. Terraform provisions the infrastructure, Ansible configures the hosts,
    Argo CD syncs the application, and a status check confirms it is healthy before
    Slack reports the outcome. Each tool keeps its job; Kestra coordinates them.

    Prerequisites:
      - Secrets:
        - AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY: Terraform provider credentials.
        - ARGOCD_SERVER, ARGOCD_TOKEN: Argo CD endpoint and API token.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - Ansible on the worker (Process runner) and an existing Argo CD application.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Replace the stub Terraform, inventory, and playbook with your real assets.
      3. Point the Argo CD tasks at your application name.

    Outputs:
      - outputs.provision / outputs.configure: Terraform and Ansible run results.
      - outputs.deploy / outputs.verify: Argo CD sync and status payloads.

    Notes:
      - Each step fails the chain on error, so a failed provision never reaches configure or deploy.
      - Swap the stub steps for your real provisioning, configuration, and application.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Chain Terraform provisioning, Ansible configuration, and an Argo CD sync with a final health check and Slack summary.
