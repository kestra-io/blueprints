id: beam-flink-portable-pipeline
namespace: company.team

labels:
  team: data
  domain: beam

inputs:
  - id: parallelism
    type: INT
    defaults: 2
    description: Number of parallel Flink subtasks to request for the pipeline.

  - id: job_endpoint
    type: STRING
    defaults: "localhost:8099"
    description: Beam Flink JobServer endpoint. localhost works only when the JobServer shares the worker host or network namespace; set a routable host:port for a real cluster.

  - id: flink_rest_url
    type: STRING
    defaults: "http://localhost:8082"
    description: Flink REST API URL, used for the pre-submit reachability check and surfaced in logs so an operator can open the Flink dashboard.

  - id: source_uri
    type: STRING
    defaults: https://huggingface.co/datasets/kestra/datasets/raw/main/csv/orders.csv
    description: Source the upstream ingestion produced. Defaults to a public orders CSV so the blueprint is runnable; point it at the real sink your ingest_raw_events flow writes.


tasks:
  - id: download_source
    type: io.kestra.plugin.core.http.Download
    description: Pull the ingested dataset into Kestra internal storage so the Flink job processes real data, not a literal.
    uri: "{{ inputs.source_uri }}"
    saveAs: orders.csv
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    timeout: PT5M
    options:
      readTimeout: PT2M

  - id: check_jobserver
    type: io.kestra.plugin.core.http.Request
    description: Verify the Flink REST API answers before submitting, so an unreachable cluster fails fast with a clear error instead of a long opaque submit timeout.
    uri: "{{ inputs.flink_rest_url }}/overview"
    method: GET
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 5
    timeout: PT2M
    options:
      readTimeout: PT30S

  - id: write_pipeline
    type: io.kestra.plugin.core.storage.Write
    description: Render a Beam YAML pipeline that does a real distributed aggregation (revenue per product category) so the Flink runner is justified by the work, not n*n on ten integers.
    extension: .yaml
    content: |
      pipeline:
        type: chain
        transforms:
          - type: ReadFromCsv
            config:
              path: orders.csv
          - type: MapToFields
            config:
              language: python
              fields:
                category: "category"
                revenue:
                  callable: |
                    def fn(row):
                      return float(row.total)
          - type: Combine
            config:
              group_by: category
              combine:
                revenue: sum
          - type: WriteToCsv
            config:
              path: revenue_by_category
          - type: LogForTesting

  - id: run_on_flink
    type: io.kestra.plugin.beam.RunPipeline
    description: Submit the Python pipeline to the Flink portable runner through the JobServer.
    sdk: PYTHON
    beamRunner: FLINK
    containerImage: apache/beam_python3.11_sdk:2.71.0
    file: "{{ outputs.write_pipeline.uri }}"
    inputFiles:
      orders.csv: "{{ outputs.download_source.uri }}"
    pipelineTimeoutSeconds: 900
    timeout: PT30M
    retry:
      type: constant
      interval: PT30S
      maxAttempt: 3
    outputFiles:
      - "revenue_by_category*"
    options:
      job_endpoint: "{{ inputs.job_endpoint }}"
      environment_type: "LOOPBACK"
      parallelism: "{{ inputs.parallelism }}"
    runnerConfig:
      flinkRestUrl: "{{ inputs.flink_rest_url }}"

  - id: log_result
    type: io.kestra.plugin.core.log.Log
    description: Surface the Flink dashboard URL and the captured output so an operator can see what the job did, not just an exit code.
    message: "Flink portable pipeline finished. Dashboard: {{ inputs.flink_rest_url }}. Output shards: {{ outputs.run_on_flink.outputFiles }}"

triggers:
  - id: after_ingestion
    type: io.kestra.plugin.core.trigger.Flow
    preconditions:
      id: ingestion_done
      flows:
        - namespace: company.team
          flowId: ingest_raw_events
          states:
            - SUCCESS

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} Flink submission failed (execution {{ execution.id }}). Check {{ inputs.flink_rest_url }}."

extend:
  shortDescription: Submit a Python Apache Beam pipeline that aggregates real data on a distributed Flink portable runner via a JobServer, triggered after upstream ingestion succeeds.
  title: Apache Beam Distributed Pipeline on Flink (Portable Runner)
  metaTitle: Apache Beam on Flink Portable Runner with Kestra
  metaDescription: Run a Python Apache Beam pipeline on a distributed Flink portable runner with Kestra. Event-driven, with pre-submit checks, retries, and Slack alerting.
  description: |
    Run an Apache Beam Python pipeline on a distributed Flink cluster through the portable runner, orchestrated by Kestra. A Beam JobServer bridges the serialized Python pipeline to the Flink JobManager and TaskManager, and a worker harness executes the Python code. This blueprint solves a common gap: Beam and Flink can run a job, but they cannot wait for upstream ingestion, retry a not-yet-ready JobServer, alert on failure, or capture the output back into a governed store. Kestra wires those pieces together so a distributed aggregation runs only when its input is fresh, and never silently.

    ## How it works
    1. A `io.kestra.plugin.core.trigger.Flow` trigger (`after_ingestion`) fires once an upstream flow `ingest_raw_events` in `company.team` finishes with state `SUCCESS`.
    2. `download_source` (`io.kestra.plugin.core.http.Download`) pulls the `source_uri` input into Kestra internal storage as `orders.csv`, with a `constant` retry and a `PT5M` timeout.
    3. `check_jobserver` (`io.kestra.plugin.core.http.Request`) hits the Flink REST API `/overview` so an unreachable cluster fails fast instead of hanging on a long submit timeout.
    4. `write_pipeline` (`io.kestra.plugin.core.storage.Write`) renders a Beam YAML pipeline that reads the CSV, sums revenue per product category with a `Combine` group-by (a real shuffle), and writes the result to CSV.
    5. `run_on_flink` (`io.kestra.plugin.beam.RunPipeline`) submits the pipeline with `sdk: PYTHON` and `beamRunner: FLINK` to the JobServer at `options.job_endpoint`, points at the cluster via `runnerConfig.flinkRestUrl`, and captures `outputFiles` matching `revenue_by_category*`.
    6. `log_result` (`io.kestra.plugin.core.log.Log`) reports the Flink dashboard URL and the captured output shards.

    ## What you get
    - A distributed Beam aggregation that runs only after its upstream data is confirmed ready.
    - A pre-submit reachability check so a down cluster fails in seconds, not minutes.
    - Captured output shards pulled back into Kestra internal storage as governed artifacts.
    - Retries on download, the reachability check, and the Flink submission for transient faults.
    - A Slack alert on any failure, carrying the execution id and the Flink dashboard URL.

    ## Who it's for
    - Data engineers running Beam pipelines on Flink who need event-driven scheduling.
    - Platform teams standardizing how distributed jobs are submitted, retried, and monitored.
    - Analytics teams aggregating ingested datasets on a shared Flink cluster.

    ## Why orchestrate this with Kestra
    The Beam SDK and the Flink scheduler can execute a job, but neither can react to an upstream flow completing, the gap this blueprint fills with a `Flow` trigger that fires on `ingest_raw_events` success. Kestra adds declarative YAML pipelines, per-task `retry` and `timeout` so a briefly unready JobServer is retried rather than failing the run, full lineage across download, submit, and capture, and an `errors` block that turns a silent distributed failure into a Slack alert. Output files land back in internal storage as tracked artifacts, something a fire-and-forget runner submission does not give you.

    ## Prerequisites
    A running Flink cluster and Beam JobServer reachable from the Kestra worker. This cannot be sandboxed, hence `demo: false`.
    - A Flink JobManager and at least one TaskManager (for example the `flink:1.18` images) with the REST API exposed (default `:8082`).
    - A Beam Flink JobServer (`apache/beam_flink1.18_job_server:2.71.0`) exposing the job endpoint on `:8099`.
    - The flow defaults to `environment_type: LOOPBACK`, the lowest-privilege worker harness: no Docker socket, no `privileged: true`, no host networking.

    ### Secrets
    - `SLACK_WEBHOOK`: used only by the `alert_failure` error handler. No cluster credentials are needed for this reference flow because the JobServer and Flink cluster are reached over the local network. If your cluster sits behind authentication, store the token as a secret and inject it with `{{ secret('NAME') }}` rather than hardcoding it.

    ## Quick start
    1. Stand up the Flink JobManager, TaskManager, and Beam JobServer, and confirm they answer on `job_endpoint` and `flink_rest_url`.
    2. Add a `SLACK_WEBHOOK` secret for failure alerts.
    3. Deploy this flow alongside the upstream `ingest_raw_events` flow, or run it manually with the default public `source_uri`.
    4. Run `ingest_raw_events`. On success the `after_ingestion` trigger launches this pipeline.
    5. Watch the Flink dashboard (logged by `log_result`) and the `run_on_flink` task logs.

    ## How to extend
    - Point `source_uri` at the real sink your ingestion writes, and bring your own `ingest_raw_events` flow.
    - Switch `environment_type` to `DOCKER` or `EXTERNAL` for production worker pools (DOCKER needs a mounted Docker socket plus `privileged: true` and host networking, so run it only on isolated workers).
    - Tune `parallelism` to match your TaskManager slots, and version-match the SDK and JobServer images.
    - Replace the `Combine` group-by with your own Beam YAML transforms, or write results to a warehouse instead of CSV.

    ## Links
    - Apache Beam plugin: https://kestra.io/plugins/plugin-beam
    - Beam Flink runner: https://beam.apache.org/documentation/runners/flink/
    - Beam portability and JobServer: https://beam.apache.org/roadmap/portability/
    - Beam YAML framework: https://beam.apache.org/documentation/sdks/yaml/
  tags:
    - Data
  ee: false
  demo: false
