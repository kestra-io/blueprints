id: beam-flink-portable-pipeline
namespace: company.team

labels:
  team: data
  domain: beam

inputs:
  - id: parallelism
    type: INT
    defaults: 2
    description: Number of parallel Flink subtasks to request for the pipeline.

  - id: job_endpoint
    type: STRING
    defaults: "localhost:8099"
    description: Beam Flink JobServer endpoint. localhost works only when the JobServer shares the worker host or network namespace; set a routable host:port for a real cluster.

  - id: flink_rest_url
    type: STRING
    defaults: "http://localhost:8082"
    description: Flink REST API URL, used for the pre-submit reachability check and surfaced in logs so an operator can open the Flink dashboard.

  - id: source_uri
    type: STRING
    defaults: https://huggingface.co/datasets/kestra/datasets/raw/main/csv/orders.csv
    description: Source the upstream ingestion produced. Defaults to a public orders CSV so the blueprint is runnable; point it at the real sink your ingest_raw_events flow writes.


tasks:
  - id: download_source
    type: io.kestra.plugin.core.http.Download
    description: Pull the ingested dataset into Kestra internal storage so the Flink job processes real data, not a literal.
    uri: "{{ inputs.source_uri }}"
    saveAs: orders.csv
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    timeout: PT5M
    options:
      readTimeout: PT2M

  - id: check_jobserver
    type: io.kestra.plugin.core.http.Request
    description: Verify the Flink REST API answers before submitting, so an unreachable cluster fails fast with a clear error instead of a long opaque submit timeout.
    uri: "{{ inputs.flink_rest_url }}/overview"
    method: GET
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 5
    timeout: PT2M
    options:
      readTimeout: PT30S

  - id: write_pipeline
    type: io.kestra.plugin.core.storage.Write
    description: Render a Beam YAML pipeline that does a real distributed aggregation (revenue per product category) so the Flink runner is justified by the work, not n*n on ten integers.
    extension: .yaml
    content: |
      pipeline:
        type: chain
        transforms:
          - type: ReadFromCsv
            config:
              path: orders.csv
          - type: MapToFields
            config:
              language: python
              fields:
                category: "category"
                revenue:
                  callable: |
                    def fn(row):
                      return float(row.total)
          - type: Combine
            config:
              group_by: category
              combine:
                revenue: sum
          - type: WriteToCsv
            config:
              path: revenue_by_category
          - type: LogForTesting

  - id: run_on_flink
    type: io.kestra.plugin.beam.RunPipeline
    description: Submit the Python pipeline to the Flink portable runner through the JobServer.
    sdk: PYTHON
    beamRunner: FLINK
    containerImage: apache/beam_python3.11_sdk:2.71.0
    file: "{{ outputs.write_pipeline.uri }}"
    inputFiles:
      orders.csv: "{{ outputs.download_source.uri }}"
    pipelineTimeoutSeconds: 900
    timeout: PT30M
    retry:
      type: constant
      interval: PT30S
      maxAttempt: 3
    outputFiles:
      - "revenue_by_category*"
    options:
      job_endpoint: "{{ inputs.job_endpoint }}"
      environment_type: "LOOPBACK"
      parallelism: "{{ inputs.parallelism }}"
    runnerConfig:
      flinkRestUrl: "{{ inputs.flink_rest_url }}"

  - id: log_result
    type: io.kestra.plugin.core.log.Log
    description: Surface the Flink dashboard URL and the captured output so an operator can see what the job did, not just an exit code.
    message: "Flink portable pipeline finished. Dashboard: {{ inputs.flink_rest_url }}. Output shards: {{ outputs.run_on_flink.outputFiles }}"

triggers:
  - id: after_ingestion
    type: io.kestra.plugin.core.trigger.Flow
    preconditions:
      id: ingestion_done
      flows:
        - namespace: company.team
          flowId: ingest_raw_events
          states:
            - SUCCESS

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} Flink submission failed (execution {{ execution.id }}). Check {{ inputs.flink_rest_url }}."

extend:
  shortDescription: Submit a Python Beam pipeline that aggregates real data on a distributed Flink portable runner via a JobServer after upstream ingestion succeeds.
  title: Apache Beam Distributed Pipeline on Flink (Portable Runner)
  metaTitle: Beam Flink portable runner pipeline
  description: |
    This blueprint runs an Apache Beam Python pipeline on a distributed Flink cluster using
    the portable runner. A JobServer bridges the serialized Python pipeline to the Flink
    JobManager and TaskManager, and the worker harness executes the Python code. The flow is
    chained off an upstream ingestion flow with a Flow trigger and aggregates the data that
    ingestion produced, so the distributed runner is justified by a real GroupBy aggregation
    rather than a toy transform.

    ## Bring your own upstream
    The Flow trigger fires after a flow named `ingest_raw_events` in `company.team` succeeds.
    That flow is not shipped here: treat it as bring-your-own upstream, or point `source_uri`
    at the dataset it produces. The default `source_uri` is a public orders CSV so the
    blueprint is runnable standalone.

    ## What this flow does
    1. A `Flow` trigger fires after the upstream `ingest_raw_events` flow finishes with state
       `SUCCESS`.
    2. The `Download` task pulls `source_uri` into internal storage as `orders.csv`.
    3. The `Request` task hits the Flink REST API (`/overview`) to confirm the cluster is
       reachable before submitting, so an unreachable JobServer fails fast with a clear error.
    4. The `Write` task renders a Beam YAML pipeline that reads the CSV, sums revenue per
       product category with a `Combine` group-by (a real shuffle), and writes the result to
       CSV. This is the kind of aggregation that justifies a distributed runner.
    5. The `RunPipeline` task submits the pipeline with `sdk: PYTHON` and `beamRunner: FLINK`,
       targeting the JobServer at `options.job_endpoint`, and points at the Flink REST API via
       `runnerConfig.flinkRestUrl`. The result is captured via `outputFiles`.
    6. A `Log` task reports the Flink dashboard URL and the captured output shards.

    ## Worker harness and security
    This flow defaults to `environment_type: LOOPBACK`, where the TaskManager connects back to
    the Kestra task process to execute Python locally. LOOPBACK is the lowest-privilege option:
    it needs no Docker socket mount, no `privileged: true`, and no host networking. Start here.

    The alternative is `environment_type: DOCKER`, where the Flink TaskManager spawns a sibling
    Beam SDK worker container through the Docker socket. That requires the task runner to mount
    `/var/run/docker.sock` and run `privileged: true` with `networkMode: host`:

    ```yaml
      privileged: true
      networkMode: host
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    options:
      environment_type: "DOCKER"
      environment_config: "apache/beam_python3.11_sdk:2.71.0"
    ```

    Security warning: `privileged: true` plus a mounted Docker socket plus host networking is
    effectively root on the host and is container-escape-equivalent. Do not paste this onto a
    shared worker. Run it only on isolated, dedicated workers, and prefer LOOPBACK (or a
    pre-provisioned `EXTERNAL` worker pool) wherever you can. A third option, `EXTERNAL`,
    connects to an already-running worker pool on a fixed port and avoids granting the task any
    Docker access at all.

    ## Endpoints are inputs
    `job_endpoint`, `flink_rest_url`, and `source_uri` are inputs with `localhost` defaults for
    the docker-compose / single-host case. For a real cluster the JobServer and Flink REST are
    rarely on the worker's own host, so set routable values. `parallelism` is an `INT` input so
    it is validated as a number.

    ## Container topology
    - Container A (Kestra): the `RunPipeline` task that submits the job.
    - Container B (JobServer): the Beam Flink JobServer receiving the job at `job_endpoint`.
    - Container C (TaskManager): the Flink TaskManager that executes the pipeline.
    - Container D (Worker): the Python SDK harness. With LOOPBACK this is the Kestra task
      process itself; with DOCKER the TaskManager spawns a sibling container via the socket.

    ## Reliability
    - `download_source`, `check_jobserver`, and `run_on_flink` carry task-level `retry` plus a
      wall-clock `timeout`, so a JobServer that is briefly not ready or a transient connection
      reset is retried rather than failing the run.
    - A flow-level `errors` block posts a Slack alert (with the execution id and the Flink URL)
      on any failure, so a failed distributed submission is never silent.
    - `concurrency.limit: 1` prevents repeated or backfilled ingestion successes from stacking
      multiple heavy Flink submissions against one cluster.

    ## Reproducibility
    - Both the SDK image and (for the DOCKER path) the worker image are pinned to
      `apache/beam_python3.11_sdk:2.71.0`. Keep the JobServer image version-matched, for
      example `apache/beam_flink1.18_job_server:2.71.0`.

    ## Prerequisites
    This flow needs a running Flink cluster and JobServer reachable from the Kestra worker. It
    cannot be sandboxed, hence `demo: false`. Provide:
    - A Flink JobManager and at least one TaskManager (for example the `flink:1.18` images),
      with the Flink REST API exposed (default `:8082`).
    - A Beam Flink JobServer (`apache/beam_flink1.18_job_server:2.71.0`) exposing the job
      endpoint on `:8099`.
    - For the DOCKER worker path only: the Docker socket mounted into the task runner and
      `privileged: true` with `networkMode: host`. LOOPBACK needs none of this.

    ## Secrets
    - `SLACK_WEBHOOK`: used only by the failure-alert `errors` block. No cluster credentials are
      required for this reference flow because the JobServer and Flink cluster are reached over
      the local network. If your cluster sits behind authentication, store the token as a secret
      and inject it with `{{ secret('NAME') }}` rather than hardcoding it.

    ## Quick start
    1. Stand up the Flink JobManager, TaskManager, and Beam JobServer, and confirm the JobServer
       answers on `job_endpoint` and the Flink REST API on `flink_rest_url`.
    2. Deploy this flow alongside the upstream `ingest_raw_events` flow (or run it manually with
       the default public `source_uri`).
    3. Run `ingest_raw_events`. On success, the Flow trigger launches this pipeline.
    4. Watch the Flink dashboard (logged by `log_result`) and the `run_on_flink` task logs.

    ## Expected outputs
    - `{{ outputs.run_on_flink.exitCode }}` is `0` once the Flink job completes.
    - `{{ outputs.run_on_flink.outputFiles }}` is a map of `revenue_by_category` shard names to
      internal storage URIs.
    - `{{ outputs.write_pipeline.uri }}` is the `kestra://` URI of the submitted pipeline.
    - Pipeline records also appear in the `run_on_flink` logs via the `LogForTesting` transform.

    ## Learn more
    - Apache Beam plugin: https://kestra.io/plugins/plugin-beam
    - Beam Flink runner: https://beam.apache.org/documentation/runners/flink/
    - Beam portability and JobServer: https://beam.apache.org/roadmap/portability/
    - Beam YAML framework: https://beam.apache.org/documentation/sdks/yaml/
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Aggregate real data with a Python Apache Beam pipeline on a distributed Flink portable runner, with retry, alerting, and a low-privilege LOOPBACK default.
