id: slack-snowflake-canvas
namespace: company.team
description: |
  Publish a daily Snowflake digest as an editable Slack Canvas. Query Snowflake,
  format the results into Markdown, and create a Canvas the team can read and
  annotate, instead of a transient chat message.

inputs:
  - id: snowflake_url
    type: STRING
    defaults: jdbc:snowflake://your_account.snowflakecomputing.com?warehouse=COMPUTE_WH&db=ANALYTICS
    description: Snowflake JDBC URL including warehouse and database.

tasks:
  - id: query_metrics
    type: io.kestra.plugin.jdbc.snowflake.Query
    description: Query the headline metrics for the digest.
    url: "{{ inputs.snowflake_url }}"
    username: "{{ secret('SNOWFLAKE_USERNAME') }}"
    password: "{{ secret('SNOWFLAKE_PASSWORD') }}"
    fetchType: FETCH
    sql: |
      SELECT metric_name, metric_value
      FROM daily_metrics
      WHERE metric_date = CURRENT_DATE
      ORDER BY metric_name

  - id: format_markdown
    type: io.kestra.plugin.scripts.python.Script
    description: Turn the query rows into a Markdown digest.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: python:3.11-slim
    beforeCommands:
      - pip install kestra
    inputFiles:
      rows.json: "{{ outputs.query_metrics.rows }}"
    script: |
      import json
      from kestra import Kestra

      with open("rows.json") as f:
          rows = json.load(f)

      lines = ["## Daily metrics", ""]
      for r in rows:
          lines.append(f"- **{r['METRIC_NAME']}**: {r['METRIC_VALUE']}")

      Kestra.outputs({"markdown": "\n".join(lines)})

  - id: publish_canvas
    type: io.kestra.plugin.slack.app.canvases.Create
    description: Create the editable Slack Canvas with the digest.
    token: "{{ secret('SLACK_TOKEN') }}"
    title: "Daily metrics {{ execution.startDate | date('yyyy-MM-dd') }}"
    documentContent:
      type: markdown
      markdown: "{{ outputs.format_markdown.vars.markdown }}"

triggers:
  - id: daily_digest
    type: io.kestra.plugin.core.trigger.Schedule
    description: Publish the digest every morning. Adjust or disable as needed.
    cron: "0 7 * * *"
    disabled: true

extend:
  shortDescription: Query Snowflake, format the results as Markdown, and publish them as an editable Slack Canvas.
  title: Daily Snowflake Digest as a Slack Canvas
  metaTitle: Daily Snowflake Digest as a Slack Canvas
  description: |
    This blueprint turns a daily Snowflake query into a living document. It reads
    the headline metrics, formats them into Markdown, and publishes a Slack Canvas
    the team can read and edit, rather than a chat message that scrolls away.

    Prerequisites:
      - Secrets:
        - SNOWFLAKE_USERNAME, SNOWFLAKE_PASSWORD: Snowflake credentials.
        - SLACK_TOKEN: Slack token with canvases:write scope.
      - A Snowflake table with the metrics to publish.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Point snowflake_url at your account, warehouse, and database.
      3. Adjust the SQL and the Markdown formatting to your metrics.

    Outputs:
      - outputs.query_metrics.rows: the queried metric rows.
      - outputs.format_markdown.vars.markdown: the rendered Markdown.
      - outputs.publish_canvas.canvasId: the created Canvas ID.

    Notes:
      - Column names from Snowflake are uppercase; the formatter reads them accordingly.
      - The Slack Canvas API only accepts Markdown content.
  tags:
    - Business
    - Data
  ee: false
  demo: false
  metaDescription: Query Snowflake, format the results as Markdown, and publish them as an editable Slack Canvas each morning.
