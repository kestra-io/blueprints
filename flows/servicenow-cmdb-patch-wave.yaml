id: servicenow-cmdb-patch-wave
namespace: company.team
description: |
  Drive a patch wave from the ServiceNow CMDB. Query the CIs that are due for
  patching, run the patch runbook against each as a subflow, and update each CMDB
  record so the source of truth stays accurate.

inputs:
  - id: ci_query
    type: STRING
    defaults: install_status=1^u_patch_due=true
    description: ServiceNow encoded query selecting the CIs to patch.
  - id: patch_runbook_id
    type: STRING
    defaults: ansible-rolling-patch-wave
    description: Flow ID of the patch runbook to run per CI.

tasks:
  - id: list_cis
    type: io.kestra.plugin.servicenow.Get
    description: Query the CMDB for the configuration items due for patching.
    table: cmdb_ci_server
    query: "{{ inputs.ci_query }}"
    fetchType: FETCH

  - id: patch_each_ci
    type: io.kestra.plugin.core.flow.ForEach
    description: Patch each CI via the runbook and update its CMDB record.
    values: "{{ outputs.list_cis.results }}"
    concurrencyLimit: 2
    tasks:
      - id: run_patch
        type: io.kestra.plugin.core.flow.Subflow
        description: Run the patch runbook for this CI.
        namespace: company.team
        flowId: "{{ inputs.patch_runbook_id }}"
        wait: true

      - id: update_ci
        type: io.kestra.plugin.servicenow.Update
        description: Record the patch on the CI in the CMDB.
        table: cmdb_ci_server
        sysId: "{{ taskrun.value.sys_id }}"
        data:
          u_patch_due: "false"
          u_last_patched: "{{ now() }}"
          work_notes: "Patched by Kestra execution {{ execution.id }}."

pluginDefaults:
  - type: io.kestra.plugin.servicenow.Get
    values:
      domain: "{{ secret('SN_DOMAIN') }}"
      username: "{{ secret('SN_USERNAME') }}"
      password: "{{ secret('SN_PASSWORD') }}"
  - type: io.kestra.plugin.servicenow.Update
    values:
      domain: "{{ secret('SN_DOMAIN') }}"
      username: "{{ secret('SN_USERNAME') }}"
      password: "{{ secret('SN_PASSWORD') }}"

triggers:
  - id: on_patch_window
    type: io.kestra.plugin.core.trigger.Webhook
    description: A change window or scheduler posts here to start the patch wave.
    key: "{{ secret('SN_PATCH_WEBHOOK_KEY') }}"

extend:
  shortDescription: Query CMDB CIs due for patching, run a patch runbook per CI, and update each CMDB record.
  title: CMDB-Driven Patch Wave from ServiceNow
  metaTitle: CMDB-Driven Patch Wave from ServiceNow
  description: |
    This blueprint makes the ServiceNow CMDB the driver of patching. It queries the
    CIs flagged as due for patching, runs the patch runbook against each one as a
    subflow, and updates each CMDB record so the inventory reflects what was
    actually patched. The CMDB defines the scope and stays in sync with reality.

    Prerequisites:
      - Secrets:
        - SN_DOMAIN, SN_USERNAME, SN_PASSWORD: ServiceNow instance and credentials.
        - SN_PATCH_WEBHOOK_KEY: key guarding the webhook trigger.
      - A patch runbook flow to call and CMDB CIs that carry a patch-due flag.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Adjust ci_query to match how your CMDB flags patch-due servers.
      3. Point patch_runbook_id at the flow that performs the patch.

    Outputs:
      - outputs.list_cis.results: the CIs selected for this wave.
      - outputs.patch_each_ci: per-CI runbook and CMDB update results.

    Notes:
      - The CI fields (u_patch_due, u_last_patched) are examples; map them to your CMDB schema.
      - concurrencyLimit caps how many CIs are patched at once.
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: Query CMDB CIs due for patching, run a patch runbook per CI, and update each CMDB record in ServiceNow.
