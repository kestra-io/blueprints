extend:
  title: "Get Started with Kestra in Three Steps"
  metaTitle: "Get Started with Kestra in Three Steps"
  shortDescription: >-
    A beginner-friendly tutorial that walks through three essential Kestra
    concepts: working with inputs and outputs, running tasks, and scheduling
    flows with triggers.
  description: |
    **Build your first Kestra flow in three steps, covering inputs, task execution, and scheduled triggers.**

    1. A `io.kestra.plugin.scripts.python.Script` task uses flow inputs to greet the user and produce structured outputs
    2. A `io.kestra.plugin.core.http.Request` task fetches a random inspirational quote from a public API
    3. A `io.kestra.plugin.scripts.python.Script` task combines the greeting with the quote and computes a summary
    4. A `io.kestra.plugin.core.trigger.Schedule` trigger demonstrates how to run this flow automatically on a cron schedule

    Ideal for:
    - **New Kestra users** who want to understand how flows, tasks, and triggers work together
    - **Automation engineers** looking for a quick hands-on introduction to the platform
  tags:
    - Getting Started
    - Core
  ee: false
  demo: true
  metaDescription: >-
    Beginner Kestra tutorial covering inputs, HTTP requests, Python scripting,
    and scheduled triggers in three simple steps.

id: getting-started-three-steps
namespace: company.team

inputs:
  - id: name
    type: STRING
    defaults: "World"
    description: "Your name, used in the greeting message."

tasks:
  # --- Step 1: Inputs and Outputs ---
  - id: step1_greeting
    type: io.kestra.plugin.scripts.python.Script
    description: "Step 1 — Learn how inputs become outputs. This task reads the flow input and produces a greeting."
    script: |
      from kestra import Kestra

      name = "{{ inputs.name }}"
      greeting = f"Hello, {name}! Welcome to Kestra."

      print(greeting)

      Kestra.outputs({
          "greeting": greeting,
          "step": 1
      })

  # --- Step 2: Running Tasks (HTTP + Python) ---
  - id: step2_fetch_quote
    type: io.kestra.plugin.core.http.Request
    description: "Step 2a — Fetch live data from the internet. This task calls a public quotes API."
    uri: "https://zenquotes.io/api/random"
    method: GET

  - id: step2_process_quote
    type: io.kestra.plugin.scripts.python.Script
    description: "Step 2b — Process the API response with Python. Extracts the quote and author from the JSON payload."
    script: |
      import json
      from kestra import Kestra

      # The HTTP response body is available as a file; parse it
      raw = '{{ outputs.step2_fetch_quote.body }}'
      data = json.loads(raw)

      # zenquotes.io returns a list with one item
      if isinstance(data, list) and len(data) > 0:
          quote = data[0].get("q", "No quote found")
          author = data[0].get("a", "Unknown")
      else:
          quote = "No quote found"
          author = "Unknown"

      print(f'Quote: "{quote}" - {author}')

      Kestra.outputs({
          "quote": quote,
          "author": author,
          "step": 2
      })

  # --- Step 3: Combine Everything ---
  - id: step3_summary
    type: io.kestra.plugin.scripts.python.Script
    description: "Step 3 — Combine outputs from previous tasks into a final summary."
    script: |
      from kestra import Kestra

      greeting = "{{ outputs.step1_greeting.vars.greeting }}"
      quote = "{{ outputs.step2_process_quote.vars.quote }}"
      author = "{{ outputs.step2_process_quote.vars.author }}"

      summary = f"{greeting} Here is your quote of the day: \"{quote}\" - {author}"

      print(summary)

      Kestra.outputs({
          "summary": summary,
          "step": 3
      })

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    description: "Runs this flow every day at 9:00 AM UTC. Disable or adjust the cron expression as needed."
    cron: "0 9 * * *"
