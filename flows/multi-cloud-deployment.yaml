id: multi-cloud-deployment
namespace: company.team

inputs:
  - id: cloud_name
    type: SELECT
    displayName: Cloud name
    description: Available values - local, gcp and azure
    required: true
    values:
      - local
      - gcp
      - azure

  - id: github_repo
    type: STRING
    displayName: GitHub repository
    description: GitHub public repository that has Dockerfile
    required: true
    defaults: https://github.com/AlapMistry/spring-boot-demo

  - id: github_repo_branch
    type: STRING
    displayName: GitHub repository branch
    description: GitHub public repository branch that has Dockerfile
    required: true
    defaults: main

  - id: docker_user_account_name
    type: STRING
    displayName: Docker Hub user account name
    description: Docker Hub user account name
    required: true
    defaults: alapmistry

  - id: docker_image_tag
    type: STRING
    displayName: Docker image tag
    description: Your application docker image tag
    required: true
    defaults: 1.0.0

  - id: application_name
    type: STRING
    displayName: Application name
    description: Your application name that start with lower case letters and contain numbers and - (hyphen) upto 49 characters length
    required: true
    defaults: spring-boot-demo

  - id: docker_container_port
    type: STRING
    displayName: Docker container port
    description: Your application must run on this port
    required: true
    defaults: "8080"

  - id: host_port
    type: STRING
    displayName: Host port
    description: Your application will expose on this port to the world
    required: true
    defaults: "8080"

tasks:
  - id: docker_image
    type: io.kestra.plugin.core.flow.WorkingDirectory
    tasks:
      - id: clone_repo
        type: io.kestra.plugin.git.Clone
        url: "{{ inputs.github_repo }}"
        branch: "{{ inputs.github_repo_branch }}"

      - id: docker_build_push
        type: io.kestra.plugin.docker.Build
        tags:
          - "{{ inputs.docker_user_account_name }}/{{ inputs.application_name }}:{{ inputs.docker_image_tag }}"
        dockerfile: "Dockerfile"
        push: true
        credentials:
          registry: https://index.docker.io/v1/
          username: "{{ secret('DOCKER_HUB_USERNAME') }}"
          password: "{{ secret('DOCKER_HUB_PAT') }}"

  - id: cloud_choice
    type: io.kestra.plugin.core.flow.Switch
    value: "{{ inputs.cloud_name }}"
    cases:
      local:
        - id: local_docker_run
          type: io.kestra.plugin.docker.Run
          containerImage: "{{ inputs.docker_user_account_name }}/{{ inputs.application_name }}:{{ inputs.docker_image_tag }}"
          pullPolicy: IF_NOT_PRESENT
          wait: false
          portBindings:
            - "{{ inputs.host_port }}:{{ inputs.docker_container_port }}"

        - id: local_ngrok_expose
          type: io.kestra.plugin.scripts.shell.Commands
          targetOS: LINUX
          containerImage: ngrok/ngrok:3
          taskRunner:
            type: io.kestra.plugin.scripts.runner.docker.Docker
            networkMode: host
            wait: false
          env:
            NGROK_AUTHTOKEN: "{{ secret('NGROK_AUTH_TOKEN') }}"
          commands:
            - "ngrok http {{ inputs.host_port }} --url {{ secret('NGROK_STATIC_DOMAIN') }}"

      gcp:
        - id: gcp_service_deploy
          type: io.kestra.plugin.gcp.cli.GCloudCLI
          projectId: "{{ secret('GCP_PROJECT_ID') }}"
          serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
          commands:
            - "gcloud run deploy {{ inputs.application_name }} --image=docker.io/{{ inputs.docker_user_account_name }}/{{ inputs.application_name }}:{{ inputs.docker_image_tag }} --port={{ inputs.docker_container_port }} --region={{ secret('GCP_REGION') }}"
            
      azure:
        - id: azure_service_deploy
          type: io.kestra.plugin.azure.cli.AzCLI
          username: "{{ secret('AZURE_APP_ID') }}"
          password: "{{ secret('AZURE_SERVICE_PRINCIPAL_PASSWORD') }}"
          tenant: "{{ secret('AZURE_TENANT_ID') }}"
          servicePrincipal: true
          commands:
            - az container create --resource-group {{ secret('AZURE_RESOURCE_GROUP') }} --name {{ inputs.application_name }} --image docker.io/{{ inputs.docker_user_account_name }}/{{ inputs.application_name }}:{{ inputs.docker_image_tag }} --dns-name-label {{ inputs.application_name }} --ports {{ inputs.docker_container_port }} --os-type linux --memory 1.5 --cpu 1 --location {{ secret('AZURE_LOCATION') }}

extend:
  shortDescription: Build a Docker image from a GitHub repo and deploy it to local, GCP Cloud Run, or Azure Container Instances from one declarative flow.
  title: Multi-cloud deployment pipeline with Docker, ngrok, GCP Cloud Run, and Azure Container Apps
  metaTitle: Multi-Cloud Docker Deployment with Kestra
  metaDescription: Build a Docker image from any GitHub repo and deploy it to local, GCP Cloud Run, or Azure with a single Kestra flow driven by one cloud_name input.
  description: |
    Ship the same container to multiple clouds without maintaining a separate pipeline for each target. This Kestra flow clones a public GitHub repository, builds and pushes a Docker image to Docker Hub, then deploys that image to local Docker, GCP Cloud Run, or Azure Container Instances based on a single `cloud_name` input. It solves the common problem of fragmented, copy-pasted CI scripts where build logic and per-cloud deployment logic drift apart and become impossible to audit.

    ## How it works
    1. A `io.kestra.plugin.core.flow.WorkingDirectory` task wraps the build stage so all steps share one workspace.
    2. `io.kestra.plugin.git.Clone` checks out the repo from `github_repo` at `github_repo_branch`.
    3. `io.kestra.plugin.docker.Build` builds the image from the repo `Dockerfile`, tags it `user/app:tag`, and pushes it to Docker Hub with `push: true`.
    4. `io.kestra.plugin.core.flow.Switch` reads `cloud_name` and routes to one of three cases:
       - `local`: `io.kestra.plugin.docker.Run` runs the container with a host port binding, then `io.kestra.plugin.scripts.shell.Commands` exposes it publicly through an ngrok static domain.
       - `gcp`: `io.kestra.plugin.gcp.cli.GCloudCLI` runs `gcloud run deploy` to push the image to Cloud Run.
       - `azure`: `io.kestra.plugin.azure.cli.AzCLI` runs `az container create` to launch an Azure Container Instance.

    ## What you get
    - One pipeline that builds once and deploys anywhere across three environments.
    - Public Docker Hub image you can reuse across targets.
    - Instant public URL for local testing via ngrok.
    - Parameterized inputs for repo, branch, image tag, ports, and application name.

    ## Who it's for
    - Platform and DevOps engineers standardizing multi-cloud deployments.
    - Backend teams that want repeatable build-and-deploy without per-cloud CI YAML.
    - Developers demoing an app on local, GCP, or Azure on demand.

    ## Why orchestrate this with Kestra
    Docker, gcloud, and az each have their own CLI but no shared scheduler, retry policy, or lineage across clouds. Kestra unifies them in one declarative YAML flow: a single `Switch` chooses the target, every task run is logged and observable, retries and error handling are built in, and the build artifact is traced through to each deployment. You get event triggers and scheduling that a standalone container CLI simply cannot provide.

    ## Prerequisites
    - A public GitHub repository containing a `Dockerfile`.
    - A Docker Hub account with push access.
    - GCP and/or Azure accounts if deploying to those clouds.
    - An ngrok account with a static domain for local public exposure.

    ### Secrets
    - `DOCKER_HUB_USERNAME`, `DOCKER_HUB_PAT`
    - `NGROK_AUTH_TOKEN`, `NGROK_STATIC_DOMAIN`
    - `GCP_PROJECT_ID`, `GCP_SERVICE_ACCOUNT`, `GCP_REGION`
    - `AZURE_APP_ID`, `AZURE_SERVICE_PRINCIPAL_PASSWORD`, `AZURE_TENANT_ID`, `AZURE_RESOURCE_GROUP`, `AZURE_LOCATION`

    ## Quick start
    1. Add the secrets above for the target you intend to use.
    2. Set `cloud_name` to `local`, `gcp`, or `azure`.
    3. Point `github_repo` and `github_repo_branch` at your app.
    4. Set `docker_user_account_name`, `application_name`, and `docker_image_tag`.
    5. Execute the flow and watch the build then the matching deployment case run.

    ## How to extend
    - Add a new `Switch` case for AWS ECS or Kubernetes.
    - Swap `WorkingDirectory` to build from a private repo with Git credentials.
    - Add a `Schedule` or webhook trigger to redeploy on every push.
    - Add post-deploy health checks or Slack notifications on completion.

    ## Links
    - [Docker plugin docs](https://kestra.io/plugins/plugin-docker)
    - [Docker orchestration with Kestra](https://kestra.io/orchestration/docker)
  tags:
    - Infrastructure
    - Cloud
  ee: false
  demo: false
