id: openai-text-to-speech
namespace: company.team

inputs:
  - id: input_text
    type: STRING
    displayName: Text to convert
    description: The text content to convert into speech audio
    defaults: "The quick brown fox jumped over the lazy dog."
  - id: voice
    type: STRING
    displayName: TTS Voice
    description: "OpenAI voice to use: alloy, echo, fable, onyx, nova, or shimmer"
    defaults: "alloy"
  - id: model
    type: STRING
    displayName: TTS Model
    description: "OpenAI TTS model: tts-1 (faster) or tts-1-hd (higher quality)"
    defaults: "tts-1"

tasks:
  - id: generate_speech
    type: io.kestra.plugin.core.http.Request
    description: Send text to OpenAI TTS endpoint and receive MP3 audio
    uri: "https://api.openai.com/v1/audio/speech"
    method: POST
    headers:
      Authorization: "Bearer {{ secret('OPENAI_API_KEY') }}"
      Content-Type: "application/json"
    body: |
      {
        "model": "{{ inputs.model }}",
        "input": "{{ inputs.input_text }}",
        "voice": "{{ inputs.voice }}"
      }

extend:
  title: Convert Text to Speech with OpenAI
  metaTitle: Text to Speech with OpenAI TTS
  shortDescription: >-
    Send text to OpenAI's TTS API and receive a high-quality MP3 audio file.
    Configure input text, voice selection, and model parameters from flow inputs.
  description: |
    **Generate natural-sounding speech audio from any text input using the OpenAI Text-to-Speech API.**

    1. A `io.kestra.plugin.scripts.python.Script` task defines the text content and selects the TTS voice (alloy, echo, fable, onyx, nova, or shimmer)
    2. A `io.kestra.plugin.core.http.Request` task sends the configured payload to the OpenAI `/v1/audio/speech` endpoint and returns the generated MP3 audio file

    Ideal for:
    - **Content creators** who need voiceovers for videos, podcasts, or presentations without recording equipment
    - **Developers** prototyping voice-enabled applications or accessibility features
    - **Teams** building automated audio content pipelines for newsletters, alerts, or learning materials
  tags:
    - AI
  ee: false
  demo: false
  metaDescription: >-
    Convert any text to natural-sounding speech with OpenAI TTS.
    Configure voice, model, and input text, then receive an MP3 audio file.

