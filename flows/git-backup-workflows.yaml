id: git-backup-workflows
namespace: company.team

inputs:
  - id: git_repo_url
    type: STRING
    displayName: Git repository URL
    description: The remote Git repository URL to push backups to (e.g., git@github.com:org/kestra-backups.git)
  - id: git_branch
    type: STRING
    displayName: Git branch
    description: The branch to push backup commits to
    defaults: "main"
  - id: kestra_api_url
    type: STRING
    displayName: Kestra API URL
    description: Base URL of the Kestra instance API
    defaults: "http://localhost:8080"

tasks:
  - id: setup_repo
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - |
        if [ ! -d "backup-repo/.git" ]; then
          git clone --branch {{ inputs.git_branch }} {{ inputs.git_repo_url }} backup-repo || {
            mkdir -p backup-repo
            cd backup-repo
            git init
            git remote add origin {{ inputs.git_repo_url }}
            git checkout -b {{ inputs.git_branch }}
          }
        else
          cd backup-repo
          git pull origin {{ inputs.git_branch }} || true
        fi

  - id: export_flows
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - |
        mkdir -p backup-repo/flows
        curl -s "{{ inputs.kestra_api_url }}/api/v1/flows" \
          -H "Accept: application/json" \
          -o backup-repo/flows/all_flows.json || echo "Warning: Could not export flows"

  - id: export_namespace_files
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - |
        mkdir -p backup-repo/namespace-files
        curl -s "{{ inputs.kestra_api_url }}/api/v1/namespaces" \
          -H "Accept: application/json" \
          -o backup-repo/namespace-files/namespaces.json || echo "Warning: Could not export namespace files"

  - id: git_commit_and_push
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - |
        cd backup-repo
        git add -A
        if git diff --cached --quiet; then
          echo "No changes detected, skipping commit."
        else
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "Automated backup: ${TIMESTAMP}"
          git push origin {{ inputs.git_branch }}
          echo "Backup committed and pushed at ${TIMESTAMP}"
        fi

triggers:
  - id: scheduled_backup
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 */6 * * *"

extend:
  title: Automated Git Backup for Workflow Definitions
  metaTitle: Git Backup for Kestra Flows
  shortDescription: >-
    Automatically export Kestra flow definitions and namespace files to a Git
    repository on a recurring schedule, creating commits only when changes are detected.
  description: |
    **Keep your Kestra flow definitions safely versioned in Git with automated periodic backups.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger runs the backup every 6 hours
    2. A `io.kestra.plugin.scripts.shell.Commands` task exports all flow definitions from the Kestra API to a local directory
    3. A second `io.kestra.plugin.scripts.shell.Commands` task stages and commits any changes, skipping the commit if nothing has changed
    4. A final `io.kestra.plugin.scripts.shell.Commands` task pushes the commit to the remote Git repository

    Ideal for:
    - **DevOps teams** who need version-controlled backups of their orchestration flows
    - **Platform engineers** maintaining disaster recovery procedures for Kestra deployments
    - **Teams with compliance requirements** that mandate audit trails for workflow changes
  tags:
    - Infrastructure
    - System
  ee: false
  demo: false
  metaDescription: >-
    Automatically back up Kestra flow definitions to a Git repository on a schedule,
    with commits created only when changes are detected.

