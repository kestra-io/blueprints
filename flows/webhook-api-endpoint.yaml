id: webhook-api-endpoint
namespace: company.team

tasks:
  - id: create_url_string
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra

      first_name = "{{ trigger.body.first_name }}"
      last_name = "{{ trigger.body.last_name }}"
      url = f"https://www.google.com/search?q={first_name}+{last_name}"

      Kestra.outputs({"product": url})

  - id: respond_to_webhook
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra

      url = "{{ outputs.create_url_string.vars.product }}"
      first = "{{ trigger.body.first_name }}"
      last = "{{ trigger.body.last_name }}"
      Kestra.outputs({"response": f'The Google search URL for "{first} {last}" is: {url}'})

triggers:
  - id: webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"

extend:
  title: "Build a Lightweight API Endpoint in Kestra Using Webhook Triggers"
  metaTitle: "Build an API Endpoint with Kestra Webhooks"
  shortDescription: >-
    Receive HTTP requests via a Kestra webhook trigger, process query parameters
    with Python, and return a formatted response — no separate web framework needed.
  description: |
    **Turn a Kestra flow into a live API endpoint: accept HTTP requests via webhook, process the payload with Python, and return a structured response to the caller.**

    1. A `io.kestra.plugin.core.trigger.Webhook` trigger exposes a secret-protected HTTPS endpoint that fires on every incoming POST request, making the full request body available as `trigger.body`
    2. A `io.kestra.plugin.scripts.python.Script` task reads fields from the request body and performs any transformation — in this example, constructing a Google search URL from `first_name` and `last_name` parameters
    3. A `io.kestra.plugin.scripts.python.Script` task formats the final response and sets it as the webhook reply via `Kestra.outputs({"response": ...})`

    The pattern extends naturally to richer use cases:
    - **Form backends**: accept a JSON form submission, validate fields, write to a database or Google Sheet, and return a success confirmation
    - **Internal API proxy**: receive a request, call a third-party API, transform the response, and return enriched data to the original caller
    - **Webhook relay**: accept an inbound event from a SaaS tool (Stripe, GitHub, Slack), apply business logic, and forward to multiple downstream services
    - **On-demand data lookups**: expose a search or filter endpoint over internal datasets without provisioning a dedicated service

    The webhook key (stored as a Kestra secret) ensures the endpoint is not publicly accessible without the correct authentication token.

    Ideal for:
    - **Backend developers** prototyping lightweight internal APIs without deploying a web framework or managing server infrastructure
    - **Automation engineers** building request-response pipelines where a human or external system needs to query live flow outputs
    - **Teams** replacing simple backend routes or Express/Flask handlers with declarative, observable Kestra flows
  tags:
    - Core
    - Getting Started
  ee: false
  demo: false
  metaDescription: >-
    Build a live API endpoint in Kestra using a webhook trigger and Python.
    Process any HTTP request, apply custom logic, and return a structured response.

