id: webhook-api-endpoint
namespace: company.team

tasks:
  - id: create_url_string
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra

      first_name = "{{ trigger.body.first_name }}"
      last_name = "{{ trigger.body.last_name }}"
      url = f"https://www.google.com/search?q={first_name}+{last_name}"

      Kestra.outputs({"product": url})

  - id: respond_to_webhook
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra

      url = "{{ outputs.create_url_string.vars.product }}"
      first = "{{ trigger.body.first_name }}"
      last = "{{ trigger.body.last_name }}"
      Kestra.outputs({"response": f'The Google search URL for "{first} {last}" is: {url}'})

triggers:
  - id: webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"

extend:
  title: Build an API Endpoint with Webhooks
  metaTitle: Build an API Endpoint with Webhooks
  shortDescription: >-
    Receive HTTP requests via a webhook trigger, construct a dynamic URL from
    query parameters, and return a formatted response to the caller.
  description: |
    **Accept incoming HTTP requests, transform query parameters into a search URL, and respond with the result in a single flow.**

    1. A `io.kestra.plugin.core.trigger.Webhook` trigger listens for incoming HTTP requests and extracts query parameters from the request body
    2. A `io.kestra.plugin.scripts.python.Script` task reads the `first_name` and `last_name` query parameters and builds a Google search URL
    3. A `io.kestra.plugin.scripts.python.Script` task formats and returns the constructed URL as a plain-text response to the caller

    Ideal for:
    - **Backend developers** prototyping lightweight API endpoints without a full web framework
    - **Automation engineers** who need a quick webhook-to-response pipeline for internal tools
    - **Teams** replacing simple backend routes with a declarative workflow
  tags:
    - Core
    - Getting Started
  ee: false
  demo: false
  metaDescription: >-
    Create a simple API endpoint that receives webhook requests, builds a
    dynamic Google search URL from query parameters, and returns the result.

