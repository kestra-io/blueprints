id: ai-chart-analysis-openai
namespace: company.team
tasks:
  - id: analyze_chart_image
    type: io.kestra.plugin.openai.ChatCompletion
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: "gpt-4o"
    messages:
      - role: system
        content: >-
          You are an expert financial analyst tasked with providing an advanced
          technical analysis of a stock or cryptocurrency chart provided as an image.
          Your analysis will be based on various technical indicators and will provide
          simple insights for novice traders. Explain where you expect the market is
          moving. Warn that this is not binding financial advice. Make sure to explain
          everything in plain, easy-to-understand language.
      - role: user
        content: "Analyze the following chart image: {{ trigger.body.image }}"
  - id: respond_to_webhook
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra

      analysis = """{{ outputs.analyze_chart_image.choices[0].message.content }}"""
      Kestra.outputs({"response": analysis})
triggers:
  - id: webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"

extend:
  title: "AI-Powered Chart Image Analysis with OpenAI Vision"
  metaTitle: "AI Chart Analysis with OpenAI Vision API"
  shortDescription: >-
    Analyze financial chart images via a webhook endpoint using OpenAI Vision
    to produce plain-language technical analysis.
  description: |
    **Submit a chart screenshot to a webhook and receive an AI-generated technical analysis written in accessible language.**

    1. A `io.kestra.plugin.core.trigger.Webhook` receives a POST request containing a base64-encoded chart image
    2. A `io.kestra.plugin.openai.ChatCompletion` task sends the image to OpenAI Vision (GPT-4o) with a prompt requesting technical analysis of the chart, including trend direction, support and resistance levels, and a disclaimer
    3. A `io.kestra.plugin.scripts.python.Script` task returns the analysis text as the webhook response

    Ideal for:
    - **Traders and investors** who want quick, AI-generated insights on stock or cryptocurrency charts
    - **Financial analysts** looking to augment manual chart review with automated pattern recognition
    - **Application developers** building tools that need on-demand chart interpretation via API
  tags:
    - AI
    - Business
  ee: false
  demo: false
  metaDescription: >-
    Analyze stock and crypto chart images with OpenAI Vision. Submit a screenshot
    via webhook and receive plain-language technical analysis with trend insights.

