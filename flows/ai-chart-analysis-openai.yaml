id: ai-chart-analysis-openai
namespace: company.team
tasks:
  - id: analyze_chart_image
    type: io.kestra.plugin.openai.ChatCompletion
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: "gpt-4o"
    messages:
      - role: system
        content: >-
          You are an expert financial analyst tasked with providing an advanced
          technical analysis of a stock or cryptocurrency chart provided as an image.
          Your analysis will be based on various technical indicators and will provide
          simple insights for novice traders. Explain where you expect the market is
          moving. Warn that this is not binding financial advice. Make sure to explain
          everything in plain, easy-to-understand language.
      - role: user
        content: "Analyze the following chart image: {{ trigger.body.image }}"
  - id: respond_to_webhook
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra

      analysis = """{{ outputs.analyze_chart_image.choices[0].message.content }}"""
      Kestra.outputs({"response": analysis})
triggers:
  - id: webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"

extend:
  title: "AI-Powered Chart Image Analysis with OpenAI Vision"
  metaTitle: "AI Chart Analysis with OpenAI Vision API"
  shortDescription: >-
    Analyze financial chart images via a webhook endpoint using OpenAI Vision
    to produce plain-language technical analysis.
  description: |
    **Submit a chart screenshot to a webhook and receive an AI-generated technical analysis written in plain, accessible language — no financial background required to understand the output.**

    1. A `io.kestra.plugin.core.trigger.Webhook` receives a POST request containing a base64-encoded chart image in the `trigger.body.image` field
    2. A `io.kestra.plugin.openai.ChatCompletion` task sends the image to GPT-4o Vision with a system prompt instructing the model to identify trend direction, key support and resistance levels, and potential reversal signals — written for novice traders and always including a "not financial advice" disclaimer
    3. A `io.kestra.plugin.scripts.python.Script` task packages the analysis text and returns it as the webhook response body

    The system prompt is fully customizable: adjust the analysis depth (e.g., add RSI, MACD, Bollinger Band identification), change the tone (institutional vs. retail), or request the output as structured JSON to make the results easier to parse and store. You can also chain this flow with a `io.kestra.plugin.email.MailSend` or Telegram notification task to push the analysis to analysts automatically.

    Ideal for:
    - **Retail traders and investors** who want quick, AI-generated chart commentary on stocks or cryptocurrencies without manually describing patterns
    - **Financial analysts** looking to augment manual chart review with a first-pass automated pattern recognition layer
    - **Application developers and fintech teams** building trading tools, mobile apps, or dashboards that need an on-demand chart interpretation endpoint
  tags:
    - AI
    - Business
  ee: false
  demo: false
  metaDescription: >-
    Analyze stock and crypto charts with OpenAI Vision and Kestra. Submit a
    screenshot via webhook and receive plain-language technical analysis with trend insights.

