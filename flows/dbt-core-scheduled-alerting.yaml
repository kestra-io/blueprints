id: dbt-core-scheduled-alerting
namespace: company.team
description: |
  Run dbt Core on a schedule and alert on failure. Build the models, run the
  tests, and post to Slack; if either step fails, the error handler sends a
  failure alert so data quality issues surface immediately.

tasks:
  - id: build_models
    type: io.kestra.plugin.dbt.cli.DbtCLI
    description: Install dependencies and run the dbt models.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: ghcr.io/kestra-io/dbt-duckdb:latest
    namespaceFiles:
      enabled: true
    commands:
      - dbt deps
      - dbt run

  - id: test_models
    type: io.kestra.plugin.dbt.cli.DbtCLI
    description: Run the dbt tests to validate data quality.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: ghcr.io/kestra-io/dbt-duckdb:latest
    namespaceFiles:
      enabled: true
    commands:
      - dbt test

  - id: notify_success
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Report a successful run to Slack.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "dbt Core run and tests passed for execution {{ execution.id }}."
      }

errors:
  - id: notify_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Alert Slack when the run or tests fail.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "dbt Core run FAILED for execution {{ execution.id }}. Investigate the models or tests."
      }

triggers:
  - id: nightly_run
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run dbt nightly. Adjust or disable as needed.
    cron: "0 2 * * *"
    disabled: true

extend:
  shortDescription: Run dbt Core models and tests on a schedule, alerting Slack on success and on failure.
  title: Scheduled dbt Core Run with Failure Alerting
  metaTitle: Scheduled dbt Core Run with Failure Alerting
  description: |
    This blueprint runs dbt Core on a cadence and makes failures loud. It installs
    dependencies, runs the models, runs the tests, and posts a success message;
    if any step fails, the error handler sends a failure alert to Slack so data
    quality problems are caught the same night they happen.

    Prerequisites:
      - Secrets:
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - Your dbt project (including profiles.yml) uploaded as namespace files.

    Quick start:
      1. Set SLACK_WEBHOOK_URL in your Kestra namespace.
      2. Upload your dbt project to the namespace so namespaceFiles can load it.
      3. Enable the schedule to run nightly.

    Outputs:
      - outputs.build_models / outputs.test_models: dbt run and test results.

    Notes:
      - namespaceFiles loads your dbt project from the namespace into the task working directory.
      - Swap the dbt-duckdb image for the adapter image that matches your warehouse.
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Run dbt Core models and tests on a schedule, alerting Slack on success and via an error handler on failure.
