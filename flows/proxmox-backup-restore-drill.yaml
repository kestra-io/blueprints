id: proxmox-backup-restore-drill
namespace: company.team
description: |
  Recurring disaster-recovery drill for Proxmox VE backups. List the backups on
  a storage, restore a chosen vzdump archive to a throwaway VMID, verify it, and
  delete the test VM so the drill leaves no residue.

inputs:
  - id: storage
    type: STRING
    defaults: local
    description: Storage that holds the vzdump backup archives to list.
  - id: archive
    type: STRING
    description: "Backup volid to restore, for example: local:backup/vzdump-qemu-100-2024_01_01-00_00_00.vma.zst"
  - id: target_storage
    type: STRING
    defaults: local-lvm
    description: Storage where the restored disk images are placed.
  - id: test_vm_id
    type: INT
    defaults: 999
    description: Unused VMID assigned to the restored test VM.
  - id: verify_url
    type: STRING
    description: Endpoint probed to confirm the restored VM is healthy.

tasks:
  - id: list_backups
    type: io.kestra.plugin.proxmox.backup.List
    description: List the backups available on the source storage.
    storage: "{{ inputs.storage }}"

  - id: restore_backup
    type: io.kestra.plugin.proxmox.backup.Restore
    description: Restore the chosen archive to the throwaway test VMID.
    archive: "{{ inputs.archive }}"
    storage: "{{ inputs.target_storage }}"
    vmId: "{{ inputs.test_vm_id }}"
    resourceType: VM

  - id: verify_restore
    type: io.kestra.plugin.core.http.Request
    description: Probe the restored VM to confirm the backup is recoverable.
    uri: "{{ inputs.verify_url }}"
    method: GET

  - id: cleanup_test_vm
    type: io.kestra.plugin.proxmox.vm.Delete
    description: Delete the restored test VM so the drill leaves no residue.
    vmName: "{{ inputs.test_vm_id }}"

errors:
  - id: cleanup_on_failure
    type: io.kestra.plugin.proxmox.vm.Delete
    description: Remove the test VM even when verification fails.
    vmName: "{{ inputs.test_vm_id }}"

pluginDefaults:
  - type: io.kestra.plugin.proxmox.backup.List
    values:
      host: "{{ secret('PROXMOX_HOST') }}"
      node: "{{ secret('PROXMOX_NODE') }}"
      username: "{{ secret('PROXMOX_USERNAME') }}"
      password: "{{ secret('PROXMOX_PASSWORD') }}"
  - type: io.kestra.plugin.proxmox.backup.Restore
    values:
      host: "{{ secret('PROXMOX_HOST') }}"
      node: "{{ secret('PROXMOX_NODE') }}"
      username: "{{ secret('PROXMOX_USERNAME') }}"
      password: "{{ secret('PROXMOX_PASSWORD') }}"
  - type: io.kestra.plugin.proxmox.vm.Delete
    values:
      host: "{{ secret('PROXMOX_HOST') }}"
      node: "{{ secret('PROXMOX_NODE') }}"
      username: "{{ secret('PROXMOX_USERNAME') }}"
      password: "{{ secret('PROXMOX_PASSWORD') }}"

triggers:
  - id: weekly_dr_drill
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run the restore drill weekly. Adjust or disable as needed.
    cron: "0 3 * * 1"
    disabled: true

extend:
  shortDescription: List Proxmox VE backups, restore one to a throwaway VMID, verify it, and clean up the test VM.
  title: Proxmox VE Backup Restore Drill
  metaTitle: Proxmox VE Backup Restore Drill
  description: |
    This blueprint proves your Proxmox VE backups are recoverable without
    touching production. It lists the backups on a storage, restores a chosen
    vzdump archive to a throwaway VMID, probes the restored VM, then deletes it.
    An error handler removes the test VM even when verification fails, so repeated
    drills never accumulate orphaned VMs.

    Prerequisites:
      - Secrets:
        - PROXMOX_HOST: Proxmox VE host or IP (no scheme, no port).
        - PROXMOX_NODE: Cluster node name that scopes the API calls (for example, pve).
        - PROXMOX_USERNAME: PAM or PVE user in the form user@realm (for example, root@pam).
        - PROXMOX_PASSWORD: Password for ticket-based authentication.
      - A vzdump backup archive volid to restore and a free VMID for the test VM.

    Quick start:
      1. Set the four secrets above in your Kestra namespace.
      2. Run the flow with the archive volid, target_storage, test_vm_id, and verify_url.
      3. The flow restores the backup, verifies it, and deletes the test VM.

    Outputs:
      - outputs.list_backups: the backup archives found on the source storage.
      - outputs.restore_backup: the restore task result for the test VM.
      - outputs.verify_restore: status code and body of the verification probe.

    Notes:
      - test_vm_id must be unused in the cluster; the restored VM is created stopped and deleted at the end.
      - The Schedule trigger is disabled by default; enable it to run the drill on a cadence.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Restore a Proxmox VE backup to a throwaway VMID, verify it, and delete the test VM, proving backups are recoverable.
