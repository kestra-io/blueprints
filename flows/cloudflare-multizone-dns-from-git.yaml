id: cloudflare-multizone-dns-from-git
namespace: company.team
description: |
  Treat a Git repository as the source of truth for Cloudflare DNS across many
  zones. Clone the manifest repo, list the account's zones for context, then for
  each managed zone apply its desired records in a single batch request.

inputs:
  - id: manifest_repo
    type: STRING
    defaults: https://github.com/my-org/dns-manifests
    description: Git repository holding one JSON record file per zone (manifest/<zoneId>.json).
  - id: manifest_branch
    type: STRING
    defaults: main
    description: Branch of the manifest repository to apply.
  - id: zones
    type: ARRAY
    itemType: STRING
    description: Cloudflare zone IDs to reconcile; each needs a matching manifest/<zoneId>.json.

tasks:
  - id: clone_manifest
    type: io.kestra.plugin.git.Clone
    description: Clone the DNS manifest repository.
    url: "{{ inputs.manifest_repo }}"
    branch: "{{ inputs.manifest_branch }}"
    directory: manifest

  - id: list_zones
    type: io.kestra.plugin.cloudflare.zones.List
    description: List the account's zones so the reconciliation scope is auditable.

  - id: reconcile_zones
    type: io.kestra.plugin.core.flow.ForEach
    description: Apply the desired record set for each managed zone in one batch call.
    values: "{{ inputs.zones }}"
    tasks:
      - id: apply_records
        type: io.kestra.plugin.cloudflare.dns.records.Batch
        description: Batch-create the records declared for this zone.
        zoneId: "{{ taskrun.value }}"
        posts: "{{ read('manifest/manifest/' ~ taskrun.value ~ '.json') | fromJson }}"

pluginDefaults:
  - type: io.kestra.plugin.cloudflare.zones.List
    values:
      apiToken: "{{ secret('CLOUDFLARE_API_TOKEN') }}"
  - type: io.kestra.plugin.cloudflare.dns.records.Batch
    values:
      apiToken: "{{ secret('CLOUDFLARE_API_TOKEN') }}"

triggers:
  - id: reconcile_on_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    description: Reconcile DNS from Git on a schedule. Adjust or disable as needed.
    cron: "*/30 * * * *"
    disabled: true

extend:
  shortDescription: Clone a Git DNS manifest and batch-apply records to each managed Cloudflare zone.
  title: Reconcile Multi-Zone Cloudflare DNS from a Git Manifest
  metaTitle: Reconcile Multi-Zone Cloudflare DNS from a Git Manifest
  description: |
    This blueprint runs GitOps for Cloudflare DNS. A repository holds one JSON
    file of desired records per zone; the flow clones it, lists the account zones
    for an audit trail, and applies each zone's record set with a single batch
    request. Run it on a schedule to converge DNS toward what Git declares.

    Prerequisites:
      - Secrets:
        - CLOUDFLARE_API_TOKEN: Cloudflare token with DNS edit and zone read permissions.
      - A Git repo with manifest/<zoneId>.json files, each a JSON array of record objects
        (type, name, content, ttl, proxied).

    Quick start:
      1. Set CLOUDFLARE_API_TOKEN in your Kestra namespace.
      2. Create manifest/<zoneId>.json for each zone you manage.
      3. Run the flow with manifest_repo, manifest_branch, and the list of zone IDs.

    Outputs:
      - outputs.list_zones.zones: the account zones returned by Cloudflare.
      - outputs.reconcile_zones: per-zone batch results.

    Notes:
      - The Clone task writes into manifest/, so files resolve at manifest/manifest/<zoneId>.json.
      - Batch only creates records here (posts); add patches and deletes to converge fully.
  tags:
    - Cloud
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Clone a Git DNS manifest and batch-apply the declared records to each managed Cloudflare zone on a schedule.
