id: vertex-ai-event-classification-guardrail
namespace: company.team
description: |
  Classify each incoming event with Vertex AI, then route on the result through
  an automated guardrail. A Pub/Sub realtime trigger starts one run per event,
  a Gemini model on Vertex AI assigns a priority, and an If branch escalates only
  the high-priority events to a BigQuery audit table and Discord. No human gate,
  just an automated decision per event.

tasks:
  - id: classify
    type: io.kestra.plugin.gcp.vertexai.ChatCompletion
    description: Ask Gemini to label the event priority.
    region: us-central1
    modelId: gemini-1.5-flash
    messages:
      - author: user
        content: "Classify this event as one word, high or low priority: {{ trigger.data }}"

  - id: guardrail
    type: io.kestra.plugin.core.flow.If
    description: Escalate only high-priority events.
    condition: "{{ outputs.classify.predictions[0] | lower == 'high' }}"
    then:
      - id: record
        type: io.kestra.plugin.gcp.bigquery.Query
        description: Log the high-priority event to the audit table.
        sql: |
          INSERT INTO `{{ secret('GCP_PROJECT_ID') }}.analytics.priority_events` (message_id, priority, logged_at)
          VALUES ('{{ trigger.messageId }}', 'high', CURRENT_TIMESTAMP());

      - id: escalate
        type: io.kestra.plugin.discord.DiscordIncomingWebhook
        description: Page the channel on a high-priority event.
        url: "{{ secret('DISCORD_WEBHOOK_URL') }}"
        payload: |
          {
            "content": "High-priority event {{ trigger.messageId }} classified by Vertex AI (execution {{ execution.id }})."
          }

pluginDefaults:
  - type: io.kestra.plugin.gcp
    values:
      projectId: "{{ secret('GCP_PROJECT_ID') }}"
      serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT') }}"

triggers:
  - id: on_event
    type: io.kestra.plugin.gcp.pubsub.RealtimeTrigger
    description: Start one execution per Pub/Sub event. Enable once your secrets and subscription are set.
    topic: events
    subscription: kestra-events-sub
    serdeType: JSON
    disabled: true

errors:
  - id: alert_on_failure
    type: io.kestra.plugin.discord.DiscordIncomingWebhook
    description: Alert Discord if classification or routing fails.
    url: "{{ secret('DISCORD_WEBHOOK_URL') }}"
    payload: |
      {
        "content": "Event classification flow failed (execution {{ execution.id }})."
      }

extend:
  shortDescription: A Pub/Sub event is classified by Vertex AI, then an automated If guardrail escalates only the high-priority ones.
  title: Classify and Route Events with Vertex AI
  metaTitle: Classify and Route Events with Vertex AI
  description: |
    This blueprint puts an LLM decision inline in an event pipeline. A Pub/Sub
    RealtimeTrigger starts one execution per event, a Gemini model on Vertex AI
    classifies the payload, and an automated If branch routes on the label,
    logging high-priority events to a BigQuery audit table and paging Discord.
    The guardrail is code, not a human pause, so every event is decided in
    milliseconds with a full execution record.

    Prerequisites:
      - Secrets:
        - GCP_PROJECT_ID: GCP project hosting Pub/Sub, Vertex AI, and BigQuery.
        - GCP_SERVICE_ACCOUNT: service account key JSON with Pub/Sub, Vertex AI, and BigQuery access.
        - DISCORD_WEBHOOK_URL: Discord incoming webhook URL.
      - A Pub/Sub topic (events) with a subscription and a priority_events audit table.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Point the trigger topic and subscription at your Pub/Sub resources, then enable the trigger.
      3. Adjust the classification prompt and the If condition to your labels and routing.

    Outputs:
      - trigger.data: the event payload classified by the model.
      - outputs.classify.predictions: the model label the guardrail branches on.

    Notes:
      - The guardrail is an automated If on the model output, never a human Pause; routine event routing should not wait on a person.
      - Vertex AI hosts Gemini models; set region and modelId to your enabled model.
      - Tighten the prompt to force a single-token label so the If condition stays deterministic.
  tags:
    - AI
    - Cloud
  ee: false
  demo: false
  metaDescription: A Pub/Sub event is classified by Vertex AI, then an automated If guardrail escalates only the high-priority ones.
