id: process-script-runner
namespace: company.team

tasks:
  - id: shell
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - echo "Hello World!"

extend:
  shortDescription: "Here is an example of a Shell script configured with the Process task runner which runs a Shell command as a child process within the Kestra host."
  title: Run a Shell script as a subprocess on the Kestra host
  metaTitle: Run a Shell script as a subprocess on the Kestra
  description: |
    Here is an example of a Shell script configured with the Process task runner
    which runs a Shell command as a child process within the Kestra host.

    The Process task runner doesn’t have any additional configuration beyond the
    `type` property.
  tags:
    - Data
  ee: false
  demo: true
  metaDescription: Run Shell scripts as a subprocess on the Kestra host using the Process task runner. Execute system commands directly within Kestra workflow tasks.
