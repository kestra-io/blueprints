id: vertex-ai-gemini-rag-ingestion
namespace: company.team
description: |
  Keep a retrieval index fresh with Gemini embeddings on a schedule. Each night
  the flow re-ingests source documents, splits them into overlapping chunks,
  embeds them with a Gemini embedding model, and stores the vectors so a RAG
  application can retrieve grounded context. Slack confirms the reindex.

tasks:
  - id: ingest
    type: io.kestra.plugin.ai.rag.IngestDocument
    description: Chunk and embed the source documents into the vector store.
    timeout: PT15M
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    provider:
      type: io.kestra.plugin.ai.provider.GoogleGemini
      modelName: gemini-embedding-001
      apiKey: "{{ secret('GEMINI_API_KEY') }}"
    embeddings:
      type: io.kestra.plugin.ai.embeddings.KestraKVStore
    drop: true
    documentSplitter:
      splitter: PARAGRAPH
      maxSegmentSizeInChars: 4096
      maxOverlapSizeInChars: 200
    fromExternalURLs:
      - https://raw.githubusercontent.com/kestra-io/docs/refs/heads/main/src/contents/blogs/release-1-1/index.md

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Confirm the index was rebuilt.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "RAG index reindexed with Gemini embeddings (execution {{ execution.id }})."
      }

triggers:
  - id: reindex_daily
    type: io.kestra.plugin.core.trigger.Schedule
    description: Rebuild the index nightly. Adjust or disable as needed.
    cron: "0 3 * * *"
    disabled: true

errors:
  - id: alert_on_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Alert Slack if the reindex fails.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "RAG reindex failed (execution {{ execution.id }})."
      }

extend:
  shortDescription: Re-ingest documents nightly, embed them with a Gemini model, and store the vectors so a RAG app retrieves grounded context.
  title: Nightly RAG Ingestion with Gemini Embeddings
  metaTitle: Nightly RAG Ingestion with Gemini Embeddings
  description: |
    This blueprint keeps a retrieval index current. On a schedule it ingests
    source documents, splits them into overlapping paragraph chunks, embeds each
    chunk with a Gemini embedding model (the same family Vertex AI serves), and
    writes the vectors to a store that a RAG application queries for grounded
    answers. Rebuilding on a cadence means retrieval always reflects the latest
    source content, and Slack confirms each reindex.

    Prerequisites:
      - Secrets:
        - GEMINI_API_KEY: API key for the Gemini embedding model (or wire a Vertex AI service account for the enterprise path).
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Replace fromExternalURLs with your own document sources (docs, wikis, or files pulled from GCS first).
      3. Swap the KestraKVStore embeddings store for Qdrant, PGVector, or another vector DB as you scale.

    Outputs:
      - outputs.ingest: ingestion result, including the number of segments embedded.

    Notes:
      - drop: true rebuilds the index from scratch each run; set it to false to append incrementally.
      - To ingest GCS-hosted documents, download them first and point the splitter at the local files, or use their public URLs here.
      - Vertex AI serves the same Gemini models; use a Vertex service account for IAM-governed, region-pinned access in production.
  tags:
    - AI
    - Data
  ee: false
  demo: false
  metaDescription: Re-ingest documents nightly, embed them with a Gemini model, and store the vectors so a RAG app retrieves grounded context.
