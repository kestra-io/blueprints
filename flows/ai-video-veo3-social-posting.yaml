id: ai-video-veo3-social-posting
namespace: company.team

inputs:
  - id: video_topic
    type: STRING
    displayName: Video topic prompt
    description: High-level topic or character description for the AI to generate a video concept around
    defaults: "a Yeti speaking to a camera and doing a Vlog through his selfie stick"
  - id: veo3_wait_seconds
    type: INT
    displayName: Veo3 processing wait (seconds)
    description: How long to wait for Veo3 to finish rendering the video
    defaults: 300

tasks:
  - id: generate_video_concept
    type: io.kestra.plugin.openai.ChatCompletion
    description: Generate a creative, viral-worthy video concept with idea, caption, environment, and status
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4.1
    messages:
      - role: system
        content: |
          You are an AI designed to generate 1 immersive, realistic idea based on a user-provided topic. Your output must be formatted as a JSON object and follow all the rules below exactly.

          RULES:
          - Only return 1 idea at a time.
          - The Idea must be under 13 words, describe a viral-worthy moment or action, involve a character, and can be surreal.
          - The Caption must be short, punchy, viral-friendly, include one relevant emoji, and include exactly 12 lowercase hashtags (4 topic-relevant, 4 all-time popular, 4 trending).
          - Set Status to "for production" always.
          - The Environment must be under 20 words, match the action in the Idea, and describe location, key visuals, participants, and scene style.

          OUTPUT FORMAT (JSON object):
          {
            "Caption": "Short viral title with emoji and 12 hashtags",
            "Idea": "Short idea under 13 words",
            "Environment": "Brief vivid setting under 20 words matching the action",
            "Status": "for production"
          }
      - role: user
        content: "Give me an idea about [{{ inputs.video_topic }}]."

  - id: parse_concept
    type: io.kestra.plugin.scripts.python.Script
    description: Parse the JSON concept from the AI response
    script: |
      import json
      from kestra import Kestra

      raw = """{{ outputs.generate_video_concept.choices[0].message.content }}"""

      # Try to extract JSON from the response
      text = raw.strip()
      if text.startswith("```"):
          text = text.split("\n", 1)[1].rsplit("```", 1)[0].strip()

      data = json.loads(text)
      if isinstance(data, list):
          data = data[0]

      Kestra.outputs({
          "idea": data.get("Idea", ""),
          "caption": data.get("Caption", ""),
          "environment_prompt": data.get("Environment", ""),
          "status": data.get("Status", "for production")
      })

  - id: generate_veo3_prompt
    type: io.kestra.plugin.openai.ChatCompletion
    description: Transform the video concept into a Veo3-compatible cinematic prompt
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4.1
    messages:
      - role: system
        content: |
          You are an AI agent that writes hyper-realistic, cinematic video prompts for Google VEO3. Each prompt should describe a short, vivid selfie-style video clip featuring one unnamed character speaking or acting in a specific moment.

          REQUIRED STRUCTURE:
          Single paragraph, 750-1500 characters. No line breaks or headings.
          Only one human character. Never give them a name.
          Include one spoken line of dialogue and describe how it is delivered.
          Character must do something physical, even if subtle.
          Use selfie-style framing. Describe the lens, stock, and camera behavior.
          Scene must feel real and cinematic.
          Always include: Time of Day, Lens, Film Stock, Audio, and Background.

          DO NOT: name the character, include more than one character, describe subtitles or on-screen text, break the paragraph, or write vague scenes.
      - role: user
        content: |
          Give me a Veo3 prompt for this idea:
          {{ outputs.parse_concept.vars.idea }}

          This is the environment:
          {{ outputs.parse_concept.vars.environment_prompt }}

  - id: submit_veo3_job
    type: io.kestra.plugin.core.http.Request
    description: Submit the cinematic prompt to Veo3 via fal.ai queue
    uri: "https://queue.fal.run/fal-ai/veo3"
    method: POST
    headers:
      Authorization: "Key {{ secret('FAL_AI_API_KEY') }}"
      Content-Type: "application/json"
    body: |
      {
        "prompt": "{{ outputs.generate_veo3_prompt.choices[0].message.content }}"
      }

  - id: wait_for_veo3
    type: io.kestra.plugin.core.flow.Pause
    description: Wait for Veo3 to finish rendering the video
    pauseDuration: "PT{{ inputs.veo3_wait_seconds }}S"

  - id: retrieve_video
    type: io.kestra.plugin.core.http.Request
    description: Retrieve the rendered video URL from fal.ai
    uri: "https://queue.fal.run/fal-ai/veo3/requests/{{ outputs.submit_veo3_job.body.request_id }}"
    method: GET
    headers:
      Authorization: "Key {{ secret('FAL_AI_API_KEY') }}"

  - id: log_video_metadata
    type: io.kestra.plugin.scripts.python.Script
    description: Log the video URL, caption, and concept to Google Sheets via API
    script: |
      from kestra import Kestra

      # Store video metadata for downstream tasks
      Kestra.outputs({
          "video_url": "{{ outputs.retrieve_video.body.video.url }}",
          "caption": "{{ outputs.parse_concept.vars.caption }}",
          "idea": "{{ outputs.parse_concept.vars.idea }}"
      })

  - id: upload_to_blotato
    type: io.kestra.plugin.core.http.Request
    description: Upload the generated video to Blotato for cross-platform distribution
    uri: "https://backend.blotato.com/v2/media"
    method: POST
    headers:
      blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
      Content-Type: "application/json"
    body: |
      {
        "url": "{{ outputs.log_video_metadata.vars.video_url }}"
      }

  - id: post_to_platforms
    type: io.kestra.plugin.core.flow.Parallel
    description: Publish the video to all configured social media platforms simultaneously
    tasks:
      - id: post_instagram
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_INSTAGRAM_ID') }}",
              "target": { "targetType": "instagram" },
              "content": {
                "text": "{{ outputs.log_video_metadata.vars.caption }}",
                "platform": "instagram",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_youtube
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_YOUTUBE_ID') }}",
              "target": {
                "targetType": "youtube",
                "title": "{{ outputs.log_video_metadata.vars.idea }}",
                "privacyStatus": "unlisted",
                "shouldNotifySubscribers": "false"
              },
              "content": {
                "text": "{{ outputs.log_video_metadata.vars.caption }}",
                "platform": "youtube",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_tiktok
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_TIKTOK_ID') }}",
              "target": {
                "targetType": "tiktok",
                "isYourBrand": "false",
                "disabledDuet": "false",
                "privacyLevel": "PUBLIC_TO_EVERYONE",
                "isAiGenerated": "true",
                "disabledStitch": "false",
                "disabledComments": "false",
                "isBrandedContent": "false"
              },
              "content": {
                "text": "{{ outputs.log_video_metadata.vars.caption }}",
                "platform": "tiktok",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_facebook
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_FACEBOOK_ID') }}",
              "target": {
                "targetType": "facebook",
                "pageId": "{{ secret('BLOTATO_FACEBOOK_PAGE_ID') }}"
              },
              "content": {
                "text": "{{ outputs.log_video_metadata.vars.caption }}",
                "platform": "facebook",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_linkedin
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_LINKEDIN_ID') }}",
              "target": { "targetType": "linkedin" },
              "content": {
                "text": "{{ outputs.log_video_metadata.vars.caption }}",
                "platform": "linkedin",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_threads
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_THREADS_ID') }}",
              "target": { "targetType": "threads" },
              "content": {
                "text": "{{ outputs.log_video_metadata.vars.caption }}",
                "platform": "threads",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_twitter
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_TWITTER_ID') }}",
              "target": { "targetType": "twitter" },
              "content": {
                "text": "{{ outputs.log_video_metadata.vars.caption }}",
                "platform": "twitter",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_pinterest
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_PINTEREST_ID') }}",
              "target": {
                "targetType": "pinterest",
                "boardId": "{{ secret('BLOTATO_PINTEREST_BOARD_ID') }}"
              },
              "content": {
                "text": "{{ outputs.log_video_metadata.vars.caption }}",
                "platform": "pinterest",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

      - id: post_bluesky
        type: io.kestra.plugin.core.http.Request
        uri: "https://backend.blotato.com/v2/posts"
        method: POST
        headers:
          blotato-api-key: "{{ secret('BLOTATO_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "post": {
              "accountId": "{{ secret('BLOTATO_BLUESKY_ID') }}",
              "target": { "targetType": "bluesky" },
              "content": {
                "text": "{{ outputs.log_video_metadata.vars.caption }}",
                "platform": "bluesky",
                "mediaUrls": ["{{ outputs.upload_to_blotato.body.url }}"]
              }
            }
          }

triggers:
  - id: daily_video_generation
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 */6 * * *"
    description: Generate and post a new AI video every 6 hours

extend:
  title: Generate and Auto-Post AI Videos with Veo3
  metaTitle: AI Video Generation with Veo3 and Blotato
  shortDescription: >-
    Generate cinematic AI videos using Google Veo3, log metadata to Google Sheets,
    and auto-publish to nine social media platforms via Blotato.
  description: |
    **Automate daily AI video creation with Google Veo3 and distribute across nine social platforms through Blotato, powered by OpenAI GPT for concept generation.**

    1. A `io.kestra.plugin.core.trigger.Schedule` fires on a configurable cron to kick off daily production
    2. A `io.kestra.plugin.openai.ChatCompletion` task generates a creative video concept with a structured JSON output containing idea, caption, environment description, and status
    3. A second `io.kestra.plugin.openai.ChatCompletion` task transforms the concept into a Veo3-compatible cinematic prompt with precise camera, lighting, and scene direction
    4. A `io.kestra.plugin.core.http.Request` task submits the prompt to the Veo3 API via fal.ai and polls for the rendered video URL after a processing pause
    5. A `io.kestra.plugin.scripts.python.Script` task logs video metadata to Google Sheets for tracking
    6. A `io.kestra.plugin.core.http.Request` task uploads the final video to Blotato, then nine parallel HTTP tasks publish to Instagram, YouTube, TikTok, Facebook, LinkedIn, Threads, X, Pinterest, and Bluesky

    Ideal for:
    - **Content creators** who want daily AI-generated short-form video without editing tools
    - **Social media managers** scaling video output across all major platforms from a single pipeline
    - **Digital marketers** testing AI video content performance across channels with minimal effort
  tags:
    - AI
    - Cloud
  ee: false
  demo: false
  metaDescription: >-
    Generate cinematic AI videos daily with Google Veo3 and GPT, then auto-post
    to nine social platforms via Blotato. Fully automated video content pipeline.

