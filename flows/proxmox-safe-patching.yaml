id: proxmox-safe-patching
namespace: company.team
description: |
  Snapshot-gated OS patching for a Proxmox VE virtual machine with automatic
  rollback. Take a pre-patch snapshot, apply OS updates over SSH, probe the
  application, and roll back to the snapshot if the patch or the health check
  fails.

inputs:
  - id: vm_name
    type: STRING
    defaults: my-vm
    description: VM name (resolved at runtime) or integer VMID to patch.
  - id: vm_host
    type: STRING
    description: Reachable hostname or IP of the guest, used by the SSH patch step.
  - id: ssh_user
    type: STRING
    defaults: root
    description: SSH user with sudo privileges on the guest.
  - id: health_check_url
    type: STRING
    description: URL probed after patching. A non-2xx response triggers a rollback.

tasks:
  - id: create_snapshot
    type: io.kestra.plugin.proxmox.snapshot.Create
    description: Capture the pre-patch snapshot used as the rollback point.
    vmName: "{{ inputs.vm_name }}"
    snapName: "prepatch-{{ execution.id }}"
    snapDescription: "Pre-patch snapshot from Kestra execution {{ execution.id }}"

  - id: apply_patch
    type: io.kestra.plugin.scripts.shell.Commands
    description: Update the guest OS over SSH using a key supplied as a secret.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: alpine:3.20
    inputFiles:
      id_ssh: "{{ secret('VM_SSH_PRIVATE_KEY') }}"
    commands:
      - apk add --no-cache openssh-client >/dev/null
      - chmod 600 id_ssh
      - ssh -i id_ssh -o StrictHostKeyChecking=no {{ inputs.ssh_user }}@{{ inputs.vm_host }} 'sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get -y upgrade'

  - id: health_probe
    type: io.kestra.plugin.core.http.Request
    description: Probe the application after patching. A non-2xx response fails the task and triggers the rollback.
    uri: "{{ inputs.health_check_url }}"
    method: GET

errors:
  - id: rollback_snapshot
    type: io.kestra.plugin.proxmox.snapshot.Rollback
    description: Restore the pre-patch snapshot when patching or the health check fails.
    vmName: "{{ inputs.vm_name }}"
    snapName: "prepatch-{{ execution.id }}"

pluginDefaults:
  - type: io.kestra.plugin.proxmox.snapshot.Create
    values:
      host: "{{ secret('PROXMOX_HOST') }}"
      node: "{{ secret('PROXMOX_NODE') }}"
      username: "{{ secret('PROXMOX_USERNAME') }}"
      password: "{{ secret('PROXMOX_PASSWORD') }}"
  - type: io.kestra.plugin.proxmox.snapshot.Rollback
    values:
      host: "{{ secret('PROXMOX_HOST') }}"
      node: "{{ secret('PROXMOX_NODE') }}"
      username: "{{ secret('PROXMOX_USERNAME') }}"
      password: "{{ secret('PROXMOX_PASSWORD') }}"

triggers:
  - id: monthly_maintenance
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run during the monthly maintenance window. Adjust or disable as needed.
    cron: "0 2 1 * *"
    disabled: true

extend:
  shortDescription: Snapshot a Proxmox VE VM, patch it over SSH, and roll back automatically if the health check fails.
  title: Safe Proxmox VE Patching with Snapshot Rollback
  metaTitle: Safe Proxmox VE Patching with Snapshot Rollback
  description: |
    This blueprint patches a Proxmox VE virtual machine behind a snapshot gate.
    It captures a pre-patch snapshot, applies OS updates over SSH, and probes the
    application. If the patch step or the health probe fails, the flow's error
    handler rolls the VM back to the snapshot it took at the start, so a bad
    update never leaves the guest in a broken state.

    Prerequisites:
      - Secrets:
        - PROXMOX_HOST: Proxmox VE host or IP (no scheme, no port).
        - PROXMOX_NODE: Cluster node name that scopes the API calls (for example, pve).
        - PROXMOX_USERNAME: PAM or PVE user in the form user@realm (for example, root@pam).
        - PROXMOX_PASSWORD: Password for ticket-based authentication.
        - VM_SSH_PRIVATE_KEY: SSH private key for the patch user on the guest.
      - The guest must be reachable over SSH from the worker and the SSH user needs sudo.

    Quick start:
      1. Set the five secrets above in your Kestra namespace.
      2. Run the flow with vm_name, vm_host, and health_check_url.
      3. The flow snapshots the VM, patches it, and probes the health URL; a failure rolls back.

    Outputs:
      - outputs.create_snapshot: snapshot and task identifiers for the pre-patch snapshot.
      - outputs.apply_patch: stdout and exit code of the SSH update step.
      - outputs.health_probe: status code and body of the post-patch probe.

    Notes:
      - The snapshot name is keyed to the execution id so the rollback always targets the right snapshot.
      - The Schedule trigger is disabled by default; enable it for an unattended maintenance window.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Patch a Proxmox VE VM behind a snapshot gate and roll back automatically when the post-patch health check fails.
