id: ansible-netbox-dynamic-inventory
namespace: company.team
description: |
  Build an Ansible inventory dynamically from NetBox, run a playbook against it,
  and record the run in ServiceNow. NetBox stays the source of truth for which
  hosts exist, and the CMDB reflects when they were last configured.

inputs:
  - id: site
    type: STRING
    defaults: nyc-dc1
    description: NetBox site slug to build the inventory from.
  - id: role
    type: STRING
    defaults: application-server
    description: NetBox device role slug to target.
  - id: cmdb_sys_id
    type: STRING
    description: sys_id of the ServiceNow CI to stamp with the run result.

tasks:
  - id: list_devices
    type: io.kestra.plugin.ee.netbox.device.List
    description: Pull the target devices from NetBox.
    url: "{{ secret('NETBOX_URL') }}"
    token: "{{ secret('NETBOX_API_TOKEN') }}"
    filters:
      site: "{{ inputs.site }}"
      role: "{{ inputs.role }}"
      status: active
    fields:
      - name
    fetchType: FETCH

  - id: run_playbook
    type: io.kestra.plugin.ansible.cli.AnsibleCLI
    description: Build the inventory from NetBox devices and run the playbook.
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    inputFiles:
      inventory.ini: |
        [{{ inputs.role }}]
        {% for d in outputs.list_devices.rows %}{{ d.name }}
        {% endfor %}
      site.yml: |
        ---
        - name: Configure NetBox-sourced hosts
          hosts: all
          gather_facts: false
          tasks:
            - name: Confirm reachability
              ansible.builtin.ping:
    commands:
      - ansible-playbook -i inventory.ini site.yml

  - id: record_run
    type: io.kestra.plugin.servicenow.Update
    description: Stamp the ServiceNow CI with the configuration run result.
    domain: "{{ secret('SN_DOMAIN') }}"
    username: "{{ secret('SN_USERNAME') }}"
    password: "{{ secret('SN_PASSWORD') }}"
    table: cmdb_ci_server
    sysId: "{{ inputs.cmdb_sys_id }}"
    data:
      u_last_config_run: "{{ now() }}"
      work_notes: "Configured {{ outputs.list_devices.size }} {{ inputs.role }} hosts from NetBox via Kestra."

triggers:
  - id: daily_config
    type: io.kestra.plugin.core.trigger.Schedule
    description: Rebuild inventory and configure daily. Adjust or disable as needed.
    cron: "0 5 * * *"
    disabled: true

extend:
  shortDescription: Build an Ansible inventory from NetBox, run a playbook, and record the run in ServiceNow.
  title: Ansible with a Dynamic NetBox Inventory and ServiceNow Record
  metaTitle: Ansible with a Dynamic NetBox Inventory and ServiceNow Record
  description: |
    This blueprint keeps configuration driven by source-of-truth data. It pulls
    the target hosts from NetBox, builds the Ansible inventory from that result,
    runs the playbook, and stamps the ServiceNow CMDB with when the hosts were last
    configured. NetBox decides what exists; the CMDB records what happened.

    Prerequisites:
      - Secrets:
        - NETBOX_URL, NETBOX_API_TOKEN: NetBox base URL and API token.
        - SN_DOMAIN, SN_USERNAME, SN_PASSWORD: ServiceNow instance and credentials.
      - Ansible on the worker (Process runner) and a ServiceNow CI to stamp.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Pass the NetBox site and role plus the cmdb_sys_id to update.
      3. Replace the sample playbook with your real configuration tasks.

    Outputs:
      - outputs.list_devices.rows: the NetBox devices used to build the inventory.
      - outputs.run_playbook: the Ansible run result.
      - outputs.record_run.result: the updated ServiceNow CI.

    Notes:
      - The inventory is generated from NetBox device names; point ansible_host at your DNS or IP source if needed.
      - NetBox is an Enterprise Edition plugin; ensure your license includes it.
  tags:
    - Infrastructure
  ee: true
  demo: false
  metaDescription: Build an Ansible inventory from NetBox, run a playbook, and record the configuration run in ServiceNow.
