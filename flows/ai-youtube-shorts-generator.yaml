extend:
  title: "Create and Upload AI-Generated YouTube Shorts"
  metaTitle: "AI YouTube Shorts Generator with Video and Audio"
  shortDescription: >-
    Fully autonomous pipeline that brainstorms ASMR video ideas with AI,
    generates video clips and sound effects, assembles them, and publishes
    to YouTube with logging and notifications.
  description: |
    **End-to-end autonomous content factory that uses AI to ideate, produce, and publish short-form video content to YouTube without manual intervention.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger starts the pipeline on a recurring cadence
    2. A `io.kestra.plugin.openai.ChatCompletion` task brainstorms a short, trendy video concept
    3. A second `io.kestra.plugin.openai.ChatCompletion` task enriches the concept into a full production plan with caption, environment, and sound descriptions
    4. A `io.kestra.plugin.core.http.Request` task logs the new idea to a Google Sheet
    5. A third `io.kestra.plugin.openai.ChatCompletion` task generates detailed scene-by-scene video prompts
    6. A `io.kestra.plugin.scripts.python.Script` task extracts individual scene descriptions from the structured output
    7. A `io.kestra.plugin.core.http.Request` task calls the Wavespeed AI (Seedance) API to generate video clips for each scene
    8. A `io.kestra.plugin.core.flow.Pause` task waits for video generation to complete
    9. A `io.kestra.plugin.core.http.Request` task retrieves the generated video clips
    10. A `io.kestra.plugin.core.http.Request` task calls Fal AI to generate matching ASMR sound effects
    11. A `io.kestra.plugin.core.flow.Pause` task waits for audio generation to complete
    12. A `io.kestra.plugin.core.http.Request` task retrieves the generated audio
    13. A `io.kestra.plugin.scripts.python.Script` task collects all video URLs into a list
    14. A `io.kestra.plugin.core.http.Request` task sequences the clips into a final video via the FFMPEG API
    15. A `io.kestra.plugin.core.flow.Pause` task waits for final video assembly
    16. A `io.kestra.plugin.core.http.Request` task retrieves the assembled video
    17. A `io.kestra.plugin.core.http.Request` task updates the Google Sheet with the final video URL
    18. A `io.kestra.plugin.core.http.Request` task downloads the final video file
    19. A `io.kestra.plugin.scripts.python.Script` task uploads the video to YouTube via the YouTube Data API
    20. A `io.kestra.plugin.email.MailSend` task sends an email notification on completion
    21. A `io.kestra.plugin.core.http.Request` task sends a Telegram notification with the video link
    22. A `io.kestra.plugin.core.http.Request` task updates the Google Sheet with the YouTube link

    Ideal for:
    - **Content creators** who want to automate short-form video production at scale
    - **YouTube automation enthusiasts** looking for a fully hands-off publishing pipeline
    - **AI hobbyists** experimenting with chaining text-to-video and text-to-audio models
  tags:
    - AI
    - Video
    - YouTube
    - Content Creation
  ee: false
  demo: false
  metaDescription: >-
    Autonomous AI pipeline that brainstorms video ideas, generates clips and audio,
    assembles a final video, uploads to YouTube, and sends notifications.

id: ai-youtube-shorts-generator
namespace: company.team

tasks:
  - id: generate_trendy_idea
    type: io.kestra.plugin.openai.ChatCompletion
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: "gpt-4.1"
    messages:
      - role: system
        content: >-
          You are an AI that specializes in identifying viral trends on platforms
          like TikTok and YouTube Shorts. Your job is to brainstorm a single,
          simple, and satisfying ASMR video concept. You must only return the
          idea as a single line of plain text. Do not add any extra words,
          formatting, or explanation.
      - role: user
        content: >-
          Generate one short, trendy, and viral ASMR video idea. Describe the
          core concept in less than 10 words. Do not explain it, just state the idea.

  - id: enrich_idea_into_plan
    type: io.kestra.plugin.openai.ChatCompletion
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: "gpt-4.1"
    messages:
      - role: system
        content: >-
          Role: You are an AI designed to generate 1 immersive, satisfying idea
          based on a user-provided topic. Your output must be formatted as a JSON
          object with these fields: Caption, Idea, Environment, Sound, Status.

          The Idea must be under 13 words describing an interesting viral-worthy
          ASMR moment. The Caption must be short, punchy, and include 12
          hashtags. The Environment must be under 20 words describing the scene.
          The Sound must be under 15 words describing the primary audio.
          Set Status to "for production".
      - role: user
        content: >-
          Take the following trendy ASMR idea and expand it into a full
          production plan using JSON format.

          The short ASMR idea is:
          {{ outputs.generate_trendy_idea.choices[0].message.content }}

          Have your final expanded "Idea" field be in this format:
          "(color/style) (object) being (action)".
          Examples: layered rainbow kinetic sand being sliced, sparkly purple
          soap being scooped, neon green slime being pressed.

  - id: log_idea_to_sheet
    type: io.kestra.plugin.core.http.Request
    description: "Append the new idea to the tracking Google Sheet"
    uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ secret('GOOGLE_SHEET_ID') }}/values/Sheet1:append?valueInputOption=USER_ENTERED"
    method: POST
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_ACCESS_TOKEN') }}"
      Content-Type: "application/json"
    body: |
      {
        "values": [[
          "{{ json(outputs.enrich_idea_into_plan.choices[0].message.content).Idea }}",
          "{{ json(outputs.enrich_idea_into_plan.choices[0].message.content).Caption }}",
          "In Progress",
          ""
        ]]
      }

  - id: generate_scene_prompts
    type: io.kestra.plugin.openai.ChatCompletion
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: "gpt-4.1"
    messages:
      - role: system
        content: >-
          Role: You are a prompt-generation AI specializing in satisfying,
          ASMR-style video prompts. Your task is to generate a 3-scene video
          sequence. Return a JSON object with fields: Idea, Environment, Sound,
          Scene_1, Scene_2, Scene_3. Each scene must be between 1000 and 2000
          characters, describing satisfying tactile realism with macro-level
          detail. A visible tool must always be in motion interacting with the
          material. No poetic metaphors or storytelling. All descriptions must
          feel physically grounded and visually appealing.
      - role: user
        content: >-
          Give me 3 video prompts based on the following plan:

          Idea: {{ json(outputs.enrich_idea_into_plan.choices[0].message.content).Idea }}
          Environment: {{ json(outputs.enrich_idea_into_plan.choices[0].message.content).Environment }}
          Sound: {{ json(outputs.enrich_idea_into_plan.choices[0].message.content).Sound }}

  - id: unbundle_prompts
    type: io.kestra.plugin.scripts.python.Script
    description: "Extract individual scene descriptions from the structured AI output"
    script: |
      import json
      from kestra import Kestra

      raw = """{{ outputs.generate_scene_prompts.choices[0].message.content }}"""

      # Parse JSON output from the AI
      try:
          data = json.loads(raw)
      except json.JSONDecodeError:
          # Try to extract JSON from markdown code block
          import re
          match = re.search(r'```(?:json)?\s*([\s\S]*?)```', raw)
          if match:
              data = json.loads(match.group(1))
          else:
              raise ValueError("Could not parse scene prompts as JSON")

      # Find all scene entries
      scenes = []
      for key, value in data.items():
          if key.lower().startswith("scene") and isinstance(value, str):
              scenes.append(value)

      if not scenes:
          # Try nested structure
          def find_scenes(obj):
              found = []
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      if k.lower().startswith("scene") and isinstance(v, str):
                          found.append(v)
                      elif isinstance(v, (dict, list)):
                          found.extend(find_scenes(v))
              elif isinstance(obj, list):
                  for item in obj:
                      found.extend(find_scenes(item))
              return found
          scenes = find_scenes(data)

      if not scenes:
          raise ValueError("No scene keys found in the AI output")

      Kestra.outputs({
          "scenes": json.dumps([{"description": s} for s in scenes]),
          "idea": data.get("Idea", ""),
          "environment": data.get("Environment", "")
      })

  - id: generate_clips_and_audio
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ outputs.unbundle_prompts.vars.scenes }}"
    tasks:
      - id: create_clip
        type: io.kestra.plugin.core.http.Request
        uri: "https://api.wavespeed.ai/api/v3/bytedance/seedance-v1-lite-t2v-480p"
        method: POST
        headers:
          Authorization: "{{ secret('WAVESPEED_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "aspect_ratio": "9:16",
            "duration": 10,
            "prompt": "VIDEO THEME: {{ outputs.unbundle_prompts.vars.idea }} | WHAT HAPPENS IN THE VIDEO: {{ json(taskrun.value).description }} | WHERE THE VIDEO IS SHOT: {{ outputs.unbundle_prompts.vars.environment }}"
          }

      - id: wait_for_clip
        type: io.kestra.plugin.core.flow.Pause
        pauseDuration: "PT2M"

      - id: get_clip
        type: io.kestra.plugin.core.http.Request
        uri: "https://api.wavespeed.ai/api/v3/predictions/{{ json(outputs.create_clip.body).data.id }}/result"
        method: GET
        headers:
          Authorization: "{{ secret('WAVESPEED_API_KEY') }}"

      - id: create_sound
        type: io.kestra.plugin.core.http.Request
        uri: "https://queue.fal.run/fal-ai/mmaudio-v2"
        method: POST
        headers:
          Authorization: "{{ secret('FAL_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "prompt": "ASMR Soothing sound effects. {{ json(outputs.enrich_idea_into_plan.choices[0].message.content).Sound }}",
            "duration": 10,
            "video_url": "{{ json(outputs.get_clip.body).data.outputs[0] }}"
          }

      - id: wait_for_sound
        type: io.kestra.plugin.core.flow.Pause
        pauseDuration: "PT1M"

      - id: get_sound
        type: io.kestra.plugin.core.http.Request
        uri: "https://queue.fal.run/fal-ai/mmaudio-v2/requests/{{ json(outputs.create_sound.body).request_id }}"
        method: GET
        headers:
          Authorization: "{{ secret('FAL_API_KEY') }}"

  - id: collect_video_urls
    type: io.kestra.plugin.scripts.python.Script
    description: "Gather all generated video URLs into a single list for sequencing"
    script: |
      import json
      from kestra import Kestra

      # Collect video URLs from the ForEach iterations
      # In production, these would come from the iteration outputs
      # This task aggregates the URLs for the FFMPEG sequencing step
      video_urls = []
      iterations = json.loads("""{{ outputs.generate_clips_and_audio }}""")
      for iteration in iterations:
          url = iteration.get("get_sound", {}).get("video", {}).get("url", "")
          if url:
              video_urls.append(url)

      Kestra.outputs({"video_urls": json.dumps(video_urls)})

  - id: sequence_video
    type: io.kestra.plugin.core.http.Request
    description: "Stitch video clips into a single final video using the FFMPEG API"
    uri: "https://queue.fal.run/fal-ai/ffmpeg-api/compose"
    method: POST
    headers:
      Authorization: "{{ secret('FAL_API_KEY') }}"
      Content-Type: "application/json"
    body: |
      {
        "tracks": [
          {
            "id": "1",
            "type": "video",
            "keyframes": [
              { "url": "{{ json(outputs.collect_video_urls.vars.video_urls)[0] }}", "timestamp": 0, "duration": 10 },
              { "url": "{{ json(outputs.collect_video_urls.vars.video_urls)[1] }}", "timestamp": 10, "duration": 10 },
              { "url": "{{ json(outputs.collect_video_urls.vars.video_urls)[2] }}", "timestamp": 20, "duration": 10 }
            ]
          }
        ]
      }

  - id: wait_for_final_video
    type: io.kestra.plugin.core.flow.Pause
    pauseDuration: "PT1M"

  - id: get_final_video
    type: io.kestra.plugin.core.http.Request
    uri: "https://queue.fal.run/fal-ai/ffmpeg-api/requests/{{ json(outputs.sequence_video.body).request_id }}"
    method: GET
    headers:
      Authorization: "{{ secret('FAL_API_KEY') }}"

  - id: update_sheet_status
    type: io.kestra.plugin.core.http.Request
    description: "Update the Google Sheet row to mark production as Done"
    uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ secret('GOOGLE_SHEET_ID') }}/values/Sheet1!C2?valueInputOption=USER_ENTERED"
    method: PUT
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_ACCESS_TOKEN') }}"
      Content-Type: "application/json"
    body: |
      {
        "values": [["Done"]]
      }

  - id: download_final_video
    type: io.kestra.plugin.core.http.Request
    description: "Download the assembled video file for upload"
    uri: "{{ json(outputs.get_final_video.body).video_url }}"
    method: GET

  - id: upload_to_youtube
    type: io.kestra.plugin.scripts.python.Script
    description: "Upload the final video to YouTube using the YouTube Data API v3"
    script: |
      import json
      import requests
      from kestra import Kestra

      idea = """{{ json(outputs.enrich_idea_into_plan.choices[0].message.content).Idea }}"""
      caption = """{{ json(outputs.enrich_idea_into_plan.choices[0].message.content).Caption }}"""

      # YouTube Data API v3 resumable upload
      # Step 1: Initialize the upload
      metadata = {
          "snippet": {
              "title": f"AI ASMR: {idea}",
              "description": f"AI-Generated Video Idea: {idea}\n\n{caption}",
              "tags": ["asmr", "viral", "satisfying", "shorts"],
              "categoryId": "22"
          },
          "status": {
              "privacyStatus": "public"
          }
      }

      headers = {
          "Authorization": f"Bearer {Kestra.secret('YOUTUBE_ACCESS_TOKEN')}",
          "Content-Type": "application/json"
      }

      init_resp = requests.post(
          "https://www.googleapis.com/upload/youtube/v3/videos"
          "?uploadType=resumable&part=snippet,status",
          headers=headers,
          json=metadata
      )
      init_resp.raise_for_status()
      upload_url = init_resp.headers["Location"]

      # Step 2: Upload the video binary
      video_data = requests.get(
          """{{ json(outputs.get_final_video.body).video_url }}"""
      ).content

      upload_resp = requests.put(
          upload_url,
          headers={"Content-Type": "video/*"},
          data=video_data
      )
      upload_resp.raise_for_status()
      video_id = upload_resp.json().get("id", "")

      Kestra.outputs({"youtube_video_id": video_id})

  - id: email_notification
    type: io.kestra.plugin.email.MailSend
    host: "{{ secret('SMTP_HOST') }}"
    port: 587
    username: "{{ secret('SMTP_USER') }}"
    password: "{{ secret('SMTP_PASSWORD') }}"
    from: "{{ secret('EMAIL_FROM') }}"
    to: "{{ secret('NOTIFICATION_EMAIL') }}"
    subject: "Your new video is ready!"
    htmlTextContent: |
      <p>Your new AI-generated video has been published.</p>
      <p><strong>Title:</strong> {{ json(outputs.enrich_idea_into_plan.choices[0].message.content).Idea }}</p>
      <p>Watch it here: <a href="https://www.youtube.com/watch?v={{ outputs.upload_to_youtube.vars.youtube_video_id }}">YouTube Link</a></p>

  - id: telegram_notification
    type: io.kestra.plugin.core.http.Request
    description: "Send a Telegram notification with the published video link"
    uri: "https://api.telegram.org/bot{{ secret('TELEGRAM_BOT_TOKEN') }}/sendMessage"
    method: POST
    contentType: application/json
    body: |
      {
        "chat_id": "{{ secret('TELEGRAM_CHAT_ID') }}",
        "text": "Your new video is ready! Title: {{ json(outputs.enrich_idea_into_plan.choices[0].message.content).Idea }} -- Watch: https://www.youtube.com/watch?v={{ outputs.upload_to_youtube.vars.youtube_video_id }}"
      }

  - id: update_sheet_youtube_link
    type: io.kestra.plugin.core.http.Request
    description: "Update the Google Sheet with the final YouTube video URL"
    uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ secret('GOOGLE_SHEET_ID') }}/values/Sheet1!D2?valueInputOption=USER_ENTERED"
    method: PUT
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_ACCESS_TOKEN') }}"
      Content-Type: "application/json"
    body: |
      {
        "values": [["https://www.youtube.com/watch?v={{ outputs.upload_to_youtube.vars.youtube_video_id }}"]]
      }

triggers:
  - id: schedule_trigger
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "*/30 * * * *"
