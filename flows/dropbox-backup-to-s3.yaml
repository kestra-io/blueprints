id: dropbox-backup-to-s3
namespace: company.infra

inputs:
  - id: dropbox_folder
    type: STRING
    defaults: "/company-documents"
    description: Dropbox folder to back up.

  - id: s3_bucket
    type: STRING
    defaults: my-dropbox-backups
    description: Destination S3 bucket for the backup copies.

  - id: s3_prefix
    type: STRING
    defaults: dropbox-backup
    description: Key prefix under which backup objects are stored. No leading or trailing slash.

  - id: max_files
    type: INT
    defaults: 1000
    description: Per-run cap on the number of Dropbox entries listed. Raise it for larger folders, but very large listings produce oversized executions.

variables:
  watermark: "{{ kv('DROPBOX_BACKUP_WATERMARK', errorOnMissing=false) ?? '1970-01-01T00:00:00Z' }}"

pluginDefaults:
  - type: io.kestra.plugin.dropbox
    values:
      accessToken: "{{ secret('DROPBOX_ACCESS_TOKEN') }}"
  - type: io.kestra.plugin.aws.s3
    values:
      accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      secretKeyId: "{{ secret('AWS_SECRET_KEY_ID') }}"
      region: "{{ secret('AWS_DEFAULT_REGION') }}"

concurrency:
  limit: 1

tasks:
  - id: list_dropbox_files
    type: io.kestra.plugin.dropbox.files.List
    description: Recursively list entries under the Dropbox folder, capped at max_files per run.
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 5
    from: "{{ inputs.dropbox_folder }}"
    recursive: true
    limit: "{{ inputs.max_files }}"
    fetchType: FETCH

  - id: backup_each_file
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ outputs.list_dropbox_files.rows }}"
    concurrencyLimit: 4
    tasks:
      - id: backup_if_changed
        type: io.kestra.plugin.core.flow.If
        description: Skip folder entries (Download only works on files) and skip files unchanged since the last successful run, so each night only copies new and modified files.
        condition: "{{ fromJson(taskrun.value).type == 'file' and (fromJson(taskrun.value).clientModified | timestamp) > (render(vars.watermark) | timestamp) }}"
        then:
          - id: download_from_dropbox
            type: io.kestra.plugin.dropbox.files.Download
            description: Download the changed Dropbox file into Kestra internal storage.
            retry:
              type: constant
              interval: PT10S
              maxAttempt: 5
            from: "{{ fromJson(parent.taskrun.value).path }}"

          - id: upload_to_s3
            type: io.kestra.plugin.aws.s3.Upload
            description: Upload the file to the S3 backup bucket, mirroring its Dropbox path under a single normalised separator.
            retry:
              type: constant
              interval: PT10S
              maxAttempt: 5
            bucket: "{{ inputs.s3_bucket }}"
            from: "{{ outputs.download_from_dropbox.uri }}"
            key: "{{ inputs.s3_prefix }}/{{ fromJson(parent.taskrun.value).path | substringAfter('/') }}"
            storageClass: STANDARD

  - id: update_watermark
    type: io.kestra.plugin.core.kv.Set
    description: Record this run's start as the new watermark only after every changed file uploaded successfully, so a mid-run failure re-tries the same window next time.
    key: DROPBOX_BACKUP_WATERMARK
    kvType: STRING
    value: "{{ execution.startDate | date('yyyy-MM-dd''T''HH:mm:ss''Z''', timeZone='UTC') }}"

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }}). Nightly Dropbox backup did not complete; the watermark was not advanced."

triggers:
  - id: nightly_backup
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 2 * * *"
    timezone: Etc/UTC

extend:
  shortDescription: Incrementally back up a Dropbox folder to Amazon S3 each night, copying only files changed since the last run, with file-vs-folder filtering, retries, and failure alerting.
  title: Cross-cloud incremental backup of Dropbox to Amazon S3
  metaTitle: Dropbox to S3 incremental backup
  description: |
    This flow keeps a durable, off-platform copy of a Dropbox folder in an Amazon S3 bucket. It
    is incremental: each nightly run lists the folder, then copies only the files that changed
    since the last successful run, so it does not re-download and re-upload everything every
    night. That keeps Dropbox egress and S3 PUT costs proportional to what actually changed and
    stops the job getting slower as the folder grows.

    ## What this flow does
    1. `list_dropbox_files` recursively lists entries under the configured folder, capped at the
       `max_files` input per run (default 1000) to keep the execution payload bounded.
    2. `backup_each_file` loops over the listing with a `ForEach` task (four at a time).
    3. An `If` guard inside the loop keeps only entries whose `type` is `file` (a recursive
       listing also returns folders, which `Download` cannot fetch) and whose `clientModified`
       timestamp is newer than the stored watermark. Matching files are downloaded and uploaded
       to S3 under a key that mirrors the Dropbox path with a single normalised separator.
    4. `update_watermark` writes this run's start time to the KV store, but only after every
       changed file has uploaded. If a file fails, the watermark is not advanced and the next run
       retries the same window, so the backup is at-least-once rather than silently skipping files.
    5. A `Schedule` trigger runs the backup at 02:00 UTC every day.

    ## Scope and limits
    - This is an incremental file-copy backup, not a point-in-time snapshot or versioned vault.
      For versioning and accidental-delete protection, enable S3 bucket versioning on the target
      bucket.
    - Listing is capped at `max_files` per run. For folders larger than the cap, raise it or
      partition the source into sub-folders and run one flow per sub-folder.

    ## Prerequisites
    - A Kestra instance with the Dropbox, AWS, and Slack plugins installed.
    - A Dropbox app access token with read access to the source folder.
    - AWS credentials (or an attached IAM role) with `s3:PutObject` on the target prefix.
    - An existing S3 bucket to receive the backup copies.

    ## Secrets
    - `DROPBOX_ACCESS_TOKEN`: Dropbox API access token used to list and download files.
    - `AWS_ACCESS_KEY_ID` / `AWS_SECRET_KEY_ID`: AWS credentials for the S3 upload. Prefer an
      IAM role or instance profile where Kestra runs and omit these static keys; if you must use
      keys, scope the policy to `arn:aws:s3:::<bucket>/<prefix>/*`.
    - `AWS_DEFAULT_REGION`: AWS region of the destination S3 bucket, for example `eu-west-1`.
    - `SLACK_WEBHOOK`: Slack incoming webhook URL used by the failure alert.
    Never hardcode any of these values.

    ## Quick start
    1. Add the `DROPBOX_ACCESS_TOKEN`, `AWS_ACCESS_KEY_ID`, `AWS_SECRET_KEY_ID`,
       `AWS_DEFAULT_REGION`, and `SLACK_WEBHOOK` secrets to your namespace.
    2. Set the `dropbox_folder`, `s3_bucket`, `s3_prefix`, and `max_files` inputs.
    3. Enable S3 versioning on the bucket if you want delete/overwrite protection, and add a
       lifecycle rule to transition older versions to `STANDARD_IA` or `GLACIER` after N days
       rather than writing into IA on every upload.
    4. Enable the flow and confirm the first nightly run lands objects in your bucket. The first
       run copies everything (the watermark starts at the Unix epoch); later runs copy only changes.

    ## Expected outputs
    - `{{ outputs.list_dropbox_files.size }}` entries discovered in the Dropbox folder.
    - For each changed file, `{{ outputs.download_from_dropbox.uri }}` is the staged copy in Kestra storage.
    - `{{ outputs.upload_to_s3.bucket }}` and `{{ outputs.upload_to_s3.key }}` confirm the S3
      destination for each uploaded object.

    ## Documentation
    - Dropbox plugin: https://kestra.io/plugins/plugin-dropbox
    - AWS S3 Upload task: https://kestra.io/plugins/plugin-aws/tasks/s3/io.kestra.plugin.aws.s3.upload
    - KV Store: https://kestra.io/docs/concepts/kv-store
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: "Incrementally back up a Dropbox folder to Amazon S3 nightly: list, filter files, copy only changed files via a KV watermark, with retries and alerts."
