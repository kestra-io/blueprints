id: docker-build-scan-sign-push
namespace: company.team
description: |
  Secure container supply chain in one flow: build the image, scan it for
  HIGH/CRITICAL vulnerabilities with Trivy (which fails the run on findings),
  push it to the registry, then sign the pushed image with cosign.

inputs:
  - id: image
    type: STRING
    defaults: ghcr.io/my-org/my-app:latest
    description: Fully qualified image reference to build, scan, push, and sign.

tasks:
  - id: build
    type: io.kestra.plugin.docker.Build
    description: Build the image locally without pushing yet.
    dockerfile: |
      FROM python:3.12-slim
      WORKDIR /app
      RUN pip install --no-cache-dir flask
      COPY . /app
      CMD ["python", "-m", "flask", "run", "--host=0.0.0.0"]
    tags:
      - "{{ inputs.image }}"
    push: false

  - id: scan
    type: io.kestra.plugin.trivy.cli.TrivyCLI
    description: Fail the build on HIGH or CRITICAL vulnerabilities.
    commands:
      - trivy image --exit-code 1 --severity HIGH,CRITICAL "{{ inputs.image }}"

  - id: push
    type: io.kestra.plugin.docker.Push
    description: Push the scanned image to the registry.
    tags:
      - "{{ inputs.image }}"
    credentials:
      registry: ghcr.io
      username: "{{ secret('REGISTRY_USERNAME') }}"
      password: "{{ secret('REGISTRY_PASSWORD') }}"

  - id: sign
    type: io.kestra.plugin.scripts.shell.Commands
    description: Sign the pushed image with cosign (keyless or key-based).
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: bitnami/cosign:latest
    env:
      COSIGN_KEY: "{{ secret('COSIGN_PRIVATE_KEY') }}"
      COSIGN_PASSWORD: "{{ secret('COSIGN_PASSWORD') }}"
    commands:
      - cosign sign --yes --key env://COSIGN_KEY "{{ inputs.image }}"

triggers:
  - id: on_build_request
    type: io.kestra.plugin.core.trigger.Webhook
    description: CI posts here to build, scan, and publish a new image.
    key: "{{ secret('DOCKER_BUILD_WEBHOOK_KEY') }}"

extend:
  shortDescription: Build an image, fail on HIGH/CRITICAL CVEs with Trivy, push it, then sign with cosign.
  title: Build, Scan, Push, and Sign a Container Image
  metaTitle: Build, Scan, Push, and Sign a Container Image
  description: |
    This blueprint gives container builds a security gate. It builds the image,
    scans it with Trivy and fails the run if HIGH or CRITICAL vulnerabilities are
    found, pushes the clean image to the registry, and signs it with cosign so
    downstream consumers can verify provenance.

    Prerequisites:
      - Secrets:
        - REGISTRY_USERNAME, REGISTRY_PASSWORD: registry push credentials.
        - COSIGN_PRIVATE_KEY, COSIGN_PASSWORD: cosign signing key and its password.
        - DOCKER_BUILD_WEBHOOK_KEY: key guarding the webhook trigger.
      - A worker with Docker daemon access for the build, scan, and push steps.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Replace the sample Dockerfile with your application's Dockerfile.
      3. POST to the webhook (or run manually) with the target image reference.

    Outputs:
      - outputs.build.imageId: the built image ID.
      - outputs.scan: Trivy scan result; a non-zero exit stops the flow before push.

    Notes:
      - Trivy needs Docker daemon access to scan the locally built image; mount the socket on the runner.
      - cosign signs the pushed image by digest; switch to keyless signing if you use OIDC.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Build a container image, fail on HIGH/CRITICAL CVEs with Trivy, push it, then sign it with cosign.
