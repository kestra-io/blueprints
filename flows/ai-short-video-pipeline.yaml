id: ai-short-video-pipeline
namespace: company.team

tasks:
  - id: idea_creator
    type: io.kestra.plugin.openai.ChatCompletion
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4o
    messages:
      - role: system
        content: >-
          You are a creative video content strategist for short-form social
          media. Generate engaging video ideas that are simple to understand,
          short, and optimized for maximum viewer retention.
      - role: user
        content: >-
          Generate one unique short-form video concept. The idea should be
          visually compelling, trend-aware, and suitable for a 5-second clip.
          Return a JSON object with an "idea" field containing the full creative
          prompt for a text-to-video AI model.

  - id: create_sisif_video
    type: io.kestra.plugin.core.http.Request
    uri: "https://sisif.ai/api/videos/generate/"
    method: POST
    headers:
      Authorization: "Bearer {{ secret('SISIF_API_TOKEN') }}"
      Content-Type: application/json
    body: |
      {
        "prompt": "{{ outputs.idea_creator.choices[0].message.content }}",
        "duration": 5,
        "resolution": "540x960"
      }

  - id: wait_for_rendering
    type: io.kestra.plugin.core.flow.Pause
    pauseDuration: PT10S

  - id: check_video_status
    type: io.kestra.plugin.core.http.Request
    uri: "https://sisif.ai/api/videos/status/{{ outputs.create_sisif_video.body.videoId }}"
    method: GET
    headers:
      Authorization: "Bearer {{ secret('SISIF_API_TOKEN') }}"

  - id: video_ready_check
    type: io.kestra.plugin.core.flow.If
    condition: "{{ outputs.check_video_status.body.status == 'completed' }}"
    then:
      - id: prepare_final_data
        type: io.kestra.plugin.scripts.python.Script
        script: |
          from kestra import Kestra

          Kestra.outputs({
              "videoUrl": "{{ outputs.check_video_status.body.videoUrl }}",
              "status": "completed",
              "prompt": "{{ outputs.idea_creator.choices[0].message.content }}"
          })
    else:
      - id: retry_wait
        type: io.kestra.plugin.core.flow.Pause
        pauseDuration: PT10S

triggers:
  - id: schedule_trigger
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 */6 * * *"

extend:
  title: Automated Short Video Creation Pipeline with GPT-4o
  metaTitle: AI Short Video Pipeline with GPT-4o
  shortDescription: >-
    Generate creative short-form video ideas with GPT-4o and produce videos
    automatically using the Sisif.ai text-to-video API on a recurring schedule.
  description: |
    **Produce a steady stream of short-form video content by combining AI idea generation with automated video rendering.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger fires every 6 hours to start a new content cycle
    2. A `io.kestra.plugin.openai.ChatCompletion` task uses GPT-4o to brainstorm a trending, engagement-optimized video concept
    3. A `io.kestra.plugin.core.http.Request` task sends the creative prompt to the Sisif.ai video generation API
    4. A `io.kestra.plugin.core.flow.Pause` task waits for video rendering to complete
    5. A `io.kestra.plugin.core.http.Request` task polls the Sisif.ai status endpoint until the video is ready
    6. A `io.kestra.plugin.core.flow.If` task checks whether the video has finished rendering or needs another polling cycle

    Ideal for:
    - **Content creators** who want to maintain a consistent posting cadence without manual video production
    - **Social media managers** looking to scale short-form content output across platforms
    - **Marketing teams** experimenting with AI-generated video for rapid creative testing
  tags:
    - AI
  ee: false
  demo: false
  metaDescription: >-
    Automatically generate short video ideas with GPT-4o and render them via
    Sisif.ai on a scheduled pipeline for consistent content output.

