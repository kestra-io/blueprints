id: argocd-app-management
namespace: company.team
description: |
  Manage an Argo CD application end to end: create the Application manifest
  with kubectl, check its status, run a sync, and verify status afterward.

tasks:
  - id: create_argocd_app
    type: io.kestra.plugin.kubernetes.kubectl.Apply
    description: Apply the Argo CD Application manifest to the cluster.
    connection:
      masterUrl: "{{ secret('K8S_MASTER_URL') }}"
      oauthToken: "{{ secret('K8S_TOKEN') }}"
    namespace: default
    spec: |
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: my-argocd-app
      spec:
        project: default
        source:
          repoURL: https://github.com/argoproj/argocd-example-apps.git
          targetRevision: HEAD
          path: guestbook
        destination:
          server: https://kubernetes.default.svc
          namespace: default

  - id: get_argocd_app_status_before_sync
    type: io.kestra.plugin.argocd.apps.Status
    description: Fetch the application status before running synchronization.
    application: my-argocd-app

  - id: sync_argocd_app
    type: io.kestra.plugin.argocd.apps.Sync
    description: Synchronize the application and prune any out-of-band resources.
    application: my-argocd-app
    prune: true
    revision: HEAD

  - id: get_argocd_app_status_after_sync
    type: io.kestra.plugin.argocd.apps.Status
    description: Fetch the application status after synchronization completes.
    application: my-argocd-app

pluginDefaults:
  - type: io.kestra.plugin.argocd.apps.Status
    values:
      server: "{{ secret('ARGOCD_SERVER') }}"
      token: "{{ secret('ARGOCD_TOKEN') }}"
  - type: io.kestra.plugin.argocd.apps.Sync
    values:
      server: "{{ secret('ARGOCD_SERVER') }}"
      token: "{{ secret('ARGOCD_TOKEN') }}"

extend:
  shortDescription: "Create an Argo CD Application, sync it, and capture status before and after reconciliation in one Kestra flow."
  title: Manage an Argo CD Application with Sync Verification
  metaTitle: Manage an Argo CD Application with Kestra
  metaDescription: Provision an Argo CD Application with kubectl, run a pruning sync, and verify status before and after reconciliation in one Kestra GitOps flow.
  description: |
    Manage an Argo CD Application end to end from a single Kestra flow: create the GitOps Application manifest, sync it to your Kubernetes cluster, and verify reconciliation status before and after the sync. Instead of stitching together `kubectl apply`, the Argo CD CLI, and manual status checks across separate scripts, this blueprint turns the full create, sync, and verify loop into one declarative, auditable, repeatable pipeline. It is ideal for teams running GitOps deployments who want to trigger and observe Argo CD reconciliation as a governed, orchestrated step rather than a side effect of a Git push.

    ## How it works
    1. `create_argocd_app` uses `io.kestra.plugin.kubernetes.kubectl.Apply` to apply an Argo CD `Application` manifest (`argoproj.io/v1alpha1`) to the cluster, pointing at a Git `repoURL`, `targetRevision`, and `path`.
    2. `get_argocd_app_status_before_sync` calls `io.kestra.plugin.argocd.apps.Status` to capture the application health and sync state before reconciliation.
    3. `sync_argocd_app` runs `io.kestra.plugin.argocd.apps.Sync` with `prune: true` and `revision: HEAD` to reconcile desired state and remove resources no longer defined in Git.
    4. `get_argocd_app_status_after_sync` calls `io.kestra.plugin.argocd.apps.Status` again to confirm the post-sync state, giving you a clear before-and-after record.

    Argo CD connection details (`server`, `token`) are injected through `pluginDefaults` so the Status and Sync tasks stay clean.

    ## What you get
    - One flow that creates, syncs, and verifies an Argo CD Application.
    - A before-and-after status diff for every reconciliation run.
    - Pruning sync that keeps the cluster aligned with Git as the source of truth.
    - Outputs you can route downstream: `outputs.create_argocd_app`, `outputs.get_argocd_app_status_before_sync`, and `outputs.get_argocd_app_status_after_sync`.

    ## Who it's for
    - Platform and DevOps engineers running GitOps on Kubernetes with Argo CD.
    - SREs who want sync events captured and auditable.
    - Release teams that need deployment reconciliation tied into a broader orchestration pipeline.

    ## Why orchestrate this with Kestra
    Argo CD reconciles continuously on its own, but it cannot coordinate everything that should happen around a deployment. With Kestra you can trigger a sync from upstream events (a CI build, a webhook, an approval), gate it behind other tasks, add retries on transient failures, and keep full execution lineage of who synced what and when. The before and after `Status` tasks give you an explicit reconciliation record that Argo CD's own scheduler does not surface as a discrete, queryable run. Everything is declarative YAML, version controlled alongside the rest of your pipelines.

    ## Prerequisites
    - Argo CD installed in the target Kubernetes cluster.
    - A Git repository containing the application manifests referenced by the `Application`.

    ### Secrets
    - `K8S_MASTER_URL`: Kubernetes API server URL for kubectl access.
    - `K8S_TOKEN`: Bearer token with permission to create Argo CD Applications.
    - `ARGOCD_SERVER`: Argo CD API endpoint (for example, https://argocd.example.com).
    - `ARGOCD_TOKEN`: Argo CD API token with access to the target application.

    ## Quick start
    1. Set the four secrets above in your Kestra namespace.
    2. Adjust the Application `name`, `repoURL`, `targetRevision`, and `path` to point at the app you want to deploy.
    3. Save and execute the flow to create the Application, run the sync, and inspect the before and after statuses.

    ## How to extend
    - Add a `Schedule` or webhook trigger to run reconciliation on a cadence or on Git events.
    - Add retries and notifications (Slack, email) around the `Sync` task for failed reconciliations.
    - Conditionally branch on the post-sync `Status` to alert when health is degraded or out of sync.
    - Parameterize the manifest with inputs to manage multiple applications from one flow.

    ## Links
    - [Argo CD plugin documentation](https://kestra.io/plugins/plugin-argocd)
    - [Argo CD orchestration with Kestra](https://kestra.io/orchestration/argocd)
  tags:
    - Infrastructure
  ee: false
  demo: false
