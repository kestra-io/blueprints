id: terraform-approval-plan-apply
namespace: company.team
description: |
  Put a human gate between terraform plan and apply. A webhook starts the run,
  the flow plans and shows the changes, pauses for approval, then applies only
  the reviewed plan and logs the result.

tasks:
  - id: plan
    type: io.kestra.plugin.terraform.cli.TerraformCLI
    description: Produce a saved plan for review.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: hashicorp/terraform:latest
    env:
      AWS_ACCESS_KEY_ID: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      AWS_SECRET_ACCESS_KEY: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
    inputFiles:
      main.tf: |
        # Replace with your real configuration and backend.
        terraform {
          required_providers {
            random = { source = "hashicorp/random" }
          }
        }
        resource "random_pet" "example" {}
    outputFiles:
      - tfplan
    beforeCommands:
      - terraform init
    commands:
      - terraform plan -no-color -out=tfplan

  - id: approve
    type: io.kestra.plugin.core.flow.Pause
    description: Wait for a human to approve the reviewed plan.
    pauseDuration: PT2H

  - id: apply
    type: io.kestra.plugin.terraform.cli.TerraformCLI
    description: Apply the exact plan that was reviewed and approved.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: hashicorp/terraform:latest
    env:
      AWS_ACCESS_KEY_ID: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      AWS_SECRET_ACCESS_KEY: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
    inputFiles:
      tfplan: "{{ outputs.plan.outputFiles['tfplan'] }}"
      main.tf: |
        terraform {
          required_providers {
            random = { source = "hashicorp/random" }
          }
        }
        resource "random_pet" "example" {}
    beforeCommands:
      - terraform init
    commands:
      - terraform apply -no-color -auto-approve tfplan

  - id: log_result
    type: io.kestra.plugin.core.log.Log
    description: Record that the approved plan was applied.
    message: "Terraform apply completed for execution {{ execution.id }}."

triggers:
  - id: on_apply_request
    type: io.kestra.plugin.core.trigger.Webhook
    description: A change request system posts here to start a plan/apply.
    key: "{{ secret('TERRAFORM_APPLY_WEBHOOK_KEY') }}"

extend:
  shortDescription: Plan Terraform, pause for approval, then apply the exact reviewed plan and log the outcome.
  title: Terraform Plan and Apply with an Approval Gate
  metaTitle: Terraform Plan and Apply with an Approval Gate
  description: |
    This blueprint enforces review before infrastructure changes land. A webhook
    starts the run, Terraform produces a saved plan, the flow pauses for a human
    to approve, and apply runs against that exact saved plan so what ships is what
    was reviewed. The result is logged for the audit trail.

    Prerequisites:
      - Secrets:
        - AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY: provider credentials.
        - TERRAFORM_APPLY_WEBHOOK_KEY: key guarding the webhook trigger.
      - Terraform configuration with a remote backend shared across the plan and apply steps.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Replace the stub main.tf and backend with your configuration.
      3. POST to the webhook (or run manually); approve the Pause to apply.

    Outputs:
      - outputs.plan.outputFiles: the saved tfplan reviewed before apply.
      - outputs.apply: stdout of the apply step.

    Notes:
      - apply runs the saved tfplan, so it cannot diverge from the reviewed plan.
      - A remote backend is required so the plan file matches the apply state.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Plan Terraform, pause for approval, then apply the exact reviewed plan and log the outcome.
