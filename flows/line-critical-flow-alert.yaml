id: line-critical-flow-alert
namespace: company.team

labels:
  type: monitoring
  channel: line
  tier: tier-1

concurrency:
  limit: 1

tasks:
  - id: notify_outcome
    type: io.kestra.plugin.line.LineExecution
    description: Broadcast the terminal outcome of the watched critical flow to the LINE Official Account followers.
    channelAccessToken: "{{ secret('LINE_CHANNEL_ACCESS_TOKEN') }}"
    executionId: "{{ trigger.executionId ?? execution.id }}"
    customMessage: "[{{ trigger.state ?? 'MANUAL' }}] Critical flow daily-revenue-close reached a terminal state. Open the linked execution for details."
    customFields:
      Flow: daily-revenue-close
      Owner: Finance Ops
      Tier: Tier-1
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 5
    timeout: PT30S

triggers:
  - id: on_critical_flow_terminal
    type: io.kestra.plugin.core.trigger.Flow
    states:
      - SUCCESS
      - WARNING
      - FAILED
      - KILLED
      - CANCELLED
    conditions:
      - type: io.kestra.plugin.core.condition.ExecutionFlow
        namespace: company.team
        flowId: daily-revenue-close

extend:
  shortDescription: Broadcast a LINE update to your followers every time one specific business-critical flow reaches a terminal state.
  title: Watch one critical flow and report its result to LINE
  metaTitle: LINE alerts for a single critical Kestra flow
  description: |
    This flow keeps a close eye on a single business-critical flow (here `daily-revenue-close` in the `company.team`
    namespace) and sends a LINE notification every time that flow reaches a terminal state: `SUCCESS`, `WARNING`,
    `FAILED`, `KILLED`, or `CANCELLED`. Unlike a broad failure monitor, this watch reports both good and bad outcomes,
    so stakeholders get a per-run confirmation for the one flow that matters most.

    The message lead line is outcome-aware: it prefixes the LINE broadcast with `[{{ trigger.state }}]` so a reader
    scanning their LINE feed can tell `[SUCCESS]` from `[FAILED]` at a glance without opening the execution link. When
    you run this flow manually for a smoke test the prefix shows `[MANUAL]`, because there is no trigger state to read.

    The flow uses a `io.kestra.plugin.core.trigger.Flow` trigger scoped with an `ExecutionFlow` condition, which
    matches only the exact namespace and flow id you specify. The `states` list controls which terminal transitions
    fire the alert. The LINE message also carries the execution link, id, namespace, flow name, start date, duration,
    and status, resolved by the `LineExecution` task.

    ## How LINE delivery works (read this first)
    `LineExecution` posts to the LINE Messaging API broadcast endpoint, which delivers to **every follower of the LINE
    Official Account** tied to your channel access token. There is no per-team or per-stakeholder routing here. Because
    this watcher reports revenue-close status, the receiving Official Account should be a controlled, internal-only
    account whose followers are exactly the stakeholders allowed to see that status. Do not treat this as targeted
    delivery to a specific group or person.

    ## What this watcher can and cannot see (honest scope)
    A Flow trigger only fires on **state transitions of executions that actually start**. If `daily-revenue-close` is
    disabled, fails to be scheduled, or its own trigger never fires, this watcher stays silent: there is no run to
    observe. For a true revenue-close heartbeat, the missing-run case is exactly the failure mode stakeholders care
    about most, and this flow alone cannot detect it. This blueprint is an **echo-when-it-runs** confirmation, not a
    dead-man's-switch. To cover the missing-run case, pair this with a separate scheduled flow that alerts if no
    `SUCCESS` for `daily-revenue-close` was observed within the expected window.

    ## Reliability
    For a Tier-1 heartbeat a dropped notification is worse than no heartbeat (stakeholders may believe the critical job
    did not run when it did, or vice versa), so the LINE call is hardened:
    - `retry` (constant, 5 attempts, 10s apart) rides out transient LINE API `5xx`, timeouts, and `429` rate limits.
    - `timeout: PT30S` bounds a hung HTTP call so the task fails fast and retries instead of stalling a worker.

    This flow is itself a state-driven alerter, so it deliberately has no flow-level `errors` block, which would risk a
    notification loop on its own failures. Add an independent second channel (Slack or email) in this flow if a LINE
    outage must never go unnoticed.

    ## Prerequisites
    - A LINE Messaging API channel (a LINE Official Account with the Messaging API enabled).
    - A LINE Channel Access Token with permission to broadcast messages.
    - The critical flow you want to watch must exist; update `namespace` and `flowId` in the condition to match it.

    ## Secrets
    - `LINE_CHANNEL_ACCESS_TOKEN`: the Channel Access Token used to authenticate to the LINE Messaging API and
      broadcast the message. Store it as a Kestra secret; never inline the token.

    ## Quick start
    1. Issue a Channel Access Token in the LINE Developers console for your Messaging API channel.
    2. Save it in Kestra as the secret `LINE_CHANNEL_ACCESS_TOKEN`.
    3. Set the `namespace` and `flowId` in the `ExecutionFlow` condition to your critical flow.
    4. Trim the `states` list if you only want certain outcomes (for example, drop `SUCCESS` to alert on problems only).
    5. Update `customMessage` and `customFields` for the owning team, then deploy.
    6. Run the watched flow once to confirm the LINE message arrives. You can also run this flow manually as a smoke
       test, since `executionId` falls back to `execution.id` when no trigger is present.

    ## Expected outputs
    This is a notification-only flow and writes no files. The deliverable is a LINE broadcast for each terminal run of
    the watched flow. Delivery can be confirmed in the `notify_outcome` task logs; the original run is reachable from
    the execution link in the LINE message, built from `{{ trigger.executionId ?? execution.id }}`.

    ## Links
    - Kestra LINE plugin: https://kestra.io/plugins/plugin-line
    - ExecutionFlow condition: https://kestra.io/plugins/core/conditions/io.kestra.plugin.core.condition.executionflow
    - LINE Messaging API broadcast: https://developers.line.biz/en/docs/messaging-api/sending-messages/#send-broadcast-message
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: Get an outcome-aware LINE broadcast every time one specific business-critical Kestra flow reaches a terminal state, success or failure.
