id: odoo-create-leads-from-webhook
namespace: company.sales

labels:
  team: sales
  channel: webhook

pluginDefaults:
  - type: io.kestra.plugin.odoo.Query
    values:
      url: "{{ secret('ODOO_URL') }}"
      db: "{{ secret('ODOO_DB') }}"
      username: "{{ secret('ODOO_USERNAME') }}"
      password: "{{ secret('ODOO_PASSWORD') }}"

tasks:
  - id: validate_payload
    type: io.kestra.plugin.core.execution.Fail
    description: Reject malformed submissions before touching the CRM so junk and spam never become leads.
    condition: "{{ (trigger.body.email is null) or (trigger.body.email | length < 5) or (trigger.body.email | length > 254) or (not (trigger.body.email contains '@')) or (not (trigger.body.email contains '.')) or (trigger.body.name is null) or (trigger.body.name | length == 0) }}"
    errorMessage: "Rejected lead webhook: email or name missing or malformed for payload {{ trigger.body | toJson }}."

  - id: find_existing
    type: io.kestra.plugin.odoo.Query
    description: Look up an existing open lead with the same email so retries and double submits do not create duplicates.
    model: crm.lead
    operation: SEARCH_READ
    filters:
      - ["email_from", "=", "{{ trigger.body.email }}"]
      - ["type", "=", "lead"]
    fields:
      - id
      - email_from
    limit: 1
    fetchType: FETCH
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: upsert_lead
    type: io.kestra.plugin.core.flow.If
    description: Update the existing lead if one was found, otherwise create a new one (idempotent on email).
    condition: "{{ (outputs.find_existing.size ?? 0) > 0 }}"
    then:
      - id: update_lead
        type: io.kestra.plugin.odoo.Query
        description: Refresh the existing CRM lead with the latest submission details.
        model: crm.lead
        operation: WRITE
        ids:
          - "{{ outputs.find_existing.rows[0].id }}"
        values:
          contact_name: "{{ trigger.body.name }}"
          phone: "{{ trigger.body.phone ?? '' }}"
          description: "Updated from webhook submission. utm_source={{ trigger.body.utm_source ?? 'unknown' }} utm_campaign={{ trigger.body.utm_campaign ?? 'unknown' }}. {{ trigger.body.message ?? '' }}"
        retry:
          type: constant
          interval: PT10S
          maxAttempt: 3

      - id: log_updated
        type: io.kestra.plugin.core.log.Log
        description: Record that an existing lead was refreshed, without leaking the submitter email.
        message: "Updated existing CRM lead id {{ outputs.find_existing.rows[0].id }} from webhook submission."
    else:
      - id: create_lead
        type: io.kestra.plugin.odoo.Query
        description: Create a new CRM lead in Odoo from the inbound webhook form payload.
        model: crm.lead
        operation: CREATE
        values:
          name: "{{ trigger.body.company ?? 'Website enquiry' }}"
          contact_name: "{{ trigger.body.name }}"
          email_from: "{{ trigger.body.email }}"
          phone: "{{ trigger.body.phone ?? '' }}"
          description: "Captured from webhook. utm_source={{ trigger.body.utm_source ?? 'unknown' }} utm_campaign={{ trigger.body.utm_campaign ?? 'unknown' }}. {{ trigger.body.message ?? '' }}"
          type: lead
        retry:
          type: constant
          interval: PT10S
          maxAttempt: 3

      - id: log_created
        type: io.kestra.plugin.core.log.Log
        description: Record that a new lead was created, without leaking the submitter email.
        message: "Created new CRM lead id {{ outputs.create_lead.ids[0] }} from webhook submission."

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed to record an inbound lead (execution {{ execution.id }})."
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

triggers:
  - id: form_submission
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('ODOO_WEBHOOK_KEY') }}"

extend:
  shortDescription: "Receive a website form submission via webhook and upsert a matching lead in Odoo CRM, with payload validation, email-based dedup, retry, and failure alerting."
  title: Create Odoo CRM leads from an inbound webhook
  metaTitle: Create Odoo leads from a webhook with Kestra
  description: |
    This flow turns inbound form submissions into Odoo CRM leads. A webhook trigger exposes
    a signed URL that your website, landing page, or marketing tool can POST to, and the flow
    writes the payload into the `crm.lead` model over XML-RPC. Unlike a naive "POST straight to
    CRM" example, it validates the payload first, dedups on email so retries and double submits
    do not pile up duplicate leads, retries transient Odoo errors, and alerts on failure.

    ## What this flow does
    1. A `Webhook` trigger exposes an authenticated endpoint at
       `/api/v1/{tenant}/executions/webhook/{namespace}/odoo-create-leads-from-webhook/{key}`.
    2. `validate_payload` rejects the submission (failing the run) when `email` is missing,
       malformed, or out of length bounds, or when `name` is empty, so spam and junk never reach
       the CRM.
    3. `find_existing` runs a `SEARCH_READ` on `crm.lead` by `email_from` to see whether an open
       lead already exists for this address.
    4. `upsert_lead` branches: if a match exists it `WRITE`s the latest details onto that lead,
       otherwise it `CREATE`s a new one. This makes the endpoint idempotent on email, so a client
       retry or a double form submit refreshes the existing lead instead of duplicating it.
    5. utm attribution (`utm_source`, `utm_campaign`) from the payload is folded into the lead so
       leads are not captured unattributed.
    6. A log task records whether the run updated or created a lead, by id, without logging the
       submitter's email.

    ## Expected webhook payload
    Send a JSON body such as:

    ```json
    {
      "name": "Ada Lovelace",
      "company": "Analytical Engines Ltd",
      "email": "ada@example.com",
      "phone": "+44 20 1234 5678",
      "message": "Interested in a demo",
      "utm_source": "google",
      "utm_campaign": "spring-demo"
    }
    ```

    `email` and `name` are required and validated; the rest fall back to safe defaults.

    ## Safety, dedup, and routing
    - The endpoint is reachable by anyone who learns the URL, so the webhook key is a credential.
      Put the endpoint behind a form tool with spam protection (CAPTCHA / rate limiting); the
      `validate_payload` guard is a backstop, not a substitute for that.
    - Dedup is keyed on `email_from` for open leads of `type = lead`. If your team also works
      converted opportunities, widen the lookup or key on a CRM-side correlation id.
    - To route leads, set `team_id` (and optionally `user_id`) in the `values` map of the
      create/update tasks; the utm fields above are mapped so reporting can attribute the source.

    ## Prerequisites
    - A reachable Odoo instance with XML-RPC enabled and the CRM app installed.
    - An Odoo user allowed to read and create/write `crm.lead` records.
    - A frontend, form tool, or marketing platform that can POST JSON to the webhook URL.

    ## Secrets
    - `ODOO_URL`: Base URL of the Odoo instance, including scheme and port (for example `https://erp.example.com`).
    - `ODOO_DB`: Odoo database name to connect to.
    - `ODOO_USERNAME`: Odoo login used for XML-RPC authentication.
    - `ODOO_PASSWORD`: Password for that Odoo user.
    - `ODOO_WEBHOOK_KEY`: The secret key embedded in the webhook URL. Treat it as a credential, since it is the main thing protecting the endpoint.
    - `SLACK_WEBHOOK`: Slack incoming webhook URL used for failure alerts.

    ## Quick start
    1. Add the six secrets above to your namespace or tenant. Use a random string for `ODOO_WEBHOOK_KEY`.
    2. Save the flow, then copy its webhook URL from the Triggers tab.
    3. Point your form or marketing tool at that URL and POST a JSON body like the one above.
    4. Confirm the new lead appears in the Odoo CRM pipeline, then re-POST the same body and
       confirm it updates the same lead rather than creating a second one.

    ## Expected outputs
    - `{{ outputs.create_lead.ids }}`: list with the id of the created `crm.lead` record (create path).
    - `{{ outputs.find_existing.rows }}`: the matched existing lead, if any (update path).
    - `{{ trigger.body }}`: the raw form payload that was received.

    ## Links
    - Odoo plugin: https://kestra.io/plugins/plugin-odoo
    - Webhook trigger: https://kestra.io/plugins/core/triggers/io.kestra.plugin.core.trigger.webhook
    - Odoo external API (XML-RPC): https://www.odoo.com/documentation/master/developer/reference/external_api.html
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: Kestra webhook flow that upserts inbound website form submissions into Odoo CRM leads with validation, email dedup, retry, and alerting.
