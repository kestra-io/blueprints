id: kubernetes-vault-rotation-restart
namespace: company.team
description: |
  Rotate a secret from Vault into Kubernetes and roll the workloads that use it.
  Read the fresh secret from Vault, patch the Kubernetes Secret, trigger a rolling
  restart of the Deployment, and confirm the rollout.

inputs:
  - id: namespace
    type: STRING
    defaults: production
    description: Kubernetes namespace holding the secret and deployment.
  - id: secret_name
    type: STRING
    defaults: app-credentials
    description: Kubernetes Secret to patch with the rotated value.
  - id: deployment_name
    type: STRING
    defaults: my-api
    description: Deployment to roll after the secret is rotated.
  - id: vault_path
    type: STRING
    defaults: https://vault.example.com/v1/secret/data/app
    description: Vault API URL that returns the current secret.

tasks:
  - id: read_from_vault
    type: io.kestra.plugin.core.http.Request
    description: Read the current secret value from Vault.
    uri: "{{ inputs.vault_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ secret('VAULT_TOKEN') }}"

  - id: patch_secret
    type: io.kestra.plugin.kubernetes.kubectl.Patch
    description: Patch the Kubernetes Secret with the rotated, base64-encoded value.
    namespace: "{{ inputs.namespace }}"
    resourceType: secret
    resourceName: "{{ inputs.secret_name }}"
    patchStrategy: JSON_MERGE
    patch: |
      {
        "data": {
          "password": "{{ outputs.read_from_vault.body | jq('.data.data.password') | first | base64encode }}"
        }
      }

  - id: restart_deployment
    type: io.kestra.plugin.kubernetes.kubectl.Restart
    description: Trigger a rolling restart so pods pick up the new secret.
    namespace: "{{ inputs.namespace }}"
    resourceType: Deployment
    resourcesNames:
      - "{{ inputs.deployment_name }}"

  - id: verify_rollout
    type: io.kestra.plugin.kubernetes.kubectl.Get
    description: Read the deployment back to confirm the rollout.
    namespace: "{{ inputs.namespace }}"
    resourceType: deployments
    resourcesNames:
      - "{{ inputs.deployment_name }}"
    fetchType: FETCH

pluginDefaults:
  - type: io.kestra.plugin.kubernetes.kubectl.Patch
    values:
      connection:
        masterUrl: "{{ secret('K8S_MASTER_URL') }}"
        oauthToken: "{{ secret('K8S_TOKEN') }}"
  - type: io.kestra.plugin.kubernetes.kubectl.Restart
    values:
      connection:
        masterUrl: "{{ secret('K8S_MASTER_URL') }}"
        oauthToken: "{{ secret('K8S_TOKEN') }}"
  - type: io.kestra.plugin.kubernetes.kubectl.Get
    values:
      connection:
        masterUrl: "{{ secret('K8S_MASTER_URL') }}"
        oauthToken: "{{ secret('K8S_TOKEN') }}"

triggers:
  - id: weekly_rotation
    type: io.kestra.plugin.core.trigger.Schedule
    description: Rotate weekly. Adjust or disable as needed.
    cron: "0 3 * * 0"
    disabled: true

extend:
  shortDescription: Read a secret from Vault, patch the Kubernetes Secret, restart the Deployment, and verify the rollout.
  title: Rotate Vault Secrets into Kubernetes with a Rolling Restart
  metaTitle: Rotate Vault Secrets into Kubernetes with a Rolling Restart
  description: |
    This blueprint automates secret rotation across Vault and Kubernetes. It reads
    the current secret from Vault, patches the matching Kubernetes Secret, triggers
    a rolling restart of the Deployment so running pods pick up the new value, and
    reads the deployment back to confirm the rollout.

    Prerequisites:
      - Secrets:
        - K8S_MASTER_URL, K8S_TOKEN: Kubernetes API access.
        - VAULT_TOKEN: token used to read the secret from Vault.
      - A Kubernetes Secret and Deployment that reference it.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Point vault_path at the Vault endpoint returning your secret.
      3. Run the flow with the namespace, secret_name, and deployment_name.

    Outputs:
      - outputs.read_from_vault.body: the Vault response payload.
      - outputs.verify_rollout: the deployment read back after restart.

    Notes:
      - The Secret data value is base64-encoded as Kubernetes expects; adjust the JSON path to your Vault layout.
      - kubectl.Restart performs the standard rolling restart used by kubectl rollout restart.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Read a secret from Vault, patch the Kubernetes Secret, restart the Deployment, and verify the rollout.
