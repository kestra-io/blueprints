id: snowflake-incremental-merge-upsert
namespace: company.team
description: |
  Load a batch file into Snowflake and apply it as an idempotent incremental
  upsert. The file is staged, then the delta COPY into a staging table and the
  MERGE into the target run together in one DML transaction, so a failed batch
  rolls back and the target never holds a half-applied load. Slack confirms.

inputs:
  - id: stage_file
    type: STRING
    defaults: customers_delta.csv
    description: File name to stage and load (already in Kestra internal storage or fetched upstream).

tasks:
  - id: fetch_delta
    type: io.kestra.plugin.core.http.Download
    description: Stand-in for the upstream extract; replace with your real source.
    uri: https://huggingface.co/datasets/kestra/datasets/raw/main/employees/employees00.csv

  - id: stage_upload
    type: io.kestra.plugin.jdbc.snowflake.Upload
    description: Upload the delta file to the target table's internal stage.
    from: "{{ outputs.fetch_delta.uri }}"
    fileName: "{{ inputs.stage_file }}"
    prefix: delta
    stageName: "@KESTRA.PUBLIC.%CUSTOMERS"
    compress: true

  - id: ensure_staging
    type: io.kestra.plugin.jdbc.snowflake.Query
    description: Create the persistent staging table once (DDL, outside the transaction).
    sql: CREATE TRANSIENT TABLE IF NOT EXISTS KESTRA.PUBLIC.CUSTOMERS_STAGING LIKE KESTRA.PUBLIC.CUSTOMERS;

  - id: merge_upsert
    type: io.kestra.plugin.jdbc.snowflake.Queries
    description: Reset staging, COPY the delta, and MERGE into the target as one DML transaction.
    transaction: true
    queryTag: "kestra-incremental-merge-{{ execution.id }}"
    sql: |
      DELETE FROM KESTRA.PUBLIC.CUSTOMERS_STAGING;
      COPY INTO KESTRA.PUBLIC.CUSTOMERS_STAGING
        FROM @KESTRA.PUBLIC.%CUSTOMERS
        FILE_FORMAT = (type = csv field_optionally_enclosed_by='"' skip_header = 1)
        PATTERN = '.*delta/.*'
        ON_ERROR = 'abort_statement';
      MERGE INTO KESTRA.PUBLIC.CUSTOMERS AS target
        USING (
          SELECT * FROM KESTRA.PUBLIC.CUSTOMERS_STAGING
          QUALIFY ROW_NUMBER() OVER (PARTITION BY CUSTOMER_ID ORDER BY UPDATED_AT DESC) = 1
        ) AS source
        ON target.CUSTOMER_ID = source.CUSTOMER_ID
        WHEN MATCHED AND source.UPDATED_AT > target.UPDATED_AT THEN UPDATE SET
          target.EMAIL = source.EMAIL,
          target.CITY = source.CITY,
          target.UPDATED_AT = source.UPDATED_AT
        WHEN NOT MATCHED THEN INSERT (CUSTOMER_ID, EMAIL, CITY, UPDATED_AT)
          VALUES (source.CUSTOMER_ID, source.EMAIL, source.CITY, source.UPDATED_AT);

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Confirm the incremental merge completed.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Snowflake incremental merge complete for {{ inputs.stage_file }} (execution {{ execution.id }})."
      }

pluginDefaults:
  - type: io.kestra.plugin.jdbc.snowflake
    values:
      url: "{{ secret('SNOWFLAKE_URL') }}"
      username: "{{ secret('SNOWFLAKE_USERNAME') }}"
      password: "{{ secret('SNOWFLAKE_PASSWORD') }}"

triggers:
  - id: daily
    type: io.kestra.plugin.core.trigger.Schedule
    description: Run the incremental merge on a cadence. Adjust or disable as needed.
    cron: "0 4 * * *"
    disabled: true

errors:
  - id: alert_on_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Alert Slack if the load or merge fails (the transaction rolls back).
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Snowflake incremental merge failed and rolled back (execution {{ execution.id }})."
      }

extend:
  shortDescription: Stage a delta file, COPY into a staging table, and MERGE into the target as one transaction for an idempotent upsert.
  title: Snowflake Incremental MERGE Upsert with a Transactional Load
  metaTitle: Snowflake Incremental MERGE Upsert
  description: |
    This blueprint applies a batch of changed rows to a Snowflake target table
    as an idempotent incremental upsert. It uploads the delta file to the
    target's internal stage and ensures a transient staging table exists, then
    resets the staging table, COPYs the delta into it, and MERGEs into the
    target with deduplication on the merge key. The COPY and MERGE run together
    in one transaction (the Queries task enables transactions by default), so a
    failure rolls them back and the target never holds a half-applied batch.
    Reruns are safe because the MERGE is keyed and deduped.

    Prerequisites:
      - Secrets:
        - SNOWFLAKE_URL: JDBC URL, e.g. jdbc:snowflake://<account>.snowflakecomputing.com?warehouse=COMPUTE_WH
        - SNOWFLAKE_USERNAME, SNOWFLAKE_PASSWORD: Snowflake credentials.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - A target table KESTRA.PUBLIC.CUSTOMERS with a CUSTOMER_ID key and an UPDATED_AT column.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Replace the fetch_delta task with your real extract and point stage_file at it.
      3. Adjust the table names, merge key, and column list to your schema.

    Outputs:
      - outputs.stage_upload: the staged file result.
      - outputs.merge_upsert.outputs: per-statement results of the transactional batch.

    Notes:
      - The QUALIFY ROW_NUMBER dedup keeps only the latest row per key from the delta, so duplicate or late rows collapse on the merge key.
      - transaction is true by default, so a failed COPY or MERGE rolls the whole batch back; the target is never partially updated.
      - For key-pair auth, swap password for privateKey (and privateKeyPassword if encrypted) on the Snowflake tasks.
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Stage a delta file, COPY into a staging table, and MERGE into the Snowflake target as one transaction for an idempotent upsert.
