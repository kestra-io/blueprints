id: nutanix-inventory-chargeback
namespace: company.team
description: |
  Produce a Nutanix AHV chargeback report. List the VMs, compute a cost per VM
  from their resources, append the result to a Google Sheet for finance, and
  post a summary to Slack.

inputs:
  - id: spreadsheet_id
    type: STRING
    description: Google Sheet ID that accumulates the chargeback rows.
  - id: core_hour_rate
    type: FLOAT
    defaults: 0.05
    description: Cost per vCPU-core per reporting period.

tasks:
  - id: list_vms
    type: io.kestra.plugin.ee.nutanix.ahv.ListVms
    description: List all AHV VMs with their resource configuration.
    fetchType: FETCH

  - id: compute_chargeback
    type: io.kestra.plugin.scripts.python.Script
    description: Compute per-VM cost and write a CSV chargeback report.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: python:3.11-slim
    beforeCommands:
      - pip install kestra
    inputFiles:
      vms.json: "{{ outputs.list_vms.rows }}"
    script: |
      import csv
      import json
      from kestra import Kestra

      rate = float("{{ inputs.core_hour_rate }}")
      with open("vms.json") as f:
          vms = json.load(f)

      total = 0.0
      with open("chargeback.csv", "w", newline="") as out:
          writer = csv.writer(out)
          for vm in vms:
              name = vm.get("name", "unknown")
              cores = (vm.get("numSockets", 1) or 1) * (vm.get("numCoresPerSocket", 1) or 1)
              cost = round(cores * rate, 2)
              total += cost
              writer.writerow([name, cores, cost])

      Kestra.outputs({"vm_count": len(vms), "total_cost": round(total, 2)})
    outputFiles:
      - chargeback.csv

  - id: append_to_sheet
    type: io.kestra.plugin.googleworkspace.sheets.Load
    description: Append the chargeback rows to the finance spreadsheet.
    from: "{{ outputs.compute_chargeback.outputFiles['chargeback.csv'] }}"
    spreadsheetId: "{{ inputs.spreadsheet_id }}"
    range: Chargeback
    insertType: APPEND
    serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT') }}"

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Post the chargeback summary to Slack.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Nutanix chargeback: {{ outputs.compute_chargeback.vars.vm_count }} VMs, total {{ outputs.compute_chargeback.vars.total_cost }} for the period."
      }

pluginDefaults:
  - type: io.kestra.plugin.ee.nutanix.ahv.ListVms
    values:
      host: "{{ secret('NUTANIX_HOST') }}"
      token: "{{ secret('NUTANIX_TOKEN') }}"

triggers:
  - id: monthly_report
    type: io.kestra.plugin.core.trigger.Schedule
    description: Produce the chargeback report monthly. Adjust or disable as needed.
    cron: "0 6 1 * *"
    disabled: true

extend:
  shortDescription: List Nutanix AHV VMs, compute per-VM cost, append to a Google Sheet, and summarize on Slack.
  title: Nutanix AHV Inventory and Chargeback Report
  metaTitle: Nutanix AHV Inventory and Chargeback Report
  description: |
    This blueprint turns Nutanix AHV inventory into a finance-ready chargeback
    report. It lists the VMs, computes a cost per VM from vCPU cores and a rate,
    appends the rows to a Google Sheet that accumulates each period, and posts a
    summary to Slack.

    Prerequisites:
      - Secrets:
        - NUTANIX_HOST, NUTANIX_TOKEN: Prism Central host and bearer token.
        - GCP_SERVICE_ACCOUNT: service account key with Google Sheets access.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - A Google Sheet shared with the service account.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Share the target spreadsheet with the service account and pass its ID.
      3. Adjust the cost model in compute_chargeback to your pricing.

    Outputs:
      - outputs.list_vms.rows: the AHV VM inventory.
      - outputs.compute_chargeback.vars: vm_count and total_cost for the period.
      - outputs.append_to_sheet: rows and range written to the sheet.

    Notes:
      - The cost model uses vCPU cores times a rate; extend it with memory or storage as needed.
      - sheets.Load appends rows, so each run adds a new period to the report.
  tags:
    - Infrastructure
  ee: true
  demo: false
  metaDescription: List Nutanix AHV VMs, compute per-VM cost, append the report to a Google Sheet, and summarize on Slack.
