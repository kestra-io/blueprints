id: aws-emr-serverless-spark
namespace: company.team
description: |
  Scale Spark processing to the backlog. On a schedule, read a CloudWatch metric
  that tracks pending work, and when there is a backlog, submit a Spark job to an
  existing EMR Serverless application. Slack reports the submitted run.

inputs:
  - id: application_id
    type: STRING
    description: Existing EMR Serverless application ID to run the job on.
  - id: execution_role_arn
    type: STRING
    description: IAM role ARN assumed for the job run.
  - id: entry_point
    type: STRING
    defaults: s3://my-bucket/scripts/spark-app.py
    description: S3 path to the Spark application entry point.
  - id: backlog_metric
    type: STRING
    defaults: ApproximateNumberOfMessagesVisible
    description: CloudWatch metric used as the backlog signal.

tasks:
  - id: read_backlog
    type: io.kestra.plugin.aws.cloudwatch.Query
    description: Read the backlog metric over the last 15 minutes.
    namespace: AWS/SQS
    metricName: "{{ inputs.backlog_metric }}"
    statistic: Maximum
    periodSeconds: 300
    window: PT15M

  - id: scale_if_backlog
    type: io.kestra.plugin.core.flow.If
    description: Submit a Spark job only when the metric returned datapoints above zero.
    condition: "{{ outputs.read_backlog.count > 0 }}"
    then:
      - id: start_spark_job
        type: io.kestra.plugin.aws.emr.StartServerlessJobRun
        description: Submit the Spark job to the EMR Serverless application.
        applicationId: "{{ inputs.application_id }}"
        executionRoleArn: "{{ inputs.execution_role_arn }}"
        jobName: "kestra-backlog-{{ execution.id }}"
        entryPoint: "{{ inputs.entry_point }}"

      - id: notify
        type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
        description: Report the submitted job run to Slack.
        url: "{{ secret('SLACK_WEBHOOK_URL') }}"
        payload: |
          {
            "text": "Submitted EMR Serverless job {{ outputs.start_spark_job.jobRunId }} to clear the backlog."
          }

pluginDefaults:
  - type: io.kestra.plugin.aws.cloudwatch.Query
    values:
      accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
      region: "{{ secret('AWS_DEFAULT_REGION') }}"
  - type: io.kestra.plugin.aws.emr.StartServerlessJobRun
    values:
      accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
      secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
      region: "{{ secret('AWS_DEFAULT_REGION') }}"

triggers:
  - id: every_15_min
    type: io.kestra.plugin.core.trigger.Schedule
    description: Check the backlog every 15 minutes. Adjust or disable as needed.
    cron: "*/15 * * * *"
    disabled: true

extend:
  shortDescription: Read a CloudWatch backlog metric and submit an EMR Serverless Spark job when work is pending.
  title: Autoscale EMR Serverless Spark on a CloudWatch Backlog
  metaTitle: Autoscale EMR Serverless Spark on a CloudWatch Backlog
  description: |
    This blueprint submits Spark work only when there is something to process. On
    a schedule it reads a CloudWatch metric that represents the backlog (for
    example, an SQS queue depth) and, when datapoints are present, starts a job on
    an existing EMR Serverless application. It reports the submitted run to Slack.

    Prerequisites:
      - Secrets:
        - AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION: AWS access.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - An EMR Serverless application, an execution role, a Spark entry point in S3, and a CloudWatch metric.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Pass application_id, execution_role_arn, and entry_point.
      3. Point read_backlog at the metric and namespace that represent your queue depth.

    Outputs:
      - outputs.read_backlog: datapoint count and series for the backlog metric.
      - outputs.start_spark_job.jobRunId: the submitted EMR Serverless run ID.

    Notes:
      - StartServerlessJobRun returns the run ID and does not wait; track completion via EMR events if needed.
      - Tune the namespace, metric, statistic, and the If condition to your backlog signal and threshold.
  tags:
    - Cloud
    - AWS
  ee: false
  demo: false
  metaDescription: Read a CloudWatch backlog metric on a schedule and submit an EMR Serverless Spark job when work is pending.
