id: zulip-failure-alert
namespace: system

inputs:
  - id: channel
    type: STRING
    defaults: "#alerts"

tasks:
  - id: notify_zulip
    type: io.kestra.plugin.zulip.ZulipExecution
    description: Render execution metadata for the failed upstream run and post it to the engineering stream.
    url: "{{ secret('ZULIP_WEBHOOK') }}"
    channel: "{{ inputs.channel }}"
    executionId: "{{ trigger.executionId }}"
    iconEmoji: ":warning:"
    username: Kestra Alerts
    customMessage: |
      A flow in the company namespace ended in {{ trigger.state }}. Investigate the failing task before the next scheduled run.
    retry:
      type: constant
      interval: PT30S
      maxAttempt: 3
    timeout: PT30S

triggers:
  - id: on_failed
    type: io.kestra.plugin.core.trigger.Flow
    conditions:
      - type: io.kestra.plugin.core.condition.ExecutionStatus
        in:
          - FAILED
      - type: io.kestra.plugin.core.condition.ExecutionNamespace
        namespace: company
        prefix: true

extend:
  shortDescription: Send a Zulip alert to a stream whenever any flow in a namespace fails, with retry and a bounded timeout.
  title: Alert a Zulip stream on namespace-wide flow failures
  metaTitle: Zulip namespace failure alerts
  description: |
    This flow is a centralized, namespace-level alerting hook. It does not run on a schedule and has no upstream data of its own. Instead, a Flow trigger watches every execution under the `company` namespace and reacts whenever one finishes in a FAILED state. When that happens, the `ZulipExecution` task renders the execution metadata and posts it to a Zulip stream, so on-call engineers see one consistent alert instead of wiring a notification into each individual flow.

    The flow itself lives in the reserved `system` namespace so it is not matched by its own `company` namespace condition. This is the recommended pattern for instance-wide alerting flows: it keeps monitoring flows out of your business namespaces and avoids any risk of the alert reacting to its own executions. Because this flow IS the failure alerter, it deliberately has no flow-level `errors` block of its own (that would risk an alert-on-the-alerter loop); instead it hardens the single notification task with `retry` and a `timeout`.

    ## Reliability
    `ZulipExecution` does not retry and does not raise on a non-200 response, so on its own a transient Zulip or network blip at the exact moment an upstream flow fails would drop the alert silently. To reduce that risk the task carries a `retry` (constant, three attempts, 30s apart) and a `timeout` (PT30S) so a hung POST cannot wedge the worker. Delivery is still best-effort: because the task does not raise on a non-200 status, a persistent Zulip outage can still lose a message, so treat this as a notification convenience rather than a guaranteed-delivery channel.

    ## What the alert contains
    `ZulipExecution` auto-renders a built-in execution metadata block (link, ID, namespace, flow name, start date, duration, terminal status, and the failing task when applicable). The `customMessage` you see in the YAML is appended to that block, not a replacement for it, so the message in Zulip is the rich metadata followed by your custom note.

    ## How it works
    - The `io.kestra.plugin.core.trigger.Flow` trigger listens for state transitions across the instance.
    - The `ExecutionStatus` condition limits it to the FAILED terminal state. WARNING is intentionally excluded by default: in a busy namespace, WARNING is common (allowed-failure tasks, soft assertions) and lumping it with FAILED trains operators to ignore the channel. To opt in, add `WARNING` to the `in:` list, ideally routing it to a separate channel or topic.
    - The `ExecutionNamespace` condition with `prefix: true` scopes it to the `company` namespace and all of its children (for example `company.team`, `company.payroll`).
    - `ZulipExecution` is given `executionId: {{ trigger.executionId }}` so it reports on the original failed execution rather than this alerting execution.

    There is no built-in throttle or dedup: a flow that fails repeatedly (a flapping schedule) will post one message per failure. If that is a concern, add a `MultipleCondition` or a cooldown flow in front of this hook.

    ## Prerequisites
    - A Kestra instance where flows in the target namespace produce executions.
    - A Zulip organization with an Incoming Webhook integration configured for the destination stream. See the Zulip docs linked below to create one.
    - The full webhook URL stored as a Kestra secret (never inline it).

    ## Secrets
    - `ZULIP_WEBHOOK`: the full Zulip incoming webhook URL, including the integration path and API key, in the form `https://yourZulipDomain.zulipchat.com/api/v1/external/INTEGRATION_NAME?api_key=API_KEY`. Used by `ZulipExecution` to post the alert.

    ## Quick start
    1. Create an Incoming Webhook integration in your Zulip organization and copy the generated URL.
    2. Add it as a secret named `ZULIP_WEBHOOK` in your Kestra namespace or environment.
    3. Adjust the `ExecutionNamespace` condition to the namespace you want to monitor, and set the `channel` input to your target stream.
    4. Deploy this flow and trigger a failing run in the monitored namespace to confirm the alert lands in Zulip.

    ## Expected outputs
    `ZulipExecution` is a notification task and does not write files to internal storage, so there is no `{{ outputs.notify_zulip.uri }}` artifact. Success is observed as a message appearing in the configured Zulip stream and a SUCCESS state on the `notify_zulip` task in the Logs tab. If delivery fails, the task does not raise on a non-200 response, so check the task logs.

    ## Links
    - Plugin docs: https://kestra.io/plugins/plugin-zulip/io.kestra.plugin.zulip.zulipexecution
    - Flow trigger docs: https://kestra.io/docs/workflow-components/triggers/flow-trigger
    - System flows: https://kestra.io/docs/concepts/system-flows
    - Alerting and monitoring guide: https://kestra.io/docs/administrator-guide/monitoring#alerting
    - Retries: https://kestra.io/docs/workflow-components/retries
    - Zulip incoming webhooks: https://zulip.com/api/incoming-webhooks-overview
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: Use a Kestra Flow trigger and ZulipExecution to alert a Zulip stream on FAILED flows in a namespace, with retry and timeout.
