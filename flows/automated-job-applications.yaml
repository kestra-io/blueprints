extend:
  title: Automated Job Applications with Multi-Platform Status Tracking
  metaTitle: Automated Job Applications with Status Tracking
  shortDescription: >-
    Automatically submit job applications across LinkedIn and Indeed from a
    Google Sheets tracker, monitor status changes, and receive email alerts.
  description: |
    **Streamline your entire job search by automating applications and tracking their status across platforms.**

    1. A `io.kestra.plugin.scripts.python.Script` task loads configuration including your spreadsheet ID, resume URL, cover letter template, and notification email
    2. A `io.kestra.plugin.core.http.Request` task reads your job tracking sheet from Google Sheets via the API
    3. A `io.kestra.plugin.scripts.python.Script` task filters for jobs marked as "Not Applied" with Medium or High priority
    4. A `io.kestra.plugin.core.flow.ForEach` task iterates through each pending job and prepares platform-specific application data
    5. A `io.kestra.plugin.core.flow.Switch` task routes the application to the correct platform API (LinkedIn or Indeed)
    6. A `io.kestra.plugin.core.http.Request` task submits the application via the platform API
    7. A `io.kestra.plugin.scripts.python.Script` task processes the result and determines success or failure
    8. A `io.kestra.plugin.core.http.Request` task updates the Google Sheet with the new application status
    9. A `io.kestra.plugin.email.MailSend` task sends a confirmation email for each submitted application
    10. A separate scheduled branch reads all previously applied jobs, checks for status changes, and sends update notifications

    Ideal for:
    - **Job seekers** managing applications across multiple platforms who want to save hours of manual effort
    - **Career coaches** helping clients track application pipelines at scale
    - **Recruiting coordinators** who need to monitor outbound application status
  tags:
    - Automation
    - Productivity
    - Email
  ee: false
  demo: false
  metaDescription: >-
    Automate job applications to LinkedIn and Indeed from Google Sheets, track
    status changes on a schedule, and get email notifications for every update.

id: automated-job-applications
namespace: company.team

tasks:
  - id: configuration
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra

      Kestra.outputs({
          "spreadsheetId": "REPLACE_WITH_YOUR_GOOGLE_SHEET_ID",
          "resumeUrl": "https://drive.google.com/file/d/YOUR_RESUME_ID/view",
          "coverLetterTemplate": "Dear Hiring Manager,\n\nI am excited to apply for the {{position}} role at {{company}}. With my experience in {{skills}}, I believe I would be a valuable addition to your team.\n\nBest regards,\nYour Name",
          "userEmail": "user@example.com"
      })

  - id: read_jobs_sheet
    type: io.kestra.plugin.core.http.Request
    uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ outputs.configuration.vars.spreadsheetId }}/values/Sheet1"
    method: GET
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_API_TOKEN') }}"

  - id: filter_pending_applications
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      import json

      # Filter jobs with status "Not Applied" and priority Medium or High
      # Replace with actual data parsing from the sheet response
      jobs = []  # TODO: parse from read_jobs_sheet output
      pending = [j for j in jobs if j.get("Status") == "Not Applied" and j.get("Priority") in ("Medium", "High")]
      Kestra.outputs({"pendingJobs": json.dumps(pending)})

  - id: process_jobs_one_by_one
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ outputs.filter_pending_applications.vars.pendingJobs }}"
    tasks:
      - id: prepare_application_data
        type: io.kestra.plugin.scripts.python.Script
        script: |
          from kestra import Kestra
          import json

          job = json.loads('{{ taskrun.value }}')
          job_url = job.get("Job_URL", "")

          if "linkedin.com" in job_url:
              platform = "linkedin"
          elif "indeed.com" in job_url:
              platform = "indeed"
          else:
              platform = "generic"

          cover_letter = "Dear Hiring Manager,\n\nI am excited to apply for the {pos} role at {co}.".format(
              pos=job.get("Position", ""),
              co=job.get("Company", "")
          )

          Kestra.outputs({
              "platform": platform,
              "personalizedCoverLetter": cover_letter,
              "company": job.get("Company", ""),
              "position": job.get("Position", ""),
              "jobUrl": job_url
          })

      - id: route_by_platform
        type: io.kestra.plugin.core.flow.Switch
        value: "{{ outputs.prepare_application_data.vars.platform }}"
        cases:
          linkedin:
            - id: apply_via_linkedin
              type: io.kestra.plugin.core.http.Request
              uri: "https://api.linkedin.com/v2/jobs/applications"
              method: POST
              headers:
                Authorization: "Bearer {{ secret('LINKEDIN_API_TOKEN') }}"
          indeed:
            - id: apply_via_indeed
              type: io.kestra.plugin.core.http.Request
              uri: "https://api.indeed.com/ads/applications"
              method: POST
              headers:
                Authorization: "Bearer {{ secret('INDEED_API_TOKEN') }}"

      - id: process_application_result
        type: io.kestra.plugin.scripts.python.Script
        script: |
          from kestra import Kestra
          from datetime import datetime

          # Determine application outcome based on HTTP response
          Kestra.outputs({
              "applicationStatus": "Applied",
              "applicationId": "AUTO_" + datetime.now().strftime("%Y%m%d%H%M%S"),
              "statusNotes": "Application submitted successfully"
          })

      - id: update_job_status
        type: io.kestra.plugin.core.http.Request
        uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ outputs.configuration.vars.spreadsheetId }}/values/Sheet1"
        method: PUT
        headers:
          Authorization: "Bearer {{ secret('GOOGLE_API_TOKEN') }}"

      - id: send_application_notification
        type: io.kestra.plugin.email.MailSend
        host: "{{ secret('SMTP_HOST') }}"
        port: 587
        username: "{{ secret('SMTP_USER') }}"
        password: "{{ secret('SMTP_PASSWORD') }}"
        from: "{{ secret('EMAIL_FROM') }}"
        to: "{{ outputs.configuration.vars.userEmail }}"
        subject: "Job Application: {{ outputs.prepare_application_data.vars.company }} - {{ outputs.prepare_application_data.vars.position }}"
        htmlTextContent: |
          <h2>Application Submitted</h2>
          <p>Your application for <b>{{ outputs.prepare_application_data.vars.position }}</b>
          at <b>{{ outputs.prepare_application_data.vars.company }}</b> has been submitted.</p>
          <p>Status: {{ outputs.process_application_result.vars.applicationStatus }}</p>
          <p>Reference: {{ outputs.process_application_result.vars.applicationId }}</p>

  - id: read_applied_jobs
    type: io.kestra.plugin.core.http.Request
    uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ outputs.configuration.vars.spreadsheetId }}/values/Sheet1"
    method: GET
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_API_TOKEN') }}"

  - id: filter_applied_jobs
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra
      import json

      # Filter jobs with status "Applied" for status checking
      jobs = []  # TODO: parse from read_applied_jobs output
      applied = [j for j in jobs if j.get("Status") == "Applied"]
      Kestra.outputs({"appliedJobs": json.dumps(applied)})

  - id: check_status_one_by_one
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ outputs.filter_applied_jobs.vars.appliedJobs }}"
    tasks:
      - id: mock_status_check
        type: io.kestra.plugin.scripts.python.Script
        script: |
          from kestra import Kestra
          import random
          from datetime import datetime

          statuses = ["Applied", "Under Review", "Interview Scheduled", "Rejected"]
          Kestra.outputs({
              "newStatus": random.choice(statuses),
              "checkDate": datetime.now().strftime("%Y-%m-%d"),
              "statusNotes": "Status checked automatically via API"
          })

      - id: check_if_status_changed
        type: io.kestra.plugin.core.flow.If
        condition: "{{ outputs.mock_status_check.vars.newStatus != 'Applied' }}"
        then:
          - id: update_changed_status
            type: io.kestra.plugin.core.http.Request
            uri: "https://sheets.googleapis.com/v4/spreadsheets/{{ outputs.configuration.vars.spreadsheetId }}/values/Sheet1"
            method: PUT
            headers:
              Authorization: "Bearer {{ secret('GOOGLE_API_TOKEN') }}"

          - id: send_status_update
            type: io.kestra.plugin.email.MailSend
            host: "{{ secret('SMTP_HOST') }}"
            port: 587
            username: "{{ secret('SMTP_USER') }}"
            password: "{{ secret('SMTP_PASSWORD') }}"
            from: "{{ secret('EMAIL_FROM') }}"
            to: "{{ outputs.configuration.vars.userEmail }}"
            subject: "Status Update: {{ outputs.mock_status_check.vars.newStatus }}"
            htmlTextContent: |
              <h2>Application Status Changed</h2>
              <p>New status: <b>{{ outputs.mock_status_check.vars.newStatus }}</b></p>
              <p>Checked on: {{ outputs.mock_status_check.vars.checkDate }}</p>
              <p>{{ outputs.mock_status_check.vars.statusNotes }}</p>

triggers:
  - id: daily_application_trigger
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 9 * * 1-5"

  - id: status_check_trigger
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 10 */2 * *"
