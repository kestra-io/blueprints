id: ai-stock-market-summary
namespace: company.team

inputs:
  - id: symbols
    type: STRING
    defaults: "AAPL,MSFT,NVDA,TSLA,AMZN,GOOGL,META,JPM,XOM,UNH,GME"
    description: Comma-separated list of stock ticker symbols to analyze

tasks:
  - id: check_market_status
    type: io.kestra.plugin.core.http.Request
    description: Query the Alpaca Markets clock API to check if the US stock market is open
    uri: "https://paper-api.alpaca.markets/v2/clock"
    method: GET
    headers:
      APCA-API-KEY-ID: "{{ secret('ALPACA_API_KEY_ID') }}"
      APCA-API-SECRET-KEY: "{{ secret('ALPACA_API_SECRET_KEY') }}"

  - id: check_if_market_is_open
    type: io.kestra.plugin.core.flow.If
    description: Only proceed when the market is currently open
    condition: "{{ outputs.check_market_status.body.is_open == true }}"
    then:
      - id: fetch_stock_data
        type: io.kestra.plugin.core.http.Request
        description: Fetch daily price bars for the configured tickers from Alpaca
        uri: "https://data.alpaca.markets/v2/stocks/bars?symbols={{ inputs.symbols }}&timeframe=1Day&limit=1000&feed=iex"
        method: GET
        headers:
          APCA-API-KEY-ID: "{{ secret('ALPACA_API_KEY_ID') }}"
          APCA-API-SECRET-KEY: "{{ secret('ALPACA_API_SECRET_KEY') }}"

      - id: interpret_data
        type: io.kestra.plugin.scripts.python.Script
        description: Calculate RSI and MACD for each stock and classify as Buy, Hold, or Sell
        beforeCommands:
          - pip install pandas numpy
        script: |
          import pandas as pd
          import numpy as np
          import json
          from kestra import Kestra

          # Parse the stock bars from the API response
          response_body = json.loads("""{{ outputs.fetch_stock_data.body }}""")
          bars_by_symbol = response_body.get("bars", {})
          stocks = []

          for symbol, bars in bars_by_symbol.items():
              closes = [bar['c'] for bar in bars if 'c' in bar]
              if len(closes) < 30:
                  continue

              df = pd.DataFrame({'close': closes})

              # RSI(14)
              delta = df['close'].diff()
              gain = delta.clip(lower=0)
              loss = -delta.clip(upper=0)
              avg_gain = gain.rolling(14).mean()
              avg_loss = loss.rolling(14).mean()
              rs = avg_gain / avg_loss
              df['rsi'] = 100 - (100 / (1 + rs))

              # MACD (12, 26, 9)
              ema12 = df['close'].ewm(span=12, adjust=False).mean()
              ema26 = df['close'].ewm(span=26, adjust=False).mean()
              df['macd'] = ema12 - ema26
              df['signal'] = df['macd'].ewm(span=9, adjust=False).mean()

              latest = df.iloc[-1]
              rsi = latest['rsi']
              macd = latest['macd']
              signal = latest['signal']

              status = "Hold"
              if rsi < 30 and macd > signal:
                  status = "Buy"
              elif rsi > 70 and macd < signal:
                  status = "Sell"

              stocks.append({
                  "ticker": symbol,
                  "rsi": round(float(rsi), 2),
                  "macd": round(float(macd), 2),
                  "signal": round(float(signal), 2),
                  "status": status
              })

          summary_json = json.dumps({"stocks": stocks}, separators=(',', ':'))

          Kestra.outputs({
              "summary": summary_json,
              "stock_count": len(stocks)
          })

      - id: generate_ai_summary
        type: io.kestra.plugin.openai.ChatCompletion
        description: Summarize the technical analysis into a readable Slack-formatted market update
        apiKey: "{{ secret('OPENAI_API_KEY') }}"
        model: gpt-4o
        messages:
          - role: system
            content: |
              You are a stock market analyst assistant. Summarize the provided technical indicator data into a clear, concise market update formatted for Slack. Use bold for ticker symbols and status labels. Group stocks by their Buy/Hold/Sell classification. Include RSI and MACD values. Keep the summary professional and actionable.
          - role: user
            content: |
              Here is the technical indicator data as JSON:

              {{ outputs.interpret_data.vars.summary }}

              Provide a formatted market summary for today.

      - id: send_slack_summary
        type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
        description: Post the AI-generated market summary to Slack
        url: "{{ secret('SLACK_WEBHOOK_URL') }}"
        payload: |
          {
            "text": "{{ outputs.generate_ai_summary.choices[0].message.content }}"
          }

triggers:
  - id: market_hours_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "30 13-21 * * 1-5"
    description: Runs hourly during US market hours (UTC), Monday through Friday

extend:
  title: AI-Powered Daily Stock Market Summary
  metaTitle: AI Stock Market Summary Bot
  shortDescription: >-
    Analyze stocks with RSI and MACD indicators, summarize insights with OpenAI, and deliver a daily market update to Slack.
  description: |
    **Monitor a portfolio of stocks using technical indicators and receive a plain-language AI summary in Slack every trading day.**

    1. A `io.kestra.plugin.core.trigger.Schedule` fires on a cron schedule during US market hours (Monday through Friday)
    2. A `io.kestra.plugin.core.http.Request` task checks the Alpaca Markets API to confirm the market is currently open
    3. A `io.kestra.plugin.core.flow.If` task gates the pipeline so it only continues when the market is active
    4. A `io.kestra.plugin.core.http.Request` task fetches daily price bars for a configurable list of ticker symbols from Alpaca
    5. A `io.kestra.plugin.scripts.python.Script` task calculates RSI(14) and MACD(12,26,9) for each stock using pandas and classifies each as Buy, Hold, or Sell
    6. A `io.kestra.plugin.openai.ChatCompletion` task summarizes the technical analysis into a readable Slack-formatted market update
    7. A `io.kestra.plugin.slack.notifications.SlackIncomingWebhook` task delivers the summary to a Slack channel

    Ideal for:
    - **Traders** who want automated technical analysis delivered to Slack before making daily decisions
    - **Finance teams** monitoring a watchlist of equities with consistent daily reporting
    - **Hobbyist investors** who want an AI-powered morning briefing on their portfolio
  tags:
    - AI
    - Business
  ee: false
  demo: false
  metaDescription: >-
    Automated stock analysis with RSI and MACD indicators, AI-powered summaries via OpenAI, and daily Slack notifications during market hours.

