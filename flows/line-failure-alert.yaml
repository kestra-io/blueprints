id: line-failure-alert
namespace: company.team

labels:
  type: monitoring
  channel: line


tasks:
  - id: notify_followers
    type: io.kestra.plugin.line.LineExecution
    description: Broadcast the failed execution details to the LINE Official Account followers.
    channelAccessToken: "{{ secret('LINE_CHANNEL_ACCESS_TOKEN') }}"
    executionId: "{{ trigger.executionId ?? execution.id }}"
    customMessage: ":rotating_light: {{ trigger.flowId ?? flow.id }} failed in {{ trigger.namespace ?? flow.namespace }}. On-call, please investigate. Runbook: https://wiki.company.io/runbooks/on-call"
    customFields:
      Environment: Production
      Team: On-Call
      Severity: High
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 5
    timeout: PT30S

triggers:
  - id: on_namespace_failure
    type: io.kestra.plugin.core.trigger.Flow
    states:
      - FAILED
    conditions:
      - type: io.kestra.plugin.core.condition.ExecutionNamespace
        namespace: company.team
        prefix: true

extend:
  shortDescription: Broadcast a LINE alert to your Official Account followers whenever any flow in a namespace fails.
  title: Alert your LINE followers on any namespace failure
  metaTitle: LINE failure alerts for a Kestra namespace
  description: |
    This flow watches every execution in the `company.team` namespace (and its sub-namespaces) and sends a LINE
    notification the moment a flow ends in a `FAILED` state. The LINE message includes the failing flow id, the
    execution link, id, namespace, flow name, start date, duration, and status, so the engineer on call can jump
    straight to the failing run. The `customMessage` is built from trigger context, so the broadcast names the flow
    that failed and carries a runbook link rather than a static line.

    This is a system-style monitoring flow with no schedule of its own. It reacts to other flows through a
    `io.kestra.plugin.core.trigger.Flow` trigger, scoped with an `ExecutionNamespace` condition so it only fires for
    the namespaces you care about. To monitor your whole instance, deploy it in the `system` namespace and widen the
    namespace prefix.

    ## How LINE delivery works (read this first)
    `LineExecution` posts to the LINE Messaging API broadcast endpoint
    (`https://api.line.me/v2/bot/message/broadcast`), which delivers to **every follower of the LINE Official Account**
    tied to your channel access token. It is not a group push or an on-call rotation: there is no per-group or per-user
    addressing here. Treat the receiving Official Account as a controlled, internal-only account whose followers are
    exactly the people who should see failure alerts. If you need targeted group or 1:1 delivery, that is a different
    LINE Messaging API capability and is out of scope for this task.

    ## Reliability
    An alerting flow is only useful if the alert actually lands, so the LINE call is hardened:
    - `retry` (constant, 5 attempts, 10s apart) rides out transient LINE API `5xx`, timeouts, and `429` rate limits.
    - `timeout: PT30S` bounds a hung HTTP call so the alert task fails fast and retries instead of stalling a worker.

    This flow is itself the failure alerter, so it deliberately has no flow-level `errors` block: an errors block on a
    failure monitor would alert on its own failures and risk a notification loop. If a hardened LINE outage matters to
    you, add a second, independent channel (for example a Slack or email task in this flow) rather than a self-referential
    errors block.

    ## Tuning the trigger
    The trigger defaults to `FAILED` only. `WARNING` is intentionally excluded: on a broad `PREFIX` namespace monitor,
    `WARNING` fires for non-fatal conditions (an `allowFailure` task, a skipped branch) and at scale floods the broadcast,
    training the on-call to ignore it. Add `WARNING` to the `states` list only if your team genuinely wants to page on
    warnings. The flow sets `concurrency: { limit: 1 }` so a correlated outage that fails 50 flows at once does not fan
    out into 50 simultaneous alert executions; alerts are serialized into an orderly queue instead of a storm.

    ## Prerequisites
    - A LINE Messaging API channel (a LINE Official Account with the Messaging API enabled).
    - A LINE Channel Access Token for that channel, with permission to broadcast messages.
    - At least one other flow in the `company.team` namespace whose failures you want to track.

    ## Secrets
    - `LINE_CHANNEL_ACCESS_TOKEN`: the long-lived Channel Access Token used to authenticate against the LINE
      Messaging API and broadcast the alert. Never hardcode this value; store it as a Kestra secret.

    ## Quick start
    1. In the LINE Developers console, open your Messaging API channel and issue a Channel Access Token.
    2. Add it to Kestra as the secret `LINE_CHANNEL_ACCESS_TOKEN`.
    3. Adjust the `namespace` in the `ExecutionNamespace` condition to the namespace you want to watch.
    4. Tweak `customMessage`, the runbook URL, and `customFields` to match your team and severity conventions.
    5. Deploy the flow and trigger a failing test execution in that namespace to confirm the LINE message arrives.
       Because `executionId` falls back to `execution.id`, you can also run this flow manually as a smoke test without
       a trigger present.

    ## Expected outputs
    This is a notification-only flow, so it produces no file artifacts. The result is a LINE broadcast delivered to
    your Official Account followers. You can confirm delivery in the `notify_followers` task logs and on the Gantt and
    Logs tabs of this flow's own execution; the original failing run is reachable through the execution link inside the
    LINE message, derived from `{{ trigger.executionId ?? execution.id }}`.

    ## Links
    - Kestra LINE plugin: https://kestra.io/plugins/plugin-line
    - Flow trigger docs: https://kestra.io/docs/workflow-components/triggers/flow-trigger
    - LINE Messaging API broadcast: https://developers.line.biz/en/docs/messaging-api/sending-messages/#send-broadcast-message
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: Broadcast a LINE alert to your Official Account followers whenever any flow in a Kestra namespace ends in a FAILED state.
