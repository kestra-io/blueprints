id: kubernetes-multicluster-apply
namespace: company.team
description: |
  Apply the same manifest across many tenant clusters. Iterate over a list of
  cluster connections, server-side apply the manifest to each, and read the
  resource back to confirm it landed.

inputs:
  - id: clusters
    type: ARRAY
    itemType: STRING
    description: Cluster names used to resolve per-cluster connection secrets (K8S_MASTER_URL_<name>, K8S_TOKEN_<name>).
  - id: target_namespace
    type: STRING
    defaults: platform
    description: Namespace the manifest is applied into on every cluster.

tasks:
  - id: apply_across_clusters
    type: io.kestra.plugin.core.flow.ForEach
    description: Apply and verify the manifest on each tenant cluster.
    values: "{{ inputs.clusters }}"
    concurrencyLimit: 3
    tasks:
      - id: apply_manifest
        type: io.kestra.plugin.kubernetes.kubectl.Apply
        description: Server-side apply the shared manifest to this cluster.
        connection:
          masterUrl: "{{ secret('K8S_MASTER_URL_' ~ taskrun.value) }}"
          oauthToken: "{{ secret('K8S_TOKEN_' ~ taskrun.value) }}"
        namespace: "{{ inputs.target_namespace }}"
        spec: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: platform-baseline
          data:
            managed-by: kestra
            policy-version: "2024.1"

      - id: verify_apply
        type: io.kestra.plugin.kubernetes.kubectl.Get
        description: Read the applied resource back to confirm it exists.
        connection:
          masterUrl: "{{ secret('K8S_MASTER_URL_' ~ taskrun.value) }}"
          oauthToken: "{{ secret('K8S_TOKEN_' ~ taskrun.value) }}"
        namespace: "{{ inputs.target_namespace }}"
        resourceType: configmaps
        resourcesNames:
          - platform-baseline
        fetchType: FETCH

triggers:
  - id: rollout_on_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    description: Roll the baseline out on a schedule. Adjust or disable as needed.
    cron: "0 8 * * 1"
    disabled: true

extend:
  shortDescription: Iterate over tenant clusters and server-side apply a shared manifest to each, verifying the result.
  title: Multi-Cluster Kubernetes Apply Across Tenants
  metaTitle: Multi-Cluster Kubernetes Apply Across Tenants
  description: |
    This blueprint rolls a shared manifest out to a fleet of clusters. It iterates
    over a list of cluster names, resolves each cluster's connection from secrets,
    server-side applies the manifest, and reads the resource back to confirm the
    apply succeeded on every cluster.

    Prerequisites:
      - Secrets, per cluster name in the list:
        - K8S_MASTER_URL_<name>: API server URL for that cluster.
        - K8S_TOKEN_<name>: bearer token for that cluster.
      - The manifest to apply (here a ConfigMap; replace with your own).

    Quick start:
      1. Create K8S_MASTER_URL_<name> and K8S_TOKEN_<name> secrets for each cluster.
      2. Pass the list of cluster names in the clusters input.
      3. Replace the inline manifest with the resource you want to standardize.

    Outputs:
      - outputs.apply_across_clusters: per-cluster apply and verify results.

    Notes:
      - Per-cluster credentials are resolved dynamically from secret names suffixed with the cluster name.
      - concurrencyLimit caps how many clusters are updated in parallel.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Iterate over tenant clusters and server-side apply a shared Kubernetes manifest to each, verifying the result.
