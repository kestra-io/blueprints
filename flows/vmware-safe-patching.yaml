id: vmware-safe-patching
namespace: company.team
description: >
  Snapshot a vCenter VM, apply OS updates over SSH, health-check the VM after
  reboot, and automatically restore the snapshot if the health probe fails.

inputs:
  - id: vm_name
    type: STRING
    defaults: "prod-web-01"
  - id: vm_address
    type: STRING
    description: "Hostname or IP used to SSH into the VM and run the health probe."

tasks:
  - id: pre_patch_snapshot
    type: io.kestra.plugin.ee.vmware.vcenter.CreateVmSnapshot
    vmName: "{{ inputs.vm_name }}"
    snapshotName: "pre-patch-{{ execution.startDate | date('yyyyMMdd-HHmm') }}"
    snapshotDescription: "Captured by Kestra execution {{ execution.id }} before OS patching."

  - id: apply_patches
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - ssh -o StrictHostKeyChecking=no ops@{{ inputs.vm_address }} "sudo apt-get update && sudo apt-get -y upgrade && sudo reboot"
    allowFailure: true

  - id: wait_for_boot
    type: io.kestra.plugin.core.flow.Pause
    delay: PT1M

  - id: health_check
    type: io.kestra.plugin.core.http.Request
    uri: "http://{{ inputs.vm_address }}/health"
    method: GET
    options:
      connectTimeout: PT30S
      readTimeout: PT30S
    retry:
      type: constant
      interval: PT30S
      maxAttempt: 10

  - id: notify_success
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":white_check_mark: *Patching succeeded.* VM `{{ inputs.vm_name }}` patched, rebooted, and health-check OK."

errors:
  - id: rollback
    type: io.kestra.plugin.ee.vmware.vcenter.RestoreVmFromSnapshot
    vmName: "{{ inputs.vm_name }}"
    snapshotName: "pre-patch-{{ execution.startDate | date('yyyyMMdd-HHmm') }}"
    suppressPowerOn: false

  - id: notify_oncall
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":alert: *Patching failed.* VM `{{ inputs.vm_name }}` rolled back to pre-patch snapshot. <{{ execution.url }}|View execution>"

pluginDefaults:
  - type: io.kestra.plugin.ee.vmware
    values:
      server: "vcenter.company.local"
      username: "{{ secret('VMWARE_VCENTER_USERNAME') }}"
      password: "{{ secret('VMWARE_VCENTER_PASSWORD') }}"

extend:
  shortDescription: "Snapshot a vCenter VM, apply OS patches over SSH, health-check, and roll back automatically on failure."
  title: VMware safe patching with snapshot rollback
  metaTitle: VMware safe patching with snapshot rollback
  description: |
    This flow runs the safe-patching pattern against a vCenter-managed VM.
    It first creates a named pre-patch snapshot, applies OS updates over SSH,
    waits for the VM to reboot, then probes a /health endpoint.

    If any step fails, the errors branch restores the snapshot automatically
    and notifies the on-call channel on Slack, with a link to the failing
    execution.

    Prerequisites:
      - Secrets:
        - VMWARE_VCENTER_USERNAME: vCenter user with snapshot permission (required)
        - VMWARE_VCENTER_PASSWORD: vCenter password (required)
        - SLACK_WEBHOOK: Slack Incoming Webhook URL (required)
      - Services: vCenter cluster, SSH access to the VM, an HTTP /health endpoint.

    Inputs:
      - vm_name (STRING): the VM name in vCenter inventory.
      - vm_address (STRING): hostname or IP used for SSH and the HTTP probe.

    The snapshot name is built from the execution start date, so the rollback
    in the errors branch always targets the exact snapshot this run created.
    Adjust the SSH command to match your OS (apt-get for Debian/Ubuntu,
    dnf or yum for RHEL/CentOS) and the pluginDefaults.server to match
    your vCenter FQDN.
  tags:
    - Infrastructure
  ee: true
  demo: false
  metaDescription: "Pre-patch snapshot, OS update over SSH, health probe, and automatic snapshot rollback for vCenter VMs."
