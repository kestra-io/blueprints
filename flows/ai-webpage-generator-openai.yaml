id: ai-webpage-generator-openai
namespace: company.team
tasks:
  - id: open_ai_using_structured_output
    type: io.kestra.plugin.core.http.Request
    uri: "https://api.openai.com/v1/chat/completions"
    method: POST
    headers:
      Authorization: "Bearer {{ secret('OPENAI_API_KEY') }}"
      Content-Type: "application/json"
    body: |
      {
        "model": "gpt-4o-2024-08-06",
        "messages": [
          {
            "role": "system",
            "content": "You are a user interface designer and copywriter. Your job is to help users visualize their website ideas. You design elegant and simple websites with professional text. You use the Tailwind CSS framework."
          },
          {
            "role": "user",
            "content": "{{ trigger.query.query }}"
          }
        ],
        "response_format": {
          "type": "json_schema",
          "json_schema": {
            "name": "ui",
            "description": "Dynamically generated UI",
            "strict": true,
            "schema": {
              "type": "object",
              "properties": {
                "type": {
                  "type": "string",
                  "description": "The type of the UI component",
                  "enum": [
                    "div", "span", "a", "p", "h1", "h2", "h3", "h4", "h5", "h6",
                    "ul", "ol", "li", "img", "button", "input", "textarea", "select",
                    "option", "label", "form", "table", "thead", "tbody", "tr", "th",
                    "td", "nav", "header", "footer", "section", "article", "aside",
                    "main", "figure", "figcaption", "blockquote", "q", "hr", "code",
                    "pre", "iframe", "video", "audio", "canvas", "svg", "path",
                    "circle", "rect", "line", "polyline", "polygon", "g", "use", "symbol"
                  ]
                },
                "label": {
                  "type": "string",
                  "description": "The label of the UI component, used for buttons or form fields"
                },
                "children": {
                  "type": "array",
                  "description": "Nested UI components",
                  "items": {
                    "$ref": "#"
                  }
                },
                "attributes": {
                  "type": "array",
                  "description": "Arbitrary attributes for the UI component, suitable for any element using Tailwind framework",
                  "items": {
                    "type": "object",
                    "properties": {
                      "name": {
                        "type": "string",
                        "description": "The name of the attribute, for example onClick or className"
                      },
                      "value": {
                        "type": "string",
                        "description": "The value of the attribute using the Tailwind framework classes"
                      }
                    },
                    "additionalProperties": false,
                    "required": ["name", "value"]
                  }
                }
              },
              "required": ["type", "label", "children", "attributes"],
              "additionalProperties": false
            }
          }
        }
      }
  - id: open_ai_json_to_html
    type: io.kestra.plugin.openai.ChatCompletion
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: "gpt-4o-mini"
    messages:
      - role: system
        content: >-
          You convert a JSON UI component tree to HTML. Return a JSON object with two fields:
          html (the page body HTML using Tailwind CSS classes) and title (a short page title).
      - role: user
        content: "Convert this JSON UI tree to HTML: {{ outputs.open_ai_using_structured_output.body }}"
  - id: format_the_html_result
    type: io.kestra.plugin.scripts.python.Script
    script: |
      import json
      from kestra import Kestra

      raw = """{{ outputs.open_ai_json_to_html.choices[0].message.content }}"""
      data = json.loads(raw)
      title = data.get("title", "Generated Page")
      body_html = data.get("html", "")

      full_html = f"""<!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{title}</title>
        <script src="https://cdn.tailwindcss.com"></script>
      </head>
      <body>
        {body_html}
      </body>
      </html>"""

      Kestra.outputs({"html": full_html})
  - id: respond_to_webhook
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from kestra import Kestra

      html_content = """{{ outputs.format_the_html_result.html }}"""
      Kestra.outputs({"response": html_content})
triggers:
  - id: webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"

extend:
  title: "Generate Dynamic Webpages with OpenAI Structured Output"
  metaTitle: "AI Webpage Generator with OpenAI Structured Output"
  shortDescription: >-
    Turn a plain-text description into a fully rendered HTML page using OpenAI structured
    output and Tailwind CSS.
  description: |
    **Transform natural language requests into complete, styled HTML pages using OpenAI structured output.**

    1. A `io.kestra.plugin.core.trigger.Webhook` receives the user request with a query parameter describing the desired page
    2. A `io.kestra.plugin.core.http.Request` task sends the prompt to the OpenAI API with a JSON schema that enforces a structured UI component tree
    3. A `io.kestra.plugin.openai.ChatCompletion` task converts the structured JSON response into valid HTML with a page title
    4. A `io.kestra.plugin.scripts.python.Script` task wraps the generated HTML in a full document with the Tailwind CSS CDN script
    5. A `io.kestra.plugin.scripts.python.Script` task returns the final HTML page as the webhook response

    Ideal for:
    - **Developers** who want to rapidly prototype UI layouts from text descriptions
    - **Content creators** who need quick landing pages or mockups without writing code
    - **Product teams** exploring AI-assisted design workflows
  tags:
    - AI
  ee: false
  demo: false
  metaDescription: >-
    Generate complete HTML webpages from text descriptions using OpenAI structured output.
    Uses a JSON schema to produce Tailwind-styled UI components and renders them as a live page.

