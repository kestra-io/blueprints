id: slack-project-channel
namespace: company.team

inputs:
  - id: channel_name
    type: STRING
    required: true
    description: "Slack channel name (lowercase, hyphens). Example: proj-acme-launch"

  - id: topic
    type: STRING
    required: true
    description: "Channel topic (max 250 chars)."

  - id: user_ids
    type: ARRAY
    itemType: STRING
    required: true
    description: "List of Slack user IDs to invite (U...)."

tasks:
  - id: create_channel
    type: io.kestra.plugin.slack.app.conversations.Create
    token: "{{ secret('SLACK_TOKEN') }}"
    name: "{{ inputs.channel_name }}"
    isPrivate: false

  - id: set_topic
    type: io.kestra.plugin.slack.app.conversations.SetTopic
    token: "{{ secret('SLACK_TOKEN') }}"
    channel: "{{ outputs.create_channel.id }}"
    topic: "{{ inputs.topic }}"

  - id: invite_users
    type: io.kestra.plugin.slack.app.conversations.Invite
    token: "{{ secret('SLACK_TOKEN') }}"
    channel: "{{ outputs.create_channel.id }}"
    users: "{{ inputs.user_ids }}"

  - id: post_welcome
    type: io.kestra.plugin.slack.app.chats.Post
    token: "{{ secret('SLACK_TOKEN') }}"
    channel: "{{ outputs.create_channel.id }}"
    messageText: |
      Welcome to #{{ inputs.channel_name }}

      Quick rules
      - Use threads for discussions
      - Put key links in the channel canvas / pinned message
      - Share status updates here

  - id: add_reaction
    type: io.kestra.plugin.slack.app.reactions.Add
    token: "{{ secret('SLACK_TOKEN') }}"
    channel: "{{ outputs.create_channel.id }}"
    name: "white_check_mark"
    timestamp: "{{ outputs.post_welcome.timestamp }}"

description: |
  Creates a project channel, sets a topic, invites users, and posts a welcome message.
  Required secrets:
    - SLACK_TOKEN (xoxb-... with chat:write + channels permissions)
  Optional secrets used in the welcome message:
    - KESTRA_UI_URL
    - PROJECT_REPO_URL

extend:
  title: Bootstrap a Project Slack Channel (Create, Invite, Welcome)
  shortDescription: "Automatically create a Slack channel, invite users, set the topic, and post a welcome message."
  description: |
    This blueprint automates the repetitive "new project channel" setup:
    1) Create a channel
    2) Set a standardized topic
    3) Invite the right people
    4) Post a welcome message and mark it with a reaction

    Ideal for PM/Eng onboarding, client projects, and internal initiatives.
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: |
    Automatically create and configure a Slack project channel: topic, members, and a welcome message using Slack App methods.
