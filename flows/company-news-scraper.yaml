id: company-news-scraper
namespace: company.team

tasks:
  - id: setup
    type: io.kestra.plugin.scripts.python.Script
    description: "Define configuration parameters for the news scraper"
    script: |
      from kestra import Kestra

      Kestra.outputs({
          "apiKey": Kestra.secret("NEWSAPI_KEY"),
          "newsAge": 10,
          "maxArticles": 20,
          "emails": Kestra.secret("NOTIFICATION_EMAIL")
      })

  - id: get_meetings_for_today
    type: io.kestra.plugin.scripts.python.Script
    description: "Query Google Calendar API to get today's meetings"
    script: |
      import json
      import requests
      from datetime import datetime, timezone
      from kestra import Kestra

      today = datetime.now(timezone.utc)
      time_min = today.replace(hour=0, minute=0, second=0).isoformat()
      time_max = today.replace(hour=23, minute=59, second=59).isoformat()

      headers = {
          "Authorization": f"Bearer {Kestra.secret('GOOGLE_ACCESS_TOKEN')}"
      }
      params = {
          "timeMin": time_min,
          "timeMax": time_max,
          "singleEvents": True,
          "orderBy": "startTime"
      }
      resp = requests.get(
          "https://www.googleapis.com/calendar/v3/calendars/primary/events",
          headers=headers,
          params=params
      )
      resp.raise_for_status()
      events = resp.json().get("items", [])

      meetings = []
      for event in events:
          summary = event.get("summary", "")
          meetings.append({"summary": summary})

      Kestra.outputs({"meetings": json.dumps(meetings)})

  - id: process_meetings
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ outputs.get_meetings_for_today.vars.meetings }}"
    tasks:
      - id: filter_meeting
        type: io.kestra.plugin.core.flow.If
        condition: "{{ json(taskrun.value).summary | lower starts_with 'call with' or json(taskrun.value).summary | lower starts_with 'meeting with' }}"
        then:
          - id: extract_company_name
            type: io.kestra.plugin.scripts.python.Script
            description: "Extract the company name from the meeting summary"
            script: |
              from kestra import Kestra

              summary = """{{ json(taskrun.value).summary }}"""
              company = summary.lower().replace("meeting with", "").replace("call with", "").strip()

              Kestra.outputs({"companyName": company, "originalSummary": summary})

          - id: get_latest_news
            type: io.kestra.plugin.core.http.Request
            description: "Fetch recent news articles about the company from NewsAPI"
            uri: "https://newsapi.org/v2/everything"
            method: GET
            params:
              apiKey: "{{ outputs.setup.vars.apiKey }}"
              q: "{{ outputs.extract_company_name.vars.companyName }}"
              sortBy: "publishedAt"
              language: "en"
              pageSize: "{{ outputs.setup.vars.maxArticles }}"
              searchIn: "title"

          - id: format_for_email
            type: io.kestra.plugin.scripts.python.Script
            description: "Format news articles into an HTML table for the email digest"
            script: |
              import json
              from kestra import Kestra

              raw_response = """{{ outputs.get_latest_news.body }}"""
              data = json.loads(raw_response)
              articles = data.get("articles", [])

              html = '<table style="width: 100%">'
              for article in articles:
                  title = article.get("title", "No title")
                  url = article.get("url", "#")
                  description = article.get("description") or article.get("content", "")
                  source_name = article.get("source", {}).get("name", "")
                  source_html = f"<b>Source:</b> {source_name}" if source_name else ""

                  html += f"""
                  <tr>
                    <td style="display: flex; background-color: #f2f4f8; font-family: sans-serif; padding: 0.3em 0.5em">
                      <div style="padding: 1em">
                        <a style="display: block; margin-bottom: 10px; font-size: 1.2em" href="{url}">{title}</a>
                        <i>{description}</i>
                        <div style="margin-top: 1em">{source_html}</div>
                      </div>
                    </td>
                  </tr>
                  """
              html += "</table>"

              Kestra.outputs({"html": html})

          - id: send_news
            type: io.kestra.plugin.email.MailSend
            host: "{{ secret('SMTP_HOST') }}"
            port: 587
            username: "{{ secret('SMTP_USER') }}"
            password: "{{ secret('SMTP_PASSWORD') }}"
            from: "{{ secret('EMAIL_FROM') }}"
            to: "{{ outputs.setup.vars.emails }}"
            subject: "Latest news for '{{ outputs.extract_company_name.vars.originalSummary }}'"
            htmlTextContent: "{{ outputs.format_for_email.vars.html }}"

triggers:
  - id: every_morning_7
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 7 * * *"

extend:
  title: "Scrape Recent Company News Before a Meeting"
  metaTitle: "Scrape Company News Before Meetings"
  shortDescription: >-
    Automatically scans your calendar each morning, fetches the latest news
    about companies you are meeting with, and delivers a formatted digest
    to your inbox.
  description: |
    **Stay prepared for every meeting by automatically receiving a curated news digest for each company on your calendar, delivered to your inbox each morning.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger fires every morning at 7:00 AM
    2. A `io.kestra.plugin.scripts.python.Script` task defines configuration parameters including API key, news age, and article limits
    3. A second `io.kestra.plugin.scripts.python.Script` task queries the Google Calendar API to retrieve meetings scheduled for the current day
    4. A `io.kestra.plugin.core.flow.If` task filters only meetings whose summary starts with "call with" or "meeting with"
    5. A `io.kestra.plugin.scripts.python.Script` task extracts the company name from the meeting summary
    6. A `io.kestra.plugin.core.http.Request` task fetches the latest news articles for that company from the NewsAPI
    7. A `io.kestra.plugin.scripts.python.Script` task formats the articles into an HTML email with headlines, descriptions, sources, and links
    8. A `io.kestra.plugin.email.MailSend` task sends the formatted news digest via email

    Ideal for:
    - **Sales professionals** who need to arrive at calls informed about their prospects
    - **Account managers** tracking client news and industry developments
    - **Executives** who want automated pre-meeting intelligence briefings
  tags:
    - Business
    - Data
  ee: false
  demo: false
  metaDescription: >-
    Scans your calendar each morning, fetches recent news about companies
    you are meeting with, and emails you a formatted digest before each call.

