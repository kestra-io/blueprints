id: line-sla-duration-alert
namespace: company.team

labels:
  type: monitoring
  channel: line
  signal: sla


tasks:
  - id: notify_sla_breach
    type: io.kestra.plugin.line.LineExecution
    description: Broadcast a LINE alert to your followers when a watched flow breaches its agreed duration SLA.
    channelAccessToken: "{{ secret('LINE_CHANNEL_ACCESS_TOKEN') }}"
    executionId: "{{ trigger.executionId ?? execution.id }}"
    customMessage: ":hourglass_flowing_sand: SLA breach on {{ trigger.flowId ?? flow.id }} in {{ trigger.namespace ?? flow.namespace }}. This run exceeded its declared MAX_DURATION SLA. Open the linked execution for its actual duration and threshold."
    customFields:
      Owner: Data Platform
      Action: Investigate runtime
      Threshold: See the watched flow's MAX_DURATION SLA
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 5
    timeout: PT30S

triggers:
  - id: on_sla_miss
    type: io.kestra.plugin.core.trigger.Flow
    states:
      - SUCCESS
      - WARNING
      - CANCELLED
    conditions:
      - type: io.kestra.plugin.core.condition.ExecutionNamespace
        namespace: company.team
        prefix: true
      - type: io.kestra.plugin.core.condition.ExecutionLabels
        labels:
          sla: miss

extend:
  shortDescription: Broadcast a LINE alert to your followers only when a flow breaches its duration SLA, using a MAX_DURATION SLA label.
  title: Alert LINE when a flow breaches its duration SLA
  metaTitle: LINE SLA breach alerts for slow Kestra flows
  description: |
    This flow sends a LINE notification only when a watched flow breaches its agreed duration Service Level
    Agreement (SLA). It relies on Kestra's native SLA mechanism: the watched flows declare a `MAX_DURATION` SLA
    that stamps a label (here `sla: miss`) on any execution that runs longer than the allowed duration. This alert
    flow then uses a `io.kestra.plugin.core.trigger.Flow` trigger, scoped to the `company.team` namespace with an
    `ExecutionNamespace` condition and filtered to SLA-breaching executions with an `ExecutionLabels` condition, so
    it fires only for runs that actually missed the SLA. Fast runs are never labelled, so the LINE channel stays
    quiet unless something is genuinely slow.

    The duration check lives in the watched flow's `MAX_DURATION` SLA rather than in this alert flow, because the
    upstream execution's duration is not exposed to a Flow-triggered flow (a Flow trigger only exposes
    `trigger.executionId`, `trigger.namespace`, `trigger.flowId`, `trigger.flowRevision`, and `trigger.state`).
    Gating at the SLA source is the supported, reliable pattern. The LINE message includes the breaching flow id, the
    execution link, id, namespace, flow name, start date, duration, and status, resolved by `LineExecution`.

    ## Choosing the SLA behavior (this drives which states to watch)
    A `MAX_DURATION` SLA can either force a state change on breach or just stamp a label. The two options need
    different `states` here:
    - **`behavior: FAIL` or `behavior: CANCEL`** (the pattern the Kestra SLA docs lead with): the breach forces the
      execution into `FAILED` or `CANCELLED`, a real state transition the trigger reacts to. This is the more proven
      path. If you use it, include the matching state (`CANCELLED` for `CANCEL`) in the `states` list. Note that
      `FAIL` lands the run in `FAILED`, which would also match a separate failure monitor (see the de-duplication note
      below), so `CANCEL` is the cleaner choice when you want SLA breaches reported as their own signal.
    - **`behavior: NONE`**: the run keeps its natural terminal state (usually `SUCCESS`) and only gets the label. The
      alert then depends on `SUCCESS` (and `WARNING`/`CANCELLED`) being in `states` AND the `sla: miss` label being
      present at the terminal transition. This works but is the less-proven path, because it couples breach-time
      labelling with terminal-time evaluation.

    This blueprint's `states` list (`SUCCESS`, `WARNING`, `CANCELLED`) supports both the `NONE` variant (matches the
    natural `SUCCESS`) and the `CANCEL` variant (matches `CANCELLED`). It deliberately omits `FAILED`; see below.

    Example `MAX_DURATION` SLA to add to each watched flow:
    ```yaml
    sla:
      - id: maxDuration
        type: MAX_DURATION
        duration: PT15M
        behavior: CANCEL
        labels:
          sla: miss
    ```

    ## Avoiding double-alerts when run alongside the failure monitor
    These LINE blueprints are designed as a set. If `line-failure-alert` is also deployed, a run that breaches its SLA
    **and** fails would otherwise fire both this SLA alert and the failure alert: two LINE broadcasts for one incident.
    To keep one incident to one page, this flow excludes `FAILED` from `states` and lets the failure monitor own
    failures; this flow owns the slow-but-not-failed case (and, with `behavior: CANCEL`, the cancelled-on-breach case).
    If you only deploy this flow, you can add `FAILED` back to `states` to also catch slow runs that failed.

    ## Reliability
    An SLA-breach alert that silently fails to deliver defeats the purpose of the SLA mechanism, so the LINE call is
    hardened:
    - `retry` (constant, 5 attempts, 10s apart) rides out transient LINE API `5xx`, timeouts, and `429` rate limits.
    - `timeout: PT30S` bounds a hung HTTP call so the task fails fast and retries instead of stalling a worker.

    This flow is itself a label-driven alerter, so it has no flow-level `errors` block, which would risk a
    notification loop on its own failures. Add an independent second channel if a LINE outage must never go unnoticed.

    ## On the threshold value
    Earlier revisions hardcoded a custom field `SLA: 15 minutes`, but a single alerter can watch many flows that each
    declare a different `MAX_DURATION`, and the field would drift the moment any flow's SLA changed. Instead the
    `Threshold` field points the reader at the watched flow's own SLA, and the per-run specifics (actual duration,
    declared threshold) are reachable through the execution link. The alerter does not, and cannot, know each watched
    flow's threshold from the Flow trigger context alone.

    ## Prerequisites
    - A LINE Messaging API channel (a LINE Official Account with the Messaging API enabled).
    - A LINE Channel Access Token with permission to broadcast messages.
    - One or more flows in `company.team` that declare a `MAX_DURATION` SLA which sets the label `sla: miss` on
      breach (see the SLA example above).

    ## How LINE delivery works
    `LineExecution` posts to the LINE Messaging API broadcast endpoint, which delivers to **every follower of the LINE
    Official Account** tied to your channel access token. It is not a group or 1:1 push and has no per-team routing, so
    treat the receiving Official Account as a controlled, internal-only account.

    ## Secrets
    - `LINE_CHANNEL_ACCESS_TOKEN`: the Channel Access Token used to authenticate to the LINE Messaging API and
      broadcast the alert. Store it as a Kestra secret; never hardcode the value.

    ## Quick start
    1. Create a Channel Access Token in the LINE Developers console for your Messaging API channel.
    2. Add it to Kestra as the secret `LINE_CHANNEL_ACCESS_TOKEN`.
    3. On each watched flow, add a `MAX_DURATION` SLA with your threshold (for example `duration: PT15M`) that sets
       the label `sla: miss` on breach. Pick `behavior: CANCEL` (recommended) or `behavior: NONE` per the section above.
    4. Update the `ExecutionNamespace` condition to the namespace you want to govern, and align the `states` list with
       your chosen SLA behavior.
    5. Update the `Owner` custom field and the `customMessage`, then deploy.
    6. Run a flow that exceeds the threshold to confirm the LINE alert fires, and a fast one to confirm it stays silent.
       You can also run this flow manually as a smoke test, since `executionId` falls back to `execution.id`.

    ## Expected outputs
    This is a notification-only flow and produces no files. When a watched run breaches its SLA, Kestra labels that
    execution `sla: miss`; this flow's trigger matches the label and the `notify_sla_breach` task sends a LINE
    broadcast. Runs that meet the SLA are never labelled, so no message is sent. Confirm delivery in the
    `notify_sla_breach` task logs. The slow run is reachable from the execution link in the LINE message, derived
    from `{{ trigger.executionId ?? execution.id }}`.

    ## Links
    - Kestra LINE plugin: https://kestra.io/plugins/plugin-line
    - Workflow SLAs: https://kestra.io/docs/workflow-components/sla
    - ExecutionNamespace condition: https://kestra.io/plugins/core/conditions/io.kestra.plugin.core.condition.executionnamespace
    - LINE Messaging API broadcast: https://developers.line.biz/en/docs/messaging-api/sending-messages/#send-broadcast-message
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: Broadcast a LINE alert to your followers only when a Kestra flow breaches its duration SLA, using a MAX_DURATION SLA label.
