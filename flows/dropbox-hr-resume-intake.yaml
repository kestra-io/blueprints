id: dropbox-hr-resume-intake
namespace: company.hr

inputs:
  - id: incoming_folder
    type: STRING
    defaults: "/incoming-resumes"
    description: Dropbox folder watched for new candidate resumes.

  - id: archive_folder
    type: STRING
    defaults: "/archive/resumes"
    description: Parent Dropbox folder where processed resumes are filed under a dated sub-folder.

variables:
  archive_date: "{{ (trigger.date ?? execution.startDate) | date('yyyy-MM-dd') }}"

pluginDefaults:
  - type: io.kestra.plugin.dropbox
    values:
      accessToken: "{{ secret('DROPBOX_ACCESS_TOKEN') }}"


tasks:
  - id: list_resumes
    type: io.kestra.plugin.dropbox.files.List
    description: List PDF and DOCX candidate files in the intake folder. Filtering by extension rather than a name query so real resumes (CV.pdf, lebenslauf.docx) are not missed.
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 5
    from: "{{ inputs.incoming_folder }}"
    recursive: false
    limit: 500
    fetchType: FETCH

  - id: process_each_resume
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ outputs.list_resumes.rows }}"
    concurrencyLimit: 2
    tasks:
      - id: process_file
        type: io.kestra.plugin.core.flow.If
        description: Only process file entries with a PDF or DOCX extension, skipping folders and other file types the listing returns.
        condition: "{{ fromJson(taskrun.value).type == 'file' and (fromJson(taskrun.value).path | lower | substringAfterLast('.')) isIn ['pdf', 'docx'] }}"
        then:
          - id: download_resume
            type: io.kestra.plugin.dropbox.files.Download
            description: Pull the resume into Kestra internal storage for parsing.
            retry:
              type: constant
              interval: PT10S
              maxAttempt: 5
            from: "{{ fromJson(parent.taskrun.value).path }}"

          - id: parse_resume
            type: io.kestra.plugin.scripts.python.Script
            description: Extract candidate fields from the resume file. Replace this stub with a real parser or ATS push; resume content is PII and must be handled accordingly.
            containerImage: python:3.13-slim
            timeout: PT5M
            dependencies:
              - pdfminer.six
              - kestra
            inputFiles:
              resume_input: "{{ outputs.download_resume.uri }}"
            script: |
              import os
              from kestra import Kestra

              source_path = "{{ fromJson(parent.taskrun.value).path }}"
              file_name = os.path.basename(source_path)
              size_bytes = os.path.getsize("resume_input")

              print(f"Parsed candidate file {file_name} ({size_bytes} bytes)")
              Kestra.outputs({"candidate_file": file_name, "size_bytes": size_bytes})

          - id: archive_resume
            type: io.kestra.plugin.dropbox.files.Move
            description: Move the processed resume into a dated archive sub-folder so the intake folder only holds work that still needs attention.
            retry:
              type: constant
              interval: PT10S
              maxAttempt: 5
            from: "{{ fromJson(parent.taskrun.value).path }}"
            to: "{{ inputs.archive_folder }}/{{ render(vars.archive_date) }}/{{ outputs.parse_resume.vars.candidate_file }}"
            autorename: true

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }}). Resumes may be unprocessed in {{ inputs.incoming_folder }}."

triggers:
  - id: every_weekday_morning
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 7 * * 1-5"
    timezone: Europe/Paris

extend:
  shortDescription: List a Dropbox intake folder for resumes, parse each PDF or DOCX, then move processed files into a dated archive folder, with retries and failure alerting.
  title: HR resume intake and archival with Dropbox
  metaTitle: Dropbox HR resume intake pipeline
  description: |
    This flow automates the first mile of recruiting operations. Every weekday morning it scans
    a Dropbox intake folder for new candidate resumes, downloads and parses each one, then moves
    the processed file into a dated archive sub-folder so the intake folder always reflects work
    that still needs attention.

    It is built to survive contact with a rate-limited API: every Dropbox call carries a retry
    block, a flow-level `errors` block alerts on failure with the execution id, and a
    `concurrency` limit prevents a slow run from overlapping the next 07:00 schedule.

    ## What this flow does
    1. `list_resumes` lists the `/incoming-resumes` folder and returns its entries. The flow
       filters by extension (`pdf`, `docx`) rather than a name query, because real resumes are
       named `Jane_Doe_CV.pdf` or `lebenslauf.docx` and a `resume` keyword search would miss them.
    2. `process_each_resume` loops over every entry with a `ForEach` task (two at a time).
    3. An `If` guard skips folder entries and non-resume extensions, so only PDF and DOCX files
       are downloaded, parsed by a Python step, and then moved with `files.Move`.
    4. Processed files land in `{{ archive_folder }}/<run-date>/`, derived from
       `trigger.date ?? execution.startDate` so backfills file into the correct dated folder.
    5. A `Schedule` trigger runs the whole pipeline at 07:00 on business days, Europe/Paris.

    ## Prerequisites
    - A Kestra instance with the Dropbox and Slack plugins installed.
    - A Dropbox app with an access token that can read, list, download, and move files.
    - A Docker-compatible task runner for the Python parsing step.
    - Two Dropbox folders: an intake folder and a parent archive folder.

    ## Secrets
    - `DROPBOX_ACCESS_TOKEN`: Dropbox API access token used by every Dropbox task. Scope the
      Dropbox app to the intake and archive folders only and grant the minimum scopes
      (`files.metadata.read`, `files.content.read`, `files.content.write`). Never hardcode it.
    - `SLACK_WEBHOOK`: Slack incoming webhook URL used by the failure alert.

    ## Quick start
    1. Add the `DROPBOX_ACCESS_TOKEN` and `SLACK_WEBHOOK` secrets to your namespace.
    2. Adjust the `incoming_folder` and `archive_folder` inputs to match your Dropbox layout.
    3. Replace the parsing logic in `parse_resume` with your real resume parser (for example a
       call to an applicant tracking system or an LLM extraction step). Resume content is PII;
       handle downstream storage and access accordingly.
    4. Enable the flow and let the schedule pick up new resumes.

    ## Expected outputs
    - `{{ outputs.list_resumes.size }}` entries found in the intake folder.
    - For each resume, `{{ outputs.download_resume.uri }}` is the downloaded file in Kestra storage.
    - `{{ outputs.parse_resume.vars.candidate_file }}` is the parsed file name.
    - `{{ outputs.archive_resume.file }}` holds the metadata of the moved file in the dated archive folder.

    ## Documentation
    - Dropbox plugin: https://kestra.io/plugins/plugin-dropbox
    - ForEach task: https://kestra.io/plugins/core/tasks/flow/io.kestra.plugin.core.flow.foreach
    - Dropbox API: https://www.dropbox.com/developers/documentation/http/documentation
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: "Automate HR resume intake in Dropbox: list incoming PDF/DOCX resumes, parse each, then archive into a dated folder, with retries and failure alerts."
