extend:
  title: "Gmail AI Auto-Responder with Draft Replies"
  metaTitle: "Gmail AI Auto-Responder with Draft Replies"
  shortDescription: >-
    Automatically assess incoming Gmail messages with OpenAI and generate
    draft replies, keeping you in control before anything is sent.
  description: |
    **Automatically triage incoming emails and generate context-aware draft replies using OpenAI, so you stay in control while eliminating writer's block.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger polls for new emails on a regular cadence
    2. A `io.kestra.plugin.openai.ChatCompletion` task evaluates whether the message requires a reply by analyzing the subject and body
    3. A `io.kestra.plugin.core.flow.If` task routes only messages that need responses to the next step
    4. A second `io.kestra.plugin.openai.ChatCompletion` task drafts a professional reply based on the original email content
    5. A `io.kestra.plugin.email.MailSend` task creates the draft reply in the same email thread

    Ideal for:
    - **Professionals** managing high-volume inboxes who need quick reply suggestions
    - **Support teams** that want AI-assisted first drafts without auto-sending
    - **Founders and executives** who want to reduce email response time while maintaining quality
  tags:
    - AI
    - Email
    - Gmail
    - Productivity
  ee: false
  demo: false
  metaDescription: >-
    Automatically assess incoming Gmail messages with OpenAI and create draft
    replies. Keeps you in control by generating suggestions without sending.

id: gmail-ai-auto-responder
namespace: company.team

tasks:
  - id: check_inbox
    type: io.kestra.plugin.scripts.python.Script
    description: "Poll Gmail inbox for new unread messages using the Gmail API"
    script: |
      import json
      import requests
      from kestra import Kestra

      # Use Gmail API to fetch recent unread messages (excluding sent mail)
      # Configure GMAIL_ACCESS_TOKEN via Google OAuth2
      headers = {
          "Authorization": f"Bearer {Kestra.secret('GMAIL_ACCESS_TOKEN')}"
      }
      params = {
          "q": "-from:me is:unread",
          "maxResults": 10
      }
      resp = requests.get(
          "https://gmail.googleapis.com/gmail/v1/users/me/messages",
          headers=headers,
          params=params
      )
      resp.raise_for_status()
      messages = resp.json().get("messages", [])

      results = []
      for msg in messages:
          detail = requests.get(
              f"https://gmail.googleapis.com/gmail/v1/users/me/messages/{msg['id']}",
              headers=headers,
              params={"format": "full"}
          ).json()
          headers_list = detail.get("payload", {}).get("headers", [])
          subject = next((h["value"] for h in headers_list if h["name"].lower() == "subject"), "")
          from_addr = next((h["value"] for h in headers_list if h["name"].lower() == "from"), "")
          thread_id = detail.get("threadId", "")
          snippet = detail.get("snippet", "")
          results.append({
              "messageId": msg["id"],
              "threadId": thread_id,
              "subject": subject,
              "from": from_addr,
              "snippet": snippet
          })

      Kestra.outputs({"emails": json.dumps(results)})

  - id: process_emails
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ outputs.check_inbox.vars.emails }}"
    tasks:
      - id: assess_if_needs_reply
        type: io.kestra.plugin.openai.ChatCompletion
        apiKey: "{{ secret('OPENAI_API_KEY') }}"
        model: "gpt-4o"
        messages:
          - role: system
            content: >-
              Your task is to assess if the message requires a response.
              Return JSON with a single boolean field "needsReply".
              Marketing emails, automated notifications, and newsletters
              do not require a response.
          - role: user
            content: "Subject: {{ json(taskrun.value).subject }}\nMessage:\n{{ json(taskrun.value).snippet }}"

      - id: if_needs_reply
        type: io.kestra.plugin.core.flow.If
        condition: "{{ json(outputs.assess_if_needs_reply.choices[0].message.content).needsReply == true }}"
        then:
          - id: generate_email_reply
            type: io.kestra.plugin.openai.ChatCompletion
            apiKey: "{{ secret('OPENAI_API_KEY') }}"
            model: "gpt-4-turbo"
            messages:
              - role: system
                content: >-
                  You are a helpful personal assistant. Your task is to draft replies
                  on behalf of the user to incoming emails. Return an appropriate
                  draft reply and nothing else. Ensure the reply is suitable for a
                  professional email setting and addresses the topic clearly.

                  Instructions:
                  - Be concise and maintain a business casual tone
                  - Start with "Hello," and end with "Best,"
                  - When replying to yes-no questions, draft 2 responses: one
                    affirmative and one negative separated by
                    " - - - - - - - OR - - - - - - - "
                  - If you do not know an answer, leave placeholders like
                    "[YOUR_ANSWER_HERE]"
                  - Use plain text only, no special formatting
                  - Reply in the same language as the inbound email
              - role: user
                content: "Subject: {{ json(taskrun.value).subject }}\nMessage: {{ json(taskrun.value).snippet }}"

          - id: create_draft
            type: io.kestra.plugin.email.MailSend
            host: "{{ secret('SMTP_HOST') }}"
            port: 587
            username: "{{ secret('SMTP_USER') }}"
            password: "{{ secret('SMTP_PASSWORD') }}"
            from: "{{ secret('EMAIL_FROM') }}"
            to: "{{ json(taskrun.value).from }}"
            subject: "Re: {{ json(taskrun.value).subject }}"
            htmlTextContent: "{{ outputs.generate_email_reply.choices[0].message.content | replace('\n', '<br/>\n') }}"

triggers:
  - id: poll_inbox
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "* * * * *"
