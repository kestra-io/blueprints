id: parallel-python
namespace: company.team

tasks:
  - id: parallel
    type: io.kestra.plugin.core.flow.ForEach
    concurrencyLimit: 0
    values:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
    tasks:
      - id: python
        type: io.kestra.plugin.scripts.python.Commands
        taskRunner:
          type: io.kestra.plugin.scripts.runner.docker.Docker
        inputFiles:
          parametrized.py: |
            import argparse
            parser = argparse.ArgumentParser()
            parser.add_argument("--num", type=int, default=42, help="Enter an integer")
            args = parser.parse_args()
            result = args.num * 2
            print(result)
        commands:
          - python parametrized.py --num {{ taskrun.value }}

extend:
  shortDescription: "Add a Python script called parametrized.py as a Namespace File and run it in parallel with different parameter values using a Python script."
  title: Add a parametrized Python script as a Namespace File and run it in
  metaTitle: Run a Parametrized Python Namespace File in Parallel
    parallel in Docker containers
  description: |
    Add a Python script called `parametrized.py` as a Namespace File and run it
    in parallel with different parameter `values` using a Python script.

    You can also add that script directly to NamespaceFiles and set the namespaceFiles.enabled to true instead of using the `inputFiles` property.
  tags:
    - Core
  ee: false
  demo: false
  metaDescription: Run a parametrized Python Namespace File in parallel Docker containers with Kestra. Scale Python workloads across isolated containers in a single flow.
