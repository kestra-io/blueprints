id: docker-digest-promotion
namespace: company.team
description: |
  Promote the exact image you tested. Build once to get an immutable image ID,
  pause for an approval, then retag that same image to the production reference
  and push it, so promotion can never swap in a different build.

inputs:
  - id: staging_tag
    type: STRING
    defaults: ghcr.io/my-org/my-app:staging
    description: Tag applied to the freshly built image.
  - id: production_tag
    type: STRING
    defaults: ghcr.io/my-org/my-app:1.0.0
    description: Immutable production tag to promote to.
  - id: approval_timeout
    type: DURATION
    defaults: PT4H
    description: How long to wait for promotion approval.

tasks:
  - id: build
    type: io.kestra.plugin.docker.Build
    description: Build the candidate image and capture its immutable image ID.
    dockerfile: |
      FROM nginx:1.27-alpine
      COPY . /usr/share/nginx/html
    tags:
      - "{{ inputs.staging_tag }}"
    push: false

  - id: approve_promotion
    type: io.kestra.plugin.core.flow.Pause
    description: Wait for a human to approve promoting this exact build to production.
    pauseDuration: "{{ inputs.approval_timeout }}"

  - id: tag_production
    type: io.kestra.plugin.docker.Tag
    description: Retag the approved image ID to the production reference.
    sourceImage: "{{ outputs.build.imageId }}"
    targetImage: "{{ inputs.production_tag }}"

  - id: push_production
    type: io.kestra.plugin.docker.Push
    description: Push the production-tagged image to the registry.
    tags:
      - "{{ inputs.production_tag }}"
    credentials:
      registry: ghcr.io
      username: "{{ secret('REGISTRY_USERNAME') }}"
      password: "{{ secret('REGISTRY_PASSWORD') }}"

triggers:
  - id: on_promotion_request
    type: io.kestra.plugin.core.trigger.Webhook
    description: A release system posts here to start a promotion.
    key: "{{ secret('DOCKER_PROMOTE_WEBHOOK_KEY') }}"

extend:
  shortDescription: Build an image, pause for approval, then retag that exact image ID to production and push it.
  title: Digest-Pinned Container Promotion with Approval
  metaTitle: Digest-Pinned Container Promotion with Approval
  description: |
    This blueprint guarantees you promote the artifact you reviewed. It builds the
    image and keeps its immutable image ID, pauses for a human to approve, then
    retags that exact ID to the production reference and pushes it. Because
    promotion works from the captured image ID, a different or newer build can
    never sneak into production.

    Prerequisites:
      - Secrets:
        - REGISTRY_USERNAME, REGISTRY_PASSWORD: registry push credentials.
        - DOCKER_PROMOTE_WEBHOOK_KEY: key guarding the webhook trigger.
      - A worker with Docker daemon access for build, tag, and push.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Replace the sample Dockerfile with your build, or adapt to pull a prebuilt image.
      3. Run with staging_tag and production_tag; approve the Pause to promote.

    Outputs:
      - outputs.build.imageId: the immutable ID promoted to production.
      - outputs.push_production: the production push result.

    Notes:
      - Promotion uses the image ID, not a tag, so the reviewed bits are exactly what ships.
      - Replace the build step with a pull of a prebuilt digest if your CI builds elsewhere.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Build an image, pause for approval, then retag that exact image ID to production and push it.
