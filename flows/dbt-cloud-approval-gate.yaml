id: dbt-cloud-approval-gate
namespace: company.team
description: |
  Gate a dbt Cloud production run behind an approval. Trigger the CI job first,
  pause for a human to review, then trigger the production job and report to
  Slack, so production transformations never run unreviewed.

inputs:
  - id: ci_job_id
    type: STRING
    description: dbt Cloud job ID for the CI / validation run.
  - id: prod_job_id
    type: STRING
    description: dbt Cloud job ID for the production run.
  - id: approval_timeout
    type: DURATION
    defaults: PT2H
    description: How long to wait for approval before timing out.

tasks:
  - id: run_ci_job
    type: io.kestra.plugin.dbt.cloud.TriggerRun
    description: Trigger the dbt Cloud CI job and wait for it to finish.
    jobId: "{{ inputs.ci_job_id }}"
    wait: true

  - id: notify_approval
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Tell the team the CI job passed and the production run needs approval.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Approval needed: dbt Cloud CI job {{ inputs.ci_job_id }} passed and the production job is paused for review (execution {{ execution.id }})."
      }

  - id: approve_production
    type: io.kestra.plugin.core.flow.Pause
    description: Wait for a human to approve running the production job.
    pauseDuration: "{{ inputs.approval_timeout }}"

  - id: run_prod_job
    type: io.kestra.plugin.dbt.cloud.TriggerRun
    description: Trigger the dbt Cloud production job and wait for completion.
    jobId: "{{ inputs.prod_job_id }}"
    wait: true

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Report the production run to Slack.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "dbt Cloud production job {{ inputs.prod_job_id }} completed after approval."
      }

pluginDefaults:
  - type: io.kestra.plugin.dbt.cloud.TriggerRun
    values:
      accountId: "{{ secret('DBT_CLOUD_ACCOUNT_ID') }}"
      token: "{{ secret('DBT_CLOUD_API_TOKEN') }}"

triggers:
  - id: on_promote_request
    type: io.kestra.plugin.core.trigger.Webhook
    description: A release system posts here to start a gated production run.
    key: "{{ secret('DBT_CLOUD_WEBHOOK_KEY') }}"

extend:
  shortDescription: Run the dbt Cloud CI job, pause for approval, then run the production job and report to Slack.
  title: dbt Cloud Production Run with an Approval Gate
  metaTitle: dbt Cloud Production Run with an Approval Gate
  description: |
    This blueprint keeps production dbt runs behind a human gate. It triggers the
    dbt Cloud CI job and waits, pauses for an approval, then triggers the
    production job and waits for it as well. Production transformations only run
    after CI passes and someone signs off.

    Prerequisites:
      - Secrets:
        - DBT_CLOUD_ACCOUNT_ID, DBT_CLOUD_API_TOKEN: dbt Cloud account and API token.
        - DBT_CLOUD_WEBHOOK_KEY: key guarding the webhook trigger.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - dbt Cloud CI and production jobs.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Pass the ci_job_id and prod_job_id.
      3. Approve the Pause once CI passes to run production.

    Outputs:
      - outputs.run_ci_job / outputs.run_prod_job: dbt Cloud run results.

    Notes:
      - Both runs use wait: true, so a failed CI job stops the flow before the approval step matters.
      - Remove the Pause for a fully automated CI-to-prod path.
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Run the dbt Cloud CI job, pause for approval, then run the production job and report the result to Slack.
