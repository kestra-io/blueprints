id: vertica-load-csv-analytics
namespace: company.analytics

labels:
  team: data
  domain: analytics

concurrency:
  limit: 1

inputs:
  - id: source_url
    type: STRING
    defaults: https://huggingface.co/datasets/kestra/datasets/raw/main/csv/orders.csv
    description: Public CSV endpoint to ingest into Vertica.

  - id: target_table
    type: SELECT
    defaults: staging.orders
    values:
      - staging.orders
    description: |
      Fully qualified target table for the loaded rows. This identifier is
      concatenated directly into DDL/DML (an identifier cannot be bound as a
      parameter), so it is exposed as a SELECT with a fixed allow-list rather
      than free text. Add trusted, operator-controlled tables to the list.

variables:
  vertica_url: jdbc:vertica://vertica-host:5433/analytics

pluginDefaults:
  - type: io.kestra.plugin.jdbc.vertica
    values:
      url: "{{ vars.vertica_url }}"
      username: "{{ secret('VERTICA_USERNAME') }}"
      password: "{{ secret('VERTICA_PASSWORD') }}"

tasks:
  - id: download_csv
    type: io.kestra.plugin.core.http.Download
    description: Stream the remote CSV into Kestra internal storage.
    uri: "{{ inputs.source_url }}"
    timeout: PT10M
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: csv_to_ion
    type: io.kestra.plugin.serdes.csv.CsvToIon
    description: Parse the CSV into ION so the Batch task can bind each row.
    from: "{{ outputs.download_csv.uri }}"
    header: true

  - id: create_table
    type: io.kestra.plugin.jdbc.vertica.Query
    description: DDL run that creates the columnar target table if it does not exist.
    timeout: PT10M
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    sql: |
      CREATE TABLE IF NOT EXISTS {{ inputs.target_table }} (
        order_id INTEGER,
        customer_name VARCHAR(255),
        product VARCHAR(255),
        price NUMERIC(12,2),
        quantity INTEGER,
        total NUMERIC(14,2),
        order_date DATE
      );
    fetchType: NONE

  - id: truncate_staging
    type: io.kestra.plugin.jdbc.vertica.Query
    description: Truncate the staging table so a re-run reloads instead of appending.
    timeout: PT10M
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    sql: TRUNCATE TABLE {{ inputs.target_table }};
    fetchType: NONE

  - id: batch_insert
    type: io.kestra.plugin.jdbc.vertica.Batch
    description: High-performance chunked insert of the ION rows into Vertica with named-column binding.
    from: "{{ outputs.csv_to_ion.uri }}"
    chunk: 1000
    columns:
      - order_id
      - customer_name
      - product
      - price
      - quantity
      - total
      - order_date
    sql: INSERT INTO {{ inputs.target_table }} (order_id, customer_name, product, price, quantity, total, order_date) VALUES (?, ?, ?, ?, ?, ?, ?)

  - id: revenue_by_product
    type: io.kestra.plugin.jdbc.vertica.Query
    description: Analytical aggregation over the freshly loaded columnar data.
    timeout: PT10M
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    sql: |
      SELECT
        product,
        COUNT(*) AS orders,
        SUM(total) AS revenue,
        ROUND(AVG(price), 2) AS avg_price
      FROM {{ inputs.target_table }}
      GROUP BY product
      ORDER BY revenue DESC;
    fetchType: STORE

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }})."

extend:
  shortDescription: Download a CSV, truncate-and-reload it into Vertica with a batch insert, then run a columnar aggregation query.
  title: Load a CSV into Vertica and run a columnar analytics query
  metaTitle: Vertica CSV load and analytics ETL
  description: |
    This flow demonstrates a re-run-safe extract, load, and analyze cycle against a Vertica columnar analytics database.

    What the flow does:
    - Downloads a remote CSV over HTTP into Kestra internal storage, with task-level retry on transient network failures.
    - Converts the CSV to ION so rows can be bound to a prepared statement.
    - Runs DDL to create the target columnar table if it does not exist.
    - Truncates the staging table before loading so a re-run or backfill reloads cleanly instead of appending duplicate rows.
    - Bulk inserts the rows using the Vertica Batch task in chunks of 1,000, binding named columns (so the example survives a CSV column reorder).
    - Runs a final analytical Query that aggregates revenue per product and stores the result set to internal storage.

    Reliability and safety:
    - Connection and credential properties are set once in a `pluginDefaults` block keyed by the Vertica plugin group, not repeated on each task.
    - Every remote Query and the HTTP Download carry a `retry` (constant, 3 attempts) and a 10-minute `timeout`. The Batch task additionally has its own internal `maxRetries`/`resumeOnRetry`.
    - A flow-level `errors` block posts a Slack alert (with the execution id) if any step fails, so an operator is notified.
    - `concurrency.limit: 1` prevents two runs from interleaving inserts into the shared table.
    - The load is idempotent: re-running truncates and reloads, so the `revenue_by_product` aggregation always reflects exactly one copy of the source data.

    Security note on the table name:
    - `target_table` is concatenated directly into DDL/DML because a SQL identifier cannot be bound as a parameter. It is therefore exposed as a SELECT input backed by a fixed allow-list of trusted, operator-controlled tables, not free text. Do not wire an untrusted/web-supplied value into this input.

    Scale envelope:
    - This pattern downloads the whole CSV into internal storage and materializes it via CsvToIon and JDBC Batch, which is appropriate for demo and moderate volumes. For very large files (hundreds of MB or more), use Vertica's native `COPY` bulk loader instead of JDBC Batch, which is what a Vertica DBA would reach for at warehouse scale.
    - At 0 loaded rows the aggregation returns an empty result set and the flow still succeeds; add a row-count assertion if an empty load should fail loudly.

    Prerequisites:
    - A reachable Vertica cluster. Update the `vertica_url` variable to your JDBC URL, for example `jdbc:vertica://your-host:5433/analytics`.
    - The connecting user must have CREATE, TRUNCATE, and INSERT privileges on the target schema.

    Secrets:
    - `VERTICA_USERNAME`: the Vertica database user used for the connection.
    - `VERTICA_PASSWORD`: the password for that Vertica user.
    - `SLACK_WEBHOOK`: the Slack incoming webhook used for failure alerts.

    Quick start:
    1. Add the `VERTICA_USERNAME`, `VERTICA_PASSWORD`, and `SLACK_WEBHOOK` secrets to your namespace.
    2. Edit the `vertica_url` variable to point at your cluster.
    3. Adjust the `target_table` allow-list and the column list in `create_table` and `batch_insert` to match your CSV schema.
    4. Execute the flow.

    Expected outputs:
    - `batch_insert` reports how many rows were loaded via `{{ outputs.batch_insert.rowCount }}` and `{{ outputs.batch_insert.updatedCount }}`.
    - The aggregation result set is stored as an ION file in internal storage at `{{ outputs.revenue_by_product.uri }}` with `{{ outputs.revenue_by_product.size }}` rows.

    Documentation:
    - Vertica plugin: https://kestra.io/plugins/plugin-jdbc-vertica
    - HTTP Download task: https://kestra.io/plugins/core/tasks/http/io.kestra.plugin.core.http.download
    - Vertica analytics database: https://docs.vertica.com/latest/en/
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Download a CSV, truncate-and-reload it into Vertica, then run a columnar aggregation query and store the results.
