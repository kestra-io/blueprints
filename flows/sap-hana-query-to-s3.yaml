id: sap-hana-query-to-s3
namespace: company.analytics

labels:
  team: analytics
  domain: data-lake

inputs:
  - id: load_date
    type: STRING
    defaults: "{{ (trigger.date ?? execution.startDate) | date('yyyy-MM-dd') }}"
    description: Business date to export. Defaults to the trigger or execution date so backfills land in the right partition.

  - id: analytics_view
    type: STRING
    defaults: "ANALYTICS.CV_DAILY_SALES"
    description: Fully qualified SAP HANA calculation or analytics view to export. Operator-supplied identifier, not free-form user input.

  - id: data_lake_bucket
    type: STRING
    defaults: enterprise-data-lake
    description: Destination S3 bucket for the exported CSV file.

variables:
  object_key: "hana/daily_sales/{{ inputs.load_date | date('yyyy/MM/dd') }}/daily_sales.csv"

pluginDefaults:
  - type: io.kestra.plugin.jdbc.hana
    values:
      url: "jdbc:sap://{{ secret('HANA_HOST') }}:39015/?databaseName=HXE"
      username: "{{ secret('HANA_USERNAME') }}"
      password: "{{ secret('HANA_PASSWORD') }}"

concurrency:
  limit: 1

tasks:
  - id: extract_view
    type: io.kestra.plugin.jdbc.hana.Query
    description: Read the analytics view for the load date and stream the result set to internal storage as ION.
    fetchType: STORE
    timeout: PT30M
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    parameters:
      loadDate: "{{ inputs.load_date }}"
    sql: |
      SELECT
        SALES_DATE,
        PRODUCT_ID,
        REGION,
        QUANTITY,
        NET_AMOUNT,
        CURRENCY
      FROM {{ inputs.analytics_view }}
      WHERE SALES_DATE = :loadDate

  - id: convert_to_csv
    type: io.kestra.plugin.serdes.csv.IonToCsv
    description: Convert the stored ION result set into a CSV file with a header row.
    from: "{{ outputs.extract_view.uri }}"
    header: true

  - id: upload_to_data_lake
    type: io.kestra.plugin.aws.s3.Upload
    description: Upload the CSV file to the partitioned data lake prefix in S3.
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    region: "{{ secret('AWS_DEFAULT_REGION') }}"
    accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
    secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
    bucket: "{{ inputs.data_lake_bucket }}"
    key: "{{ render(vars.object_key) }}"
    from: "{{ outputs.convert_to_csv.uri }}"

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }})."

triggers:
  - id: daily_export
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 5 * * *"
    timezone: Europe/Berlin

extend:
  shortDescription: Export a SAP HANA analytics view to CSV in an S3 data lake on a daily schedule.
  title: Export a SAP HANA analytics view to an S3 data lake
  metaTitle: SAP HANA to S3 data lake export
  description: |
    This flow runs every morning, reads a SAP HANA analytics or calculation view for a specific business
    date, converts the result set to CSV, and uploads it to a partitioned prefix in an Amazon S3 data lake
    bucket. It is a classic batch extract pattern for feeding HANA data into lake-house analytics, Athena,
    or Spark jobs. The date window is driven by a `load_date` input (not `CURRENT_DATE`), so backfills and
    replays select the right day and write it to the matching partition. Remote calls carry retries and
    the flow alerts to Slack on failure.

    ## What this flow does
    1. A Schedule trigger fires daily at 05:00 Europe/Berlin time. `load_date` defaults to
       `{{ (trigger.date ?? execution.startDate) }}`, so a backfill of 2026-05-01 exports that day's data.
    2. The `extract_view` task queries the analytics view with `fetchType: STORE`, binding `load_date` as
       the `:loadDate` SQL parameter and streaming the full result set to Kestra internal storage in
       Amazon ION format (efficient for large exports). It retries transient HANA disconnects and is
       bounded by a 30-minute `timeout`.
    3. The `convert_to_csv` task converts that ION file into a CSV file with a header row.
    4. The `upload_to_data_lake` task writes the CSV to S3 under a date-partitioned key built from the
       same `load_date`, such as `hana/daily_sales/2026/06/17/daily_sales.csv`. It retries transient S3
       throttling.
    5. If any task fails, the flow-level `errors` block posts a Slack alert with the execution id.

    ## Backfill and re-run safety
    - The SQL window and the S3 partition key both derive from `load_date`, so a manual run or backfill of
      a past day selects that day's rows and writes them under that day's prefix. The two never diverge.
    - The object key is deterministic for a given `load_date`, so a re-run overwrites the same S3 object
      rather than creating duplicates. Enable S3 bucket versioning if you need immutable historical copies.
    - `concurrency: { limit: 1 }` prevents a long-running export from overlapping the next 05:00 fire.

    ## A note on the query
    The SQL selects explicit columns rather than `SELECT *`, so the CSV column contract stays stable for
    downstream Athena or Spark tables even if the view gains columns. Adjust the column list to match your
    view; the view schema you select is the contract your consumers depend on.

    ## Prerequisites
    - A reachable SAP HANA instance (the JDBC URL uses port 39015; adjust the instance number and
      `databaseName` for your tenant). The SAP HANA JDBC driver (`ngdbc`) ships with the Kestra JDBC plugin.
    - An Amazon S3 bucket you can write to, and AWS credentials with `s3:PutObject` on that bucket.
    - A database user with SELECT on the target analytics view.

    ## Secrets
    - `HANA_HOST`: hostname or IP of the SAP HANA server.
    - `HANA_USERNAME`: SAP HANA database user with read access to the analytics view.
    - `HANA_PASSWORD`: password for that database user.
    - `AWS_DEFAULT_REGION`: AWS region of the destination S3 bucket.
    - `AWS_ACCESS_KEY_ID`: AWS access key id with write access to the bucket.
    - `AWS_SECRET_ACCESS_KEY`: AWS secret access key paired with the access key id.
    - `SLACK_WEBHOOK`: Slack Incoming Webhook URL for failure alerts.

    ## Quick start
    1. Add the secrets above to your Kestra instance.
    2. Set the `analytics_view` and `data_lake_bucket` inputs to match your environment.
    3. Trigger the flow manually once to validate connectivity, then let the schedule take over.

    ## Expected outputs
    - `{{ outputs.extract_view.uri }}`: the raw ION result set in internal storage.
    - `{{ outputs.extract_view.size }}`: number of rows read from the analytics view.
    - `{{ outputs.convert_to_csv.uri }}`: the generated CSV file in internal storage.
    - `{{ outputs.upload_to_data_lake.bucket }}` and `{{ outputs.upload_to_data_lake.key }}`: the
      destination bucket and object key written to S3.

    ## Documentation
    - SAP HANA plugin: https://kestra.io/plugins/plugin-jdbc-hana
    - Amazon S3 Upload task: https://kestra.io/plugins/plugin-aws/s3/io.kestra.plugin.aws.s3.upload
    - IonToCsv task: https://kestra.io/plugins/plugin-serdes/csv/io.kestra.plugin.serdes.csv.iontocsv
    - SAP HANA SQL reference: https://help.sap.com/docs/SAP_HANA_PLATFORM
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Schedule a backfill-safe daily SAP HANA analytics view export to CSV and upload it to an S3 data lake with Kestra.
