id: on-failure-alert
namespace: company.team

tasks:
  - id: fail
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - exit 1

errors:
  - id: slack
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: "Failure alert for flow {{ flow.namespace }}.{{ flow.id }} with ID {{ execution.id }}"

extend:
  shortDescription: "This flow will fail and the errors section declares tasks that should run on failure."
  title: "Error handling: send Slack alert on failure"
  description: This flow will fail and the `errors` section declares tasks that
    should run on failure.
  tags:
    - Core
  ee: false
  demo: false
  metaDescription: This flow will fail and send Slack alert on failure.
