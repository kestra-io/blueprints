id: apify-scrape-to-postgres
namespace: company.team

inputs:
  - id: actor_id
    type: STRING
    displayName: Apify actor ID
    description: Actor ID or owner~actor name from the Apify Store. Defaults to the Compass Google Maps Scraper.
    defaults: compass/crawler-google-places
  - id: search_query
    type: STRING
    displayName: Search query
    description: What the actor should scrape.
    defaults: coffee shops in Berlin
  - id: max_results
    type: INT
    displayName: Max results
    description: Caps the items returned to control Apify pay-per-result cost.
    defaults: 200

tasks:
  - id: run_actor
    type: io.kestra.plugin.apify.actor.Run
    actorId: "{{ inputs.actor_id }}"
    apiToken: "{{ secret('APIFY_API_TOKEN') }}"
    maxItems: "{{ inputs.max_results }}"
    maxTotalChargeUsd: 5
    memory: MB_2048
    input:
      searchStringsArray:
        - "{{ inputs.search_query }}"
      maxCrawledPlacesPerSearch: 50
      language: en

  - id: get_dataset
    type: io.kestra.plugin.apify.dataset.Get
    apiToken: "{{ secret('APIFY_API_TOKEN') }}"
    datasetId: "{{ outputs.run_actor.defaultDatasetId }}"

  - id: write_json
    type: io.kestra.plugin.core.storage.Write
    content: "{{ outputs.get_dataset.dataset | json }}"
    extension: .json

  - id: reshape
    type: io.kestra.plugin.graalvm.python.FileTransform
    from: "{{ outputs.write_json.uri }}"
    script: |
      row = {
          "title": row.get("title"),
          "category": row.get("categoryName"),
          "address": row.get("address"),
          "phone": row.get("phone"),
          "website": row.get("website"),
          "total_score": row.get("totalScore"),
      }

  - id: to_csv
    type: io.kestra.plugin.serdes.csv.IonToCsv
    from: "{{ outputs.reshape.uri }}"
    header: true

  - id: create_table
    type: io.kestra.plugin.jdbc.postgresql.Query
    url: "jdbc:postgresql://{{ secret('POSTGRES_HOST') }}:5432/postgres"
    username: "{{ secret('POSTGRES_USERNAME') }}"
    password: "{{ secret('POSTGRES_PASSWORD') }}"
    sql: |
      CREATE TABLE IF NOT EXISTS public.apify_places (
          title        VARCHAR,
          category     VARCHAR,
          address      VARCHAR,
          phone        VARCHAR,
          website      VARCHAR,
          total_score  NUMERIC,
          ingested_at  TIMESTAMPTZ DEFAULT now()
      );

  - id: load_data
    type: io.kestra.plugin.jdbc.postgresql.CopyIn
    url: "jdbc:postgresql://{{ secret('POSTGRES_HOST') }}:5432/postgres"
    username: "{{ secret('POSTGRES_USERNAME') }}"
    password: "{{ secret('POSTGRES_PASSWORD') }}"
    format: CSV
    from: "{{ outputs.to_csv.uri }}"
    table: public.apify_places
    header: true
    columns:
      - title
      - category
      - address
      - phone
      - website
      - total_score

  - id: notify_success
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    messageText: ":white_check_mark: Apify scrape loaded to Postgres: {{ outputs.load_data.rowCount }} rows from run {{ outputs.run_actor.id }} at cost ${{ outputs.run_actor.usageTotalUsd }}."

triggers:
  - id: daily
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 * * *"

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    messageText: ":rotating_light: Apify scrape-to-Postgres failed for actor {{ inputs.actor_id }} (execution {{ execution.id }})."

extend:
  title: Load a scheduled Apify web scrape into Postgres
  metaTitle: Apify web scrape to Postgres ELT pipeline
  shortDescription: "Run an Apify actor on a schedule, fetch its dataset, reshape the records, and bulk-load them into Postgres with run caps and Slack alerts."
  description: |
    This flow runs a scheduled **web scrape with Apify** and lands the results in **Postgres** as a declarative ELT pipeline.

    It demonstrates how to:

    1. Trigger an Apify Store actor (the Google Maps Scraper by default) with `io.kestra.plugin.apify.actor.Run`, using `maxItems`, `maxTotalChargeUsd`, and `memory` run caps so a runaway crawl never becomes a runaway bill.
    2. Fetch the actor's default dataset with `io.kestra.plugin.apify.dataset.Get` and write it to Kestra internal storage as JSON.
    3. Reshape each record into a typed, ordered row with a Python `FileTransform`.
    4. Serialize the rows to CSV and bulk-load them into Postgres with `CopyIn`, creating the table if it does not exist and defaulting an `ingested_at` timestamp.
    5. Confirm the run in Slack with the row count and the actor's reported cost, and alert the channel from an `errors` handler on any failure.

    Swap the `actor_id` input for any of the 35,000+ actors in the Apify Store, adjust the reshape and the table DDL to match its output, and point the load at BigQuery, Snowflake, or DuckDB instead of Postgres.
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Orchestrate an Apify actor with Kestra and load the scraped dataset into Postgres on a schedule, with run caps, an ingestion timestamp, and Slack alerts.
