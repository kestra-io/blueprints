extend:
  title: Handle Pagination in HTTP API Requests
  metaTitle: HTTP API Pagination Handler
  shortDescription: >-
    Demonstrate cursor-based pagination by looping through API pages until all
    data is collected. Uses a configurable base URL with rate-limit-safe delays.
  description: |
    **Loop through paginated API responses using cursor-based navigation, collecting all pages into a single combined dataset.**

    1. A `io.kestra.plugin.scripts.python.Script` task initializes the first page URL and begins iterating through paginated responses
    2. The script follows the `next` cursor from each API response, fetching subsequent pages until no more pages remain or the safety limit is reached
    3. A configurable delay between requests prevents hitting API rate limits
    4. All collected results are merged into a single output with total item count and pages fetched

    Ideal for:
    - **Developers** learning how to handle paginated REST APIs in Kestra without writing custom scripts
    - **Data engineers** building ETL pipelines that need to extract complete datasets from APIs with page limits
    - **Anyone** working with APIs that return results in pages (CRM contacts, issue trackers, product catalogs)
  tags:
    - API
    - Getting Started
    - Data Collection
  ee: false
  demo: true
  metaDescription: >-
    Paginate through any cursor-based REST API with a DoWhile loop.
    Collects all pages, respects rate limits, and merges results.

id: http-pagination-handler
namespace: company.team

inputs:
  - id: base_url
    type: STRING
    displayName: API Base URL
    description: The initial URL to begin paginating from (must support cursor-based pagination)
    defaults: "https://pokeapi.co/api/v2/pokemon?limit=20"
  - id: delay_seconds
    type: INT
    displayName: Delay between requests (seconds)
    description: Pause duration between page requests to avoid rate limits
    defaults: 1
  - id: max_pages
    type: INT
    displayName: Maximum pages
    description: Safety limit on total pages to fetch (prevents infinite loops)
    defaults: 5

tasks:
  - id: paginate
    type: io.kestra.plugin.scripts.python.Script
    description: Fetch all pages from a paginated API using cursor-based navigation
    dependencies:
      - requests
    script: |
      import requests
      import time
      import json
      from kestra import Kestra

      base_url = "{{ inputs.base_url }}"
      delay = {{ inputs.delay_seconds }}
      max_pages = {{ inputs.max_pages }}

      all_results = []
      next_url = base_url
      page = 0

      while next_url and page < max_pages:
          print(f"Fetching page {page + 1}: {next_url}")
          response = requests.get(next_url)
          response.raise_for_status()
          data = response.json()

          # Collect results - adapt the key name to your API
          # Common patterns: "results", "data", "items", "records"
          if "results" in data:
              all_results.extend(data["results"])
          elif "data" in data:
              all_results.extend(data["data"])
          elif isinstance(data, list):
              all_results.extend(data)

          # Extract next page cursor - adapt to your API
          # Common patterns: "next", "paging.next.link", "cursor", "nextPageToken"
          next_url = data.get("next")

          page += 1
          if next_url and page < max_pages:
              time.sleep(delay)

      Kestra.outputs({
          "total_items": len(all_results),
          "pages_fetched": page,
          "results": all_results
      })

  - id: log_summary
    type: io.kestra.plugin.core.log.Log
    description: Log how many items were collected across all pages
    message: "Collected {{ outputs.paginate.vars.total_items }} items across {{ outputs.paginate.vars.pages_fetched }} pages."
