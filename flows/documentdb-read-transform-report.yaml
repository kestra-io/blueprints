id: documentdb-read-transform-report
namespace: company.analytics

labels:
  team: analytics
  domain: reporting


variables:
  database: app_data
  collection: orders

pluginDefaults:
  - type: io.kestra.plugin.documentdb
    values:
      host: "{{ secret('DOCUMENTDB_HOST') }}"
      database: "{{ vars.database }}"
      username: "{{ secret('DOCUMENTDB_USERNAME') }}"
      password: "{{ secret('DOCUMENTDB_PASSWORD') }}"

tasks:
  - id: aggregate_orders
    type: io.kestra.plugin.documentdb.Read
    description: Group the scheduled day's orders by status and compute counts and revenue, stored as Ion.
    collection: "{{ vars.collection }}"
    aggregationPipeline:
      - $match:
          created_at:
            $gte:
              $date: "{{ (trigger.date ?? execution.startDate) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}T00:00:00Z"
            $lt:
              $date: "{{ (trigger.date ?? execution.startDate) | date('yyyy-MM-dd') }}T00:00:00Z"
      - $group:
          _id: "$status"
          orders:
            $sum: 1
          revenue:
            $sum: "$amount"
      - $sort:
          revenue: -1
    fetchType: STORE
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: to_csv
    type: io.kestra.plugin.serdes.csv.IonToCsv
    description: Convert the stored Ion aggregation result into a downloadable CSV report.
    from: "{{ outputs.aggregate_orders.uri }}"
    header: true

  - id: fetch_groups
    type: io.kestra.plugin.documentdb.Read
    description: Re-read the same aggregation as in-memory rows so the digest can surface real revenue figures.
    collection: "{{ vars.collection }}"
    aggregationPipeline:
      - $match:
          created_at:
            $gte:
              $date: "{{ (trigger.date ?? execution.startDate) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}T00:00:00Z"
            $lt:
              $date: "{{ (trigger.date ?? execution.startDate) | date('yyyy-MM-dd') }}T00:00:00Z"
      - $group:
          _id: "$status"
          orders:
            $sum: 1
          revenue:
            $sum: "$amount"
      - $sort:
          revenue: -1
    fetchType: FETCH
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: report
    type: io.kestra.plugin.core.flow.If
    description: Post the digest with real figures, or a distinct no-orders message when the window is empty.
    condition: "{{ (outputs.fetch_groups.size ?? 0) > 0 }}"
    then:
      - id: notify_digest
        type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
        description: Post a daily orders digest with per-status order and revenue figures.
        url: "{{ secret('SLACK_WEBHOOK') }}"
        retry:
          type: constant
          interval: PT10S
          maxAttempt: 3
        payload: |
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Daily orders digest"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Report day:*\n{{ (trigger.date ?? execution.startDate) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Status groups:*\n{{ outputs.fetch_groups.size }}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "{% for g in outputs.fetch_groups.rows %}*{{ g._id }}*: {{ g.orders }} orders, revenue {{ g.revenue }}\n{% endfor %}"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "Flow {{ flow.namespace }}.{{ flow.id }} | execution {{ execution.id }} | CSV {{ outputs.to_csv.uri }}"
                  }
                ]
              }
            ]
          }
    else:
      - id: notify_empty
        type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
        description: Post a distinct message so an empty window is never confused with a broken pipeline.
        url: "{{ secret('SLACK_WEBHOOK') }}"
        retry:
          type: constant
          interval: PT10S
          maxAttempt: 3
        messageText: ":information_source: Daily orders digest for {{ (trigger.date ?? execution.startDate) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}: no orders in the window. Flow {{ flow.namespace }}.{{ flow.id }} (execution {{ execution.id }})."

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }}). The daily orders digest did not run."

triggers:
  - id: daily_report
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 7 * * *"
    timezone: Etc/UTC

extend:
  shortDescription: Aggregate a day of DocumentDB orders, export the summary to CSV, and post a Slack digest with real figures.
  title: DocumentDB analytics report with Slack digest
  metaTitle: DocumentDB analytics report to Slack
  description: |
    This flow runs a MongoDB-style aggregation pipeline against a DocumentDB `orders` collection,
    stores the grouped result in Kestra internal storage, converts it to a CSV report, and posts a
    daily digest to Slack with the actual per-status order and revenue numbers. It is a read-only
    analytics pattern: no documents are modified. The data window is derived from the scheduled date
    (not `now()`), so backfills and missed-run replays report the correct day, and every remote call
    retries with a flow-level failure alert.

    ## What this flow does
    1. Runs `io.kestra.plugin.documentdb.Read` with an aggregation pipeline that matches the previous
       calendar day in UTC, groups by `status`, and sums orders and revenue. The window is bound to
       `{{ trigger.date ?? execution.startDate }}` and the `created_at` filter uses the EJSON `$date`
       form so it compares against a real BSON date, not a string. Results use `fetchType: STORE` so
       large result sets are written to internal storage as Ion.
    2. Converts the Ion result to CSV with `io.kestra.plugin.serdes.csv.IonToCsv`.
    3. Re-reads the same aggregation with `fetchType: FETCH` so the digest can list real figures.
    4. Branches with `io.kestra.plugin.core.flow.If`: when there are groups it posts a digest listing
       each status with its order count and revenue (and a link to the CSV in internal storage); when
       the window is empty it posts a distinct "no orders" message so a quiet day is never mistaken for
       a broken pipeline.

    ## Date storage requirement
    The window filter only works if `created_at` is stored as a BSON/EJSON date. If your documents store
    `created_at` as a string, either migrate the field to a date type or change the `$match` to compare
    against an ISO string in the same format your documents use. A type mismatch silently returns zero rows.

    ## Prerequisites
    - A reachable DocumentDB Data REST API endpoint with an `orders` collection containing `status`,
      `amount`, and a date-typed `created_at` field (indexing `created_at` keeps the window query fast).
    - A Slack incoming webhook pointed at the channel that should receive the digest.
    - Outbound network access from Kestra workers to DocumentDB and Slack.

    ## Secrets
    - `DOCUMENTDB_HOST`: base HTTPS endpoint of the DocumentDB Data REST API.
    - `DOCUMENTDB_USERNAME`: basic-auth username for the DocumentDB API.
    - `DOCUMENTDB_PASSWORD`: basic-auth password for the DocumentDB API.
    - `SLACK_WEBHOOK`: Slack incoming webhook URL used to post the digest and failure alerts.

    ## Quick start
    1. Add the four secrets above to your Kestra instance.
    2. Point the `database` and `collection` variables at your orders data.
    3. Run the flow manually to validate the pipeline and Slack delivery, then rely on the 07:00 UTC
       schedule. To re-run a past day, trigger a backfill from the Triggers tab; the window follows the
       scheduled date.

    ## Expected outputs
    - `{{ outputs.aggregate_orders.uri }}`: Ion file in internal storage with the grouped aggregation result.
    - `{{ outputs.fetch_groups.rows }}`: per-status groups with order counts and revenue used in the digest.
    - `{{ outputs.to_csv.uri }}`: the CSV report, linked in the Slack digest for download.

    ## Links
    - DocumentDB plugin: https://kestra.io/plugins/plugin-documentdb
    - IonToCsv task: https://kestra.io/plugins/plugin-serdes/csv/io.kestra.plugin.serdes.csv.iontocsv
    - Slack incoming webhook task: https://kestra.io/plugins/plugin-notifications/slack/io.kestra.plugin.slack.notifications.slackincomingwebhook
    - Slack webhook setup: https://api.slack.com/messaging/webhooks
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Aggregate a day of DocumentDB orders with a grouping pipeline, export to CSV, and post a Slack digest with real revenue figures.
