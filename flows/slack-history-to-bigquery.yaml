id: slack-history-to-bigquery
namespace: company.team
description: |
  Archive a Slack channel's history into BigQuery for analytics and retention.
  Export the channel messages to internal storage, then load them into a
  BigQuery table on a schedule.

inputs:
  - id: channel_id
    type: STRING
    description: Slack channel ID to export (right-click the channel, Copy Link, take the trailing ID).
  - id: destination_table
    type: STRING
    defaults: my-project.slack.channel_history
    description: BigQuery destination table in project.dataset.table form.

tasks:
  - id: export_history
    type: io.kestra.plugin.slack.app.conversations.History
    description: Export the channel messages to internal storage.
    token: "{{ secret('SLACK_TOKEN') }}"
    channel: "{{ inputs.channel_id }}"
    oldest: "{{ now() | dateAdd(-1, 'DAYS') }}"

  - id: convert_to_json
    type: io.kestra.plugin.serdes.json.IonToJson
    description: Convert the exported Ion messages to newline-delimited JSON for BigQuery.
    from: "{{ outputs.export_history.uri }}"

  - id: load_to_bigquery
    type: io.kestra.plugin.gcp.bigquery.Load
    description: Load the exported messages into BigQuery.
    serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
    projectId: "{{ secret('GCP_PROJECT_ID') }}"
    from: "{{ outputs.convert_to_json.uri }}"
    destinationTable: "{{ inputs.destination_table }}"
    format: JSON

triggers:
  - id: daily_export
    type: io.kestra.plugin.core.trigger.Schedule
    description: Export the previous day's messages each morning. Adjust or disable as needed.
    cron: "0 6 * * *"
    disabled: true

extend:
  shortDescription: Export a Slack channel's history to internal storage and load it into BigQuery on a schedule.
  title: Archive Slack Channel History into BigQuery
  metaTitle: Archive Slack Channel History into BigQuery
  description: |
    This blueprint keeps a durable, queryable record of Slack conversations. It
    exports a channel's messages to Kestra internal storage and loads them into a
    BigQuery table, so you can analyze activity and meet retention requirements
    without relying on Slack's own history limits.

    Prerequisites:
      - Secrets:
        - SLACK_TOKEN: Slack token with channels:history (and groups:history for private channels).
        - GCP_SERVICE_ACCOUNT: service account key with BigQuery load permissions.
        - GCP_PROJECT_ID: GCP project hosting the destination dataset.
      - An existing BigQuery dataset for the destination table.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Pass the Slack channel_id and the BigQuery destination_table.
      3. Adjust the oldest window if you want a different export range.

    Outputs:
      - outputs.export_history.uri: internal storage URI of the exported messages.
      - outputs.export_history.size: number of messages exported.
      - outputs.load_to_bigquery: the BigQuery load result.

    Notes:
      - The export window defaults to the last day; widen oldest for a backfill.
      - The Ion export is converted to newline-delimited JSON before loading, since BigQuery Load accepts CSV/JSON/AVRO/PARQUET/ORC (not Ion).
  tags:
    - Business
    - Data
  ee: false
  demo: false
  metaDescription: Export a Slack channel's history to internal storage and load it into a BigQuery table on a schedule.
