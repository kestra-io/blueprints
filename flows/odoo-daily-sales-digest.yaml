id: odoo-daily-sales-digest
namespace: company.sales

labels:
  team: sales
  domain: revenue-reporting


variables:
  window_date: "{{ (trigger.date ?? execution.startDate) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd', timeZone='Europe/Paris') }}"

pluginDefaults:
  - type: io.kestra.plugin.odoo.Query
    values:
      url: "{{ secret('ODOO_URL') }}"
      db: "{{ secret('ODOO_DB') }}"
      username: "{{ secret('ODOO_USERNAME') }}"
      password: "{{ secret('ODOO_PASSWORD') }}"

tasks:
  - id: query_orders
    type: io.kestra.plugin.odoo.Query
    description: Read the business day's confirmed sales orders from Odoo and store them as ION.
    model: sale.order
    operation: SEARCH_READ
    filters:
      - ["state", "in", ["sale", "done"]]
      - ["date_order", ">=", "{{ vars.window_date }} 00:00:00"]
      - ["date_order", "<=", "{{ vars.window_date }} 23:59:59"]
    fields:
      - name
      - partner_id
      - date_order
      - amount_total
      - currency_id
      - state
    limit: 100000
    fetchType: STORE
    retry:
      type: constant
      interval: PT30S
      maxAttempt: 4

  - id: to_jsonl
    type: io.kestra.plugin.serdes.json.IonToJson
    description: Convert the ION query result into newline-delimited JSON for pandas.
    from: "{{ outputs.query_orders.uri }}"

  - id: build_digest
    type: io.kestra.plugin.scripts.python.Script
    description: Summarize the sales orders per currency and build a JSON-safe Slack Block Kit payload.
    containerImage: python:3.13-slim
    dependencies:
      - pandas==2.2.2
      - kestra
    inputFiles:
      orders.jsonl: "{{ outputs.to_jsonl.uri }}"
    env:
      WINDOW_DATE: "{{ vars.window_date }}"
    script: |
      import json
      import os
      import pandas as pd
      from kestra import Kestra

      window_date = os.environ["WINDOW_DATE"]

      try:
          df = pd.read_json("orders.jsonl", lines=True)
      except ValueError:
          df = pd.DataFrame()

      def currency_label(value):
          if isinstance(value, list) and len(value) > 1:
              return str(value[1])
          return str(value)

      def customer_label(value):
          if isinstance(value, list) and len(value) > 1:
              return str(value[1])
          return str(value)

      fields = []
      order_count = 0
      if df.empty:
          fields.append({"type": "mrkdwn", "text": "No confirmed orders for this day."})
      else:
          order_count = int(len(df))
          df["currency"] = df["currency_id"].apply(currency_label)
          df["customer"] = df["partner_id"].apply(customer_label)

          by_currency = (
              df.groupby("currency")["amount_total"].sum().sort_values(ascending=False)
          )
          revenue_lines = "\n".join(
              f"{cur}: {round(float(amount), 2)}" for cur, amount in by_currency.items()
          )
          fields.append({"type": "mrkdwn", "text": f"*Orders:*\n{order_count}"})
          fields.append({"type": "mrkdwn", "text": f"*Revenue by currency:*\n{revenue_lines}"})

          top_customer = (
              df.groupby(["customer", "currency"])["amount_total"]
              .sum()
              .sort_values(ascending=False)
          )
          (top_name, top_cur) = top_customer.index[0]
          top_amount = round(float(top_customer.iloc[0]), 2)
          fields.append(
              {"type": "mrkdwn", "text": f"*Top customer:*\n{top_name} ({top_amount} {top_cur})"}
          )

      payload = {
          "blocks": [
              {
                  "type": "header",
                  "text": {"type": "plain_text", "text": f"Daily sales digest for {window_date}"},
              },
              {"type": "section", "fields": fields},
              {
                  "type": "context",
                  "elements": [{"type": "mrkdwn", "text": "Source: Odoo sale.order via Kestra"}],
              },
          ]
      }

      Kestra.outputs({"order_count": order_count, "payload": json.dumps(payload)})

  - id: send_digest
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Post the daily sales digest to Slack using the JSON-safe payload built in Python.
    url: "{{ secret('SLACK_WEBHOOK') }}"
    payload: "{{ outputs.build_digest.vars.payload }}"
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} could not build the {{ vars.window_date }} sales digest (execution {{ execution.id }})."
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

triggers:
  - id: every_morning
    type: io.kestra.plugin.core.trigger.Schedule
    description: Runs every morning at 07:00 Europe/Paris and reports the previous business day.
    cron: "0 7 * * *"
    timezone: Europe/Paris

extend:
  shortDescription: "Summarize the previous day's Odoo sales orders per currency every morning and post a JSON-safe digest to Slack, with retry, alerting, and backfill-safe dates."
  title: Send a daily Odoo sales digest to Slack
  metaTitle: Daily Odoo sales digest in Slack with Kestra
  description: |
    This flow gives your sales team a daily snapshot of revenue without anyone logging into Odoo.
    Each morning it reads the previous day's confirmed sales orders, summarizes them per currency
    with a short Python task, and posts a Block Kit digest to Slack. It is built to run unattended:
    the date window is timezone-aware and backfill-safe, the Odoo read retries on transient errors,
    and a failed run alerts Slack so a missing digest is explained rather than silently absent.

    ## What this flow does
    1. Runs an Odoo XML-RPC `SEARCH_READ` against the `sale.order` model for orders in state
       `sale` or `done` whose `date_order` falls on the reported business day, storing the result
       as an ION file. The day is derived from `{{ trigger.date ?? execution.startDate }}` and a
       declared timezone, so a manual replay or backfill regenerates the correct past day instead
       of using "now".
    2. Converts the ION result to newline-delimited JSON with `IonToJson` so pandas can read it.
    3. A Python task loads the rows with pandas, groups revenue by currency (so a multi-currency
       shop is not summed into a meaningless single number), finds the top customer with their
       currency, and builds the entire Slack Block Kit payload with `json.dumps`. Building the
       payload in Python means customer names containing quotes, ampersands, or backslashes are
       JSON-escaped and cannot break the Slack POST.
    4. A Slack incoming webhook posts that pre-built payload verbatim.

    ## Reliability and correctness
    - `query_orders` retries up to 4 times and `send_digest` up to 3 times on transient errors.
    - A flow-level `errors` block posts a Slack alert (with the execution id and the day) so a
      missing digest is never mistaken for "no sales".
    - The window date uses an explicit timezone (`Europe/Paris` in the example) on both the cron
      and the date math; change both to your business timezone. Odoo stores `date_order` in UTC,
      so for a strict local-day boundary convert the bounds to UTC; the example uses local-day
      string bounds, which is correct when the Odoo server and the business share a timezone.
    - The empty-day case posts a distinct "No confirmed orders for this day" digest rather than
      a misleading zero.

    ## Prerequisites
    - A reachable Odoo instance with XML-RPC enabled and the Sales app installed.
    - An Odoo user that can read `sale.order` records.
    - A Slack incoming webhook URL for the channel that should receive the digest.

    ## Secrets
    - `ODOO_URL`: Base URL of the Odoo instance, including scheme and port (for example `https://erp.example.com`).
    - `ODOO_DB`: Odoo database name to connect to.
    - `ODOO_USERNAME`: Odoo login used for XML-RPC authentication.
    - `ODOO_PASSWORD`: Password for that Odoo user.
    - `SLACK_WEBHOOK`: Slack incoming webhook URL used to post the digest and any failure alert.

    ## Quick start
    1. Add the five secrets above to your namespace or tenant.
    2. Create a Slack incoming webhook and store its URL in `SLACK_WEBHOOK`.
    3. Set the `timezone` on the trigger and in `vars.window_date` to your business timezone.
    4. Run the flow manually to test, then let the `Schedule` trigger run it each morning. To
       regenerate a past day's digest, start a backfill from the Triggers tab.

    ## Expected outputs
    - `{{ outputs.query_orders.uri }}`: ION file with the day's sales orders in internal storage.
    - `{{ outputs.query_orders.size }}`: number of sales orders returned by Odoo.
    - `{{ outputs.to_jsonl.uri }}`: the JSONL file passed to the Python task.
    - `{{ outputs.build_digest.vars.order_count }}`: number of orders in the digest.
    - `{{ outputs.build_digest.vars.payload }}`: the JSON-safe Slack payload that was posted.

    ## Scale notes
    - The `SEARCH_READ` caps at `limit: 100000` rows per run, and the Python image is pinned to a
      concrete tag with a pinned pandas version for reproducible runs. For very high order volumes,
      push the aggregation into Odoo with `read_group` instead of fetching every row.

    ## Links
    - Odoo plugin: https://kestra.io/plugins/plugin-odoo
    - Slack plugin: https://kestra.io/plugins/plugin-slack/io.kestra.plugin.slack.notifications.slackincomingwebhook
    - Python script task: https://kestra.io/plugins/plugin-script-python/io.kestra.plugin.scripts.python.script
    - Odoo external API (XML-RPC): https://www.odoo.com/documentation/master/developer/reference/external_api.html
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: Scheduled Kestra flow that summarizes the previous day's Odoo sales orders per currency and posts a JSON-safe Slack digest, with retry and alerting.
