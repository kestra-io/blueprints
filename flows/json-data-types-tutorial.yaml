extend:
  title: "Learn JSON Data Types — Interactive Tutorial"
  metaTitle: "Learn JSON Data Types in Kestra"
  shortDescription: >-
    A hands-on tutorial that teaches JSON fundamentals through a series of
    Kestra tasks. Each task introduces a core data type and shows how to
    reference outputs across tasks using Pebble expressions.
  description: |
    **Walk through every JSON data type by executing real tasks in Kestra and referencing their outputs with Pebble expressions.**

    1. A `io.kestra.plugin.scripts.python.Script` task creates a key/value pair, the fundamental building block of JSON
    2. Subsequent tasks produce each core data type: string, number, boolean, null, array, and object
    3. An expressions task demonstrates how to pull values from earlier task outputs using `{{ outputs.task_id.vars.key }}`
    4. A final exam task assembles a complete JSON object by referencing every previous task

    Ideal for:
    - **Beginners** who want to understand JSON structure before building data pipelines
    - **Automation engineers** learning how Kestra passes data between tasks with Pebble templating
  tags:
    - Getting Started
    - Core
    - Python
  ee: false
  demo: true
  metaDescription: >-
    Interactive Kestra tutorial that teaches JSON data types (string, number,
    boolean, null, array, object) through sequential tasks with Pebble expressions.

id: json-data-types-tutorial
namespace: company.team
tasks:
  - id: key_value
    type: io.kestra.plugin.scripts.python.Script
    description: "The basic building block of JSON: a key paired with a value."
    script: |
      from kestra import Kestra

      Kestra.outputs({
          "key": "value",
          "another_key": "another_value"
      })

  - id: string_type
    type: io.kestra.plugin.scripts.python.Script
    description: "A string is text, always enclosed in double quotes in JSON."
    script: |
      from kestra import Kestra

      Kestra.outputs({
          "json_example_string": "This is a simple string. In JSON, it is always enclosed in double quotes."
      })

  - id: number_type
    type: io.kestra.plugin.scripts.python.Script
    description: "Numbers can be integers or decimals. They are never quoted."
    script: |
      from kestra import Kestra

      Kestra.outputs({
          "json_example_integer": 10,
          "json_example_float": 12.5
      })

  - id: boolean_type
    type: io.kestra.plugin.scripts.python.Script
    description: "A boolean is either true or false — like a light switch."
    script: |
      from kestra import Kestra

      Kestra.outputs({
          "json_example_boolean": False
      })

  - id: null_type
    type: io.kestra.plugin.scripts.python.Script
    description: "Null represents the absence of a value — intentional emptiness."
    script: |
      from kestra import Kestra

      Kestra.outputs({
          "json_example_null": None
      })

  - id: array_type
    type: io.kestra.plugin.scripts.python.Script
    description: "An array is an ordered list of items enclosed in square brackets."
    script: |
      import json
      from kestra import Kestra

      example_array = ["first element", 2, False, None]

      Kestra.outputs({
          "json_example_array": json.dumps(example_array)
      })

  - id: object_type
    type: io.kestra.plugin.scripts.python.Script
    description: "An object is a collection of key/value pairs enclosed in curly braces."
    script: |
      import json
      from kestra import Kestra

      example_object = {
          "key": "value",
          "array": [1, 2, 3],
          "boolean": False,
          "integer": 123,
          "sub_object": {"sub_key": "Find me!"}
      }

      Kestra.outputs({
          "json_example_object": json.dumps(example_object)
      })

  - id: using_expressions
    type: io.kestra.plugin.scripts.python.Script
    description: "Demonstrates referencing outputs from previous tasks using Pebble expressions."
    script: |
      import json
      from kestra import Kestra

      # Reference outputs from earlier tasks
      integer_val = {{ outputs.number_type.vars.json_example_integer }}
      obj = json.loads('{{ outputs.object_type.vars.json_example_object }}')

      Kestra.outputs({
          "message": f"Hello, the number from the tutorial is: {integer_val}",
          "sub_key": obj["sub_object"]["sub_key"],
          "array_second_item": obj["array"][1]
      })

  - id: final_exam
    type: io.kestra.plugin.scripts.python.Script
    description: "Assembles a complete JSON object by referencing every data type from earlier tasks."
    script: |
      import json
      from kestra import Kestra

      summary = {
          "summary_string": "{{ outputs.string_type.vars.json_example_string }}",
          "summary_number": {{ outputs.number_type.vars.json_example_integer }},
          "summary_boolean": {{ outputs.boolean_type.vars.json_example_boolean }},
          "summary_null": None,
          "summary_array": json.loads('{{ outputs.array_type.vars.json_example_array }}'),
          "summary_object": json.loads('{{ outputs.object_type.vars.json_example_object }}')
      }

      Kestra.outputs(summary)
