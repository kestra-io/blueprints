id: kvm-provision-vm
namespace: company.infra

inputs:
  - id: vm_name
    type: STRING
    defaults: kestra-worker-01
    description: >
      Libvirt domain name to define and boot. Rendered directly into the domain
      XML, so it is constrained by a regex validator. Treat as a trusted,
      operator-supplied value, not free web input.
    validator: ^[a-z0-9][a-z0-9-]{0,62}$

  - id: memory_mib
    type: INT
    defaults: 2048
    description: Memory allocated to the VM in MiB.

  - id: vcpus
    type: INT
    defaults: 2
    description: Number of virtual CPUs.

  - id: base_volume
    type: STRING
    defaults: ubuntu-22.04-base.qcow2
    description: >
      Name of the read-only golden-image qcow2 in the default pool. The flow
      clones this into a fresh per-VM boot disk so provisioning is repeatable.

  - id: os_volume
    type: STRING
    defaults: kestra-worker-01-os.qcow2
    description: >
      Name of the per-VM boot disk to create in the default pool by cloning
      base_volume. Rendered into the domain XML; constrained by a regex validator.
    validator: ^[a-z0-9][a-z0-9._-]{0,127}$

  - id: disk_size_gb
    type: INT
    defaults: 20
    description: Size of the cloned boot disk in GiB.

variables:
  libvirt_uri: "{{ secret('LIBVIRT_URI') }}"

pluginDefaults:
  - type: io.kestra.plugin.kvm
    values:
      uri: "{{ vars.libvirt_uri }}"

concurrency:
  limit: 1

tasks:
  - id: clone_boot_disk
    type: io.kestra.plugin.scripts.shell.Commands
    description: >
      Create the per-VM boot disk by cloning the golden base image, so the flow
      provisions a real disk instead of assuming one was staged by hand.
    # Script tasks default to the Docker runner. This one needs host-side libvirt
    # tooling (qemu-img/virsh against the local hypervisor), so it uses the Process
    # runner to execute on the host. Remove this block to run in Docker, or switch
    # the type to Kubernetes/Docker if your hypervisor tooling lives in a container.
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 3
    env:
      LIBVIRT_DEFAULT_URI: "{{ vars.libvirt_uri }}"
      BASE_VOLUME: "{{ inputs.base_volume }}"
      OS_VOLUME: "{{ inputs.os_volume }}"
      DISK_SIZE_GB: "{{ inputs.disk_size_gb }}"
    commands:
      - set -euo pipefail
      - echo "Cloning ${BASE_VOLUME} into ${OS_VOLUME} in the default pool"
      - |
        if virsh vol-info --pool default "${OS_VOLUME}" >/dev/null 2>&1; then
          echo "Volume ${OS_VOLUME} already exists; reusing it (clone is idempotent by name)"
        else
          virsh vol-clone --pool default "${BASE_VOLUME}" "${OS_VOLUME}"
          virsh vol-resize --pool default "${OS_VOLUME}" "${DISK_SIZE_GB}G"
        fi
      - virsh vol-info --pool default "${OS_VOLUME}"

  - id: create_vm
    type: io.kestra.plugin.kvm.CreateVm
    description: >
      Define the libvirt domain from the rendered XML and boot it. CreateVm is
      idempotent by name: re-running keeps the definition in sync and the boot
      is a no-op if the domain is already running.
    name: "{{ inputs.vm_name }}"
    startAfterCreate: true
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 3
    xmlDefinition: |
      <domain type='kvm'>
        <name>{{ inputs.vm_name }}</name>
        <memory unit='MiB'>{{ inputs.memory_mib }}</memory>
        <vcpu placement='static'>{{ inputs.vcpus }}</vcpu>
        <os>
          <type arch='x86_64' machine='pc-q35-6.2'>hvm</type>
          <boot dev='hd'/>
        </os>
        <devices>
          <disk type='volume' device='disk'>
            <driver name='qemu' type='qcow2'/>
            <source pool='default' volume='{{ inputs.os_volume }}'/>
            <target dev='vda' bus='virtio'/>
          </disk>
          <interface type='network'>
            <source network='default'/>
            <model type='virtio'/>
          </interface>
        </devices>
      </domain>

  - id: wait_for_running
    type: io.kestra.plugin.kvm.StartVm
    description: >
      Confirm the freshly defined domain reaches RUNNING before notifying.
      RUNNING means libvirt has started the domain; it does not guarantee the
      guest OS has finished booting or is reachable over the network.
    name: "{{ inputs.vm_name }}"
    waitForRunning: true
    timeToWait: PT2M
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 3

  - id: notify_provisioned
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Post a Slack message announcing the domain reached RUNNING.
    url: "{{ secret('SLACK_WEBHOOK') }}"
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    payload: |
      {
        "blocks": [
          {
            "type": "header",
            "text": {
              "type": "plain_text",
              "text": "VM reached RUNNING: {{ outputs.create_vm.name }}"
            }
          },
          {
            "type": "section",
            "fields": [
              {
                "type": "mrkdwn",
                "text": "*UUID:*\n{{ outputs.create_vm.uuid }}"
              },
              {
                "type": "mrkdwn",
                "text": "*State:*\n{{ outputs.wait_for_running.state }}"
              },
              {
                "type": "mrkdwn",
                "text": "*vCPUs:*\n{{ inputs.vcpus }}"
              },
              {
                "type": "mrkdwn",
                "text": "*Memory (MiB):*\n{{ inputs.memory_mib }}"
              }
            ]
          },
          {
            "type": "context",
            "elements": [
              {
                "type": "mrkdwn",
                "text": "Boot disk {{ inputs.os_volume }} cloned from {{ inputs.base_volume }} | execution {{ execution.id }}"
              }
            ]
          }
        ]
      }

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Alert operators when provisioning fails so they learn about failures, not only successes.
    url: "{{ secret('SLACK_WEBHOOK') }}"
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed provisioning {{ inputs.vm_name }} (execution {{ execution.id }})."

extend:
  shortDescription: Clone a golden qcow2 image, define and boot a libvirt KVM domain, wait for RUNNING, and announce it in Slack with retries.
  title: Provision a KVM virtual machine on demand
  metaTitle: Provision a KVM VM with libvirt and Kestra
  description: |
    Provision a KVM virtual machine on demand with libvirt, without hand-running `virsh`
    over SSH or maintaining brittle shell scripts. This flow clones a read-only golden
    qcow2 image into a fresh per-VM boot disk, renders a libvirt domain XML template from
    your inputs, defines the domain on the target hypervisor, boots it, blocks until
    libvirt reports RUNNING, and posts the VM details to Slack. It solves the repeatable
    KVM provisioning problem: turning ad hoc, manual hypervisor steps into a versioned,
    retry-safe, idempotent workflow you can trigger by hand, on a schedule, or from an API.

    ## How it works
    1. `clone_boot_disk` (`io.kestra.plugin.scripts.shell.Commands` on the
       `io.kestra.plugin.core.runner.Process` runner) runs `virsh vol-clone` to create the
       per-VM boot disk from the golden `base_volume`, then `virsh vol-resize` to grow it
       to `disk_size_gb`. It is idempotent: if the target volume already exists it is reused.
    2. `create_vm` (`io.kestra.plugin.kvm.CreateVm` with `startAfterCreate: true`) defines
       the domain from the rendered `xmlDefinition` and boots it. It is idempotent by name,
       so re-running keeps the definition in sync and the boot is a no-op if already running.
    3. `wait_for_running` (`io.kestra.plugin.kvm.StartVm` with `waitForRunning: true` and
       `timeToWait: PT2M`) blocks until the domain reaches RUNNING.
    4. `notify_provisioned` (`io.kestra.plugin.slack.notifications.SlackIncomingWebhook`)
       posts a Slack Block Kit message with the VM name, UUID, state, and resources.

    A flow-level `errors` block (`alert_failure`) posts a Slack alert on failure, every
    remote task carries a `retry`, the libvirt `uri` is shared via `pluginDefaults`, and
    `concurrency.limit: 1` stops two runs from racing on the same domain name.

    ## What you get
    - Repeatable, idempotent KVM provisioning from a single declarative YAML file.
    - Automatic boot-disk cloning and resizing from a golden image.
    - A blocking wait until the domain is RUNNING before downstream steps proceed.
    - Slack notifications on both success and failure, with retries on every call.

    ## Who it's for
    - Platform and infrastructure engineers running on-prem or self-hosted KVM hosts.
    - Homelab and bare-metal operators who provision VMs with libvirt and qcow2 images.
    - Teams who want self-service VM provisioning without exposing raw hypervisor access.

    ## Why orchestrate this with Kestra
    libvirt has no native scheduler, no retry logic, and no notification layer: it just
    executes `virsh` commands when you run them. Kestra fills that gap. You get event and
    schedule triggers (run on a cron, or from an API/webhook call), automatic `retry` on
    transient SSH or hypervisor hiccups, full execution lineage and logs for every provision,
    and a declarative YAML definition you can version and review. Cross-tool steps like the
    Slack notification and the failure `errors` handler live in the same flow instead of in
    a separate cron job.

    ## Prerequisites
    - A reachable libvirt/KVM host. The URI looks like `qemu+ssh://root@your-host/system`
      for remote SSH or `qemu:///system` for a local hypervisor.
    - A golden-image qcow2 named in `base_volume` present in the libvirt `default` pool.
    - A `default` libvirt virtual network for the VM NIC.
    - A Kestra worker able to run `virsh` against the host (the Process runner uses the
      worker's `virsh` and `LIBVIRT_DEFAULT_URI`).

    ### Secrets
    - `LIBVIRT_URI`: the full libvirt connection URI used by every KVM task and the clone
      step (for example `qemu+ssh://root@10.0.0.10/system`).
    - `SLACK_WEBHOOK`: the Slack Incoming Webhook URL used by the success and failure alerts.

    ## Quick start
    1. Add the `LIBVIRT_URI` and `SLACK_WEBHOOK` secrets to your Kestra instance.
    2. Ensure the golden image named in `base_volume` exists in the `default` pool.
    3. Execute the flow, adjusting `vm_name`, `memory_mib`, `vcpus`, `os_volume`, and
       `disk_size_gb` as needed.

    ## How to extend
    - Add a post-boot SSH or ping check before notifying, since RUNNING means libvirt
      started the domain, not that the guest OS or cloud-init has finished.
    - Attach a cloud-init seed disk to the domain XML for first-boot configuration.
    - Add a `Schedule` trigger to provision burst capacity, or a webhook trigger for
      self-service requests.
    - Customize the domain XML for extra NICs, virtio devices, or larger CPU topologies.

    ## Links
    - KVM plugin: https://kestra.io/plugins/plugin-kvm
    - Slack plugin: https://kestra.io/plugins/plugin-slack
    - libvirt domain XML format: https://libvirt.org/formatdomain.html
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Clone a golden image, define and boot a libvirt KVM domain, wait for RUNNING, and alert Slack, with retries and idempotency in Kestra.
