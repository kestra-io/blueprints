id: argocd-event-driven-sync
namespace: company.team
description: |
  Sync an Argo CD application the moment CI finishes. A webhook from the CI
  pipeline fires the flow, which triggers an Argo CD sync, verifies the
  application is healthy, and reports the result to Slack.

inputs:
  - id: application
    type: STRING
    defaults: my-argocd-app
    description: Argo CD application to sync.

tasks:
  - id: sync
    type: io.kestra.plugin.argocd.apps.Sync
    description: Trigger an Argo CD sync, pruning out-of-band resources.
    application: "{{ inputs.application }}"
    prune: true
    revision: HEAD

  - id: status
    type: io.kestra.plugin.argocd.apps.Status
    description: Confirm the application is healthy after the sync.
    application: "{{ inputs.application }}"

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Report the sync result to Slack.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Argo CD synced {{ inputs.application }} after CI completion."
      }

pluginDefaults:
  - type: io.kestra.plugin.argocd.apps.Sync
    values:
      server: "{{ secret('ARGOCD_SERVER') }}"
      token: "{{ secret('ARGOCD_TOKEN') }}"
  - type: io.kestra.plugin.argocd.apps.Status
    values:
      server: "{{ secret('ARGOCD_SERVER') }}"
      token: "{{ secret('ARGOCD_TOKEN') }}"

triggers:
  - id: on_ci_complete
    type: io.kestra.plugin.core.trigger.Webhook
    description: CI posts here when a build completes to drive the sync.
    key: "{{ secret('ARGOCD_SYNC_WEBHOOK_KEY') }}"

extend:
  shortDescription: A CI-completion webhook triggers an Argo CD sync, verifies health, and reports to Slack.
  title: Event-Driven Argo CD Sync on CI Completion
  metaTitle: Event-Driven Argo CD Sync on CI Completion
  description: |
    This blueprint connects CI to GitOps delivery. When the CI pipeline finishes
    it calls the webhook; the flow triggers an Argo CD sync with prune, confirms
    the application reports healthy, and posts the result to Slack. Deployments
    follow successful builds without manual steps.

    Prerequisites:
      - Secrets:
        - ARGOCD_SERVER, ARGOCD_TOKEN: Argo CD endpoint and API token.
        - ARGOCD_SYNC_WEBHOOK_KEY: key guarding the webhook trigger.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - An existing Argo CD application.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Configure your CI to POST to the webhook on success.
      3. Pass the application name to sync.

    Outputs:
      - outputs.sync: the Argo CD sync result.
      - outputs.status: the post-sync health payload.

    Notes:
      - prune removes resources no longer defined in Git; disable it for additive-only syncs.
      - Pair with the staged-promotion blueprint when production needs an approval gate.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: A CI-completion webhook triggers an Argo CD sync, verifies the application is healthy, and reports to Slack.
