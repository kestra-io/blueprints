id: gitlab-ci-trigger-on-event
namespace: company.team
description: |
  Trigger a GitLab CI pipeline from an upstream event and wait for it. A webhook
  fires the flow, Kestra POSTs to the GitLab pipeline trigger endpoint over the
  REST API, polls pipeline status until terminal, and reports the result to
  Slack. CI runs on the event, not only on a Git push.

inputs:
  - id: gitlab_url
    type: STRING
    defaults: https://gitlab.com
    description: Base URL of the GitLab instance (change for self-hosted).
  - id: project_id
    type: STRING
    description: GitLab project ID that owns the pipeline.
  - id: ref
    type: STRING
    defaults: main
    description: Branch or tag the pipeline runs on.

tasks:
  - id: trigger_pipeline
    type: io.kestra.plugin.core.http.Request
    description: Start a GitLab CI pipeline via the pipeline trigger token.
    uri: "{{ inputs.gitlab_url }}/api/v4/projects/{{ inputs.project_id }}/trigger/pipeline"
    method: POST
    contentType: multipart/form-data
    formData:
      token: "{{ secret('GITLAB_TRIGGER_TOKEN') }}"
      ref: "{{ inputs.ref }}"

  - id: wait_for_pipeline
    type: io.kestra.plugin.core.flow.Sequential
    description: Poll the GitLab pipeline every 15 seconds until it reaches a terminal status.
    retry:
      type: constant
      interval: PT15S
      maxAttempt: 80
    tasks:
      - id: check_pipeline
        type: io.kestra.plugin.core.http.Request
        uri: "{{ inputs.gitlab_url }}/api/v4/projects/{{ inputs.project_id }}/pipelines/{{ outputs.trigger_pipeline.body.id }}"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ secret('GITLAB_TOKEN') }}"
      - id: assert_terminal
        type: io.kestra.plugin.core.execution.Assert
        description: Re-runs the polling block until GitLab reports the pipeline finished.
        conditions:
          - "{{ (outputs.check_pipeline.body.finished_at ?? '') != '' }}"

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Report the final pipeline status to Slack.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "GitLab pipeline {{ outputs.trigger_pipeline.body.id }} on {{ inputs.ref }} finished with status {{ outputs.check_pipeline.body.status }} (execution {{ execution.id }})."
      }

triggers:
  - id: on_event
    type: io.kestra.plugin.core.trigger.Webhook
    description: An upstream system posts here to start the pipeline.
    key: "{{ secret('GITLAB_CI_WEBHOOK_KEY') }}"

errors:
  - id: alert_on_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Alert Slack if the trigger or polling fails.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "GitLab CI trigger flow failed for project {{ inputs.project_id }} (execution {{ execution.id }})."
      }

extend:
  shortDescription: A webhook triggers a GitLab CI pipeline over REST, polls until terminal, and reports the result to Slack.
  title: Trigger and Poll a GitLab CI Pipeline on an Upstream Event
  metaTitle: Trigger GitLab CI on an Upstream Event
  description: |
    This blueprint fires a GitLab CI pipeline from an upstream event rather than
    only on a Git push. A webhook starts the flow, Kestra POSTs to the GitLab
    pipeline trigger endpoint over the REST API, polls pipeline status every 15
    seconds until it reaches a terminal state, then reports the result to Slack.

    Why REST instead of a plugin task: the Kestra GitLab plugin covers issues
    and merge requests; GitLab CI pipelines are driven over the REST API with
    core.http.Request, the same pattern used for any CI system that exposes a
    trigger endpoint.

    Prerequisites:
      - Secrets:
        - GITLAB_TRIGGER_TOKEN: a GitLab pipeline trigger token (Settings, CI/CD, Pipeline trigger tokens).
        - GITLAB_TOKEN: a personal or project access token with api scope, used to read pipeline status.
        - GITLAB_CI_WEBHOOK_KEY: key guarding the Kestra webhook trigger.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - A GitLab project with a .gitlab-ci.yml pipeline.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Pass the project_id and the ref to run.
      3. POST to the webhook URL to trigger the pipeline; watch Slack for the result.

    Outputs:
      - outputs.trigger_pipeline.body.id: the created pipeline ID.
      - outputs.wait_for_pipeline: the polling block result, including the final pipeline status.

    Notes:
      - Polling uses a constant 15s interval and up to 80 attempts (20-minute ceiling); tune the retry block for longer pipelines.
      - The Assert re-runs the polling block until the pipeline status is terminal (success, failed, canceled, skipped, manual).
      - For self-hosted GitLab, set gitlab_url to your instance; the trigger and status endpoints are the same.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: A webhook triggers a GitLab CI pipeline over REST, polls until terminal, and reports the final status to Slack.
