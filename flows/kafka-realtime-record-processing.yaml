id: kafka-realtime-record-processing
namespace: company.team
description: |
  Start one execution per Kafka record and react in real time. The realtime
  trigger consumes each message as it arrives, the flow branches on the
  payload, and anomalies alert Slack while normal records are logged. No
  consumer service to run; the trigger is the consumer.

tasks:
  - id: route_record
    type: io.kestra.plugin.core.flow.If
    description: Branch on the record status carried in the message value.
    condition: "{{ (trigger.value | jq('.status') | first) == 'FAILED' }}"
    then:
      - id: alert_anomaly
        type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
        description: Page the channel for a failed record.
        url: "{{ secret('SLACK_WEBHOOK_URL') }}"
        payload: |
          {
            "text": "Kafka record flagged FAILED on topic {{ trigger.topic }} at offset {{ trigger.offset }} (execution {{ execution.id }})."
          }
    else:
      - id: log_record
        type: io.kestra.plugin.core.log.Log
        description: Record processed normally.
        message: "Processed Kafka record on {{ trigger.topic }} partition {{ trigger.partition }} offset {{ trigger.offset }}."

triggers:
  - id: on_record
    type: io.kestra.plugin.kafka.RealtimeTrigger
    description: Consume each Kafka record as it arrives and start one execution per message. Enable once your broker and topic are set.
    topic: transactions
    properties:
      bootstrap.servers: "{{ secret('KAFKA_BOOTSTRAP_SERVERS') }}"
    groupId: kestra-realtime-processor
    valueDeserializer: JSON
    disabled: true

extend:
  shortDescription: A realtime Kafka trigger starts one execution per record, branches on the payload, and alerts Slack on anomalies.
  title: Real-Time Kafka Record Processing with Per-Record Executions
  metaTitle: Real-Time Kafka Record Processing
  description: |
    This blueprint turns a Kafka topic into per-record workflow executions. The
    RealtimeTrigger consumes each message as it arrives and starts one execution
    per record, the flow branches on the payload, and a failed record alerts
    Slack while normal records are logged. There is no standalone consumer
    service to deploy and operate; the trigger is the consumer, with offsets and
    per-record execution history handled by Kestra.

    Prerequisites:
      - Secrets:
        - KAFKA_BOOTSTRAP_SERVERS: Kafka bootstrap servers, e.g. broker1:9092,broker2:9092
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - A Kafka topic (transactions) producing JSON messages with a status field.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Point the trigger topic at your stream and set the groupId.
      3. Adjust the If condition and jq expression to your message shape.

    Outputs:
      - trigger.value: the consumed message value (JSON).
      - trigger.topic, trigger.partition, trigger.offset: record coordinates.

    Notes:
      - Offsets commit after the execution succeeds (auto-commit disabled), so a failed run replays the record.
      - For queue-style competing consumers, set groupType SHARE on the trigger and acknowledge with acknowledgeType.
      - For high-throughput streams where per-record executions are too granular, use the batch Kafka Trigger for grouped micro-batches.
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: A realtime Kafka trigger starts one execution per record, branches on the payload, and alerts Slack on anomalies. No consumer service to run.
