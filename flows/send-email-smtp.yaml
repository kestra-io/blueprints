extend:
  title: Send an Email via SMTP
  metaTitle: Send an Email via SMTP
  shortDescription: >-
    Send a single email message through an SMTP server using the MailSend
    plugin. A minimal starting point for any email-based workflow.
  description: |
    **Send a basic email through SMTP with a single task -- the simplest possible email workflow.**

    1. A `io.kestra.plugin.email.MailSend` task connects to your SMTP server and delivers an email with the subject, recipient, and HTML body you specify

    Ideal for:
    - **Beginners** learning how Kestra sends email and looking for a quick-start example
    - **DevOps engineers** who need a lightweight alert or notification step inside a larger pipeline
    - **Anyone** building workflows that require outbound email and want a tested starting point
  tags:
    - Email
    - Getting Started
  ee: false
  demo: false
  metaDescription: >-
    Send an email through SMTP using the Kestra MailSend plugin. A single-task
    blueprint ideal for getting started with email notifications.

id: send-email-smtp
namespace: company.team

tasks:
  - id: send_email
    type: io.kestra.plugin.email.MailSend
    host: "{{ secret('SMTP_HOST') }}"
    port: 587
    username: "{{ secret('SMTP_USER') }}"
    password: "{{ secret('SMTP_PASSWORD') }}"
    from: "{{ secret('EMAIL_FROM') }}"
    to: "{{ secret('EMAIL_TO') }}"
    subject: "Hello from Kestra"
    htmlTextContent: |
      <h2>Test Email</h2>
      <p>This message was sent by a Kestra workflow to verify that SMTP
      delivery is configured correctly.</p>
