id: send-email-smtp
namespace: company.team

tasks:
  - id: send_email
    type: io.kestra.plugin.email.MailSend
    host: "{{ secret('SMTP_HOST') }}"
    port: 587
    username: "{{ secret('SMTP_USER') }}"
    password: "{{ secret('SMTP_PASSWORD') }}"
    from: "{{ secret('EMAIL_FROM') }}"
    to: "{{ secret('EMAIL_TO') }}"
    subject: "Hello from Kestra"
    htmlTextContent: |
      <h2>Test Email</h2>
      <p>This message was sent by a Kestra workflow to verify that SMTP
      delivery is configured correctly.</p>

extend:
  title: "Send an Email via SMTP Using the Kestra MailSend Plugin"
  metaTitle: "SMTP Email Alerts with Kestra — MailSend Plugin Quickstart"
  shortDescription: >-
    Send a single email message through an SMTP server using the Kestra MailSend
    plugin. A minimal starting point for any email-based workflow or alert system.
  description: |
    **Send a transactional or notification email through any SMTP server with a single Kestra task — the simplest possible starting point for email-driven workflows.**

    1. A `io.kestra.plugin.email.MailSend` task authenticates with your SMTP server on port 587 (STARTTLS) and delivers an HTML email to the configured recipient with the subject and body you specify

    The `MailSend` plugin supports HTML content, plain-text fallback, CC/BCC recipients, and file attachments — making this minimal blueprint a foundation you can extend:
    - Add `attachments` to send generated reports or CSV exports as email attachments
    - Replace the hardcoded `subject` and `htmlTextContent` with dynamic values from upstream task outputs
    - Wrap this task inside a `io.kestra.plugin.core.flow.If` condition to send alerts only when a threshold is breached
    - Chain it after a data processing task to distribute nightly reports to a distribution list via `to` array

    Ideal for:
    - **DevOps and platform engineers** who need a reliable SMTP alert step at the end of a pipeline (failed builds, SLA breaches, infrastructure events)
    - **Data teams** distributing scheduled reports (CSV exports, PDF summaries) to stakeholders via email
    - **Developers** validating SMTP credentials and email delivery as a first integration step before building more complex notification logic
    - **Anyone** adding outbound email to an existing Kestra flow without introducing a third-party email SaaS
  tags:
    - Core
    - Getting Started
  ee: false
  demo: false
  metaDescription: >-
    Send HTML emails via SMTP in Kestra using the MailSend plugin. A single-task
    quickstart for pipeline alerts, report delivery, and notification workflows.

