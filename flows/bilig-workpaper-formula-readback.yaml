id: bilig-workpaper-formula-readback
namespace: company.team
description: Calculate quote fields with Bilig WorkPaper formulas and persist a verified readback proof file.

inputs:
  - id: previous_quantity
    type: INT
    defaults: 12
    description: Existing quantity used to prove before and after formula readback.
  - id: quantity
    type: INT
    defaults: 18
    description: New quote quantity written into Inputs!B2.
  - id: unit_price
    type: FLOAT
    defaults: 125
    description: Unit price used by the quote formulas.
  - id: discount_rate
    type: FLOAT
    defaults: 0.1
    description: Discount rate used by the quote formulas.
  - id: tax_rate
    type: FLOAT
    defaults: 0.08
    description: Tax rate used by the quote formulas.
  - id: unit_cost
    type: FLOAT
    defaults: 52
    description: Unit cost used by the margin formula.

tasks:
  - id: calculate_quote
    type: io.kestra.plugin.scripts.node.Script
    description: Writes one WorkPaper input, recalculates dependent formulas, restores serialized JSON, and writes a proof file.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: node:24-slim
    inputFiles:
      package.json: |
        {
          "name": "bilig-kestra-workpaper-proof",
          "private": true,
          "type": "module",
          "dependencies": {
            "@bilig/workpaper": "0.154.0"
          }
        }
    beforeCommands:
      - npm install
    outputFiles:
      - workpaper-proof.json
    script: |
      import { writeFile } from 'node:fs/promises';
      import {
        WorkPaper,
        createWorkPaperFromDocument,
        exportWorkPaperDocument,
        parseWorkPaperDocument,
        serializeWorkPaperDocument,
      } from '@bilig/workpaper';

      const input = {
        previousQuantity: readKestraNumber({{ inputs.previous_quantity }}, 12, 'previous quantity'),
        quantity: readKestraNumber({{ inputs.quantity }}, 18, 'quantity'),
        unitPrice: readKestraNumber({{ inputs.unit_price }}, 125, 'unit price'),
        discountRate: readKestraNumber({{ inputs.discount_rate }}, 0.1, 'discount rate'),
        taxRate: readKestraNumber({{ inputs.tax_rate }}, 0.08, 'tax rate'),
        unitCost: readKestraNumber({{ inputs.unit_cost }}, 52, 'unit cost'),
      };

      const workbook = WorkPaper.buildFromSheets({
        Inputs: [
          ['Field', 'Value'],
          ['Quantity', input.previousQuantity],
          ['Unit price', input.unitPrice],
          ['Discount rate', input.discountRate],
          ['Tax rate', input.taxRate],
          ['Unit cost', input.unitCost],
        ],
        Summary: [
          ['Field', 'Value'],
          ['Subtotal', '=Inputs!B2*Inputs!B3'],
          ['Discount amount', '=B2*Inputs!B4'],
          ['Taxable amount', '=B2-B3'],
          ['Tax amount', '=B4*Inputs!B5'],
          ['Total', '=B4+B5'],
          ['Margin amount', '=B4-(Inputs!B2*Inputs!B6)'],
        ],
      });

      try {
        const inputsSheet = requireSheet(workbook, 'Inputs');
        const summarySheet = requireSheet(workbook, 'Summary');
        const before = readSummary(workbook, summarySheet);

        workbook.setCellContents({ sheet: inputsSheet, row: 1, col: 1 }, input.quantity);
        const after = readSummary(workbook, summarySheet);

        const document = exportWorkPaperDocument(workbook, { includeConfig: true });
        const serialized = serializeWorkPaperDocument(document);
        const restored = createWorkPaperFromDocument(parseWorkPaperDocument(serialized));

        try {
          const afterRestore = readSummary(restored, requireSheet(restored, 'Summary'));
          const verified = JSON.stringify(after) === JSON.stringify(afterRestore) && serialized.length > 0;
          const result = {
            patch: {
              subtotal: after.subtotal,
              discount_amount: after.discountAmount,
              taxable_amount: after.taxableAmount,
              tax_amount: after.taxAmount,
              total: after.total,
              margin_amount: after.marginAmount,
            },
            proof: {
              editedCell: 'Inputs!B2',
              before,
              after,
              afterRestore,
              persistedDocumentBytes: new TextEncoder().encode(serialized).byteLength,
              outputFile: 'workpaper-proof.json',
              verified,
            },
            limitations: [
              'This Blueprint proves a formula-backed Kestra Node task boundary, not desktop Excel compatibility.',
              'Keep Excel, LibreOffice, Microsoft Graph, or another oracle in the loop for macros, pivots, charts, external links, and exact spreadsheet UI behavior.',
            ],
          };

          await writeFile('workpaper-proof.json', `${JSON.stringify(result, null, 2)}\n`, 'utf8');
          console.log(JSON.stringify(result, null, 2));

          if (!verified) {
            throw new Error(`WorkPaper verification failed: ${JSON.stringify(result.proof)}`);
          }
        } finally {
          restored.dispose();
        }
      } finally {
        workbook.dispose();
      }

      function readKestraNumber(rawValue, fallback, label) {
        const value = rawValue === undefined || rawValue === null ? fallback : Number(rawValue);
        if (!Number.isFinite(value)) {
          throw new Error(`${label} must be a finite number`);
        }
        return value;
      }

      function requireSheet(workbook, sheetName) {
        const sheetId = workbook.getSheetId(sheetName);
        if (sheetId === undefined) {
          throw new Error(`Missing ${sheetName} sheet`);
        }
        return sheetId;
      }

      function readSummary(workbook, summarySheet) {
        return {
          subtotal: readNumberCell(workbook, summarySheet, 1, 'subtotal'),
          discountAmount: readNumberCell(workbook, summarySheet, 2, 'discount amount'),
          taxableAmount: readNumberCell(workbook, summarySheet, 3, 'taxable amount'),
          taxAmount: readNumberCell(workbook, summarySheet, 4, 'tax amount'),
          total: readNumberCell(workbook, summarySheet, 5, 'total'),
          marginAmount: readNumberCell(workbook, summarySheet, 6, 'margin amount'),
        };
      }

      function readNumberCell(workbook, sheet, row, label) {
        const cell = workbook.getCellValue({ sheet, row, col: 1 });
        const value = typeof cell === 'object' && cell !== null ? Reflect.get(cell, 'value') : cell;
        if (typeof value !== 'number' || !Number.isFinite(value)) {
          throw new Error(`Expected numeric ${label}, got ${JSON.stringify(cell)}`);
        }
        return value;
      }

extend:
  shortDescription: Calculate quote fields with Bilig WorkPaper formulas and keep a verified formula readback proof file.
  title: Calculate quote fields with Bilig WorkPaper formulas
  metaTitle: Bilig WorkPaper formula readback proof in Kestra
  description: |
    Use this Blueprint when a Kestra flow needs spreadsheet-style business logic without opening Excel, LibreOffice, Google Sheets, or a browser grid.

    The flow installs `@bilig/workpaper`, builds a small quote WorkPaper, writes one input cell, recalculates dependent formula cells, serializes WorkPaper JSON, restores it, and writes `workpaper-proof.json` as an output file.

    Prerequisites:
      - A Kestra worker that can run Docker task runners.
      - Network access to npm from the worker.
      - No secrets are required.

    Quick start:
      1. Import the Blueprint and keep the default input values for a first run.
      2. Run the flow once and open the `calculate_quote` task logs.
      3. Confirm the task prints a JSON object with `proof.verified: true`.
      4. Download `workpaper-proof.json` from the task output files if another task or reviewer needs the readback evidence.

    Inputs:
      - `previous_quantity`: existing quote quantity used for before-value proof.
      - `quantity`: new quantity written into `Inputs!B2`.
      - `unit_price`, `discount_rate`, `tax_rate`, `unit_cost`: quote model inputs.

    Expected outputs:
      - `workpaper-proof.json`: output file containing before, after, restored readback, calculated patch fields, and `verified: true`.

    Boundaries:
      - This is a formula-backed workflow proof, not a desktop Excel clone.
      - Keep Excel, LibreOffice, Microsoft Graph, or a domain oracle in the loop for macros, pivots, charts, external links, and exact spreadsheet UI behavior.

    References:
      - Bilig WorkPaper package: https://www.npmjs.com/package/@bilig/workpaper
      - Bilig Kestra example source: https://proompteng.github.io/bilig/kestra-workpaper-flow.html
      - Kestra Node Script task: https://kestra.io/plugins/plugin-script-node/tasks/io.kestra.plugin.scripts.node.script
  tags:
    - Data
  ee: false
  demo: true
  metaDescription: Run Bilig WorkPaper formulas in a Kestra Node task and persist a verified formula readback proof file.
