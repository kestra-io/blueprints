id: github-cross-repo-dispatch
namespace: company.team
description: |
  Roll a workflow out across many repositories at once. Search for the
  repositories that match a topic, then dispatch the same workflow on each one,
  and report how many were triggered to Slack.

inputs:
  - id: search_query
    type: STRING
    defaults: org:my-org topic:kestra-managed
    description: GitHub search query selecting the repositories to target.
  - id: workflow_id
    type: STRING
    defaults: sync.yml
    description: Workflow file or ID to dispatch in each repository.
  - id: ref
    type: STRING
    defaults: main
    description: Branch or tag the workflow runs on.

tasks:
  - id: find_repositories
    type: io.kestra.plugin.github.repositories.Search
    description: Find the repositories that match the search query.
    oauthToken: "{{ secret('GITHUB_TOKEN') }}"
    query: "{{ inputs.search_query }}"
    fetchType: FETCH

  - id: dispatch_each
    type: io.kestra.plugin.core.flow.ForEach
    description: Dispatch the workflow on every matching repository.
    values: "{{ outputs.find_repositories.rows }}"
    concurrencyLimit: 4
    tasks:
      - id: dispatch
        type: io.kestra.plugin.github.actions.RunWorkflow
        description: Dispatch the workflow on one repository.
        oauthToken: "{{ secret('GITHUB_TOKEN') }}"
        repository: "{{ taskrun.value.full_name }}"
        workflowId: "{{ inputs.workflow_id }}"
        ref: "{{ inputs.ref }}"

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Report how many repositories were dispatched.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Dispatched {{ inputs.workflow_id }} across {{ outputs.find_repositories.size }} repositories."
      }

triggers:
  - id: weekly_rollout
    type: io.kestra.plugin.core.trigger.Schedule
    description: Roll the workflow out weekly. Adjust or disable as needed.
    cron: "0 9 * * 1"
    disabled: true

extend:
  shortDescription: Search GitHub repositories by query and dispatch the same workflow on each match, then report to Slack.
  title: Cross-Repo GitHub Actions Workflow Dispatch
  metaTitle: Cross-Repo GitHub Actions Workflow Dispatch
  description: |
    This blueprint fans a workflow out across a fleet of repositories. It searches
    GitHub for repositories matching a query (for example, an org plus a topic),
    iterates over the results, and dispatches the same workflow in each one. Slack
    reports how many repositories were triggered.

    Prerequisites:
      - Secrets:
        - GITHUB_TOKEN: token allowed to search and dispatch workflows in the target repositories.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - A workflow_dispatch-enabled workflow present in each matching repository.

    Quick start:
      1. Set the secrets above in your Kestra namespace.
      2. Tag the repositories you manage with a shared topic and use it in search_query.
      3. Run the flow with the workflow_id and ref to roll out.

    Outputs:
      - outputs.find_repositories.rows: the matched repositories.
      - outputs.dispatch_each: per-repository dispatch results.

    Notes:
      - Each matched repository must contain the workflow and allow workflow_dispatch on the ref.
      - concurrencyLimit caps how many repositories are dispatched in parallel.
  tags:
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Search GitHub repositories by query and dispatch the same workflow on each match, then report to Slack.
