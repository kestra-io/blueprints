id: failure-alert-sentry
namespace: system

tasks:
  - id: send_alert
    type: io.kestra.plugin.sentry.SentryExecution
    executionId: "{{ trigger.executionId }}"
    transaction: /execution/id/{{ trigger.executionId }}
    dsn: "{{ secret('SENTRY_DSN') }}"
    level: ERROR

triggers:
  - id: failed_prod_workflows
    type: io.kestra.plugin.core.trigger.Flow
    conditions:
      - type: io.kestra.plugin.core.condition.ExecutionStatus
        in:
          - FAILED
          - WARNING
      - type: io.kestra.plugin.core.condition.ExecutionNamespace
        namespace: company
        prefix: true

extend:
  shortDescription: Push an alert to Sentry automatically whenever any flow in the company namespace fails or warns.
  title: Send an alert to Sentry when any flow fails in the company namespace
  metaTitle: Sentry failure alerts for Kestra workflows
  description: |
    Get a Sentry issue raised the moment a Kestra workflow fails so on-call engineers triage incidents in the same place they already track application errors. This monitoring flow watches every execution in the `company` namespace and forwards failures and warnings to Sentry, turning silent pipeline breakages into actionable, deduplicated alerts with severity, transaction context, and a direct link back to the failed run.

    ## How it works
    1. A `io.kestra.plugin.core.trigger.Flow` trigger listens for executions across other flows.
    2. Two trigger conditions filter the noise: `io.kestra.plugin.core.condition.ExecutionStatus` fires only on `FAILED` or `WARNING` outcomes, and `io.kestra.plugin.core.condition.ExecutionNamespace` matches any namespace starting with the `company` prefix.
    3. When both conditions match, the `send_alert` task of type `io.kestra.plugin.sentry.SentryExecution` posts an event to Sentry using your project `dsn`, tags it with `level: ERROR`, and sets `transaction` to `/execution/id/{{ trigger.executionId }}` so the issue points straight at the offending execution.

    ## What you get
    - Automatic Sentry issues for every failed or warning execution, no manual reporting.
    - A `transaction` value that links each Sentry event to the exact Kestra execution.
    - Centralized incident visibility next to your existing application errors.
    - Configurable severity through the `level` property (`DEBUG`, `INFO`, `WARNING`, `ERROR`, `FATAL`).

    ## Who it's for
    - Platform and data engineers running production pipelines who need fast failure signals.
    - On-call and SRE teams that already standardize on Sentry for incident management.
    - Teams consolidating workflow observability into one alerting tool.

    ## Why orchestrate this with Kestra
    Sentry captures errors but does not know when your scheduled pipelines break. Kestra closes that gap: the event-driven `Flow` trigger reacts to other executions in real time rather than polling, condition blocks keep alerts scoped and relevant, and the entire monitoring policy lives in declarative, version-controlled YAML. Built-in retries, execution lineage, and the `{{ trigger.executionId }}` context give every alert traceability that a standalone error tracker cannot produce on its own.

    ## Prerequisites
    - A Sentry project with an active DSN.
    - Kestra with the Sentry plugin available.

    ### Secrets
    - `SENTRY_DSN`: the Client Key (DSN) from your Sentry project settings under "Client Keys (DSN)".

    ## Quick start
    1. Store your Sentry DSN as the `SENTRY_DSN` secret.
    2. Adjust the `ExecutionNamespace` prefix to match the namespace you want to monitor.
    3. Add this flow to your instance and let it run on the trigger.
    4. Fail a test flow in the monitored namespace and confirm the issue appears in Sentry.

    ## How to extend
    - Tune `level` per namespace or environment to separate critical failures from warnings.
    - Add more conditions to scope alerts to specific flows, labels, or tags.
    - Chain a Slack or email notification alongside the Sentry event for redundant alerting.
    - Enrich the Sentry payload with custom context about the failing execution.

    ## Links
    - [Sentry plugin documentation](https://kestra.io/plugins/plugin-sentry)
    - [Where to find your DSN](https://docs.sentry.io/product/sentry-basics/concepts/dsn-explainer/#where-to-find-your-dsn)
    - [Sentry event payloads](https://develop.sentry.dev/sdk/event-payloads/)
  tags:
    - Core
    - System
  ee: false
  demo: false
  metaDescription: Automatically raise a Sentry issue whenever any Kestra workflow in the company namespace fails or warns, with severity and a direct link to the failed execution.
