id: ai-document-data-extraction
namespace: company.team

inputs:
  - id: document_url
    type: STRING
    displayName: Document URL
    description: Public URL to a PDF, HTML page, or text document to extract data from
  - id: extraction_schema
    type: STRING
    displayName: Extraction schema (JSON)
    description: |
      JSON Schema defining the fields to extract. Example:
      {"invoice_number": "string", "vendor_name": "string", "total_amount": "number", "line_items": "array of objects with description and amount"}
    defaults: '{"invoice_number": "string", "vendor_name": "string", "invoice_date": "string", "total_amount": "number", "currency": "string", "line_items": "array of objects with description, quantity, unit_price, and total"}'
  - id: document_type
    type: SELECT
    displayName: Document type
    description: Type of document, used to calibrate the extraction prompt
    values:
      - invoice
      - contract
      - receipt
      - report
      - form
      - other
    defaults: "invoice"
  - id: output_destination
    type: SELECT
    displayName: Output destination
    description: Where to send the extracted structured data
    values:
      - postgres
      - slack
      - both
    defaults: "both"

tasks:
  - id: download_document
    type: io.kestra.plugin.core.http.Download
    uri: "{{ inputs.document_url }}"
    method: GET

  - id: extract_text
    type: io.kestra.plugin.scripts.python.Script
    inputFiles:
      document: "{{ outputs.download_document.uri }}"
    dependencies:
      - pypdf2
      - beautifulsoup4
      - requests
    script: |
      import os
      import sys
      import json
      from kestra import Kestra

      doc_path = "document"
      content = ""

      # Try to detect file type and extract text
      with open(doc_path, "rb") as f:
          header = f.read(8)

      if header[:4] == b'%PDF':
          # PDF extraction
          try:
              import PyPDF2
              with open(doc_path, "rb") as f:
                  reader = PyPDF2.PdfReader(f)
                  pages = []
                  for page in reader.pages:
                      pages.append(page.extract_text() or "")
              content = "\n".join(pages)
          except Exception as e:
              content = f"[PDF extraction error: {e}]"
      else:
          # Try HTML/text
          try:
              from bs4 import BeautifulSoup
              with open(doc_path, "r", encoding="utf-8", errors="replace") as f:
                  raw = f.read()
              if raw.strip().startswith("<"):
                  soup = BeautifulSoup(raw, "html.parser")
                  # Remove scripts and styles
                  for tag in soup(["script", "style", "nav", "footer"]):
                      tag.decompose()
                  content = soup.get_text(separator="\n", strip=True)
              else:
                  content = raw
          except Exception as e:
              content = f"[Text extraction error: {e}]"

      # Truncate to avoid token limits (keep first 8000 chars)
      content_truncated = content[:8000]
      char_count = len(content)

      Kestra.outputs({
          "text_content": content_truncated,
          "char_count": char_count,
          "truncated": char_count > 8000
      })

  - id: extract_structured_data
    type: io.kestra.plugin.openai.ChatCompletion
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4o
    maxTokens: 1500
    clientTimeout: 60
    jsonResponseSchema: |
      {
        "type": "object",
        "properties": {
          "extracted_fields": {
            "type": "object",
            "description": "The extracted fields as defined in the extraction schema"
          },
          "confidence": {
            "type": "number",
            "minimum": 0,
            "maximum": 1,
            "description": "Overall extraction confidence score"
          },
          "missing_fields": {
            "type": "array",
            "items": {"type": "string"},
            "description": "List of schema fields that could not be found in the document"
          },
          "extraction_notes": {
            "type": "string",
            "description": "Any caveats, ambiguities, or important observations about the extraction"
          }
        },
        "required": ["extracted_fields", "confidence", "missing_fields"]
      }
    messages:
      - role: system
        content: |
          You are a document data extraction specialist. Extract structured data from the provided
          document text according to the given schema. Be precise, only extract values that are
          explicitly present in the document. For missing fields, list them in `missing_fields`.
          Return null for fields you cannot find rather than guessing.

          Document type: {{ inputs.document_type }}
          Extraction schema requested: {{ inputs.extraction_schema }}
      - role: user
        content: |
          Extract the following data from this {{ inputs.document_type }} document:

          Schema: {{ inputs.extraction_schema }}

          Document text:
          {{ outputs.extract_text.vars.text_content }}

  - id: save_to_postgres
    type: io.kestra.plugin.jdbc.postgresql.Queries
    fetchType: NONE
    runIf: "{{ inputs.output_destination == 'postgres' or inputs.output_destination == 'both' }}"
    sql: |
      CREATE TABLE IF NOT EXISTS document_extractions (
          id SERIAL PRIMARY KEY,
          document_url TEXT,
          document_type TEXT,
          extracted_data JSONB,
          confidence NUMERIC,
          missing_fields JSONB,
          extraction_notes TEXT,
          extracted_at TIMESTAMP DEFAULT NOW()
      );

      INSERT INTO document_extractions
          (document_url, document_type, extracted_data, confidence, missing_fields, extraction_notes)
      VALUES (
          '{{ inputs.document_url }}',
          '{{ inputs.document_type }}',
          '{{ outputs.extract_structured_data.choices[0].message.content | json | jq(".extracted_fields") | first | json }}'::jsonb,
          {{ outputs.extract_structured_data.choices[0].message.content | json | jq(".confidence") | first }},
          '{{ outputs.extract_structured_data.choices[0].message.content | json | jq(".missing_fields") | first | json }}'::jsonb,
          '{{ outputs.extract_structured_data.choices[0].message.content | json | jq(".extraction_notes // \"\"") | first | replace("'", "''") }}'
      );

  - id: notify_slack
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    runIf: "{{ inputs.output_destination == 'slack' or inputs.output_destination == 'both' }}"
    messageText: |
      :page_facing_up: *Document Extraction Complete*

      *Type:* {{ inputs.document_type | title }}
      *Source:* {{ inputs.document_url }}
      *Confidence:* {{ outputs.extract_structured_data.choices[0].message.content | json | jq("(.confidence * 100 | floor | tostring) + \"%\"") | first }}
      *Characters processed:* {{ outputs.extract_text.vars.char_count }}{{ outputs.extract_text.vars.truncated | ternary(' (truncated)', '') }}

      *Extracted Data:*
      ```{{ outputs.extract_structured_data.choices[0].message.content | json | jq(".extracted_fields") | first | json }}```

      *Missing Fields:* {{ outputs.extract_structured_data.choices[0].message.content | json | jq(".missing_fields | if length == 0 then \"none\" else join(\", \") end") | first }}

pluginDefaults:
  - type: io.kestra.plugin.jdbc.postgresql.Queries
    values:
      url: "{{ secret('POSTGRES_URL') }}"
      username: "{{ secret('POSTGRES_USER') }}"
      password: "{{ secret('POSTGRES_PASSWORD') }}"

extend:
  title: "AI Document Data Extraction: Parse PDFs and Web Pages into Structured JSON with OpenAI"
  metaTitle: AI Document Extraction with OpenAI and Kestra
  shortDescription: Turn any PDF, web page, or text document into structured JSON with OpenAI GPT-4o, then store the results in PostgreSQL and Slack.
  description: |
    Extract structured data from unstructured documents using OpenAI GPT-4o and a configurable JSON schema. This blueprint downloads a document from any URL (PDF, HTML page, or plain text), parses readable text with format detection, sends it to GPT-4o to pull out the exact fields you define at runtime, and persists the results to PostgreSQL and Slack. It turns invoices, contracts, receipts, reports, and forms into queryable, auditable data without standing up a dedicated document processing service or hand coding a parser per document type.

    ## How it works

    1. The `download_document` task (`io.kestra.plugin.core.http.Download`) fetches the file from the `document_url` input over HTTP.
    2. The `extract_text` task (`io.kestra.plugin.scripts.python.Script`) inspects the file header and extracts text accordingly: PDFs via `PyPDF2`, HTML and text via `BeautifulSoup4` (stripping script, style, nav, and footer tags). It truncates content to 8000 characters to stay within token limits and reports a character count.
    3. The `extract_structured_data` task (`io.kestra.plugin.openai.ChatCompletion`) sends the text to `gpt-4o` with a `jsonResponseSchema`, returning `extracted_fields`, a `confidence` score, `missing_fields`, and `extraction_notes`. The `extraction_schema` and `document_type` inputs steer the prompt so you control which fields come back.
    4. The `save_to_postgres` task (`io.kestra.plugin.jdbc.postgresql.Queries`) creates a `document_extractions` table if needed and inserts the extracted JSONB, confidence, and source metadata. It runs conditionally via `runIf` based on the `output_destination` input.
    5. The `notify_slack` task (`io.kestra.plugin.slack.notifications.SlackIncomingWebhook`) posts a formatted message with the extracted fields, confidence percentage, characters processed, and any missing fields, also gated by `runIf`.

    ## What you get

    - One reusable flow that handles PDF, HTML, and plain text input
    - Field extraction driven by a runtime JSON schema, not hardcoded logic
    - Confidence scores and missing-field tracking for quality control
    - Results in a queryable PostgreSQL JSONB column with source metadata
    - A Slack preview for fast human review of low-confidence extractions

    ## Who it's for

    - Finance and operations teams automating invoice, receipt, and contract data entry
    - Legal and compliance teams pulling clauses, dates, and parties from contracts at scale
    - Data engineering teams building document ingestion pipelines for reports and filings
    - No-code automation builders who want the output schema as a configuration parameter

    ## Why orchestrate this with Kestra

    OpenAI gives you a model API, not a pipeline. Kestra supplies the orchestration around it: declarative YAML you can version and review, event triggers and schedules to process documents as they arrive, retries on transient HTTP or API failures, conditional `runIf` branching to route output, and full execution lineage so every extraction is traceable from source URL to stored row. The model has no scheduler, no state, and no way to chain download, parse, persist, and notify into one auditable run. Kestra fills that gap.

    ## Prerequisites

    - A Kestra instance (local or cloud)
    - An OpenAI API key with access to `gpt-4o`
    - A reachable PostgreSQL database (if using the Postgres destination)
    - A Slack incoming webhook URL (if using the Slack destination)

    ### Secrets

    Configure these secrets in your Kestra instance:

    - `OPENAI_API_KEY`: API key for the OpenAI ChatCompletion task
    - `SLACK_WEBHOOK_URL`: incoming webhook URL for Slack notifications
    - `POSTGRES_URL`: JDBC connection URL for the target database
    - `POSTGRES_USER`: PostgreSQL username
    - `POSTGRES_PASSWORD`: PostgreSQL password

    ## Quick start

    1. Add the blueprint to your namespace and set the secrets above.
    2. Run the flow with a `document_url` pointing to a sample PDF or web page.
    3. Adjust the `extraction_schema` input to match the fields you need.
    4. Pick an `output_destination` (postgres, slack, or both) and execute.
    5. Inspect the stored row or the Slack message to confirm the extracted data.

    ## How to extend

    - Loop over a batch of documents with `ForEach` for bulk processing.
    - Add a human-approval gate for extractions below a confidence threshold.
    - Swap the HTTP download for an S3 or GCS task to read from object storage.
    - Chain into a downstream flow that creates ERP or accounting records from invoices.
    - Add a schedule or a webhook trigger to process documents automatically on arrival.

    ## Links

    - [Kestra OpenAI plugin documentation](https://kestra.io/plugins/plugin-openai)
  tags:
    - AI
    - Data
  ee: false
  demo: false
  metaDescription: Extract structured data from PDFs and web pages with Kestra and OpenAI GPT-4o. Parse documents into JSON fields and store results in PostgreSQL and Slack.
