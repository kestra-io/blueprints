id: website-change-telegram-alert
namespace: company.team

tasks:
  - id: fetch_page_snapshot_1
    type: io.kestra.plugin.core.http.Request
    description: "Fetch the initial snapshot of the target web page"
    uri: "https://news.ycombinator.com/"
    method: GET

  - id: wait_between_checks
    type: io.kestra.plugin.core.flow.Pause
    description: "Wait 5 minutes before fetching the page again"
    pauseDuration: "PT5M"

  - id: fetch_page_snapshot_2
    type: io.kestra.plugin.core.http.Request
    description: "Fetch the web page a second time for comparison"
    uri: "https://news.ycombinator.com/"
    method: GET

  - id: compare_snapshots
    type: io.kestra.plugin.scripts.python.Script
    description: "Compare the two page snapshots using content hashing"
    script: |
      import hashlib
      from kestra import Kestra

      snapshot_1 = """{{ outputs.fetch_page_snapshot_1.body }}"""
      snapshot_2 = """{{ outputs.fetch_page_snapshot_2.body }}"""

      hash_1 = hashlib.sha256(snapshot_1.encode()).hexdigest()
      hash_2 = hashlib.sha256(snapshot_2.encode()).hexdigest()

      changed = hash_1 != hash_2

      Kestra.outputs({"content_changed": changed})

  - id: check_if_changed
    type: io.kestra.plugin.core.flow.If
    condition: "{{ outputs.compare_snapshots.vars.content_changed == true }}"
    then:
      - id: send_telegram_alert
        type: io.kestra.plugin.core.http.Request
        description: "Send a Telegram alert about the content change"
        uri: "https://api.telegram.org/bot{{ secret('TELEGRAM_BOT_TOKEN') }}/sendMessage"
        method: POST
        contentType: application/json
        body: |
          {
            "chat_id": "{{ secret('TELEGRAM_CHAT_ID') }}",
            "text": "Website content change detected on https://news.ycombinator.com/ — The page has been modified since the last check."
          }

triggers:
  - id: periodic_check
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 */6 * * *"

extend:
  title: "Website Content Change Alert via Telegram"
  metaTitle: "Website Change Alert via Telegram"
  shortDescription: >-
    Periodically fetches a web page, compares it to a previous snapshot,
    and sends a Telegram notification when the content changes.
  description: |
    **Monitor any website for content changes and receive instant Telegram alerts when something is different, ideal for tracking competitor activity or critical page updates.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger runs the check every 6 hours
    2. A `io.kestra.plugin.core.http.Request` task fetches the current HTML content of the target website
    3. A `io.kestra.plugin.core.flow.Pause` task waits 5 minutes to allow for transient differences to settle
    4. A second `io.kestra.plugin.core.http.Request` task fetches the page again for comparison
    5. A `io.kestra.plugin.scripts.python.Script` task computes a hash of both snapshots and compares them
    6. A `io.kestra.plugin.core.flow.If` task checks whether the content has changed
    7. A `io.kestra.plugin.core.http.Request` task sends a notification to your Telegram chat when a change is detected

    Ideal for:
    - **Marketers** tracking competitor blog posts and content updates
    - **DevOps engineers** monitoring status pages or documentation for changes
    - **Researchers** watching news sites or data portals for new publications
  tags:
    - System
  ee: false
  demo: false
  metaDescription: >-
    Monitors a website for content changes on a schedule and sends a Telegram
    alert when the page differs from the previous snapshot.

