extend:
  title: Google Maps Lead Generation with Email Scraping
  metaTitle: Google Maps Lead Scraper with Email Extraction
  shortDescription: >-
    Scrape business listings from Google Maps, extract website URLs and email
    addresses using Python, and export deduplicated leads to Google Sheets.
  description: |
    **Build a full lead generation pipeline that scrapes Google Maps for business websites, extracts email addresses, and exports clean results to Google Sheets.**

    1. A `io.kestra.plugin.core.http.Request` task sends a GET request to Google Maps search with your target query (e.g., city plus business type) and retrieves the raw HTML response
    2. A `io.kestra.plugin.scripts.python.Script` task uses regex to extract all website URLs from the Google Maps HTML, filtering out Google-owned domains and irrelevant static resource links
    3. A `io.kestra.plugin.core.flow.ForEach` task iterates over each extracted website URL, scraping the site HTML and using regex to find email addresses on each page
    4. A `io.kestra.plugin.scripts.python.Script` task aggregates all discovered emails, removes duplicates and null entries, and prepares the final cleaned dataset
    5. A `io.kestra.plugin.core.http.Request` task appends the deduplicated email list to a Google Sheet for outreach and CRM use

    Ideal for:
    - **Sales teams** running outbound prospecting campaigns with geographically targeted leads
    - **Marketing agencies** building industry-specific lead databases for clients
    - **Small business owners** finding local competitors and potential partners through public data
  tags:
    - Lead Generation
    - Web Scraping
    - Google Sheets
  ee: false
  demo: false
  metaDescription: >-
    Scrape Google Maps business listings, extract website URLs and emails with
    Python regex, and export deduplicated leads to Google Sheets.

id: google-maps-lead-scraper
namespace: company.team

tasks:
  - id: scrape_google_maps
    type: io.kestra.plugin.core.http.Request
    description: >-
      Search Google Maps for business listings. Replace the URL with your target
      location and business type (e.g., miami+lawyers).
    uri: "https://www.google.com/maps/search/calgary+dentists"
    method: GET

  - id: extract_urls
    type: io.kestra.plugin.scripts.python.Script
    description: >-
      Extract website URLs from Google Maps HTML response using regex, filtering
      out Google-owned and irrelevant domains.
    script: |
      import re
      import json
      from kestra import Kestra

      html_data = """{{ outputs.scrape_google_maps.body }}"""

      regex = r'https?://[^/\s"\'>\])]+'
      all_urls = re.findall(regex, html_data)

      blocked = ['google', 'gstatic', 'schema', 'googleapis', 'ggpht']
      websites = []
      seen = set()
      for url in all_urls:
          if any(b in url.lower() for b in blocked):
              continue
          if url not in seen:
              seen.add(url)
              websites.append(url)

      print(f"Extracted {len(websites)} unique website URLs")
      Kestra.outputs({"websites": json.dumps(websites), "count": len(websites)})

  - id: scrape_sites_and_extract_emails
    type: io.kestra.plugin.core.flow.ForEach
    description: >-
      Iterate over each website URL, scrape its HTML, and extract email
      addresses using regex pattern matching.
    values: "{{ outputs.extract_urls.vars.websites }}"
    tasks:
      - id: scrape_site
        type: io.kestra.plugin.core.http.Request
        uri: "{{ taskrun.value }}"
        method: GET
        options:
          allowFailed: true

      - id: extract_emails
        type: io.kestra.plugin.scripts.python.Script
        script: |
          import re
          import json
          from kestra import Kestra

          html = """{{ outputs.scrape_site.body }}"""

          regex = r'[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.(?!jpeg|jpg|png|gif|webp|svg)[a-zA-Z]{2,}'
          emails = list(set(re.findall(regex, html)))

          print(f"Found {len(emails)} emails on {{ taskrun.value }}")
          Kestra.outputs({"emails": json.dumps(emails)})

  - id: deduplicate_and_aggregate
    type: io.kestra.plugin.scripts.python.Script
    description: >-
      Aggregate all extracted emails across sites, remove duplicates and empty
      entries, and prepare the final lead list.
    script: |
      import json
      from kestra import Kestra

      # Collect all emails from the iteration outputs
      all_emails = set()

      iterations = {{ outputs.scrape_sites_and_extract_emails }}
      for iteration in iterations:
          emails_json = iteration.get("extract_emails", {}).get("vars", {}).get("emails", "[]")
          emails = json.loads(emails_json)
          all_emails.update(emails)

      # Remove empty strings
      all_emails.discard("")

      result = sorted(list(all_emails))
      print(f"Total unique emails: {len(result)}")

      Kestra.outputs({"emails": json.dumps(result), "count": len(result)})

  - id: export_to_google_sheets
    type: io.kestra.plugin.core.http.Request
    description: >-
      Append deduplicated email list to Google Sheets. Configure your
      spreadsheet ID and Google Sheets API credentials.
    uri: "https://sheets.googleapis.com/v4/spreadsheets/YOUR_SPREADSHEET_ID/values/emails!A:A:append?valueInputOption=USER_ENTERED"
    method: POST
    contentType: application/json
    headers:
      Authorization: "Bearer {{ secret('GOOGLE_SHEETS_TOKEN') }}"
    body: "{{ outputs.deduplicate_and_aggregate.vars.emails }}"
