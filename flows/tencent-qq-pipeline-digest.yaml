id: tencent-qq-pipeline-digest
namespace: company.analytics

labels:
  team: analytics
  cadence: daily
  channel: qq

inputs:
  - id: team_label
    type: STRING
    defaults: Analytics Pipelines
    description: Friendly name of the team or pipeline group included in the digest header.

  - id: watched_namespace
    type: STRING
    defaults: company.analytics
    description: Namespace whose executions are counted for the digest.

  - id: digest_recipients
    type: ARRAY
    itemType: STRING
    defaults: ["pipeline-digest-group"]
    description: QQ group or user identifiers that should receive the daily digest.

concurrency:
  limit: 1

variables:
  window_anchor: "{{ trigger.date ?? execution.startDate }}"
  window_start: "{{ (trigger.date ?? execution.startDate) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}T00:00:00Z"
  window_end: "{{ (trigger.date ?? execution.startDate) | date('yyyy-MM-dd') }}T00:00:00Z"
  digest_date: "{{ (trigger.date ?? execution.startDate) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}"

pluginDefaults:
  - type: io.kestra.plugin.kestra
    values:
      kestraUrl: "{{ secret('KESTRA_API_URL') }}"
      auth:
        username: "{{ secret('KESTRA_API_USERNAME') }}"
        password: "{{ secret('KESTRA_API_PASSWORD') }}"
  - type: io.kestra.plugin.tencent.qq
    values:
      url: "{{ secret('TENCENT_IM_URL') }}"
      token: "{{ secret('TENCENT_IM_TOKEN') }}"

tasks:
  - id: count_success
    type: io.kestra.plugin.kestra.executions.Count
    description: Counts executions that finished SUCCESS in the digest window.
    namespaces:
      - "{{ inputs.watched_namespace }}"
    states:
      - SUCCESS
    startDate: "{{ render(vars.window_start) }}"
    endDate: "{{ render(vars.window_end) }}"
    timeout: PT1M
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: count_failed
    type: io.kestra.plugin.kestra.executions.Count
    description: Counts executions that ended FAILED in the digest window.
    namespaces:
      - "{{ inputs.watched_namespace }}"
    states:
      - FAILED
    startDate: "{{ render(vars.window_start) }}"
    endDate: "{{ render(vars.window_end) }}"
    timeout: PT1M
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: count_warning
    type: io.kestra.plugin.kestra.executions.Count
    description: Counts executions that ended WARNING in the digest window.
    namespaces:
      - "{{ inputs.watched_namespace }}"
    states:
      - WARNING
    startDate: "{{ render(vars.window_start) }}"
    endDate: "{{ render(vars.window_end) }}"
    timeout: PT1M
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: count_running
    type: io.kestra.plugin.kestra.executions.Count
    description: Counts executions still RUNNING at digest time.
    namespaces:
      - "{{ inputs.watched_namespace }}"
    states:
      - RUNNING
    startDate: "{{ render(vars.window_start) }}"
    endDate: "{{ render(vars.window_end) }}"
    timeout: PT1M
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: build_summary
    type: io.kestra.plugin.core.debug.Return
    description: Assembles the digest body text from the real execution counts.
    format: |
      Daily pipeline digest for {{ inputs.team_label }} ({{ inputs.watched_namespace }}) on {{ render(vars.digest_date) }}.
      Window: {{ render(vars.window_start) }} to {{ render(vars.window_end) }}.
      Success: {{ outputs.count_success.count }} | Failed: {{ outputs.count_failed.count }} | Warning: {{ outputs.count_warning.count }} | Running: {{ outputs.count_running.count }}.
      {% if outputs.count_failed.count > 0 %}Action needed: review the {{ outputs.count_failed.count }} failed execution(s) in the Kestra UI.{% else %}No failures in the window.{% endif %}

  - id: log_counts
    type: io.kestra.plugin.core.log.Log
    description: Surfaces the counts in the run logs for operators.
    message: "{{ render(outputs.build_summary.value) }}"

  - id: post_digest_to_qq
    type: io.kestra.plugin.tencent.qq.QQIncomingWebhook
    description: Posts the assembled daily pipeline digest to the team QQ channel.
    timeout: PT30S
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    payload: |
      {
        "To_Account": {{ inputs.digest_recipients | toJson }},
        "MsgType": "TIMTextElem",
        "MsgContent": {
          "Text": {{ outputs.build_summary.value | toJson }}
        }
      }

triggers:
  - id: daily_morning_digest
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 8 * * *"
    timezone: Asia/Shanghai

errors:
  - id: alert_digest_failure
    type: io.kestra.plugin.tencent.qq.QQIncomingWebhook
    description: Notifies the channel if the digest itself could not be produced or delivered.
    timeout: PT30S
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    payload: |
      {
        "To_Account": {{ inputs.digest_recipients | toJson }},
        "MsgType": "TIMTextElem",
        "MsgContent": {
          "Text": {{ ("Pipeline digest for " ~ inputs.team_label ~ " failed to run (execution " ~ execution.id ~ "). Check the Kestra execution for details.") | toJson }}
        }
      }

extend:
  shortDescription: Post a daily pipeline status digest with real 24h execution counts to a Tencent Cloud IM / QQ team channel.
  title: Daily pipeline digest to a QQ channel
  metaTitle: Scheduled QQ pipeline digest
  description: |
    This flow sends a recurring daily summary of real pipeline activity to a Tencent Cloud IM / QQ team
    channel. A Schedule trigger runs the flow every morning, four `executions.Count` tasks query the
    Kestra API for the prior day's SUCCESS, FAILED, WARNING, and RUNNING execution counts in the watched
    namespace, a `Return` task renders those numbers into a human-readable digest body, and the
    `QQIncomingWebhook` task posts that message to the configured QQ recipients.

    Unlike the failure-alert flow, this one runs on its own cron schedule and is meant for a routine
    status update rather than incident response. The digest carries actual status (counts per state and a
    callout when failures occurred), not just the team name and date.

    Backfill and timezone safety:
    - The reporting window is derived from `{{ trigger.date ?? execution.startDate }}`, never `now()`,
      so a backfilled or replayed run reports the historically-correct day. The window covers the prior
      calendar day (00:00 to 24:00 UTC) and the partition/date label is built from the same anchor value.
    - The Schedule trigger has an explicit `timezone`, so the fire time is unambiguous across regions.

    Reliability and safety choices:
    - Every remote call (the four Kestra API counts and the QQ post) has a `retry` (constant, three
      attempts) and a `timeout`, so a transient API or QQ blip does not silently drop the digest.
    - A flow-level `errors` block posts a distinct "digest failed" message (including the execution id) to
      the same QQ group, so a dropped digest is itself surfaced rather than the team simply getting
      nothing that morning.
    - The digest body is assembled entirely inside `build_summary` and injected into the QQ payload only
      via `| toJson`. The free-text `team_label` input is never spliced raw into the JSON literal, so a
      quote, backslash, or newline in it cannot break the payload.
    - `concurrency: { limit: 1 }` prevents a slow run from overlapping the next scheduled fire.

    Connection reuse:
    - `pluginDefaults` set the Kestra API connection (`kestraUrl` + `auth`) once for all
      `io.kestra.plugin.kestra` tasks, and the QQ `url` + `token` once for all
      `io.kestra.plugin.tencent.qq` tasks, instead of repeating `secret()` calls on every task.

    Prerequisites:
    - A Tencent Cloud IM / QQ application with the REST API enabled and a valid `UserSig` signature.
    - The Tencent Cloud IM `sendmsg` REST endpoint URL for your SDKAppID.
    - One or more QQ group or user identifiers to receive the digest.
    - Kestra API access (URL plus credentials) for the `executions.Count` tasks.

    Secrets (never hardcode values):
    - `TENCENT_IM_URL`: the Tencent Cloud IM REST endpoint used to send messages, for example the
      `v4/openim/sendmsg` URL including your SDKAppID and admin identifier.
    - `TENCENT_IM_TOKEN`: the Tencent Cloud IM authentication token or `UserSig` signature.
    - `KESTRA_API_URL`: base URL of the Kestra API the count tasks call (for example `http://localhost:8080`).
    - `KESTRA_API_USERNAME` / `KESTRA_API_PASSWORD`: credentials for the Kestra API.

    Quick start:
    1. Add the `TENCENT_IM_URL`, `TENCENT_IM_TOKEN`, `KESTRA_API_URL`, `KESTRA_API_USERNAME`, and
       `KESTRA_API_PASSWORD` secrets to your Kestra instance.
    2. Set `watched_namespace` to the namespace whose executions should be counted.
    3. Set `digest_recipients` to the QQ identifiers of your team channel members.
    4. Adjust the `cron` and `timezone` of the `daily_morning_digest` trigger to your reporting time.
    5. Deploy the flow and wait for the next scheduled run, or trigger it manually to preview the digest.

    Expected outputs:
    Each `executions.Count` task exposes its `count` integer (for example `{{ outputs.count_failed.count }}`).
    The `build_summary` task exposes the rendered digest text at `{{ outputs.build_summary.value }}`, which
    is logged by `log_counts` and posted to QQ. The `QQIncomingWebhook` task does not expose file outputs;
    confirm delivery from the Logs tab of the `post_digest_to_qq` task run.

    Documentation:
    - Tencent plugin tasks: https://kestra.io/plugins/plugin-tencent
    - Kestra executions Count task: https://kestra.io/plugins/plugin-kestra
    - Schedule trigger: https://kestra.io/docs/workflow-components/triggers/schedule-trigger
    - Tencent Cloud IM REST API: https://www.tencentcloud.com/document/product/1047
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: Post a daily pipeline status digest with real 24h execution counts to a Tencent Cloud IM / QQ team channel.
