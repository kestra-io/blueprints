extend:
  title: AI-Powered Instagram DM Auto-Reply with OpenAI
  metaTitle: AI Instagram DM Auto-Reply with OpenAI
  shortDescription: >-
    Automatically respond to Instagram direct messages using OpenAI GPT.
    A webhook receives messages from ManyChat and returns AI-generated replies in your brand voice.
  description: |
    **Respond to Instagram DMs instantly with AI-generated replies that match your brand voice and communication style.**

    1. A `io.kestra.plugin.core.trigger.Webhook` receives incoming Instagram messages forwarded by ManyChat
    2. A `io.kestra.plugin.scripts.python.Script` task extracts the message text, session ID, and configures the system prompt that defines the AI persona
    3. A `io.kestra.plugin.openai.ChatCompletion` task generates a contextual reply using GPT-4o, with conversation history maintained via the KV Store for multi-turn sessions
    4. The webhook responds with the AI-generated message, which ManyChat delivers back to the Instagram user

    Ideal for:
    - **Content creators** who want to engage followers at scale without manually answering every DM
    - **Business owners** running lead generation through Instagram who need instant, on-brand responses
    - **Marketers** managing ManyChat-powered Instagram funnels who want AI-driven conversation handling
  tags:
    - AI
    - Social Media
    - OpenAI
  ee: false
  demo: false
  metaDescription: >-
    Automate Instagram DM responses with OpenAI GPT and ManyChat.
    Receive messages via webhook, generate on-brand AI replies, and deliver them back instantly.

id: ai-instagram-dm-auto-reply
namespace: company.team

inputs:
  - id: system_prompt
    type: STRING
    defaults: >-
      Persona: You are an Instagram influencer.
      Context: You receive messages from your subscribers.
      Task: Answer questions in your writing style and patterns according to your previous posts. Use your posts only for style and pattern reference.
      Style rules: Keep answers simple and concise.

tasks:
  - id: extract_message
    type: io.kestra.plugin.scripts.python.Script
    description: Extract the incoming message text and session ID from the webhook payload
    script: |
      from kestra import Kestra
      import json

      # Read the webhook body from the trigger
      body = json.loads('{{ trigger.body }}')
      session_id = body.get("session_id", "default")
      chat_input = body.get("text", "")

      Kestra.outputs({
          "session_id": session_id,
          "chat_input": chat_input
      })

  - id: load_conversation_history
    type: io.kestra.plugin.scripts.python.Script
    description: Load conversation history from the KV Store for multi-turn context
    script: |
      from kestra import Kestra
      import json

      session_id = "{{ outputs.extract_message.vars.session_id }}"
      kv_key = f"instagram_dm_{session_id}"

      # Attempt to retrieve existing conversation from KV store
      try:
          history = json.loads(Kestra.get(kv_key) or "[]")
      except Exception:
          history = []

      # Keep only the last 20 messages to stay within token limits
      history = history[-20:]

      Kestra.outputs({
          "history": json.dumps(history),
          "kv_key": kv_key
      })

  - id: generate_reply
    type: io.kestra.plugin.openai.ChatCompletion
    description: Generate an AI reply using GPT-4o with conversation history
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4o
    messages:
      - role: system
        content: "{{ inputs.system_prompt }}"
      - role: user
        content: "{{ outputs.extract_message.vars.chat_input }}"

  - id: save_conversation
    type: io.kestra.plugin.scripts.python.Script
    description: Save updated conversation to the KV Store for future context
    script: |
      from kestra import Kestra
      import json

      kv_key = "{{ outputs.load_conversation_history.vars.kv_key }}"
      history = json.loads('{{ outputs.load_conversation_history.vars.history }}')

      # Append the latest exchange
      history.append({"role": "user", "content": "{{ outputs.extract_message.vars.chat_input }}"})
      history.append({"role": "assistant", "content": "{{ outputs.generate_reply.choices[0].message.content }}"})

      # Persist to KV store
      Kestra.put(kv_key, json.dumps(history))

      # Output the reply for the webhook response
      Kestra.outputs({
          "reply": "{{ outputs.generate_reply.choices[0].message.content }}"
      })

  - id: respond_to_webhook
    type: io.kestra.plugin.scripts.python.Script
    description: Return the AI-generated reply to ManyChat via webhook response
    script: |
      from kestra import Kestra

      Kestra.outputs({
          "response": "{{ outputs.save_conversation.vars.reply }}"
      })

triggers:
  - id: instagram_message_webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"
