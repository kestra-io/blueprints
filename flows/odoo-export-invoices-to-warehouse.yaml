id: odoo-export-invoices-to-warehouse
namespace: company.analytics

labels:
  team: data
  domain: erp-analytics

concurrency:
  limit: 1

inputs:
  - id: bucket
    type: STRING
    defaults: my-warehouse-staging
    description: Target S3 bucket used as warehouse staging area.

  - id: state
    type: SELECT
    defaults: posted
    values:
      - draft
      - posted
      - cancel
    description: Invoice state to export. Constrained to a fixed set so the value is never free text.

variables:
  window_date: "{{ (trigger.date ?? execution.startDate) | date('yyyy-MM-dd') }}"
  s3_key: "odoo/invoices/{{ (trigger.date ?? execution.startDate) | date('yyyy/MM/dd') }}/account_move.csv"

pluginDefaults:
  - type: io.kestra.plugin.odoo.Query
    values:
      url: "{{ secret('ODOO_URL') }}"
      db: "{{ secret('ODOO_DB') }}"
      username: "{{ secret('ODOO_USERNAME') }}"
      password: "{{ secret('ODOO_PASSWORD') }}"

tasks:
  - id: query_invoices
    type: io.kestra.plugin.odoo.Query
    description: Read one day of customer invoices from Odoo and store the result as an ION file.
    model: account.move
    operation: SEARCH_READ
    filters:
      - ["move_type", "=", "out_invoice"]
      - ["state", "=", "{{ inputs.state }}"]
      - ["invoice_date", ">=", "{{ vars.window_date }}"]
      - ["invoice_date", "<", "{{ (trigger.date ?? execution.startDate) | dateAdd(1, 'DAYS') | date('yyyy-MM-dd') }}"]
    fields:
      - name
      - invoice_date
      - invoice_date_due
      - partner_id
      - amount_untaxed
      - amount_tax
      - amount_total
      - currency_id
      - payment_state
      - state
    limit: 100000
    fetchType: STORE
    retry:
      type: constant
      interval: PT30S
      maxAttempt: 4

  - id: log_row_count
    type: io.kestra.plugin.core.log.Log
    description: Surface how many invoices were exported so operators can spot empty or partial days.
    message: "Exported {{ outputs.query_invoices.size ?? 0 }} {{ inputs.state }} invoices for {{ vars.window_date }}."

  - id: convert_to_csv
    type: io.kestra.plugin.serdes.csv.IonToCsv
    description: Convert the ION query result into a warehouse-friendly CSV file.
    from: "{{ outputs.query_invoices.uri }}"
    quoteMode: NON_NUMERIC

  - id: upload_to_warehouse
    type: io.kestra.plugin.aws.s3.Upload
    description: Land the CSV export in the warehouse staging bucket under a date-partitioned key.
    from: "{{ outputs.convert_to_csv.uri }}"
    bucket: "{{ inputs.bucket }}"
    key: "{{ vars.s3_key }}"
    region: "{{ secret('AWS_DEFAULT_REGION') }}"
    accessKeyId: "{{ secret('AWS_ACCESS_KEY_ID') }}"
    secretKeyId: "{{ secret('AWS_SECRET_ACCESS_KEY') }}"
    retry:
      type: constant
      interval: PT30S
      maxAttempt: 4

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed for {{ vars.window_date }} (execution {{ execution.id }})."
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

triggers:
  - id: nightly
    type: io.kestra.plugin.core.trigger.Schedule
    description: Runs every night at 02:00 UTC and exports the previous calendar day of invoices.
    cron: "0 2 * * *"
    timezone: Etc/UTC

extend:
  shortDescription: "Export one day of Odoo customer invoices to CSV and stage it in Amazon S3 every night, with retry, alerting, and backfill-safe partitioning."
  title: Export Odoo invoices to an S3 warehouse staging bucket
  metaTitle: Export Odoo invoices to S3 with Kestra
  description: |
    This flow pulls ERP data out of Odoo on a nightly schedule and lands it in your
    cloud warehouse staging area so analysts can model it downstream. It is built to run
    unattended: each remote call retries on transient errors, failures alert Slack, and the
    data window is derived from the schedule date so backfills and replays land in the right
    partition instead of today's.

    ## What this flow does
    1. Runs an Odoo XML-RPC `SEARCH_READ` against the `account.move` model for customer invoices
       in the selected `state` whose `invoice_date` falls on the run's logical day, storing the
       result as an ION file in Kestra internal storage. The window is derived from
       `{{ trigger.date ?? execution.startDate }}`, so the export is incremental (one day per run)
       and backfill-safe rather than a full re-dump of all history.
    2. Logs the number of invoices returned so an operator can tell an empty day from a broken run.
    3. Converts the ION result to CSV with `IonToCsv` using `NON_NUMERIC` quoting so amounts
       stay unquoted and text fields are quoted.
    4. Uploads the CSV to an Amazon S3 bucket under a key partitioned by the SAME logical date,
       ready for loading into Snowflake, BigQuery, Redshift, or a lakehouse table. Because the key
       is derived from the data window, re-running a given day overwrites that day's object instead
       of creating a duplicate, which keeps replays idempotent.

    ## Reliability and safety
    - `query_invoices` and `upload_to_warehouse` each retry up to 4 times with a 30s constant
      backoff to ride out transient XML-RPC timeouts and S3 throttling.
    - A flow-level `errors` block posts a Slack alert (with the execution id and the day) so a
      failed nightly extract is never silent.
    - `concurrency.limit: 1` prevents a backfill run and the nightly run from writing the same
      partition at once.
    - The `state` input is a `SELECT`, so its value is constrained to a known set and never
      arbitrary free text flowing into the Odoo domain filter.

    ## Prerequisites
    - A reachable Odoo instance (self-hosted or Odoo Online) with XML-RPC enabled.
    - An Odoo user that can read `account.move` records.
    - An Amazon S3 bucket to use as warehouse staging, plus an identity that can `s3:PutObject`
      to it. Static IAM keys are shown below; in production prefer the AWS default credentials
      chain (instance profile / IRSA) or set `stsRoleArn` on the Upload task for least privilege.

    ## Secrets
    - `ODOO_URL`: Base URL of the Odoo instance, including scheme and port (for example `https://erp.example.com`).
    - `ODOO_DB`: Odoo database name to connect to.
    - `ODOO_USERNAME`: Odoo login used for XML-RPC authentication.
    - `ODOO_PASSWORD`: Password for that Odoo user.
    - `AWS_DEFAULT_REGION`: AWS region of the staging bucket.
    - `AWS_ACCESS_KEY_ID`: AWS access key id for the S3 upload.
    - `AWS_SECRET_ACCESS_KEY`: AWS secret access key for the S3 upload.
    - `SLACK_WEBHOOK`: Slack incoming webhook URL used for failure alerts.

    ## Quick start
    1. Add the eight secrets above to your namespace or tenant.
    2. Set the `bucket` input to your staging bucket name.
    3. Adjust the `filters` and `fields` lists to match the invoices and columns you want to export.
    4. Run the flow manually, or let the nightly `Schedule` trigger run it at 02:00 UTC. To
       backfill a past day, start a backfill from the Triggers tab; the window and S3 key follow
       the backfilled date automatically.

    ## Expected outputs
    - `{{ outputs.query_invoices.uri }}`: ION file with the day's invoice rows in internal storage.
    - `{{ outputs.query_invoices.size }}`: number of invoice rows returned by Odoo (also logged).
    - `{{ outputs.convert_to_csv.uri }}`: the generated CSV file in internal storage.
    - The same CSV uploaded to `s3://{{ inputs.bucket }}/{{ vars.s3_key }}`.

    ## Scale notes
    - The `SEARCH_READ` caps at `limit: 100000` rows per run. A single day of invoices is normally
      well under that; if a backfill day could exceed it, lower the window or add an offset loop.
    - An empty day produces a header-only CSV; the log line and `outputs.query_invoices.size`
      let downstream loads decide whether to skip it.

    ## Links
    - Odoo plugin: https://kestra.io/plugins/plugin-odoo
    - Amazon S3 plugin: https://kestra.io/plugins/plugin-aws/s3/io.kestra.plugin.aws.s3.upload
    - Odoo external API (XML-RPC): https://www.odoo.com/documentation/master/developer/reference/external_api.html
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: Nightly Kestra flow that exports one day of Odoo invoices to CSV in S3, with retry, Slack alerting, and backfill-safe partitioning.
