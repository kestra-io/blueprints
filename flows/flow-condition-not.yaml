id: flow-condition-not
namespace: company.team

tasks:
  - id: hello
    type: io.kestra.plugin.core.log.Log
    message: Demo for Not condition 

triggers:
  - id: flow_condition
    type: io.kestra.plugin.core.trigger.Flow
    conditions:
      - type: io.kestra.plugin.core.condition.Not
        conditions:
          - type: io.kestra.plugin.core.condition.ExecutionNamespace
            namespace: company.analytics
            comparison: PREFIX
extend:
  shortDescription: Trigger a flow whenever any upstream execution finishes, except those from a specific namespace, using the Not condition.
  title: Executes flow on flow trigger with Not condition
  metaTitle: Negate flow trigger conditions in Kestra with Not
  description: |
    Run a downstream flow in response to upstream executions while excluding a subset you do not care about, using the `io.kestra.plugin.core.condition.Not` condition wrapped around a `io.kestra.plugin.core.trigger.Flow` trigger. This blueprint shows the negation pattern: react to every flow execution in your instance except those coming from the `company.analytics` namespace prefix. It solves the common event-driven problem where a catch-all flow listener fires too broadly and you need to carve out exceptions without enumerating every namespace you do want.

    ## How it works
    - A single `hello` task of type `io.kestra.plugin.core.log.Log` runs when the flow is triggered, standing in for the real work you would orchestrate.
    - The `flow_condition` trigger of type `io.kestra.plugin.core.trigger.Flow` listens for executions of other flows.
    - Inside the trigger, `io.kestra.plugin.core.condition.Not` wraps a child condition and inverts its result.
    - The wrapped `io.kestra.plugin.core.condition.ExecutionNamespace` checks the source execution namespace with `comparison: PREFIX` against `company.analytics`. Because it sits under `Not`, the trigger fires for executions whose namespace does NOT start with `company.analytics`.

    ## What you get
    - An event-driven listener that reacts to upstream executions across namespaces.
    - A clean exclusion rule instead of a long allowlist of namespaces.
    - A reusable negation pattern that works with both Flow and Schedule triggers.

    ## Who it's for
    - Platform engineers building shared, instance-wide automation flows.
    - Data and DevOps teams that need audit, notification, or cleanup flows to run on most executions but skip a noisy or internal namespace.

    ## Why orchestrate this with Kestra
    Kestra evaluates conditions declaratively in YAML at trigger time, so the negation logic lives next to the trigger rather than buried in task code. Event triggers fire automatically on upstream executions, retries and error handling are built in, and execution lineage is captured so you can trace which upstream run started which downstream flow. A standalone scheduler or cron cannot express "react to events from everywhere except this namespace"; Kestra's composable conditions (`Not`, `ExecutionNamespace`, and others) make that exclusion a one-line declaration.

    ## Prerequisites
    A running Kestra instance and at least one other flow that produces executions to listen for.

    ### Secrets
    This blueprint references no secrets. All logic is core orchestration and requires no external credentials.

    ## Quick start
    1. Add this flow to a namespace in your Kestra instance.
    2. Adjust the `namespace` value under `ExecutionNamespace` to the prefix you want to exclude.
    3. Trigger some upstream flows in and outside that prefix.
    4. Confirm the `hello` task runs only for executions outside `company.analytics`.

    ## How to extend
    - Swap the `hello` Log task for real work such as a notification, a `Subflow`, or a cleanup task.
    - Wrap `Not` around other conditions like `ExecutionFlow`, `ExecutionStatus`, or `ExpressionCondition` to invert different criteria.
    - Combine `Not` with `And` and `Or` conditions to build precise event filters.
    - Reuse the same negation under a `Schedule` trigger to skip certain calendar windows.

    ## Links
    - [plugin-core docs](https://kestra.io/plugins/plugin-core)

  tags:
    - Core
  ee: false
  demo: false
  metaDescription: Invert flow trigger conditions in Kestra using the Not operator. Execute downstream flows only when a specific upstream condition is not satisfied.
