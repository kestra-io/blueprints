id: vmware-provision-configure-register
namespace: company.team
description: >
  Clone a VM from a vCenter template, configure it with Ansible, register the
  new host in ServiceNow CMDB, and notify Slack when all three steps succeed.

inputs:
  - id: vm_name
    type: STRING
    defaults: "app-server-01"
  - id: source_vm_name
    type: STRING
    defaults: "ubuntu-22-04-template"
  - id: vm_address
    type: STRING
    description: "Hostname or IP that Ansible will reach the new VM on."
  - id: environment
    type: SELECT
    values: [dev, staging, production]
    defaults: staging

tasks:
  - id: clone_vm
    type: io.kestra.plugin.ee.vmware.vcenter.CloneVm
    sourceVmName: "{{ inputs.source_vm_name }}"
    targetVmName: "{{ inputs.vm_name }}"
    hostname: "esxi01.company.local"
    datastoreName: "datastore1"
    powerOn: true

  - id: ansible_configure
    type: io.kestra.plugin.ansible.cli.AnsibleCLI
    inputFiles:
      inventory.ini: |
        [app]
        {{ inputs.vm_name }} ansible_host={{ inputs.vm_address }} ansible_user=ubuntu
      configure.yml: "{{ read(secret('ANSIBLE_PLAYBOOK')) }}"
    commands:
      - ansible-playbook -i inventory.ini configure.yml --extra-vars "env={{ inputs.environment }}"
    retry:
      type: constant
      interval: PT2M
      maxAttempt: 3

  - id: servicenow_register
    type: io.kestra.plugin.servicenow.Post
    domain: "{{ secret('SERVICENOW_DOMAIN') }}"
    username: "{{ secret('SERVICENOW_USER') }}"
    password: "{{ secret('SERVICENOW_PASSWORD') }}"
    clientId: "{{ secret('SERVICENOW_CLIENT_ID') }}"
    clientSecret: "{{ secret('SERVICENOW_CLIENT_SECRET') }}"
    table: cmdb_ci_vmware_instance
    data:
      name: "{{ inputs.vm_name }}"
      ip_address: "{{ inputs.vm_address }}"
      environment: "{{ inputs.environment }}"
      short_description: "Provisioned by Kestra execution {{ execution.id }}"

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    payload: |
      {
        "text": ":rocket: {{ inputs.vm_name }} provisioned from {{ inputs.source_vm_name }} ({{ inputs.vm_address }}), configured with Ansible, and registered in ServiceNow."
      }

pluginDefaults:
  - type: io.kestra.plugin.ee.vmware
    values:
      server: "vcenter.company.local"
      username: "{{ secret('VMWARE_VCENTER_USERNAME') }}"
      password: "{{ secret('VMWARE_VCENTER_PASSWORD') }}"

extend:
  shortDescription: "Clone a vCenter VM from a template, configure it with Ansible, register it in ServiceNow CMDB, and notify Slack."
  title: Provision a VMware VM with Ansible configuration and ServiceNow registration
  metaTitle: Provision a VMware VM with Ansible configuration and ServiceNow registration
  description: |
    This flow chains the typical VMware provisioning pattern in a single execution:
    clone a VM from a vCenter template, configure it with an Ansible playbook,
    create a CMDB record in ServiceNow, and notify Slack on success.

    Each step has its own retry, and the entire flow has a single execution
    history, so platform teams replacing a vRA/vRO catalog item get the same
    outcome with one auditable run.

    Prerequisites:
      - Secrets:
        - VMWARE_VCENTER_USERNAME: vCenter user with VM clone permission (required)
        - VMWARE_VCENTER_PASSWORD: vCenter password (required)
        - ANSIBLE_PLAYBOOK: path or content of the playbook to apply (required)
        - SERVICENOW_DOMAIN: ServiceNow instance domain, for example mycorp (required)
        - SERVICENOW_USER, SERVICENOW_PASSWORD: ServiceNow OAuth user credentials (required)
        - SERVICENOW_CLIENT_ID, SERVICENOW_CLIENT_SECRET: ServiceNow OAuth client (required)
        - SLACK_WEBHOOK: Slack Incoming Webhook URL (required)
      - Services: vCenter cluster, Ansible runtime, ServiceNow instance, Slack channel.

    Inputs:
      - vm_name (STRING): the target VM name to create in vCenter.
      - source_vm_name (STRING): the source template name to clone from.
      - vm_address (STRING): hostname or IP that Ansible will reach the new VM on.
      - environment (SELECT, dev / staging / production): passed as Ansible extra-vars.

    Adjust the hardcoded values in clone_vm (hostname, datastoreName) and in
    pluginDefaults (server) to match your vCenter inventory.
  tags:
    - Infrastructure
  ee: true
  demo: false
  metaDescription: "Clone a VM from a vCenter template, configure it with Ansible, register it in ServiceNow CMDB, and notify Slack."
