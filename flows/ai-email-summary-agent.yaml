id: ai-email-summary-agent
namespace: company.team

tasks:
  - id: fetch_emails_past_24_hours
    type: io.kestra.plugin.scripts.python.Script
    script: |
      import imaplib
      import email
      from datetime import datetime, timedelta
      from kestra import Kestra

      host = "{{ secret('IMAP_HOST') }}"
      username = "{{ secret('IMAP_USER') }}"
      password = "{{ secret('IMAP_PASSWORD') }}"

      mail = imaplib.IMAP4_SSL(host)
      mail.login(username, password)
      mail.select("inbox")

      since_date = (datetime.now() - timedelta(days=1)).strftime("%d-%b-%Y")
      status, messages = mail.search(None, f'(SINCE {since_date})')

      email_data = []
      for msg_id in messages[0].split():
          status, msg_data = mail.fetch(msg_id, "(RFC822)")
          msg = email.message_from_bytes(msg_data[0][1])
          snippet = ""
          if msg.is_multipart():
              for part in msg.walk():
                  if part.get_content_type() == "text/plain":
                      snippet = part.get_payload(decode=True).decode(errors="replace")[:200]
                      break
          else:
              snippet = msg.get_payload(decode=True).decode(errors="replace")[:200]

          email_data.append({
              "from": msg.get("From", ""),
              "to": msg.get("To", ""),
              "cc": msg.get("Cc", ""),
              "subject": msg.get("Subject", ""),
              "snippet": snippet
          })

      mail.logout()

      import json
      Kestra.outputs({"emails_json": json.dumps(email_data), "email_count": len(email_data)})

  - id: summarize_emails_with_openai
    type: io.kestra.plugin.openai.ChatCompletion
    apiKey: "{{ secret('OPENAI_API_KEY') }}"
    model: gpt-4o-mini
    messages:
      - role: system
        content: You are a helpful assistant that summarizes emails into concise digests.
      - role: user
        content: |
          Go through this email data and identify all key details mentioned, any specific issues to look at, and action items.
          Use this JSON format for your output:
          {
            "summary_of_emails": ["Point 1", "Point 2", "Point 3"],
            "actions": [
              {"name": "Person Name", "action": "Action description"}
            ]
          }

          Input Data:
          {{ outputs.fetch_emails_past_24_hours.vars.emails_json }}

  - id: build_html_report
    type: io.kestra.plugin.scripts.python.Script
    script: |
      import json
      from kestra import Kestra

      raw = """{{ outputs.summarize_emails_with_openai.choices[0].message.content }}"""
      data = json.loads(raw)

      summary_items = "".join(f"<li>{item}</li>" for item in data.get("summary_of_emails", []))
      action_items = "".join(
          f'<li><strong>{a["name"]}:</strong> {a["action"]}</li>'
          for a in data.get("actions", [])
      )

      html = f"""<!DOCTYPE html>
      <html>
      <head><style>
        body {{ font-family: Arial, sans-serif; background: #f9f9f9; color: #333; }}
        .container {{ max-width: 600px; margin: 20px auto; background: #fff; border: 1px solid #ddd; border-radius: 10px; }}
        .header {{ background: #0073e6; color: #fff; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }}
        .content {{ padding: 20px; }}
        .section-title {{ font-size: 18px; color: #0073e6; }}
        ul li {{ margin: 8px 0; padding: 8px; background: #f4f4f4; border-left: 4px solid #0073e6; border-radius: 4px; list-style: none; }}
        .footer {{ background: #0073e6; color: #fff; text-align: center; padding: 10px; border-radius: 0 0 10px 10px; font-size: 14px; }}
      </style></head>
      <body><div class="container">
        <div class="header"><h1>Daily Email Summary</h1></div>
        <div class="content">
          <h2 class="section-title">Summary</h2><ul>{summary_items}</ul>
          <h2 class="section-title">Action Items</h2><ul>{action_items}</ul>
        </div>
        <div class="footer">Generated by Kestra AI Email Summary Agent</div>
      </div></body></html>"""

      Kestra.outputs({"html_report": html})

  - id: send_summary_email
    type: io.kestra.plugin.email.MailSend
    host: "{{ secret('SMTP_HOST') }}"
    port: 587
    username: "{{ secret('SMTP_USER') }}"
    password: "{{ secret('SMTP_PASSWORD') }}"
    from: "{{ secret('EMAIL_FROM') }}"
    to: "{{ secret('EMAIL_RECIPIENTS') }}"
    subject: "Daily Email Summary - {{ now() | dateFormat('dd MMM yyyy') }}"
    htmlTextContent: "{{ outputs.build_html_report.vars.html_report }}"

triggers:
  - id: daily_7am_trigger
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 7 * * *"

extend:
  title: AI Email Summary Agent
  metaTitle: AI Email Summary Agent with OpenAI
  shortDescription: >-
    Fetch recent emails via IMAP, summarize key points and action items with
    OpenAI, and deliver a formatted digest to your team each morning.
  description: |
    **Automatically fetch, summarize, and distribute a daily email digest powered by AI to help teams stay on top of their inbox.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger fires daily at 7 AM to start the workflow
    2. A `io.kestra.plugin.scripts.python.Script` task connects to the mail server via IMAP, fetches emails from the past 24 hours, and extracts sender, recipient, and snippet fields
    3. A `io.kestra.plugin.openai.ChatCompletion` task sends the aggregated email data to OpenAI with a prompt that extracts key summaries and action items in structured JSON
    4. A `io.kestra.plugin.scripts.python.Script` task builds a styled HTML email report from the AI-generated summary
    5. A `io.kestra.plugin.email.MailSend` task delivers the formatted digest to the configured team recipients

    Ideal for:
    - **Team leads** who need a concise daily overview of inbox activity without reading every message
    - **Operations teams** managing high-volume email inboxes where action items can easily be missed
    - **Professionals** preparing for morning standups who want a pre-built summary of overnight communications
  tags:
    - AI
    - Business
  ee: false
  demo: false
  metaDescription: >-
    Fetch emails from the past 24 hours, use OpenAI to extract summaries and
    action items, and send a formatted HTML digest to your team every morning.

