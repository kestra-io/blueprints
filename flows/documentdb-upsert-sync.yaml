id: documentdb-upsert-sync
namespace: company.team

labels:
  team: data
  domain: sync

concurrency:
  limit: 1

inputs:
  - id: source_url
    type: STRING
    defaults: https://jsonplaceholder.typicode.com/users/1
    description: External source returning the current record to sync.

  - id: retire_when_gone
    type: BOOLEAN
    defaults: false
    description: |
      When true and the source returns 404/410 (record retired at the source), delete exactly the one
      matching document. Defaults to false. There is no collection-wide age-based prune: a single-record
      sync cannot safely decide that other documents are stale, so retention is opt-in and id-scoped only.

variables:
  database: app_data
  collection: catalog

pluginDefaults:
  - type: io.kestra.plugin.documentdb
    values:
      host: "{{ secret('DOCUMENTDB_HOST') }}"
      database: "{{ vars.database }}"
      username: "{{ secret('DOCUMENTDB_USERNAME') }}"
      password: "{{ secret('DOCUMENTDB_PASSWORD') }}"

tasks:
  - id: fetch_source
    type: io.kestra.plugin.core.http.Request
    description: Pull the current record from the external source of truth (404/410 means retired).
    uri: "{{ inputs.source_url }}"
    method: GET
    contentType: application/json
    options:
      allowFailed: true
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: route
    type: io.kestra.plugin.core.flow.If
    description: Branch on whether the source returned a live record or signalled the record is retired.
    condition: "{{ outputs.fetch_source.code == 200 }}"
    then:
      - id: guard_body
        type: io.kestra.plugin.core.execution.Fail
        description: Validate the source body has the scalar fields the sync needs before any write.
        condition: "{{ (fromJson(outputs.fetch_source.body).id is defined and fromJson(outputs.fetch_source.body).name is defined and fromJson(outputs.fetch_source.body).email is defined) == false }}"
        errorMessage: "Source body from {{ inputs.source_url }} is missing required scalar fields id/name/email."

      - id: read_existing
        type: io.kestra.plugin.documentdb.Read
        description: Check whether a document with this external_id already exists.
        collection: "{{ vars.collection }}"
        filter:
          external_id: "{{ fromJson(outputs.fetch_source.body).id }}"
        fetchType: FETCH_ONE
        retry:
          type: constant
          interval: PT10S
          maxAttempt: 3

      - id: upsert
        type: io.kestra.plugin.core.flow.If
        description: Update when the record exists, otherwise insert (emulated upsert; Update has no native upsert flag).
        condition: "{{ outputs.read_existing.row is defined and outputs.read_existing.row is not null }}"
        then:
          - id: update_existing
            type: io.kestra.plugin.documentdb.Update
            description: Refresh the matched document and bump the sync counter.
            collection: "{{ vars.collection }}"
            filter:
              external_id: "{{ fromJson(outputs.fetch_source.body).id }}"
            update:
              $set:
                name: "{{ fromJson(outputs.fetch_source.body).name }}"
                email: "{{ fromJson(outputs.fetch_source.body).email }}"
                synced_at: "{{ trigger.date ?? execution.startDate }}"
              $inc:
                sync_count: 1
            updateMany: false
            retry:
              type: constant
              interval: PT10S
              maxAttempt: 3
        else:
          - id: insert_new
            type: io.kestra.plugin.documentdb.Insert
            description: Insert the record for the first time when no match exists.
            collection: "{{ vars.collection }}"
            document:
              external_id: "{{ fromJson(outputs.fetch_source.body).id }}"
              name: "{{ fromJson(outputs.fetch_source.body).name }}"
              email: "{{ fromJson(outputs.fetch_source.body).email }}"
              sync_count: 1
              synced_at: "{{ trigger.date ?? execution.startDate }}"
            retry:
              type: constant
              interval: PT10S
              maxAttempt: 3

      - id: log_synced
        type: io.kestra.plugin.core.log.Log
        message: "Synced external_id={{ fromJson(outputs.fetch_source.body).id }}: {{ outputs.upsert.evaluationResult ? 'updated existing' : 'inserted new' }}."
    else:
      - id: handle_retired
        type: io.kestra.plugin.core.flow.If
        description: Optionally delete the single retired document, scoped to its external_id, only when opted in.
        condition: "{{ inputs.retire_when_gone and (outputs.fetch_source.code == 404 or outputs.fetch_source.code == 410) }}"
        then:
          - id: delete_retired
            type: io.kestra.plugin.documentdb.Delete
            description: Delete exactly the one document whose source record is retired (scoped, never collection-wide).
            collection: "{{ vars.collection }}"
            filter:
              external_id: "{{ inputs.source_url | split('/') | last }}"
            deleteMany: false
            retry:
              type: constant
              interval: PT10S
              maxAttempt: 3

          - id: log_retired
            type: io.kestra.plugin.core.log.Log
            message: "Source returned {{ outputs.fetch_source.code }} for {{ inputs.source_url }}; removed {{ outputs.delete_retired.deletedCount }} retired document(s)."
        else:
          - id: log_skipped
            type: io.kestra.plugin.core.log.Log
            message: "Source returned {{ outputs.fetch_source.code }} for {{ inputs.source_url }}; no write performed (retire_when_gone={{ inputs.retire_when_gone }})."

errors:
  - id: alert_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK') }}"
    messageText: ":rotating_light: {{ flow.namespace }}.{{ flow.id }} failed (execution {{ execution.id }}). The collection may be partially synced; check before re-running."

triggers:
  - id: hourly_sync
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 * * * *"
    timezone: Etc/UTC

extend:
  shortDescription: Sync one external record into DocumentDB with a serialized emulated upsert and optional id-scoped retirement.
  title: Upsert a DocumentDB record from an external source
  metaTitle: DocumentDB upsert and sync lifecycle
  description: |
    This flow keeps a DocumentDB collection in sync with an external source of truth, one record per run.
    The DocumentDB Update task does not expose a native `upsert` flag, so this flow emulates upsert with a
    Read keyed on `external_id` followed by a conditional Update (when found) or Insert (when not). The
    naive form of this pattern has a time-of-check / time-of-use race: a concurrent run could read "absent"
    and both insert. This flow closes that gap with `concurrency.limit: 1`, which serializes the hourly
    fires and any backfill so two executions never interleave, and recommends a unique index on
    `external_id` as a backstop so a duplicate insert fails loudly rather than silently doubling the record.

    There is deliberately no scheduled collection-wide delete. A flow that syncs a single record cannot
    know that the other documents are stale, so an age-based `deleteMany` would progressively wipe the
    collection. Instead, retirement is opt-in and tightly scoped: when `retire_when_gone` is true and the
    source returns 404/410 for the record, the flow deletes exactly that one document by its `external_id`.

    ## What this flow does
    1. Fetches the current record with `io.kestra.plugin.core.http.Request` (with retry; `options.allowFailed`
       so a 404/410 routes to the retirement branch instead of failing the run).
    2. When the source returns 200, validates the body has scalar `id`/`name`/`email` with
       `io.kestra.plugin.core.execution.Fail`, reads the collection with `fetchType: FETCH_ONE`, then
       branches with `io.kestra.plugin.core.flow.If`: `io.kestra.plugin.documentdb.Update`
       (`updateMany: false`) when the record exists, `io.kestra.plugin.documentdb.Insert` when it does not.
    3. When the source returns 404/410 and `retire_when_gone` is true, deletes only that one document
       with `io.kestra.plugin.documentdb.Delete` (`deleteMany: false`); otherwise it logs and writes nothing.
    4. Logs which branch ran and the external_id synced.

    ## Concurrency and uniqueness
    - `concurrency.limit: 1` serializes runs so an hourly fire cannot overlap a backfill and the
      read-then-write upsert cannot race against another execution of this flow.
    - Create a unique index on `external_id` in the collection so that, even against an external writer,
      a duplicate insert fails rather than silently creating a second document for the same source record.

    ## Safety
    - The destructive path is opt-in (`retire_when_gone`, default false), only fires on an explicit 404/410,
      and is scoped to a single `external_id` with `deleteMany: false`. There is no unbounded scheduled delete.
    - The source body is validated before it flows into the filter and update operators.
    - A flow-level `errors` block posts a Slack alert with the execution ID so a partial sync is never silent.

    ## Prerequisites
    - A reachable DocumentDB Data REST API endpoint with a `catalog` collection keyed by `external_id`
      (with a unique index on `external_id`).
    - An external HTTP source that returns the current record as JSON with scalar `id`, `name`, and `email`
      fields, and 404/410 when a record is retired.
    - Outbound network access from Kestra workers to both the source and DocumentDB.

    ## Secrets
    - `DOCUMENTDB_HOST`: base HTTPS endpoint of the DocumentDB Data REST API.
    - `DOCUMENTDB_USERNAME`: basic-auth username for the DocumentDB API.
    - `DOCUMENTDB_PASSWORD`: basic-auth password for the DocumentDB API.
    - `SLACK_WEBHOOK`: Slack incoming webhook URL used by the failure alert.

    ## Quick start
    1. Add the four secrets above to your Kestra instance.
    2. Point `source_url` at your record endpoint and set the `database` and `collection` variables.
    3. Run once to confirm the insert path, run again to confirm the update path (collection size unchanged,
       `sync_count` incremented), then enable the hourly schedule. Turn on `retire_when_gone` only once you
       are confident the source returns 404/410 for genuinely retired records.

    ## Expected outputs
    - `{{ outputs.read_existing.row }}`: the existing document when one was found, otherwise null.
    - `{{ outputs.upsert.evaluationResult }}`: true when the update branch ran, false when insert ran.
    - `{{ outputs.delete_retired.deletedCount }}`: number of retired documents removed (0 or 1) when the
      retirement branch ran.

    ## Links
    - DocumentDB plugin: https://kestra.io/plugins/plugin-documentdb
    - HTTP Request task: https://kestra.io/plugins/core/tasks/http/io.kestra.plugin.core.http.request
    - If task: https://kestra.io/plugins/core/tasks/flow/io.kestra.plugin.core.flow.if
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Sync one external record into DocumentDB with a serialized read-then-upsert and optional id-scoped retirement, with retry and alerts.
