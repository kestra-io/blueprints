id: netbox-ansible-by-role-site
namespace: company.team
description: |
  Use NetBox as the source of truth for configuration runs. List every active
  device of a given role and site, run an Ansible playbook against each one,
  then post a summary to Slack.

inputs:
  - id: site
    type: STRING
    defaults: nyc-dc1
    description: NetBox site slug to target.
  - id: role
    type: STRING
    defaults: access-switch
    description: NetBox device role slug to target.

tasks:
  - id: list_devices
    type: io.kestra.plugin.ee.netbox.device.List
    description: Fetch active devices of the requested role and site from NetBox.
    filters:
      site: "{{ inputs.site }}"
      role: "{{ inputs.role }}"
      status: active
    fields:
      - name
      - status
    fetchType: FETCH

  - id: configure_devices
    type: io.kestra.plugin.core.flow.ForEach
    description: Run the baseline playbook against each device returned by NetBox.
    values: "{{ outputs.list_devices.rows }}"
    concurrencyLimit: 5
    tasks:
      - id: ansible_apply
        type: io.kestra.plugin.ansible.cli.AnsibleCLI
        description: Apply the configuration baseline to a single device.
        taskRunner:
          type: io.kestra.plugin.core.runner.Process
        inputFiles:
          inventory.ini: |
            [{{ inputs.role }}]
            {{ taskrun.value.name }}
          site.yml: |
            ---
            - name: Enforce configuration baseline
              hosts: all
              gather_facts: false
              tasks:
                - name: Confirm reachability
                  ansible.builtin.ping:
        commands:
          - ansible-playbook -i inventory.ini site.yml

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Post a run summary to Slack.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Ansible baseline applied to {{ outputs.list_devices.size }} {{ inputs.role }} device(s) in {{ inputs.site }}."
      }

pluginDefaults:
  - type: io.kestra.plugin.ee.netbox.device.List
    values:
      url: "{{ secret('NETBOX_URL') }}"
      token: "{{ secret('NETBOX_API_TOKEN') }}"

triggers:
  - id: daily_enforcement
    type: io.kestra.plugin.core.trigger.Schedule
    description: Enforce the baseline daily. Adjust or disable as needed.
    cron: "0 6 * * *"
    disabled: true

extend:
  shortDescription: List active NetBox devices by role and site, run an Ansible playbook against each, and report to Slack.
  title: Run Ansible Against NetBox Devices by Role and Site
  metaTitle: Run Ansible Against NetBox Devices by Role and Site
  description: |
    This blueprint drives configuration management from NetBox. It queries NetBox
    for active devices matching a role and site, iterates over the result set, runs
    an Ansible playbook against each device, and posts a summary to Slack. NetBox
    stays the single source of truth for which hosts are in scope.

    Prerequisites:
      - Secrets:
        - NETBOX_URL: Base URL of the NetBox instance (for example, https://netbox.example.com).
        - NETBOX_API_TOKEN: NetBox API token sent as Authorization: Token.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL for the summary message.
      - Ansible installed on the worker (the AnsibleCLI task uses the Process runner) and SSH reach to the devices.

    Quick start:
      1. Set the three secrets above in your Kestra namespace.
      2. Run the flow with the site and role you want to target.
      3. Replace the sample site.yml playbook with your real baseline tasks.

    Outputs:
      - outputs.list_devices.rows: the matching devices returned by NetBox.
      - outputs.list_devices.size: number of devices configured.
      - outputs.configure_devices: per-device Ansible results.

    Notes:
      - The playbook uses each device's NetBox name as the inventory host; adjust to your DNS or IP source.
      - concurrencyLimit caps parallel Ansible runs so large fleets do not overwhelm the worker.
  tags:
    - Infrastructure
  ee: true
  demo: false
  metaDescription: Query NetBox for devices by role and site, run an Ansible playbook against each one, and post a summary to Slack.
