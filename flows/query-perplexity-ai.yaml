extend:
  title: Query Perplexity AI for Research and Answers
  metaTitle: Query Perplexity AI for Research
  shortDescription: >-
    Send questions to the Perplexity AI Sonar API and get accurate, citation-backed answers.
    Configure system prompts, domain filters, and search recency for targeted research.
  description: |
    **Integrate Perplexity AI into your automation workflows to get real-time, citation-backed answers to any research question.**

    1. A `io.kestra.plugin.scripts.python.Script` task defines the system prompt, user question, and optional domain filters for the search
    2. A `io.kestra.plugin.core.http.Request` task sends a structured request to the Perplexity AI Chat Completions API with configurable model, temperature, and search parameters
    3. A `io.kestra.plugin.scripts.python.Script` task extracts the answer text and source citations from the API response

    Ideal for:
    - **Researchers** who need automated, source-cited answers from the web on specific topics
    - **Content teams** building fact-checking or knowledge-gathering pipelines
    - **Developers** integrating real-time web search and AI summarization into larger workflows
  tags:
    - AI
    - Research
    - API
  ee: false
  demo: false
  metaDescription: >-
    Query Perplexity AI Sonar API for real-time, citation-backed research answers.
    Configure prompts, domain filters, and search recency for targeted results.

id: query-perplexity-ai
namespace: company.team

inputs:
  - id: system_prompt
    type: STRING
    defaults: "You are a helpful research assistant."
    description: System prompt that sets the AI persona and behavior
  - id: user_prompt
    type: STRING
    defaults: "What are the key differences between workflow orchestration platforms?"
    description: The research question or query to send to Perplexity
  - id: domain_filter
    type: STRING
    defaults: ""
    description: Comma-separated list of domains to restrict search results (leave empty for unrestricted)

tasks:
  - id: build_request_body
    type: io.kestra.plugin.scripts.python.Script
    description: Construct the Perplexity API request payload with prompts and search configuration
    script: |
      import json
      from kestra import Kestra

      system_prompt = "{{ inputs.system_prompt }}"
      user_prompt = "{{ inputs.user_prompt }}"
      domain_filter = "{{ inputs.domain_filter }}"

      # Build domain filter list
      domains = [d.strip() for d in domain_filter.split(",") if d.strip()] if domain_filter else []

      body = {
          "model": "sonar",
          "messages": [
              {"role": "system", "content": system_prompt},
              {"role": "user", "content": user_prompt}
          ],
          "temperature": 0.2,
          "top_p": 0.9,
          "return_images": False,
          "return_related_questions": False,
          "search_recency_filter": "month",
          "top_k": 0,
          "stream": False,
          "presence_penalty": 0,
          "frequency_penalty": 1
      }

      if domains:
          body["search_domain_filter"] = domains

      Kestra.outputs({"request_body": json.dumps(body)})

  - id: query_perplexity
    type: io.kestra.plugin.core.http.Request
    description: Send the query to the Perplexity AI Chat Completions endpoint
    uri: "https://api.perplexity.ai/chat/completions"
    method: POST
    contentType: application/json
    headers:
      Authorization: "Bearer {{ secret('PERPLEXITY_API_KEY') }}"
    body: "{{ outputs.build_request_body.vars.request_body }}"

  - id: extract_results
    type: io.kestra.plugin.scripts.python.Script
    description: Extract the answer text and citations from the Perplexity response
    script: |
      import json
      from kestra import Kestra

      response = json.loads("""{{ outputs.query_perplexity.body }}""")

      answer = response.get("choices", [{}])[0].get("message", {}).get("content", "No answer returned.")
      citations = response.get("citations", [])

      Kestra.outputs({
          "answer": answer,
          "citations": json.dumps(citations)
      })
