id: dagster-trigger-job
namespace: company.team

inputs:
  - id: job_name
    type: STRING
    description: The Dagster job name to trigger
    defaults: example_job

tasks:
  - id: trigger_job
    type: io.kestra.plugin.dagster.TriggerRun
    description: Trigger a Dagster job and wait for completion.
    baseUrl: "{{ secret('DAGSTER_BASE_URL') }}"
    jobName: "{{ inputs.job_name }}"
    repository: __repository__
    location: "{{ secret('DAGSTER_LOCATION') }}"
    wait: true
    pollFrequency: PT5S
    maxDuration: PT30M
    body:
      tags:
        source: kestra
        namespace: "{{ flow.namespace }}"
        flow: "{{ flow.id }}"
        execution: "{{ execution.id }}"
    options:
      headers:
        Authorization: "Bearer {{ secret('DAGSTER_TOKEN') }}"

extend:
  shortDescription: "Trigger a Dagster job from Kestra and wait for its completion."
  title: Trigger a Dagster Job
  metaTitle: Trigger a Dagster Job
  description: |
    This blueprint shows how to trigger a Dagster job from Kestra
    using the Dagster GraphQL API. The task waits for the job to
    reach a terminal state and returns run metadata.

    Kestra metadata is passed as Dagster run tags so you can trace
    which Kestra execution triggered each Dagster run.

    Prerequisites:
      - Secrets:
        - DAGSTER_BASE_URL: Dagster GraphQL endpoint (e.g. http://dagster:3000/graphql).
        - DAGSTER_TOKEN: Bearer token for Dagster API authentication.
        - DAGSTER_LOCATION: Repository location name in Dagster.
      - Services:
        - A running Dagster instance with the GraphQL API accessible.

    Expected outputs:
      - `{{ outputs.trigger_job.runId }}`: The Dagster run ID.
      - `{{ outputs.trigger_job.jobName }}`: The triggered job name.
      - `{{ outputs.trigger_job.status }}`: Final status (SUCCESS, FAILURE, CANCELED).

  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Trigger a Dagster job from Kestra and wait for completion. Automate cross-platform orchestration between Kestra and Dagster data asset pipelines.
