id: dbt-core-approval-gate
namespace: company.team
description: |
  Promote a dbt Core build to production behind an approval. Build and test
  against the CI target, pause for review, then build against the production
  target so production models only run after sign-off.

inputs:
  - id: approval_timeout
    type: DURATION
    defaults: PT2H
    description: How long to wait for production approval.

tasks:
  - id: build_ci
    type: io.kestra.plugin.dbt.cli.DbtCLI
    description: Build and test against the CI target.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: ghcr.io/kestra-io/dbt-duckdb:latest
    namespaceFiles:
      enabled: true
    commands:
      - dbt deps
      - dbt build --target ci

  - id: notify_approval
    type: io.kestra.plugin.telegram.TelegramSend
    description: Tell the team the CI build passed and a production build needs approval.
    token: "{{ secret('TELEGRAM_TOKEN') }}"
    channel: "{{ secret('TELEGRAM_CHANNEL') }}"
    payload: |
      {
        "text": "Approval needed: dbt CI build passed and the production build is paused for review (execution {{ execution.id }})."
      }

  - id: approve_production
    type: io.kestra.plugin.core.flow.Pause
    description: Wait for a human to approve the production build.
    pauseDuration: "{{ inputs.approval_timeout }}"

  - id: build_production
    type: io.kestra.plugin.dbt.cli.DbtCLI
    description: Build against the production target after approval.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: ghcr.io/kestra-io/dbt-duckdb:latest
    namespaceFiles:
      enabled: true
    commands:
      - dbt build --target prod

triggers:
  - id: scheduled_build
    type: io.kestra.plugin.core.trigger.Schedule
    description: dbt Core builds typically run on a cadence. Adjust or disable as needed.
    cron: "0 2 * * *"
    disabled: true

extend:
  shortDescription: Build and test dbt Core on the CI target, pause for approval, then build on the production target.
  title: dbt Core Production Build with an Approval Gate
  metaTitle: dbt Core Production Build with an Approval Gate
  description: |
    This blueprint keeps production dbt Core builds behind a human gate. It builds
    and tests against the CI target, pauses for an approval, then builds against
    the production target. Because the gate sits between the two builds, production
    models only run after CI passes and someone signs off.

    Prerequisites:
      - A dbt project with ci and prod targets in profiles.yml, uploaded as namespace files
        (warehouse credentials live in the dbt profile, so no Kestra secret is needed for the build).
      - Secrets:
        - TELEGRAM_TOKEN: Telegram Bot API token for the approval notification.
        - TELEGRAM_CHANNEL: Telegram chat or channel ID to notify.

    Quick start:
      1. Upload your dbt project (with ci and prod targets) to the namespace.
      2. Enable the Schedule trigger, or run the flow manually.
      3. Approve the Pause to build the production target.

    Outputs:
      - outputs.build_ci / outputs.build_production: dbt build results per target.

    Notes:
      - The CI build fails the flow before the approval matters if data quality tests fail.
      - Target names (ci, prod) must match your profiles.yml.
      - dbt Core has no native webhook, so this runs on a schedule. To trigger on merged PRs, swap in a GitHub webhook; for dbt Cloud, use the dbt-cloud-approval-gate blueprint.
  tags:
    - Data
  ee: false
  demo: false
  metaDescription: Build and test dbt Core on the CI target, pause for approval, then build on the production target.
