id: schedule-condition-or
namespace: company.team

tasks:
  - id: hello
    type: io.kestra.plugin.core.log.Log
    message: Demo for Or condition 

triggers:
  - id: schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 11 * * *"
    conditions:
      - type: io.kestra.plugin.core.condition.Or
        conditions:
          - type: io.kestra.plugin.core.condition.DayWeek
            date: "{{ trigger.date }}"
            dayOfWeek: MONDAY
          - type: io.kestra.plugin.core.condition.DayWeek
            date: "{{ trigger.date }}"
            dayOfWeek: THURSDAY

extend:
  shortDescription: Run a scheduled flow only when any one of several conditions is true, using the Or operator on a cron Schedule trigger.
  title: Executes flow on schedule trigger with Or condition
  metaTitle: Schedule Trigger with Or Condition in Kestra
  metaDescription: Combine multiple Kestra schedule conditions with the Or operator. Trigger a workflow whenever any one of several configured cron conditions is satisfied.
  description: |
    Plain cron expressions cannot say "run this only on Mondays or Thursdays" in a single, readable line. This blueprint shows how to layer Kestra schedule conditions on top of a standard cron trigger, then combine them with the `io.kestra.plugin.core.condition.Or` operator so the flow fires when any one of several conditions evaluates to true. It is a clean pattern for selective scheduling, business-calendar logic, and multi-rule time windows without writing custom date math.

    ## How it works

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger evaluates daily at 11am using the cron expression `0 11 * * *`.
    2. The schedule carries a single `io.kestra.plugin.core.condition.Or` condition that wraps two child conditions.
    3. Each child is a `io.kestra.plugin.core.condition.DayWeek` condition checking `{{ trigger.date }}` against `dayOfWeek: MONDAY` and `dayOfWeek: THURSDAY` respectively.
    4. Because `Or` requires only one child to pass, the flow executes at 11am on Mondays and on Thursdays, and is skipped on every other day.
    5. When the condition passes, the `hello` task (`io.kestra.plugin.core.log.Log`) runs and emits a confirmation message to the logs.

    ## What you get

    - A reusable template for conditional scheduling without complex cron hacks.
    - Day-of-week gating driven by `{{ trigger.date }}` so logic stays declarative.
    - A working example of `Or` to combine multiple independent triggering rules.
    - A safe, side-effect-free demo task you can swap for real work.

    ## Who it's for

    - Data engineers who need flows to run only on specific business days.
    - Platform teams standardizing scheduling patterns across many flows.
    - Anyone who finds raw cron hard to read or maintain for calendar logic.

    ## Why orchestrate this with Kestra

    A raw scheduler can only express a single cron pattern; it cannot easily combine "Mondays or Thursdays or month-end" without brittle expressions or duplicate jobs. Kestra lets you attach multiple declarative conditions to one trigger and combine them with `Or` (or `And`), all in version-controlled YAML. You also gain automatic retries, full execution lineage, and event-driven extensibility that a bare cron entry cannot provide.

    ## Prerequisites

    - A running Kestra instance.

    ### Secrets

    This flow uses no secrets.

    ## Quick start

    1. Add this flow to your Kestra instance.
    2. Confirm the `schedule` trigger is enabled.
    3. Wait for 11am on a Monday or Thursday, or backfill the trigger to test.
    4. Check the execution logs for the message from the `hello` task.

    ## How to extend

    - Add more `DayWeek` children, or mix in `io.kestra.plugin.core.condition.DateTimeBetween` for time windows.
    - Switch the wrapper to `io.kestra.plugin.core.condition.And` to require all conditions.
    - Replace the `Log` task with real work such as a query, an API call, or a subflow.

    ## Links

    - [Kestra Core plugin documentation](https://kestra.io/plugins/plugin-core)

  tags:
    - Core
  ee: false
  demo: true
