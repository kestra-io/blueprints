extend:
  title: Send Bulk Emails via Gmail from a Google Sheet
  metaTitle: Send Bulk Emails from Google Sheets
  shortDescription: >-
    Read recipient data from a Google Sheet, filter rows by status and
    scheduled date, send personalized emails via SMTP, and update each
    row's status after delivery.
  description: |
    **Automate personalized bulk email delivery by reading a Google Sheet, filtering for ready-to-send rows, dispatching emails, and marking each row as sent.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger runs the flow every 6 minutes to check for new messages to send
    2. A `io.kestra.plugin.scripts.python.Script` task authenticates with the Google Sheets API and retrieves all rows from the target spreadsheet
    3. A `io.kestra.plugin.scripts.python.Script` task filters rows where the status is "Waiting for sending" and the scheduled date matches today
    4. A `io.kestra.plugin.scripts.python.Script` task iterates over filtered rows, sends each email via SMTP using the row's recipient address, subject, and body content
    5. A `io.kestra.plugin.scripts.python.Script` task updates the Google Sheet to mark each successfully sent row with a "Sent successfully" status

    Ideal for:
    - **Marketing teams** running scheduled outreach campaigns managed in a shared spreadsheet
    - **Customer success managers** sending personalized follow-ups based on a CRM export in Google Sheets
    - **Small businesses** who need a simple, spreadsheet-driven bulk email system without dedicated email marketing software
  tags:
    - Email
    - Google Sheets
    - Automation
  ee: false
  demo: false
  metaDescription: >-
    Read recipients from a Google Sheet, filter by status and date, send
    personalized emails via Gmail SMTP, and update delivery status automatically.

id: gmail-bulk-send-from-google-sheets
namespace: company.team

tasks:
  - id: retrieve_customer_messages
    type: io.kestra.plugin.scripts.python.Script
    script: |
      import json
      from google.oauth2.service_account import Credentials
      from googleapiclient.discovery import build
      from kestra import Kestra

      SCOPES = ["https://www.googleapis.com/auth/spreadsheets"]
      SPREADSHEET_ID = "{{ secret('GOOGLE_SHEET_ID') }}"
      RANGE = "Page!A:H"

      creds = Credentials.from_service_account_info(
          json.loads("{{ secret('GOOGLE_SERVICE_ACCOUNT_JSON') }}"),
          scopes=SCOPES
      )
      service = build("sheets", "v4", credentials=creds)
      result = service.spreadsheets().values().get(
          spreadsheetId=SPREADSHEET_ID, range=RANGE
      ).execute()
      rows = result.get("values", [])

      if len(rows) > 1:
          headers = rows[0]
          data = [dict(zip(headers, row)) for row in rows[1:]]
      else:
          data = []

      Kestra.outputs({"sheet_data": json.dumps(data), "row_count": len(data)})

  - id: filter_and_send_emails
    type: io.kestra.plugin.scripts.python.Script
    script: |
      import json
      import smtplib
      from email.mime.text import MIMEText
      from datetime import datetime
      from kestra import Kestra

      rows = json.loads("""{{ outputs.retrieve_customer_messages.vars.sheet_data }}""")
      today = datetime.now().strftime("%Y/%m/%d")

      smtp_host = "{{ secret('SMTP_HOST') }}"
      smtp_port = 587
      smtp_user = "{{ secret('SMTP_USER') }}"
      smtp_pass = "{{ secret('SMTP_PASSWORD') }}"
      sender = "{{ secret('EMAIL_FROM') }}"

      sent_ids = []

      server = smtplib.SMTP(smtp_host, smtp_port)
      server.starttls()
      server.login(smtp_user, smtp_pass)

      for row in rows:
          status = row.get("Status", "")
          date = row.get("Date", "")
          email_to = row.get("Email", "")
          subject = row.get("Title", "")
          body = row.get("Subject", "")
          name = row.get("Name", "")
          row_id = row.get("ID", "")

          if status != "Waiting for sending":
              continue
          if date != today:
              continue
          if not email_to or not subject:
              continue

          msg = MIMEText(body, "plain")
          msg["Subject"] = subject
          msg["From"] = sender
          msg["To"] = email_to

          try:
              server.sendmail(sender, [email_to], msg.as_string())
              sent_ids.append(row_id)
          except Exception as e:
              print(f"Failed to send to {email_to}: {e}")

      server.quit()

      Kestra.outputs({"sent_ids": json.dumps(sent_ids), "sent_count": len(sent_ids)})

  - id: update_sheet_status
    type: io.kestra.plugin.scripts.python.Script
    script: |
      import json
      from google.oauth2.service_account import Credentials
      from googleapiclient.discovery import build
      from kestra import Kestra

      SCOPES = ["https://www.googleapis.com/auth/spreadsheets"]
      SPREADSHEET_ID = "{{ secret('GOOGLE_SHEET_ID') }}"

      sent_ids = json.loads("""{{ outputs.filter_and_send_emails.vars.sent_ids }}""")

      if not sent_ids:
          Kestra.outputs({"updated_count": 0})
      else:
          creds = Credentials.from_service_account_info(
              json.loads("{{ secret('GOOGLE_SERVICE_ACCOUNT_JSON') }}"),
              scopes=SCOPES
          )
          service = build("sheets", "v4", credentials=creds)

          # Read the sheet to find row numbers for sent IDs
          result = service.spreadsheets().values().get(
              spreadsheetId=SPREADSHEET_ID, range="Page!A:H"
          ).execute()
          rows = result.get("values", [])
          headers = rows[0] if rows else []
          id_col = headers.index("ID") if "ID" in headers else 0
          status_col = headers.index("Status") if "Status" in headers else 4

          updates = []
          for i, row in enumerate(rows[1:], start=2):
              row_id = row[id_col] if len(row) > id_col else ""
              if row_id in sent_ids:
                  cell = f"Page!{chr(65 + status_col)}{i}"
                  updates.append({"range": cell, "values": [["Sent successfully"]]})

          if updates:
              service.spreadsheets().values().batchUpdate(
                  spreadsheetId=SPREADSHEET_ID,
                  body={"valueInputOption": "RAW", "data": updates}
              ).execute()

          Kestra.outputs({"updated_count": len(updates)})

triggers:
  - id: schedule_trigger
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "*/6 * * * *"
