id: cloudflare-cache-purge-on-deploy
namespace: company.team
description: |
  Purge the Cloudflare cache the moment a deployment goes healthy. A webhook
  from the CD system (for example Argo CD reporting Healthy) fires the flow,
  which purges the zone cache, verifies the site serves fresh content, and
  reports to Slack.

inputs:
  - id: zone_id
    type: STRING
    description: Cloudflare zone ID to purge.
  - id: verify_url
    type: STRING
    defaults: https://app.example.com/
    description: URL probed after purge to confirm the site is serving.

tasks:
  - id: purge_cache
    type: io.kestra.plugin.cloudflare.cache.Purge
    description: Purge the entire zone cache so clients fetch the new release.
    zoneId: "{{ inputs.zone_id }}"
    purgeAll: true

  - id: verify_site
    type: io.kestra.plugin.core.http.Request
    description: Confirm the site responds after the purge.
    uri: "{{ inputs.verify_url }}"
    method: GET

  - id: notify
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    description: Report the purge and verification result to Slack.
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Cloudflare cache purged for zone {{ inputs.zone_id }}. {{ inputs.verify_url }} returned {{ outputs.verify_site.code }}."
      }

pluginDefaults:
  - type: io.kestra.plugin.cloudflare.cache.Purge
    values:
      apiToken: "{{ secret('CLOUDFLARE_API_TOKEN') }}"

triggers:
  - id: deploy_healthy
    type: io.kestra.plugin.core.trigger.Webhook
    description: Fires when the CD system reports the deployment is healthy.
    key: "{{ secret('CLOUDFLARE_PURGE_WEBHOOK_KEY') }}"

extend:
  shortDescription: Purge the Cloudflare zone cache on a deploy-healthy webhook, then verify the site and notify Slack.
  title: Purge Cloudflare Cache on Deployment Healthy
  metaTitle: Purge Cloudflare Cache on Deployment Healthy
  description: |
    This blueprint wires your delivery pipeline to Cloudflare. When the CD system
    reports a deployment is healthy it calls the webhook, the flow purges the full
    zone cache so users immediately get the new release, probes the site to confirm
    it is serving, and posts the result to Slack.

    Prerequisites:
      - Secrets:
        - CLOUDFLARE_API_TOKEN: Cloudflare token with cache purge permission.
        - CLOUDFLARE_PURGE_WEBHOOK_KEY: key that guards the webhook trigger.
        - SLACK_WEBHOOK_URL: Slack incoming webhook URL.
      - A CD system able to POST to the Kestra webhook when a deploy goes healthy.

    Quick start:
      1. Set the three secrets above in your Kestra namespace.
      2. Point your CD post-sync hook (for example Argo CD notifications) at the webhook URL.
      3. Pass zone_id and verify_url in the webhook body or run manually.

    Outputs:
      - outputs.purge_cache.requestId: Cloudflare purge request identifier.
      - outputs.verify_site.code: HTTP status returned by the verification probe.

    Notes:
      - purgeAll clears the whole zone; switch to files or tags for surgical purges.
  tags:
    - Cloud
    - Infrastructure
  ee: false
  demo: false
  metaDescription: Purge the full Cloudflare cache on a deploy-healthy webhook, verify the site responds, and notify Slack.
