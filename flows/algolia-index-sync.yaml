id: algolia-index-sync
namespace: company.team

inputs:
  - id: lookbackInterval
    type: STRING
    displayName: Lookback interval
    description: Duration used in SQL INTERVAL expressions (Postgres format). Example: "1 hour", "1 day"
    defaults: "1 hour"

  - id: algoliaIndex
    type: STRING
    displayName: Algolia index name
    description: Name of the Algolia index to upsert documents to
    defaults: "articles"

  - id: testRows
    type: ARRAY
    itemType: JSON
    displayName: Test rows (optional)
    description: A list of JSON objects to use when running the flow manually for testing.
    defaults: []

pluginDefaults:
  - type: io.kestra.plugin.jdbc.postgresql
    values:
      url: "{{ secret('POSTGRES_JDBC_URL') }}"
      username: "{{ secret('POSTGRES_USERNAME') }}"
      password: "{{ secret('POSTGRES_PASSWORD') }}"

tasks:
  - id: each
    type: io.kestra.plugin.core.flow.ForEach
    description: Iterate over rows returned by the Postgres trigger
    values: "{{ inputs.testRows ?? trigger.rows ?? [] }}"
    tasks:
      - id: upsert
        type: io.kestra.plugin.core.http.Request
        description: Upsert each record into Algolia index via REST API
        method: PUT
        uri: "https://{{ secret('ALGOLIA_APP_ID') }}-dsn.algolia.net/1/indexes/{{ inputs.algoliaIndex }}/{{ json(taskrun.value).id }}"
        contentType: application/json
        headers:
          x-algolia-application-id: "{{ secret('ALGOLIA_APP_ID') }}"
          x-algolia-api-key: "{{ secret('ALGOLIA_ADMIN_API_KEY') }}"
        body: "{{ json(taskrun.value) }}"

      - id: mark_indexed
        type: io.kestra.plugin.jdbc.postgresql.Query
        description: Mark record as indexed to prevent reprocessing
        sql: |
          UPDATE public.articles
          SET indexed_at = now()
          WHERE id = {{ json(taskrun.value).id }};

triggers:
  - id: postgres_trigger
    type: io.kestra.plugin.jdbc.postgresql.Trigger
    sql: |
      SELECT
        id,
        title,
        content,
        updated_at
      FROM public.articles
      WHERE updated_at > CURRENT_TIMESTAMP - INTERVAL '{{ inputs.lookbackInterval ?? "1 hour" }}'
      AND (indexed_at IS NULL OR indexed_at < updated_at)
    interval: PT5M
    fetchType: FETCH

description: |
  ## Prerequisites
  - A running Postgres instance with a table named `public.articles`:
    - `id` (INT PRIMARY KEY), `title` (TEXT), `content` (TEXT),
      `updated_at` (TIMESTAMP), optional `indexed_at` (TIMESTAMP).
  - An Algolia account with an index created.
  - Kestra server running where you can import this flow.

  ## Secrets
  - `POSTGRES_JDBC_URL` — JDBC URL for Postgres (e.g. jdbc:postgresql://host:5432/db)
  - `POSTGRES_USERNAME` — DB user
  - `POSTGRES_PASSWORD` — DB password
  - `ALGOLIA_APP_ID` — Algolia Application ID
  - `ALGOLIA_ADMIN_API_KEY` — Algolia Admin API key with write permissions

  ## Inputs
  - `lookbackInterval` (STRING, default: "1 hour") — Postgres INTERVAL used to fetch recently updated rows.
  - `algoliaIndex` (STRING, default: "articles") — Target Algolia index name.

  ## Quick Start
  1. Start Postgres and ensure `public.articles` exists. Insert a test row with a recent `updated_at`.
  2. Add required secrets to your Kestra instance and import this flow.
  3. Run the flow manually or wait for the trigger interval.

  ## Expected Outputs
  - `{{ outputs.postgres_trigger.rows }}` — list of rows found by the trigger.
  - `{{ outputs.each.outputs['upsert'].status }}` — HTTP status of the upsert call.
  - `{{ outputs.each.outputs['upsert'].body }}` — Algolia response body.

  ## Notes / Pitfalls
  - Ensure `indexed_at` column exists or remove the condition from the SQL.
  - Avoid large batches to prevent Algolia rate limits.
  - Ensure the Algolia Admin API key has write permissions.
  - If Kestra can't reach Postgres, verify the `POSTGRES_JDBC_URL`.

  ## Links
  - Kestra PostgreSQL Plugin: https://kestra.io/plugins/plugin-jdbc-postgresql
  - Algolia REST API: https://www.algolia.com/doc/rest-api/search/

labels:
  name: Sync Postgres to Algolia
