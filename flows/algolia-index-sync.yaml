id: algolia-index-sync
namespace: company.team

inputs:
  - id: lookbackInterval
    type: STRING
    displayName: Lookback interval
    description: 'Duration used in SQL INTERVAL expressions (Postgres format). Example: "1 hour", "1 day"'
    defaults: "1 hour"

  - id: algoliaIndex
    type: STRING
    displayName: Algolia index name
    description: Name of the Algolia index to upsert documents to
    defaults: "articles"

  - id: testRows
    type: ARRAY
    itemType: JSON
    displayName: Test rows (optional)
    description: A list of JSON objects to use when running the flow manually for testing.
    defaults: []

pluginDefaults:
  - type: io.kestra.plugin.jdbc.postgresql
    values:
      url: "{{ secret('POSTGRES_JDBC_URL') }}"
      username: "{{ secret('POSTGRES_USERNAME') }}"
      password: "{{ secret('POSTGRES_PASSWORD') }}"

triggers:
  - id: postgres_trigger
    type: io.kestra.plugin.jdbc.postgresql.Trigger
    sql: |
      SELECT
        id,
        title,
        content,
        updated_at
      FROM public.articles
      WHERE updated_at > CURRENT_TIMESTAMP - INTERVAL '{{ inputs.lookbackInterval ?? "1 hour" }}'
      AND (indexed_at IS NULL OR indexed_at < updated_at)
    interval: PT5M
    fetchType: FETCH

tasks:
  - id: each
    type: io.kestra.plugin.core.flow.ForEach
    description: Iterate over rows returned by the Postgres trigger or test input
    values: "{{ inputs.testRows ?? trigger.rows ?? [] }}"
    tasks:
      - id: upsert
        type: io.kestra.plugin.algolia.Index
        description: Upsert each record into Algolia index
        applicationId: "{{ secret('ALGOLIA_APP_ID') }}"
        apiKey: "{{ secret('ALGOLIA_ADMIN_API_KEY') }}"
        indexName: "{{ inputs.algoliaIndex }}"
        objects:
          - >
            {{ json(taskrun.value) | merge({'objectID': json(taskrun.value).id ?? (now() | date("yyyyMMddHHmmss")) }) }}

      - id: mark_indexed
        type: io.kestra.plugin.jdbc.postgresql.Query
        description: Mark record as indexed to prevent reprocessing
        sql: |
          UPDATE public.articles
          SET indexed_at = now()
          WHERE id = {{ json(taskrun.value).id }};

extend:
  title: Sync Postgres records to Algolia index
  description: |
    This blueprint demonstrates how to incrementally sync records from a PostgreSQL database to an Algolia index using Kestra.

    ## Prerequisites
    - A running Postgres instance with a table named `public.articles`:
      - `id` (INT PRIMARY KEY), `title` (TEXT), `content` (TEXT),
        `updated_at` (TIMESTAMP), optional `indexed_at` (TIMESTAMP).
    - An Algolia account and an existing index.
    - A running Kestra instance.

    ## Secrets
    - `POSTGRES_JDBC_URL` — JDBC URL for Postgres (e.g. jdbc:postgresql://host:5432/db)
    - `POSTGRES_USERNAME` — Database username
    - `POSTGRES_PASSWORD` — Database password
    - `ALGOLIA_APP_ID` — Algolia Application ID
    - `ALGOLIA_ADMIN_API_KEY` — Algolia Admin API key with write permissions

    ## Inputs
    - `lookbackInterval` (STRING, default: "1 hour") — Interval used to fetch recently updated rows.
    - `algoliaIndex` (STRING, default: "articles") — Target Algolia index name.
    - `testRows` (ARRAY, optional) — Use this to manually test the flow without a database trigger.

    ## Quick Start
    1. Configure required secrets in Kestra.
    2. Ensure your Postgres table contains recent data.
    3. Run the flow manually or wait for the scheduled trigger.

    ## Expected Outputs
    - `{{ outputs.postgres_trigger.rows }}` — Rows fetched from Postgres.
    - `{{ outputs.each.outputs['upsert'] }}` — Algolia indexing response.

    ## Notes / Pitfalls
    - Each record must include a unique `objectID` (mapped from `id`) to prevent duplicates in Algolia.
    - Ensure the `indexed_at` column exists or adjust the SQL query accordingly.
    - Avoid large batches to prevent Algolia rate limits.
    - Verify network connectivity between Kestra and Postgres.

    ## Links
    - Kestra PostgreSQL Plugin: https://kestra.io/plugins/plugin-jdbc-postgresql
    - Algolia Plugin Docs: https://kestra.io/plugins/plugin-algolia
    - Algolia API Docs: https://www.algolia.com/doc/

  meta_description: Incrementally sync PostgreSQL records to Algolia index using Kestra.
  tags:
    - Business
    - Data 
  ee: false

labels:
  name: Sync Postgres to Algolia
