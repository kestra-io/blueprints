id: web-scraping-anti-bot-bypass
namespace: company.team

tasks:
  - id: set_target
    type: io.kestra.plugin.scripts.python.Script
    description: Define the target website to scrape. Replace with your own URL.
    script: |
      from kestra import Kestra

      Kestra.outputs({
          "name": "example-site",
          "url": "https://example.com/"
      })

  - id: scrape_with_scrappey
    type: io.kestra.plugin.core.http.Request
    description: >-
      Send a scrape request to the Scrappey API. Replace YOUR_API_KEY with your
      actual Scrappey API key from https://scrappey.com/
    uri: "https://publisher.scrappey.com/api/v1?key={{ secret('SCRAPPEY_API_KEY') }}"
    method: POST
    contentType: application/json
    body: |
      {
        "cmd": "request.get",
        "url": "{{ outputs.set_target.vars.url }}"
      }

triggers:
  - id: schedule_trigger
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 */6 * * *"

extend:
  title: Web Scraping with Anti-Bot Bypass via Scrappey
  metaTitle: Web Scraping with Anti-Bot Bypass
  shortDescription: >-
    Scrape any website without being blocked by anti-bot technologies using the
    Scrappey API, with a scheduled trigger for recurring data collection.
  description: |
    **Bypass Cloudflare, CAPTCHA, and other anti-bot systems to reliably scrape any website on a recurring schedule — without managing headless browsers or proxy infrastructure.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger fires the flow every 6 hours to automate recurring data collection
    2. A `io.kestra.plugin.scripts.python.Script` task defines the target URL — replace `https://example.com/` with any website or parameterize it via a flow input to scrape multiple targets dynamically
    3. A `io.kestra.plugin.core.http.Request` task sends a POST request to the [Scrappey API](https://scrappey.com/), which handles browser fingerprinting, TLS spoofing, JavaScript rendering, and cookie management to return the fully rendered HTML of the target page

    Scrappey supports multiple scraping modes via the `cmd` field: `request.get` for standard GET requests, `request.post` for form submissions, and `request.getCookies` for session-based scrapers that need persistent cookies. You can also specify a `proxy` country to localize the scraping IP.

    After retrieval, chain a `io.kestra.plugin.scripts.python.Script` task using BeautifulSoup or lxml to parse the returned HTML and extract the specific fields you need — then write results to a database, Google Sheet, or data warehouse for downstream analysis.

    Ideal for:
    - **Market researchers and competitive intelligence teams** who need to collect pricing, inventory, or listing data from bot-protected e-commerce or SaaS websites
    - **Data engineers** building ETL pipelines that must reliably handle Cloudflare-protected sources without managing their own proxy rotation or headless browser infrastructure
    - **Business analysts** automating periodic scraping of job boards, real estate portals, or financial data aggregators that block standard HTTP clients
  tags:
    - Data
    - Business
  ee: false
  demo: false
  metaDescription: >-
    Scrape Cloudflare and CAPTCHA-protected websites on a schedule using Kestra
    and the Scrappey API. Bypass anti-bot systems without managing headless browsers.

