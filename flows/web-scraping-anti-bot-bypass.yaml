extend:
  title: Web Scraping with Anti-Bot Bypass via Scrappey
  metaTitle: Web Scraping with Anti-Bot Bypass
  shortDescription: >-
    Scrape any website without being blocked by anti-bot technologies using the
    Scrappey API, with a scheduled trigger for recurring data collection.
  description: |
    **Bypass anti-bot protections and reliably scrape website content using the Scrappey API on a recurring schedule.**

    1. A `io.kestra.plugin.core.trigger.Schedule` trigger fires the flow every 6 hours to automate recurring scrape jobs
    2. A `io.kestra.plugin.scripts.python.Script` task defines the target URL and site name to scrape, which you can replace with any data source or dynamic input
    3. A `io.kestra.plugin.core.http.Request` task sends a POST request to the Scrappey API with the target URL, using your API key to authenticate and retrieve the fully rendered page content

    Ideal for:
    - **Market researchers** who need to collect competitor data from bot-protected websites
    - **Data engineers** building scraping pipelines that must handle Cloudflare and similar protections
    - **Business analysts** automating periodic data extraction from hard-to-scrape sources
  tags:
    - Web Scraping
    - API
    - Automation
  ee: false
  demo: false
  metaDescription: >-
    Scrape bot-protected websites on a schedule using the Scrappey API to bypass
    anti-bot technologies like Cloudflare and CAPTCHAs.

id: web-scraping-anti-bot-bypass
namespace: company.team

tasks:
  - id: set_target
    type: io.kestra.plugin.scripts.python.Script
    description: Define the target website to scrape. Replace with your own URL.
    script: |
      from kestra import Kestra

      Kestra.outputs({
          "name": "example-site",
          "url": "https://example.com/"
      })

  - id: scrape_with_scrappey
    type: io.kestra.plugin.core.http.Request
    description: >-
      Send a scrape request to the Scrappey API. Replace YOUR_API_KEY with your
      actual Scrappey API key from https://scrappey.com/
    uri: "https://publisher.scrappey.com/api/v1?key={{ secret('SCRAPPEY_API_KEY') }}"
    method: POST
    contentType: application/json
    body: |
      {
        "cmd": "request.get",
        "url": "{{ outputs.set_target.vars.url }}"
      }

triggers:
  - id: schedule_trigger
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 */6 * * *"
