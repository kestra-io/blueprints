extend:
  title: "Voice-Based Appointment Booking with ElevenLabs AI"
  metaTitle: "Voice Appointment Booking with ElevenLabs AI"
  shortDescription: >-
    Automate appointment scheduling through voice interactions powered by ElevenLabs AI
    and Cal.com calendar availability checks.
  description: |
    **Deliver a hands-free appointment booking experience using AI-driven voice conversations and real-time calendar availability.**

    1. A `io.kestra.plugin.core.trigger.Webhook` receives inbound booking requests from the ElevenLabs voice agent
    2. A `io.kestra.plugin.core.flow.If` task routes the request based on whether it is a slot availability check or a booking confirmation
    3. A `io.kestra.plugin.core.http.Request` task queries the Cal.com API to retrieve available time slots
    4. A `io.kestra.plugin.core.http.Request` task submits the booking to Cal.com when a slot is confirmed
    5. A `io.kestra.plugin.scripts.python.Script` task formats and returns the response to the voice agent

    Ideal for:
    - **Clinics and therapists** who want to automate patient appointment scheduling via phone
    - **Consultants and coaches** looking for a hands-free booking experience for clients
    - **Sales teams** that need to reduce scheduling friction and book meetings faster
  tags:
    - AI
    - Voice
    - Scheduling
  ee: false
  demo: false
  metaDescription: >-
    Automate appointment booking with ElevenLabs AI voice agents and Cal.com.
    Check availability, book slots, and confirm meetings through natural voice conversations.

id: voice-appointment-booking-elevenlabs
namespace: company.team
tasks:
  - id: check_is_request_for_available_slot
    type: io.kestra.plugin.core.flow.If
    condition: "{{ trigger.body.tool_name == 'checkAvailableSlot' }}"
    then:
      - id: check_available_slot
        type: io.kestra.plugin.core.http.Request
        uri: "https://api.cal.com/v1/slots"
        method: GET
        headers:
          Authorization: "Bearer {{ secret('CAL_API_KEY') }}"
        params:
          startTime: "{{ trigger.body.startTime }}"
          endTime: "{{ trigger.body.endTime }}"
          eventTypeId: "{{ secret('CAL_EVENT_TYPE_ID') }}"
          timeZone: "Asia/Kolkata"
    else:
      - id: book_an_appointment
        type: io.kestra.plugin.core.http.Request
        uri: "https://api.cal.com/v1/bookings"
        method: POST
        headers:
          Authorization: "Bearer {{ secret('CAL_API_KEY') }}"
          Content-Type: "application/json"
        body: |
          {
            "eventTypeId": {{ secret('CAL_EVENT_TYPE_ID') }},
            "start": "{{ trigger.body.startTime }}",
            "responses": {
              "name": "{{ trigger.body.name }}",
              "email": "{{ trigger.body.email }}"
            },
            "timeZone": "Asia/Kolkata",
            "language": "en",
            "title": "Appointment Booking",
            "metadata": {}
          }
  - id: respond_to_webhook
    type: io.kestra.plugin.scripts.python.Script
    script: |
      import json
      from kestra import Kestra

      # Return the upstream task output as the webhook response
      Kestra.outputs({"response": json.dumps({"status": "ok"})})
triggers:
  - id: webhook
    type: io.kestra.plugin.core.trigger.Webhook
    key: "{{ secret('WEBHOOK_KEY') }}"
