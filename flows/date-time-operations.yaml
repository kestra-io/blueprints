id: date-time-operations
namespace: company.team

tasks:
  - id: set_times
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from datetime import datetime, timedelta
      from kestra import Kestra

      now = datetime.now()
      today = now.date()
      tomorrow = today + timedelta(days=1)
      one_hour_ago = now - timedelta(hours=1)
      weekday_name = now.strftime("%A")

      Kestra.outputs({
          "now": now.isoformat(),
          "current_time_with_seconds": now.strftime("%H:%M:%S"),
          "today": today.isoformat(),
          "tomorrow": tomorrow.isoformat(),
          "one_hour_ago": one_hour_ago.isoformat(),
          "weekday": weekday_name
      })

  - id: 12_hours_from_now
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from datetime import datetime, timedelta
      from kestra import Kestra

      now = datetime.now()
      twelve_hours_later = now + timedelta(hours=12)

      Kestra.outputs({
          "twelve_hours_from_now": twelve_hours_later.isoformat()
      })

  - id: edit_times
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from datetime import datetime
      from kestra import Kestra

      now_iso = "{{ outputs.set_times.vars.now }}"
      parsed = datetime.fromisoformat(now_iso)

      Kestra.outputs({
          "current_time": parsed.isoformat(),
          "current_time_formatted": parsed.strftime("%Y %b %d")
      })

  - id: format_mmmm_dd_yyyy
    type: io.kestra.plugin.scripts.python.Script
    script: |
      from datetime import datetime
      from kestra import Kestra

      now = datetime.now()

      Kestra.outputs({
          "formatted_date": now.strftime("%B %d %Y")
      })

extend:
  title: Working with Date and Time Operations
  metaTitle: Date and Time Operations in Kestra
  shortDescription: >-
    Learn how to create, format, and manipulate dates and times using Python
    scripts within a Kestra flow.
  description: |
    **Perform common date and time operations including formatting, arithmetic, and timezone handling using Python tasks.**

    1. A `io.kestra.plugin.scripts.python.Script` task computes the current date and time, tomorrow's date, one hour ago, and the current weekday name
    2. A `io.kestra.plugin.scripts.python.Script` task adds 12 hours to the current time and outputs the result
    3. A `io.kestra.plugin.scripts.python.Script` task reformats an ISO date string into a custom display format (e.g., "2024 Jan 15")
    4. A `io.kestra.plugin.scripts.python.Script` task formats the current date into "Month DD YYYY" style (e.g., "January 15 2024")

    Ideal for:
    - **Data engineers** who need to compute relative dates for pipeline scheduling and partitioning
    - **Automation builders** working with date filters, deadlines, or time-windowed queries
    - **Beginners** learning how to handle date and time transformations in workflow automation
  tags:
    - Core
    - Getting Started
  ee: false
  demo: true
  metaDescription: >-
    Learn to format dates, perform date arithmetic, and handle time
    transformations using Python scripts inside a Kestra workflow.

