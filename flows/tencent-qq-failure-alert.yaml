id: tencent-qq-failure-alert
namespace: system

labels:
  purpose: alerting
  owner: platform
  channel: qq

inputs:
  - id: qq_recipient_ids
    type: ARRAY
    itemType: STRING
    defaults: ["oncall-primary", "oncall-secondary"]
    description: QQ user or group identifiers that should receive the failure alert.

  - id: kestra_ui_url
    type: STRING
    defaults: http://localhost:8080
    description: Base URL of your Kestra instance, used to build a clickable link to the failed execution.

concurrency:
  limit: 1

tasks:
  - id: notify_qq_on_failure
    type: io.kestra.plugin.tencent.qq.QQExecution
    description: Sends the failed or warning execution details to the on-call QQ group.
    url: "{{ secret('TENCENT_IM_URL') }}"
    token: "{{ secret('TENCENT_IM_TOKEN') }}"
    executionId: "{{ trigger.executionId }}"
    timeout: PT30S
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3
    payload: |
      {
        "To_Account": {{ inputs.qq_recipient_ids | toJson }},
        "MsgType": "TIMTextElem",
        "MsgContent": {
          "Text": {{ ("Kestra alert: flow " ~ trigger.namespace ~ "." ~ trigger.flowId ~ " finished in state " ~ trigger.state ~ ". Execution " ~ trigger.executionId ~ ". Open " ~ inputs.kestra_ui_url ~ "/ui/executions/" ~ trigger.namespace ~ "/" ~ trigger.flowId ~ "/" ~ trigger.executionId) | toJson }}
        }
      }

triggers:
  - id: on_failed_or_warning
    type: io.kestra.plugin.core.trigger.Flow
    states:
      - FAILED
      - WARNING
    conditions:
      - type: io.kestra.plugin.core.condition.ExecutionNamespace
        namespace: company
        comparison: PREFIX

extend:
  shortDescription: Send a Tencent Cloud IM / QQ alert whenever any flow in a namespace fails or finishes with a warning.
  title: Alert a QQ group on flow failures across a namespace
  metaTitle: QQ failure alerts for Kestra flows
  description: |
    This flow acts as a centralized failure-alerting workflow for an entire namespace. A Flow trigger
    listens for executions that end in `FAILED` or `WARNING` state anywhere under a configurable namespace
    prefix, then uses the Tencent Cloud IM / QQ `QQExecution` task to push the execution details to an
    on-call QQ group.

    Because it reacts to other flows' executions rather than running on its own schedule, you deploy it
    once and it covers every current and future flow in the namespace. The notification includes the
    originating flow id, namespace, final state, and a clickable link back to the failed execution in the
    Kestra UI.

    Reliability and safety choices:
    - The single QQ REST call is the most failure-sensitive part of an alerter, so the task has a
      `retry` (constant, three attempts, 10s apart) and a `timeout: PT30S` so a transient 5xx, a 429
      rate-limit, or a hung connection does not silently drop the alert.
    - This flow lives in the reserved `system` namespace so it is not matched by its own `company`
      namespace condition. That is the recommended pattern for instance-wide alerting flows: it keeps the
      monitor out of your business namespaces and prevents the alerter from reacting to its own
      executions (a self-trigger loop). Because this flow IS the failure alerter, it also intentionally
      has no flow-level `errors` block: a self-referential alert on its own failure would loop. If the QQ
      call exhausts its retries, the failure is surfaced in the task logs.
    - `concurrency: { limit: 1 }` throttles the alerter: if many flows fail at once (a shared outage),
      QQ messages are serialized rather than fanning out in parallel. Note this still sends one message
      per failed execution. For very high-volume namespaces, prefer a windowed digest (see the
      pipeline-digest blueprint) over per-execution paging, and consider dropping `WARNING` from the
      watched states if warnings are noisy in your environment.
    - The message text is assembled once and passed through `| toJson`, so flow ids or namespaces that
      contain quotes, backslashes, or newlines are escaped correctly instead of breaking the JSON payload.

    Flow trigger conditions are evaluated by the server and do not support Pebble templating, so the
    watched namespace is set as a literal value in the `ExecutionNamespace` condition (default `company`
    with `comparison: PREFIX`). Edit that value directly to monitor a different namespace prefix. The
    task properties (recipients, links) do support templating and read from the flow inputs.

    Prerequisites:
    - A Tencent Cloud IM / QQ application with the REST API enabled and a valid `UserSig` signature.
    - The Tencent Cloud IM `sendmsg` REST endpoint URL for your SDKAppID.
    - One or more QQ user or group identifiers to receive alerts.

    Secrets (never hardcode values):
    - `TENCENT_IM_URL`: the Tencent Cloud IM REST endpoint used to send messages, for example the
      `v4/openim/sendmsg` URL including your SDKAppID, admin identifier, and (commonly) the `usersig`
      signature in the query string.
    - `TENCENT_IM_TOKEN`: the Tencent Cloud IM authentication token or `UserSig` signature passed via the
      task `token` property. If your endpoint already carries the `usersig` in the URL query string, the
      `token` property is redundant; keep whichever single auth mode your deployment uses and remove the
      other so it is unambiguous which credential authenticates the call.

    Quick start:
    1. Add the `TENCENT_IM_URL` and `TENCENT_IM_TOKEN` secrets to your Kestra instance.
    2. Edit the `namespace` value in the `ExecutionNamespace` condition to the namespace prefix you
       want to monitor (for example `company`). Deploy this alerter once per monitored prefix.
    3. Set `qq_recipient_ids` to the QQ identifiers of your on-call responders.
    4. Set `kestra_ui_url` to your instance base URL so alert links resolve correctly.
    5. Deploy this flow, then trigger a failing flow in the watched namespace to confirm delivery.

    Expected outputs:
    The `QQExecution` task does not expose file outputs; it performs the API call and the message lands
    in the target QQ conversation. Use the Logs tab of the `notify_qq_on_failure` task run to confirm the
    request succeeded (and to see retry attempts), and the Gantt view to confirm the trigger fired for the
    upstream failed execution.

    Documentation:
    - Tencent plugin tasks: https://kestra.io/plugins/plugin-tencent
    - Flow trigger: https://kestra.io/docs/workflow-components/triggers/flow-trigger
    - Tencent Cloud IM REST API: https://www.tencentcloud.com/document/product/1047
  tags:
    - Business
  ee: false
  demo: false
  metaDescription: Send a Tencent Cloud IM / QQ alert whenever any flow in a Kestra namespace fails or finishes with a warning.
