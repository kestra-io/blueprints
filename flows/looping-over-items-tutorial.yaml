id: looping-over-items-tutorial
namespace: company.team
tasks:
  # Provide sample data: a list of URLs
  - id: generate_urls
    type: io.kestra.plugin.scripts.python.Script
    description: "Generates a sample list of URLs to demonstrate looping."
    script: |
      import json
      from kestra import Kestra

      urls = [
          "https://www.reddit.com",
          "https://kestra.io/",
          "https://supabase.com/",
          "https://duckduckgo.com/",
          "https://httpbin.org/"
      ]

      Kestra.outputs({"urls": json.dumps(urls)})

  # Path 1: Process the entire list as one batch
  - id: batch_add_param
    type: io.kestra.plugin.scripts.python.Script
    description: "Processes the entire list at once, adding param1 to every item in a single pass."
    script: |
      import json
      from kestra import Kestra

      urls = json.loads('{{ outputs.generate_urls.vars.urls }}')

      results = []
      for url in urls:
          results.append({
              "url": url,
              "param1": "added_by_batch_processing"
          })

      print(f"Batch processed {len(results)} items at once.")

      Kestra.outputs({"batch_results": json.dumps(results)})

  # Path 2: Iterate over each item individually using ForEach
  - id: loop_over_urls
    type: io.kestra.plugin.core.flow.ForEach
    description: "Iterates over each URL one at a time using ForEach."
    values: "{{ outputs.generate_urls.vars.urls }}"
    tasks:
      - id: process_single_url
        type: io.kestra.plugin.scripts.python.Script
        description: "Processes a single URL inside the loop, adding param1."
        script: |
          from kestra import Kestra

          current_url = "{{ taskrun.value }}"
          print(f"Processing individual item: {current_url}")

          Kestra.outputs({
              "url": current_url,
              "param1": "added_by_loop_processing"
          })

  # Summarize both approaches
  - id: summary
    type: io.kestra.plugin.scripts.python.Script
    description: "Collects and displays results from both the batch and loop approaches."
    script: |
      import json
      from kestra import Kestra

      batch_results = json.loads('{{ outputs.batch_add_param.vars.batch_results }}')

      summary = {
          "batch_item_count": len(batch_results),
          "batch_sample": batch_results[0] if batch_results else None,
          "lesson": "Batch processing handles all items in one task. "
                    "ForEach processes items one at a time, which is "
                    "useful when each item needs its own API call or side effect."
      }

      print(json.dumps(summary, indent=2))
      Kestra.outputs(summary)

extend:
  title: "Looping Over Items — A Beginner's Guide"
  metaTitle: "Looping Over Items in Kestra"
  shortDescription: >-
    A beginner tutorial that demonstrates how to iterate over a list of items
    in Kestra using ForEach, showing both whole-list and per-item
    processing patterns.
  description: |
    **Learn how Kestra handles iteration by processing a list of URLs in two different ways: as a single batch and one item at a time.**

    1. A `io.kestra.plugin.scripts.python.Script` task generates a sample list of URLs
    2. A `io.kestra.plugin.scripts.python.Script` task processes the entire list as one batch, adding a parameter to every item at once
    3. A `io.kestra.plugin.core.flow.ForEach` task iterates over each URL individually
    4. Inside the loop, a `io.kestra.plugin.scripts.python.Script` task enriches each URL with an extra parameter, demonstrating per-item processing
    5. A final `io.kestra.plugin.scripts.python.Script` task collects and displays the results

    Ideal for:
    - **Beginners** who want to understand how Kestra processes lists of items
    - **Data engineers** learning the difference between batch processing and sequential iteration in Kestra
  tags:
    - Getting Started
    - Core
  ee: false
  demo: true
  metaDescription: >-
    Beginner Kestra tutorial showing how to loop over items using ForEach,
    comparing batch processing with per-item iteration patterns.

